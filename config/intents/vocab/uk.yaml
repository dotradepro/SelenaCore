# config/intents/vocab/uk.yaml — Ukrainian vocabulary for IntentCompiler
# Used by IntentCompiler to expand templates into regex patterns.

verbs:
  on:
    exact: ["увімкни", "вімкни", "включи", "запусти", "активуй"]
    stem: ["увімк", "вімк"]
  off:
    exact: ["вимкни", "відключи"]
    stem: ["вимк"]
  play:
    exact: ["увімкни", "включи", "постав", "запусти", "грай"]
    stem: ["увімк"]
  stop:
    exact: ["стоп", "зупини", "досить"]
  pause:
    exact: ["пауза", "на паузу", "зупини", "призупини"]
  resume:
    exact: ["продовжи", "продовжуй", "далі грай"]
    stem: ["продовж"]
  set:
    exact: ["постав", "встанови", "налаштуй", "зроби", "вистав"]
  query:
    exact: ["який", "яка", "яке", "скільки", "покажи", "що", "як", "розкажи"]
  search:
    exact: ["знайди", "пошукай"]
  scan:
    exact: ["скануй", "перевір"]
  list:
    exact: ["покажи", "список", "які"]
  enable:
    exact: ["увімкни", "активуй"]
  disable:
    exact: ["вимкни", "деактивуй"]

nouns:
  # MEDIA
  radio:      ["радіо", "музику", "музика", "аудіо"]
  volume:     ["гучність", "звук", "голосність"]
  track:      ["трек", "пісня"]
  # DEVICE
  light:      ["світло", "лампу", "лампа", "освітлення", "лампочку"]
  device:     ["пристрої", "пристрої", "девайси"]
  # WEATHER
  weather:    ["погода", "погоду", "погодою"]
  forecast:   ["прогноз", "прогнозують", "обіцяють"]
  temperature_noun: ["температура", "температуру", "градусів", "градуси"]
  # ENERGY
  power:      ["споживання", "електрики", "електрику", "енергію", "енергія"]
  # PRESENCE
  presence:   ["присутності", "присутність"]
  # AUTOMATION
  automation: ["автоматизації", "автоматизацій", "автоматизацію"]

params:
  level:        "__NUMBER__"
  genre:        ["рок", "джаз", "класику", "класичну", "ембієнт", "lofi", "поп", "новини"]
  station_name: "__FREETEXT__"
  query:        "__FREETEXT__"
  name:         "__FREETEXT__"
  period:       ["завтра", "тиждень", "кілька днів"]

locations:
  kitchen:     ["кухні", "кухня", "кухню"]
  bedroom:     ["спальні", "спальня", "спальню"]
  living_room: ["вітальні", "залі", "вітальня", "гостинній"]
  bathroom:    ["ванній", "ванна", "туалеті"]
  garage:      ["гаражі", "гараж"]
  hallway:     ["коридорі", "передпокої", "коридор"]
