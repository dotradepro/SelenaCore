# config/intents/definitions.yaml — Intent definitions for IntentCompiler
#
# Each intent specifies:
#   module:     system module that handles this intent
#   noun_class: semantic category (for SmartMatcher/LLM routing)
#   verb:       action verb category
#   priority:   higher = checked first (10 for parameterised, 5 for simple)
#   templates:  patterns using {verb.X}, {noun.X}, {param.X}, {location}
#   params:     parameter definitions (type: number|enum|freetext, key: vocab params key)
#   overrides:  language-specific raw regex (bypass template expansion)
#
# Template syntax:
#   {verb.play}      → expands to (?:play|put on|start|...) from vocab
#   {noun.radio}     → expands to (?:radio|music|audio|...) from vocab
#   {param.genre}    → expands to (?P<genre>rock|jazz|...) from vocab params
#   {param.level}    → expands to (?P<level>\d+) for __NUMBER__ type
#   {param.query}    → expands to (?P<query>.+) for __FREETEXT__ type
#   {location}       → expands to optional (?:kitchen|bedroom|...)? from vocab locations
#   X?               → trailing ? makes the preceding token optional

noun_classes:
  MEDIA:       {priority: 10}
  DEVICE:      {priority: 10}
  WEATHER:     {priority: 5}
  ENERGY:      {priority: 5}
  PRESENCE:    {priority: 5}
  AUTOMATION:  {priority: 5}
  WATCHDOG:    {priority: 5}

intents:

  # ══════════════════════════════════════════════════════════════════════
  # MEDIA (media-player) — 14 intents
  # ══════════════════════════════════════════════════════════════════════

  media.volume_set:
    module: media-player
    noun_class: MEDIA
    verb: set
    priority: 10
    description: "Set volume to specific level"
    templates:
      - "{noun.volume} {param.level}"
      - "{verb.set} {noun.volume} {param.level}"
    params:
      level: {type: number}
    overrides:
      uk:
        - "гучність\\s+(?:на\\s+)?(?P<level>\\d+)"
        - "постав\\s+гучність\\s+(?P<level>\\d+)"
      en:
        - "(?:set\\s+)?volume\\s+(?:to\\s+)?(?P<level>\\d+)"

  media.play_genre:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 10
    description: "Play radio by genre"
    templates:
      - "{verb.play} {param.genre} {noun.radio}?"
      - "{verb.play} {noun.radio}? {param.genre}"
    params:
      genre: {type: enum, key: genre}
    overrides:
      uk:
        - "(?:у?вімкни|включи|постав|запусти)\\s+(?P<genre>рок|джаз|класик\\w*|ембієнт|ambient|lofi|поп|новини)\\s*(?:музику|радіо)?"
      en:
        - "play\\s+(?P<genre>rock|jazz|classical|ambient|lofi|pop|news)\\s*(?:music|radio)?"

  media.play_radio_name:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 10
    description: "Play specific radio station by name"
    templates:
      - "{verb.play} {noun.radio} {param.station_name}"
    params:
      station_name: {type: freetext}
    overrides:
      uk:
        - "(?:у?вімкни|включи)\\s+(?:радіо|станцію)\\s+(?P<station_name>.+)"
      en:
        - "(?:play|tune)\\s+(?:radio\\s+)?station\\s+(?P<station_name>.+)"
        - "play\\s+(?P<station_name>.+)\\s+radio"

  media.play_search:
    module: media-player
    noun_class: MEDIA
    verb: search
    priority: 10
    description: "Search and play track"
    templates:
      - "{verb.search} {param.query}"
    params:
      query: {type: freetext}
    overrides:
      uk:
        - "(?:знайди|пошукай)\\s+(?P<query>.+)"
      en:
        - "(?:find|search)\\s+(?:for\\s+)?(?P<query>.+)"

  media.play_radio:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 5
    description: "Play radio (generic)"
    templates:
      - "{verb.play} {noun.radio}"
    overrides:
      uk:
        - "(?:у?вімкни|включи|постав|запусти)\\s+радіо"
        - "(?:у?вімкни|включи|запусти)\\s+музику"
      en:
        - "(?:play|turn on)\\s+(?:the\\s+)?radio"
        - "(?:play|turn on)\\s+(?:some\\s+)?music"

  media.pause:
    module: media-player
    noun_class: MEDIA
    verb: pause
    priority: 5
    description: "Pause playback"
    overrides:
      uk: ["пауза", "на паузу", "зупини", "призупини"]
      en: ["\\bpause\\b", "hold\\s+(?:the\\s+)?music"]

  media.resume:
    module: media-player
    noun_class: MEDIA
    verb: resume
    priority: 5
    description: "Resume playback"
    overrides:
      uk: ["продовж(?:и|уй)", "далі грай"]
      en: ["\\bresume\\b", "continue\\s+play"]

  media.stop:
    module: media-player
    noun_class: MEDIA
    verb: stop
    priority: 5
    description: "Stop playback"
    overrides:
      uk: ["\\bстоп\\b", "зупини\\s*музику", "досить", "вимкни\\s+музику"]
      en: ["\\bstop\\b", "stop\\s+(?:the\\s+)?music"]

  media.next:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 5
    description: "Next track"
    overrides:
      uk: ["наступн(?:ий|а|е)", "далі", "наступний\\s+трек"]
      en: ["\\bnext\\b", "next\\s+track", "skip"]

  media.previous:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 5
    description: "Previous track"
    overrides:
      uk: ["попередн(?:ій|я|є)", "назад", "попередній\\s+трек"]
      en: ["\\bprevious\\b", "prev(?:ious)?\\s+track", "go\\s+back"]

  media.volume_up:
    module: media-player
    noun_class: MEDIA
    verb: set
    priority: 5
    description: "Increase volume"
    overrides:
      uk: ["гучніше", "погучніше", "додай\\s+гучност"]
      en: ["louder", "volume\\s+up", "turn\\s+(?:it\\s+)?up"]

  media.volume_down:
    module: media-player
    noun_class: MEDIA
    verb: set
    priority: 5
    description: "Decrease volume"
    overrides:
      uk: ["тихіше", "потихіше", "зменш\\s+гучність"]
      en: ["quieter", "volume\\s+down", "turn\\s+(?:it\\s+)?down"]

  media.whats_playing:
    module: media-player
    noun_class: MEDIA
    verb: query
    priority: 5
    description: "What is currently playing"
    overrides:
      uk: ["що\\s+(?:грає|звучить|граєш)", "яка\\s+(?:пісня|музика)"]
      en: ["what.s\\s+playing", "what\\s+(?:is\\s+)?(?:this|playing)"]

  media.shuffle_toggle:
    module: media-player
    noun_class: MEDIA
    verb: play
    priority: 5
    description: "Toggle shuffle mode"
    overrides:
      uk: ["перемішай", "випадков(?:ий|е)\\s+порядок"]
      en: ["\\bshuffle\\b", "mix\\s+(?:it\\s+)?up"]

  # ══════════════════════════════════════════════════════════════════════
  # WEATHER (weather-service) — 3 intents
  # ══════════════════════════════════════════════════════════════════════

  weather.current:
    module: weather-service
    noun_class: WEATHER
    verb: query
    priority: 5
    description: "Get current weather conditions"
    templates:
      - "{verb.query} {noun.weather}"
    overrides:
      uk:
        - "яка\\s+(?:зараз\\s+)?погода"
        - "що\\s+(?:з|із)\\s+погодою"
        - "як\\s+(?:там\\s+)?(?:на\\s+)?(?:вулиці|надворі|дворі)"
        - "розкажи\\s+(?:про\\s+)?погоду"
      en:
        - "what(?:'s|\\s+is)\\s+the\\s+weather"
        - "(?:current|today(?:'s)?)\\s+weather"
        - "how(?:'s|\\s+is)\\s+(?:the\\s+)?weather"
        - "weather\\s+(?:right\\s+)?now"

  weather.forecast:
    module: weather-service
    noun_class: WEATHER
    verb: query
    priority: 5
    description: "Get weather forecast for upcoming days"
    params:
      period: {type: enum, key: period}
    overrides:
      uk:
        - "прогноз\\s+(?:погоди)?(?:\\s+на\\s+(?P<period>завтра|тиждень|кілька\\s+днів))?"
        - "яка\\s+погода\\s+(?:буде\\s+)?(?P<period>завтра)"
        - "що\\s+(?:обіцяють|прогнозують)"
      en:
        - "weather\\s+forecast"
        - "forecast(?:\\s+for\\s+(?P<period>tomorrow|week|next\\s+days?))?"
        - "what(?:'s|\\s+is)\\s+the\\s+weather\\s+(?P<period>tomorrow)"
        - "weather\\s+(?P<period>tomorrow)"

  weather.temperature:
    module: weather-service
    noun_class: WEATHER
    verb: query
    priority: 5
    description: "Get current temperature"
    templates:
      - "{verb.query} {noun.temperature_noun}"
    overrides:
      uk:
        - "(?:скільки|яка)\\s+(?:зараз\\s+)?(?:градусів|температура)"
        - "температура\\s+(?:на\\s+)?(?:вулиці|надворі|зараз)"
      en:
        - "what(?:'s|\\s+is)\\s+the\\s+temperature"
        - "(?:current\\s+)?temperature"
        - "how\\s+(?:hot|cold|warm)\\s+is\\s+it"

  # ══════════════════════════════════════════════════════════════════════
  # AUTOMATION (automation-engine) — 4 intents
  # ══════════════════════════════════════════════════════════════════════

  automation.list:
    module: automation-engine
    noun_class: AUTOMATION
    verb: list
    priority: 5
    description: "List all automation rules"
    templates:
      - "{verb.list} {noun.automation}"
    overrides:
      uk:
        - "які\\s+автоматизації"
        - "список\\s+автоматизацій"
      en:
        - "list\\s+automations"
        - "show\\s+automations"

  automation.enable:
    module: automation-engine
    noun_class: AUTOMATION
    verb: enable
    priority: 5
    description: "Enable an automation rule by name"
    params:
      name: {type: freetext}
    overrides:
      uk:
        - "увімкни\\s+автоматизацію\\s+(?P<name>.+)"
      en:
        - "enable\\s+automation\\s+(?P<name>.+)"

  automation.disable:
    module: automation-engine
    noun_class: AUTOMATION
    verb: disable
    priority: 5
    description: "Disable an automation rule by name"
    params:
      name: {type: freetext}
    overrides:
      uk:
        - "вимкни\\s+автоматизацію\\s+(?P<name>.+)"
      en:
        - "disable\\s+automation\\s+(?P<name>.+)"

  automation.status:
    module: automation-engine
    noun_class: AUTOMATION
    verb: query
    priority: 5
    description: "Get automation engine status"
    overrides:
      uk:
        - "статус\\s+автоматизацій"
      en:
        - "automation\\s+status"

  # ══════════════════════════════════════════════════════════════════════
  # PRESENCE (presence-detection) — 3 intents
  # ══════════════════════════════════════════════════════════════════════

  presence.check_user:
    module: presence-detection
    noun_class: PRESENCE
    verb: query
    priority: 10
    description: "Check if a specific user is home"
    params:
      name: {type: freetext}
    overrides:
      uk:
        - "чи\\s+є\\s+(?P<name>.+)\\s+вдома"
        - "(?P<name>.+)\\s+вдома\\?"
      en:
        - "is\\s+(?P<name>.+?)\\s+(?:at\\s+)?home"
        - "is\\s+(?P<name>.+?)\\s+(?:here|around)"

  presence.who_home:
    module: presence-detection
    noun_class: PRESENCE
    verb: query
    priority: 5
    description: "List all users currently at home"
    overrides:
      uk:
        - "хто\\s+вдома"
        - "хто\\s+є\\s+вдома"
        - "хто\\s+зараз\\s+вдома"
      en:
        - "who.s\\s+home"
        - "who\\s+is\\s+home"
        - "who\\s+is\\s+at\\s+home"
        - "who.s\\s+(?:here|around)"

  presence.status:
    module: presence-detection
    noun_class: PRESENCE
    verb: query
    priority: 5
    description: "Presence status summary (home / away counts)"
    overrides:
      uk:
        - "статус\\s+присутності"
        - "присутність"
      en:
        - "presence\\s+status"
        - "presence\\s+summary"

  # ══════════════════════════════════════════════════════════════════════
  # WATCHDOG (device-watchdog) — 2 intents
  # ══════════════════════════════════════════════════════════════════════

  watchdog.status:
    module: device-watchdog
    noun_class: WATCHDOG
    verb: query
    priority: 5
    description: "Report device online/offline status"
    templates:
      - "{verb.query} {noun.device}"
    overrides:
      uk:
        - "статус\\s+пристроїв"
        - "чи\\s+всі\\s+пристрої\\s+працюють"
      en:
        - "device\\s+status"
        - "are\\s+devices\\s+online"

  watchdog.scan:
    module: device-watchdog
    noun_class: WATCHDOG
    verb: scan
    priority: 5
    description: "Trigger a device availability scan"
    templates:
      - "{verb.scan} {noun.device}"
    overrides:
      uk:
        - "перевір\\s+пристрої"
        - "скануй\\s+пристрої"
      en:
        - "scan\\s+devices"
        - "check\\s+devices"

  # ══════════════════════════════════════════════════════════════════════
  # ENERGY (energy-monitor) — 2 intents
  # ══════════════════════════════════════════════════════════════════════

  energy.current:
    module: energy-monitor
    noun_class: ENERGY
    verb: query
    priority: 5
    description: "Get current power consumption"
    templates:
      - "{verb.query} {noun.power}"
    overrides:
      uk:
        - "яке\\s+споживання"
        - "скільки\\s+електрики"
      en:
        - "power\\s+consumption"
        - "how\\s+much\\s+power"
        - "current\\s+power"

  energy.today:
    module: energy-monitor
    noun_class: ENERGY
    verb: query
    priority: 5
    description: "Get today's energy consumption"
    overrides:
      uk:
        - "скільки\\s+електрики\\s+за\\s+сьогодні"
        - "споживання\\s+за\\s+сьогодні"
      en:
        - "energy\\s+today"
        - "today.s\\s+consumption"
        - "today.s\\s+energy"
