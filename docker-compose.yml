services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-core
    restart: unless-stopped
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - ${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}:${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}:ro
      - ${PIPER_MODELS_DIR:-${HOME}/.local/share/piper/models}:/var/lib/selena/models/piper
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/systemctl:/usr/bin/systemctl:ro
      - /run/systemd/system:/run/systemd/system:ro
      - /usr/bin/nsenter:/usr/bin/nsenter:ro
      - /var/log/selena:/var/log/selena
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /run/user/${HOST_UID:-1000}/pulse:/run/user/${HOST_UID:-1000}/pulse
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie:ro
      - ./core:/opt/selena-core/core
      - ./system_modules:/opt/selena-core/system_modules
      - ./agent:/opt/selena-core/agent
      - ./tests:/opt/selena-core/tests
      - ./config:/opt/selena-core/config
      - ./modules:/opt/selena-core/modules
      - ./sdk:/opt/selena-core/sdk
      - ./scripts:/opt/selena-core/scripts:ro
      - ${VOSK_MODELS_DIR:-/var/lib/selena/models/vosk}:/var/lib/selena/models/vosk
      - /media:/media:ro
      - /mnt:/mnt:ro
    devices:
      - /dev/snd:/dev/snd
    environment:
      - PULSE_SERVER=unix:/run/user/${HOST_UID:-1000}/pulse/native
      - HOST_USER=${USER:-root}
      - OLLAMA_MODELS_DIR=${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}
      - PIPER_MODELS_DIR=/var/lib/selena/models/piper
      - LLAMACPP_START_SCRIPT=${PWD}/scripts/llamacpp-start.sh
      - MALLOC_ARENA_MAX=2
      - SELENA_GPU_AVAILABLE=1
      - SELENA_GPU_TYPE=jetson
      - VOSK_MODELS_DIR=/var/lib/selena/models/vosk
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7070/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-agent
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "agent.integrity_agent"]
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - ./agent:/opt/selena-core/agent:ro
      - /var/log/selena:/var/log/selena
    env_file:
      - .env
    depends_on:
      - core

networks:
  selena_modules:
    driver: bridge

volumes:
  selena_data:
  selena_secure:
