version: "3.9"

services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-core
    restart: unless-stopped
    network_mode: host
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/selena:/var/log/selena
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - ./core:/opt/selena-core/core
      - ./system_modules:/opt/selena-core/system_modules
      - ./agent:/opt/selena-core/agent
      - ./tests:/opt/selena-core/tests
      - ./config:/opt/selena-core/config
      - ./modules:/opt/selena-core/modules
      - ./sdk:/opt/selena-core/sdk
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7070/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-agent
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "agent.integrity_agent"]
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - ./agent:/opt/selena-core/agent:ro
      - /var/log/selena:/var/log/selena
    env_file:
      - .env
    depends_on:
      - core

  # modules: запускаются отдельно для каждого модуля (см. modules/*/Dockerfile)
  # smarthome-modules:latest — базовый образ, не запускается напрямую

networks:
  selena_modules:
    driver: bridge

volumes:
  selena_data:
  selena_secure:
