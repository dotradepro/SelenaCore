services:
  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-core
    restart: unless-stopped
    network_mode: host
    pid: host
    privileged: true
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - ${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}:${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}:ro
      - ${PIPER_MODELS_DIR:-${HOME}/.local/share/piper/models}:/var/lib/selena/models/piper
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/bin/systemctl:/usr/bin/systemctl:ro
      - /run/systemd/system:/run/systemd/system:ro
      - /usr/bin/nsenter:/usr/bin/nsenter:ro
      - /var/log/selena:/var/log/selena
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket
      - /run/user/${HOST_UID:-1000}/pulse:/run/user/${HOST_UID:-1000}/pulse
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie:ro
      - ./core:/opt/selena-core/core
      - ./system_modules:/opt/selena-core/system_modules
      - ./agent:/opt/selena-core/agent
      - ./tests:/opt/selena-core/tests
      - ./config:/opt/selena-core/config
      - ./modules:/opt/selena-core/modules
      - ./sdk:/opt/selena-core/sdk
      - ./scripts:/opt/selena-core/scripts:ro
      # Read-only .git mount so core/version.py can compute the live version
      # via `git rev-list --count HEAD` + `git rev-parse --short HEAD`. With
      # this in place the API version stays in sync with the working tree
      # automatically — no manual `docker cp .version` step is needed.
      - ./.git:/opt/selena-core/.git:ro
      - ${VOSK_MODELS_DIR:-/var/lib/selena/models/vosk}:/var/lib/selena/models/vosk
      - /media:/media:ro
      - /mnt:/mnt:ro
    devices:
      - /dev/snd:/dev/snd
    environment:
      - PULSE_SERVER=unix:/run/user/${HOST_UID:-1000}/pulse/native
      - HOST_USER=${USER:-root}
      - OLLAMA_MODELS_DIR=${OLLAMA_MODELS_DIR:-/usr/share/ollama/.ollama/models}
      - PIPER_MODELS_DIR=/var/lib/selena/models/piper
      - MALLOC_ARENA_MAX=2
      - SELENA_GPU_AVAILABLE=1
      - SELENA_GPU_TYPE=jetson
      - VOSK_MODELS_DIR=/var/lib/selena/models/vosk
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost/api/v1/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: selena-agent
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "agent.integrity_agent"]
    volumes:
      - selena_data:/var/lib/selena
      - selena_secure:/secure
      - ./agent:/opt/selena-core/agent:ro
      - /var/log/selena:/var/log/selena
    environment:
      # Dev mode: silently rebaseline manifest on edits, no SAFE MODE.
      # MUST be removed (or set to "enforce") before first public release.
      # See _private/INTEGRITY_AGENT_TODO.md
      - AGENT_MODE=dev
    env_file:
      - .env
    depends_on:
      - core

  # ── Matter / Thread support ───────────────────────────────────────────────
  # Opt-in protocol stack. The Python client lives inside selena-core (via the
  # ``matter`` provider) and talks to this server over WebSocket on :5580.
  # Profile-gated so users without Matter devices don't pay the BLE/multicast
  # cost: enable with ``docker compose --profile matter up -d``.
  matter-server:
    image: ghcr.io/home-assistant-libs/python-matter-server:stable
    container_name: selena-matter-server
    profiles: ["matter"]
    restart: unless-stopped
    network_mode: host
    privileged: true
    volumes:
      - matter_data:/data
      - /run/dbus:/run/dbus:ro
    environment:
      - MATTER_SERVER_PORT=5580
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5580/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # OpenThread Border Router — only required if you have native Thread devices
  # (i.e. devices that don't use WiFi). Most Matter bulbs/plugs are WiFi-only
  # and do NOT need this. Enable with ``docker compose --profile thread up -d``
  # alongside the ``matter`` profile. Requires an nRF52840 Thread dongle.
  otbr:
    image: openthread/otbr:latest
    container_name: selena-otbr
    profiles: ["thread"]
    restart: unless-stopped
    network_mode: host
    privileged: true
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    environment:
      - OTBR_AGENT_VERBOSE=0

networks:
  selena_modules:
    driver: bridge

volumes:
  selena_data:
  selena_secure:
  matter_data:
