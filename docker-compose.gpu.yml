# GPU override for NVIDIA Jetson / discrete GPU hosts.
# Piper TTS runs inside the container (see Dockerfile.core + scripts/start.sh)
# and uses the GPU via onnxruntime-gpu. Ollama is user-managed: install it
# yourself, then point voice.providers.ollama.url at it through the wizard.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Or use scripts/start-docker.sh for auto-detection.

services:
  core:
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - LD_LIBRARY_PATH=/usr/local/cuda-12.6/targets/aarch64-linux/lib:/usr/local/cuda/lib64:/usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu
    volumes:
      - /usr/local/cuda-12.6:/usr/local/cuda-12.6:ro
      - /usr/local/cuda:/usr/local/cuda:ro
      - /usr/lib/aarch64-linux-gnu/tegra:/usr/lib/aarch64-linux-gnu/tegra:ro
      - /usr/sbin/nvidia-smi:/usr/sbin/nvidia-smi:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - /dev/nvmap:/dev/nvmap
      - /dev/nvhost-gpu:/dev/nvhost-gpu
      - /dev/nvhost-ctrl-gpu:/dev/nvhost-ctrl-gpu
      - /dev/nvhost-as-gpu:/dev/nvhost-as-gpu
      - /dev/nvhost-prof-gpu:/dev/nvhost-prof-gpu
      - /dev/nvhost-dbg-gpu:/dev/nvhost-dbg-gpu
      - /dev/nvhost-tsg-gpu:/dev/nvhost-tsg-gpu
      - /dev/nvhost-sched-gpu:/dev/nvhost-sched-gpu
