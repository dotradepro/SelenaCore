<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Users — Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <script src="/api/shared/widget-common.js"></script>
    <style>
        body { padding: 1rem; overflow: auto; }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid var(--b);
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .badge-owner {
            background: rgba(124,58,237,.13);
            color: var(--pu, #a78bfa);
        }

        .badge-admin {
            background: rgba(90,150,255,.13);
            color: var(--ac);
        }

        .badge-user {
            background: rgba(52,214,147,.13);
            color: var(--gr);
        }

        .badge-guest {
            background: rgba(245,169,58,.13);
            color: var(--am);
        }

        #status {
            font-size: .8rem;
            color: var(--tx3);
            margin-bottom: .5rem;
        }

        .perms-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: .25rem .5rem;
            align-items: center;
            font-size: .85rem;
        }
    </style>
</head>

<body>

    <div id="status" data-i18n="loading"></div>

    <!-- Users list -->
    <div class="card">
        <div class="section-title" data-i18n="usersSection"></div>
        <div id="users-list"></div>
        <button class="btn btn-secondary" id="btn-add-user" style="margin-top:.75rem" data-i18n="addUser"></button>
    </div>

    <!-- Role permissions -->
    <div class="card">
        <div class="section-title" data-i18n="rolePerms"></div>
        <div id="role-tabs" style="display:flex;gap:.5rem;margin-bottom:.75rem"></div>
        <div id="perms-panel"></div>
    </div>

    <script>
        var L = {
            en: {
                loading: 'Loading\u2026',
                usersSection: 'Users',
                addUser: '+ Add user',
                rolePerms: 'Role permissions',
                noUsers: 'No users found.',
                roleOwner: 'Owner', roleAdmin: 'Admin', roleUser: 'User', roleGuest: 'Guest',
                devicesView: 'View devices',
                devicesControl: 'Control devices',
                modulesConf: 'Configure modules',
                usersManage: 'Manage users',
                systemReboot: 'Reboot system',
                systemUpdate: 'Update system',
                voiceCommands: 'Voice commands',
                scenesRun: 'Run scenes',
                savePerms: 'Save',
                saved: 'Saved', save_error: 'Save failed',
                errLoad: 'Failed to load users',
                errPerms: 'Failed to load permissions',
            },
            uk: {
                loading: 'Завантаження\u2026',
                usersSection: 'Користувачі',
                addUser: '+ Додати користувача',
                rolePerms: 'Права ролей',
                noUsers: 'Користувачів не знайдено.',
                roleOwner: 'Власник', roleAdmin: 'Адмін', roleUser: 'Користувач', roleGuest: 'Гість',
                devicesView: 'Перегляд пристроїв',
                devicesControl: 'Керування пристроями',
                modulesConf: 'Налаштування модулів',
                usersManage: 'Управління користувачами',
                systemReboot: 'Перезавантаження',
                systemUpdate: 'Оновлення системи',
                voiceCommands: 'Голосові команди',
                scenesRun: 'Запуск сцен',
                savePerms: 'Зберегти',
                saved: 'Збережено', save_error: 'Не вдалося зберегти',
                errLoad: 'Помилка завантаження',
                errPerms: 'Не вдалося завантажити права',
            },
        };

        var ROLE_LABELS = {};
        var selectedRole = 'admin';

        function updateRoleLabels() {
            ROLE_LABELS = { owner: t('roleOwner'), admin: t('roleAdmin'), user: t('roleUser'), guest: t('roleGuest') };
        }

        applyLang();
        updateRoleLabels();

        async function load() {
            $('status').textContent = t('loading');
            updateRoleLabels();
            try {
                var data = await apiGet('/users');
                renderUsers(data.users || []);
                $('status').textContent = '';
            } catch (e) {
                $('status').textContent = t('errLoad');
                showToast(t('errLoad'), 'error');
            }
            loadPerms(selectedRole);
        }

        function badgeClass(role) {
            return 'badge badge-' + (role || 'guest');
        }

        function renderUsers(users) {
            var el = $('users-list');
            if (!users.length) { el.innerHTML = '<p style="color:var(--tx3);font-size:.85rem">' + esc(t('noUsers')) + '</p>'; return; }
            el.innerHTML = users.map(function (u) {
                return '<div class="user-row">' +
                    '<span>' + esc(u.display_name) + ' <small style="color:var(--tx3)">@' + esc(u.username) + '</small></span>' +
                    '<span class="' + badgeClass(u.role) + '">' + esc(ROLE_LABELS[u.role] || u.role) + '</span>' +
                    '</div>';
            }).join('');
        }

        async function loadPerms(role) {
            var panel = $('perms-panel');
            panel.innerHTML = '<div class="spinner"></div>';
            try {
                var p = await apiGet('/roles/' + role + '/permissions');
                renderPerms(role, p);
                renderRoleTabs();
            } catch (e) {
                panel.innerHTML = '<p style="color:var(--tx3);font-size:.85rem">\u2014</p>';
                showToast(t('errPerms'), 'error');
            }
        }

        function renderRoleTabs() {
            var el = $('role-tabs');
            el.innerHTML = ['admin', 'user', 'guest'].map(function (r) {
                var cls = 'btn ' + (selectedRole === r ? 'btn-primary' : 'btn-secondary');
                return '<button class="' + cls + '" onclick="switchRole(\'' + r + '\')">' + esc(ROLE_LABELS[r] || r) + '</button>';
            }).join('');
        }

        function switchRole(role) {
            selectedRole = role;
            loadPerms(role);
        }

        function renderPerms(role, p) {
            var rows = [
                ['devicesView', 'devices_view', 'bool'],
                ['devicesControl', 'devices_control', 'bool'],
                ['modulesConf', 'modules_configure', 'bool'],
                ['usersManage', 'users_manage', 'bool'],
                ['systemReboot', 'system_reboot', 'bool'],
                ['systemUpdate', 'system_update', 'bool'],
                ['voiceCommands', 'voice_commands', 'select', ['all', 'basic', 'none']],
                ['scenesRun', 'scenes_run', 'select', ['all', 'approved', 'none']],
            ];
            var html = '<div class="perms-grid">';
            rows.forEach(function (row) {
                var label = t(row[0]), key = row[1], type = row[2];
                html += '<span>' + esc(label) + '</span>';
                if (type === 'bool') {
                    html += '<input type="checkbox" id="p_' + key + '" ' + (p[key] ? 'checked' : '') + '>';
                } else {
                    html += '<select id="p_' + key + '">' + (row[3] || []).map(function (v) {
                        return '<option value="' + v + '"' + (p[key] === v ? ' selected' : '') + '>' + v + '</option>';
                    }).join('') + '</select>';
                }
            });
            html += '</div>';
            html += '<button class="btn btn-primary" id="btn-save-perms" style="margin-top:.75rem" onclick="savePerms(\'' + role + '\')">' + esc(t('savePerms')) + '</button>';
            $('perms-panel').innerHTML = html;
        }

        async function savePerms(role) {
            var btn = $('btn-save-perms');
            await withLoading(btn, async function () {
                var body = {
                    devices_view: $('p_devices_view').checked,
                    devices_control: $('p_devices_control').checked,
                    modules_configure: $('p_modules_configure').checked,
                    users_manage: $('p_users_manage').checked,
                    system_reboot: $('p_system_reboot').checked,
                    system_update: $('p_system_update').checked,
                    voice_commands: $('p_voice_commands').value,
                    scenes_run: $('p_scenes_run').value,
                };
                var res = await fetch(BASE + '/roles/' + role + '/permissions', {
                    method: 'PUT',
                    headers: _apiHeaders(),
                    body: JSON.stringify(body),
                });
                if (!res.ok) throw new Error(t('save_error'));
                showToast(t('saved'), 'success');
            });
        }

        load();
    </script>
</body>

</html>
