<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Users — Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <script src="/api/shared/widget-common.js"></script>
    <style>
        body { padding: 1rem; overflow: auto; }

        h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: .75rem;
        }

        .card {
            background: var(--sf);
            border: 1px solid var(--b);
            border-radius: .5rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .5rem 0;
            border-bottom: 1px solid var(--b);
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .badge {
            font-size: .7rem;
            padding: .15rem .4rem;
            border-radius: 9999px;
            font-weight: 600;
        }

        .badge-owner {
            background: rgba(124,58,237,.13);
            color: var(--pu, #a78bfa);
        }

        .badge-admin {
            background: rgba(90,150,255,.13);
            color: var(--ac);
        }

        .badge-user {
            background: rgba(52,214,147,.13);
            color: var(--gr);
        }

        .badge-guest {
            background: rgba(245,169,58,.13);
            color: var(--am);
        }

        button {
            background: var(--sf2);
            border: 1px solid var(--b);
            color: var(--tx);
            padding: .35rem .7rem;
            border-radius: .375rem;
            cursor: pointer;
            font-size: .85rem;
        }

        button:hover {
            background: var(--sf3);
        }

        .btn-danger {
            background: rgba(224,84,84,.13);
            color: var(--rd);
            border-color: transparent;
        }

        .btn-danger:hover {
            background: rgba(224,84,84,.25);
        }

        #status {
            font-size: .8rem;
            color: var(--tx3);
            margin-bottom: .5rem;
        }

        .section-title {
            font-size: .75rem;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .5rem;
        }

        .perms-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: .25rem .5rem;
            align-items: center;
            font-size: .85rem;
        }

        select {
            background: var(--sf2);
            color: var(--tx);
            border: 1px solid var(--b);
            border-radius: .375rem;
            padding: .25rem .5rem;
            font-size: .85rem;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--b);
            border-top-color: var(--ac);
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="status" data-i18n="loading"></div>

    <!-- Users list -->
    <div class="card">
        <div class="section-title" data-i18n="usersSection"></div>
        <div id="users-list"></div>
        <button id="btn-add-user" style="margin-top:.75rem" data-i18n="addUser"></button>
    </div>

    <!-- Role permissions -->
    <div class="card">
        <div class="section-title" data-i18n="rolePerms"></div>
        <div id="role-tabs" style="display:flex;gap:.5rem;margin-bottom:.75rem"></div>
        <div id="perms-panel"></div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                loading: 'Loading…',
                usersSection: 'Users',
                addUser: '+ Add user',
                rolePerms: 'Role permissions',
                noUsers: 'No users found.',
                roleOwner: 'Owner', roleAdmin: 'Admin', roleUser: 'User', roleGuest: 'Guest',
                devicesView: 'View devices',
                devicesControl: 'Control devices',
                modulesConf: 'Configure modules',
                usersManage: 'Manage users',
                systemReboot: 'Reboot system',
                systemUpdate: 'Update system',
                voiceCommands: 'Voice commands',
                scenesRun: 'Run scenes',
                savePerms: 'Save',
                saved: 'Saved', save_error: 'Save failed',
                errLoad: 'Failed to load users',
            },
            uk: {
                loading: 'Завантаження…',
                usersSection: 'Користувачі',
                addUser: '+ Додати користувача',
                rolePerms: 'Права ролей',
                noUsers: 'Користувачів не знайдено.',
                roleOwner: 'Власник', roleAdmin: 'Адмін', roleUser: 'Користувач', roleGuest: 'Гість',
                devicesView: 'Перегляд пристроїв',
                devicesControl: 'Керування пристроями',
                modulesConf: 'Налаштування модулів',
                usersManage: 'Управління користувачами',
                systemReboot: 'Перезавантаження',
                systemUpdate: 'Оновлення системи',
                voiceCommands: 'Голосові команди',
                scenesRun: 'Запуск сцен',
                savePerms: 'Зберегти',
                saved: 'Збережено', save_error: 'Не вдалося зберегти',
                errLoad: 'Помилка завантаження',
            },
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
        }
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'lang_changed') {
                try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { }
                applyLang();
                load();
            }
        });

        var BASE = window.location.pathname.replace(/\/(settings)(\.html)?$/, '');
        var ROLE_LABELS = { owner: t('roleOwner'), admin: t('roleAdmin'), user: t('roleUser'), guest: t('roleGuest') };
        var selectedRole = 'admin';

        applyLang();

        async function load() {
            document.getElementById('status').textContent = t('loading');
            try {
                var res = await fetch(BASE + '/users', { headers: { 'X-Device-Token': localStorage.getItem('selena_device') || '' } });
                if (!res.ok) throw new Error(res.status);
                var data = await res.json();
                renderUsers(data.users || []);
                document.getElementById('status').textContent = '';
            } catch (e) {
                document.getElementById('status').textContent = t('errLoad');
            }
            loadPerms(selectedRole);
        }

        function badgeClass(role) {
            return 'badge badge-' + (role || 'guest');
        }

        function renderUsers(users) {
            var el = document.getElementById('users-list');
            if (!users.length) { el.innerHTML = '<p style="color:#71717a;font-size:.85rem">' + t('noUsers') + '</p>'; return; }
            el.innerHTML = users.map(function (u) {
                return '<div class="user-row">' +
                    '<span>' + u.display_name + ' <small style="color:#71717a">@' + u.username + '</small></span>' +
                    '<span class="' + badgeClass(u.role) + '">' + (ROLE_LABELS[u.role] || u.role) + '</span>' +
                    '</div>';
            }).join('');
        }

        async function loadPerms(role) {
            var panel = document.getElementById('perms-panel');
            panel.innerHTML = '<div class="spinner"></div>';
            try {
                var res = await fetch(BASE + '/roles/' + role + '/permissions', { headers: { 'X-Device-Token': localStorage.getItem('selena_device') || '' } });
                if (!res.ok) throw new Error();
                var p = await res.json();
                renderPerms(role, p);
                renderRoleTabs();
            } catch (e) {
                panel.innerHTML = '<p style="color:#71717a;font-size:.85rem">—</p>';
            }
        }

        function renderRoleTabs() {
            var el = document.getElementById('role-tabs');
            el.innerHTML = ['admin', 'user', 'guest'].map(function (r) {
                return '<button onclick="switchRole(\'' + r + '\')" style="' + (selectedRole === r ? 'background:#7c3aed' : '') + '">' + (ROLE_LABELS[r] || r) + '</button>';
            }).join('');
        }

        function switchRole(role) {
            selectedRole = role;
            loadPerms(role);
        }

        function renderPerms(role, p) {
            var rows = [
                ['devicesView', 'devices_view', 'bool'],
                ['devicesControl', 'devices_control', 'bool'],
                ['modulesConf', 'modules_configure', 'bool'],
                ['usersManage', 'users_manage', 'bool'],
                ['systemReboot', 'system_reboot', 'bool'],
                ['systemUpdate', 'system_update', 'bool'],
                ['voiceCommands', 'voice_commands', 'select', ['all', 'basic', 'none']],
                ['scenesRun', 'scenes_run', 'select', ['all', 'approved', 'none']],
            ];
            var html = '<div class="perms-grid">';
            rows.forEach(function (row) {
                var label = t(row[0]), key = row[1], type = row[2];
                html += '<span>' + label + '</span>';
                if (type === 'bool') {
                    html += '<input type="checkbox" id="p_' + key + '" ' + (p[key] ? 'checked' : '') + '>';
                } else {
                    html += '<select id="p_' + key + '">' + (row[3] || []).map(function (v) {
                        return '<option value="' + v + '"' + (p[key] === v ? ' selected' : '') + '>' + v + '</option>';
                    }).join('') + '</select>';
                }
            });
            html += '</div>';
            html += '<button id="btn-save-perms" style="margin-top:.75rem" onclick="savePerms(\'' + role + '\')">' + t('savePerms') + '</button>';
            document.getElementById('perms-panel').innerHTML = html;
        }

        async function savePerms(role) {
            var btn = document.getElementById('btn-save-perms');
            btn.disabled = true;
            var body = {
                devices_view: document.getElementById('p_devices_view').checked,
                devices_control: document.getElementById('p_devices_control').checked,
                modules_configure: document.getElementById('p_modules_configure').checked,
                users_manage: document.getElementById('p_users_manage').checked,
                system_reboot: document.getElementById('p_system_reboot').checked,
                system_update: document.getElementById('p_system_update').checked,
                voice_commands: document.getElementById('p_voice_commands').value,
                scenes_run: document.getElementById('p_scenes_run').value,
            };
            try {
                var elevated = sessionStorage.getItem('selena_elevated') || '';
                var res = await fetch(BASE + '/roles/' + role + '/permissions', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-Device-Token': localStorage.getItem('selena_device') || '', 'X-Elevated-Token': elevated },
                    body: JSON.stringify(body),
                });
                if (res.ok) {
                    btn.textContent = t('saved');
                    btn.style.background = 'var(--gr)';
                    btn.style.color = '#fff';
                    setTimeout(function () { btn.textContent = t('savePerms'); btn.disabled = false; btn.style.background = ''; btn.style.color = ''; }, 2000);
                } else {
                    btn.textContent = t('save_error');
                    btn.style.background = 'var(--rd)';
                    btn.style.color = '#fff';
                    setTimeout(function () { btn.textContent = t('savePerms'); btn.disabled = false; btn.style.background = ''; btn.style.color = ''; }, 3000);
                }
            } catch (e) {
                btn.textContent = t('save_error');
                btn.style.background = 'var(--rd)';
                btn.style.color = '#fff';
                setTimeout(function () { btn.textContent = t('savePerms'); btn.disabled = false; btn.style.background = ''; btn.style.color = ''; }, 3000);
            }
        }

        load();
    </script>
</body>

</html>
