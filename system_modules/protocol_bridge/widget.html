<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: var(--tx);
            font-size: 13px;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.ok {
            background: var(--gr);
        }

        .dot.error {
            background: var(--rd);
        }

        .dot.idle {
            background: var(--tx2);
        }

        .label {
            font-size: 12px;
            color: var(--tx);
            flex: 1;
        }

        .val {
            font-size: 12px;
            color: var(--tx);
            font-weight: 600;
        }

        .event-item {
            font-size: 11px;
            color: var(--tx2);
            border-bottom: 1px solid var(--b);
            padding: 4px 0;
        }

        .event-item span {
            color: var(--ac);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- Left panel: connection status -->
        <div class="panel">
            <h3>Protocol Bridge</h3>
            <div class="status-row">
                <div class="dot" id="mqtt-dot"></div>
                <div class="label">MQTT</div>
                <div class="val" id="mqtt-status">—</div>
            </div>
            <div class="status-row">
                <div class="dot" id="http-dot"></div>
                <div class="label">HTTP Poll</div>
                <div class="val" id="http-count">—</div>
            </div>
            <div class="stat"><span style="color:var(--tx2)">Bridged devices</span><span id="bridged-count"
                    style="font-weight:600">—</span></div>
            <div class="stat"><span style="color:var(--tx2)">Messages/min</span><span id="msg-rate"
                    style="font-weight:600">—</span></div>
            <div class="stat"><span style="color:var(--tx2)">Errors</span><span id="err-count"
                    style="font-weight:600;color:var(--rd)">—</span></div>
        </div>
        <!-- Right panel: recent events -->
        <div class="panel">
            <h3>Recent Events</h3>
            <div id="events-list">
                <div class="event-item" style="color:var(--tx3)">Loading…</div>
            </div>
        </div>
    </div>
    <script>
        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const headers = { "Authorization": "Bearer " + TOKEN };

        async function refresh() {
            try {
                const r = await fetch(BASE + "/status", { headers });
                if (!r.ok) return;
                const d = await r.json();

                const mqttOk = d.mqtt?.connected;
                document.getElementById("mqtt-dot").className = "dot " + (mqttOk ? "ok" : "error");
                document.getElementById("mqtt-status").textContent = mqttOk ? "Connected" : "Disconnected";
                document.getElementById("http-count").textContent = (d.http_pollers ?? 0) + " pollers";
                document.getElementById("bridged-count").textContent = d.bridged_devices ?? 0;
                document.getElementById("msg-rate").textContent = d.messages_per_min ?? 0;
                document.getElementById("err-count").textContent = d.error_count ?? 0;

                const events = d.recent_events ?? [];
                const el = document.getElementById("events-list");
                if (events.length === 0) {
                    el.innerHTML = '<div class="event-item" style="color:var(--tx3)">No events yet</div>';
                } else {
                    el.innerHTML = events.slice(0, 6).map(e =>
                        `<div class="event-item"><span>${e.type}</span> — ${e.device_id ?? ""}</div>`
                    ).join("");
                }
            } catch { }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
