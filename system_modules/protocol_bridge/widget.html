<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: var(--tx);
            font-size: 13px;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.ok {
            background: var(--gr);
        }

        .dot.error {
            background: var(--rd);
        }

        .dot.idle {
            background: var(--tx2);
        }

        .label {
            font-size: 12px;
            color: var(--tx);
            flex: 1;
        }

        .val {
            font-size: 12px;
            color: var(--tx);
            font-weight: 600;
        }

        .event-item {
            font-size: 11px;
            color: var(--tx2);
            border-bottom: 1px solid var(--b);
            padding: 4px 0;
        }

        .event-item span {
            color: var(--ac);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- Left panel: connection status -->
        <div class="panel">
            <h3 data-i18n="panel_bridge"></h3>
            <div class="status-row">
                <div class="dot" id="mqtt-dot"></div>
                <div class="label">MQTT</div>
                <div class="val" id="mqtt-status">—</div>
            </div>
            <div class="status-row">
                <div class="dot" id="http-dot"></div>
                <div class="label">HTTP Poll</div>
                <div class="val" id="http-count">—</div>
            </div>
            <div class="stat"><span style="color:var(--tx2)" data-i18n="lbl_bridged"></span><span id="bridged-count"
                    style="font-weight:600">—</span></div>
            <div class="stat"><span style="color:var(--tx2)" data-i18n="lbl_msgrate"></span><span id="msg-rate"
                    style="font-weight:600">—</span></div>
            <div class="stat"><span style="color:var(--tx2)" data-i18n="lbl_errors"></span><span id="err-count"
                    style="font-weight:600;color:var(--rd)">—</span></div>
        </div>
        <!-- Right panel: recent events -->
        <div class="panel">
            <h3 data-i18n="panel_events"></h3>
            <div id="events-list">
                <div class="event-item" style="color:var(--tx3)" data-i18n="loading"></div>
            </div>
        </div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { panel_bridge: 'Protocol Bridge', lbl_bridged: 'Bridged devices', lbl_msgrate: 'Messages/min', lbl_errors: 'Errors', panel_events: 'Recent Events', loading: 'Loading…', no_events: 'No events yet', connected: 'Connected', disconnected: 'Disconnected', pollers_suffix: ' pollers' },
            uk: { panel_bridge: 'Міст протоколів', lbl_bridged: 'Пристроїв', lbl_msgrate: 'Повід./хв', lbl_errors: 'Помилки', panel_events: 'Недавні події', loading: 'Завантаження…', no_events: 'Подій немає', connected: 'Підключено', disconnected: 'Відключено', pollers_suffix: ' опитувачів' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); refresh(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const headers = { "Authorization": "Bearer " + TOKEN };

        async function refresh() {
            try {
                const r = await fetch(BASE + "/status", { headers });
                if (!r.ok) return;
                const d = await r.json();

                const mqttOk = d.mqtt?.connected;
                document.getElementById("mqtt-dot").className = "dot " + (mqttOk ? "ok" : "error");
                document.getElementById("mqtt-status").textContent = mqttOk ? t('connected') : t('disconnected');
                document.getElementById("http-count").textContent = (d.http_pollers ?? 0) + t('pollers_suffix');
                document.getElementById("bridged-count").textContent = d.bridged_devices ?? 0;
                document.getElementById("msg-rate").textContent = d.messages_per_min ?? 0;
                document.getElementById("err-count").textContent = d.error_count ?? 0;

                const events = d.recent_events ?? [];
                const el = document.getElementById("events-list");
                if (events.length === 0) {
                    el.innerHTML = '<div class="event-item" style="color:var(--tx3)">' + t('no_events') + '</div>';
                } else {
                    el.innerHTML = events.slice(0, 6).map(e =>
                        `<div class="event-item"><span>${e.type}</span> — ${e.device_id ?? ""}</div>`
                    ).join("");
                }
            } catch { }
        }

        applyLang();
        refresh();
        setInterval(refresh, 5000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")); document.documentElement.classList.toggle("has-wallpaper", p.classList.contains("has-wallpaper")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
