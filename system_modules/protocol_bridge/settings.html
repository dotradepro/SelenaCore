<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol Bridge Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        body {
            overflow-y: auto;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--sf);
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            color: var(--tx2);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tx);
        }

        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--sf);
        }

        .toggle-row:last-child {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 13px;
        }

        .toggle-desc {
            font-size: 11px;
            color: var(--tx3);
            margin-top: 2px;
        }

        input[type=checkbox] {
            width: auto;
        }

        .badge.connected {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.disconnected {
            background: rgba(248, 113, 113, 0.15);
            color: var(--rd);
        }

        .status-bar {
            display: flex;
            gap: 24px;
            background: var(--sf);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--ac);
        }

        .stat .desc {
            font-size: 11px;
            color: var(--tx3);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        #save-msg {
            font-size: 12px;
            color: var(--gr);
            margin-left: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <!-- Status bar -->
        <div class="status-bar">
            <div class="stat">
                <div class="num" id="s-bridged">0</div>
                <div class="desc" data-i18n="lbl_bridged"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-msg">0</div>
                <div class="desc" data-i18n="lbl_msgrate"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-err">0</div>
                <div class="desc" data-i18n="lbl_errors"></div>
            </div>
            <div class="stat">
                <div id="s-mqtt-badge" class="badge disconnected" data-i18n="mqtt_offline"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('mqtt')" data-i18n="tab_mqtt"></div>
            <div class="tab" onclick="switchTab('http')" data-i18n="tab_http"></div>
            <div class="tab" onclick="switchTab('zigbee')" data-i18n="tab_zigbee"></div>
            <div class="tab" onclick="switchTab('advanced')" data-i18n="tab_advanced"></div>
        </div>

        <!-- MQTT tab -->
        <div class="tab-content active" id="tab-mqtt">
            <div class="card">
                <h2 data-i18n="h_mqtt_broker"></h2>
                <div class="form-row">
                    <label data-i18n="lbl_broker_host"></label>
                    <input id="mqtt-host" placeholder="localhost" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_port"></label>
                    <input id="mqtt-port" type="number" value="1883" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_user_opt"></label>
                    <input id="mqtt-user" placeholder="mqtt_user" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_pass_opt"></label>
                    <input id="mqtt-pass" type="password" placeholder="••••••••" />
                </div>
            </div>
            <div class="card">
                <h2 data-i18n="h_subscriptions"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_ha_discovery"></div>
                        <div class="toggle-desc">homeassistant/+/+/config</div>
                    </div>
                    <input type="checkbox" id="ha-discovery" checked />
                </div>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label">zigbee2mqtt</div>
                        <div class="toggle-desc">zigbee2mqtt/bridge/devices + states</div>
                    </div>
                    <input type="checkbox" id="z2m-enabled" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_z2m_topic"></label>
                    <input id="z2m-topic" value="zigbee2mqtt" />
                </div>
            </div>
        </div>

        <!-- HTTP Poll tab -->
        <div class="tab-content" id="tab-http">
            <div class="card">
                <h2 data-i18n="h_http_polling"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_http_enable"></div>
                        <div class="toggle-desc" data-i18n="tgl_http_desc"></div>
                    </div>
                    <input type="checkbox" id="http-enabled" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_poll_interval"></label>
                    <input id="http-interval" type="number" value="30" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_req_timeout"></label>
                    <input id="http-timeout" type="number" value="5" />
                </div>
            </div>
        </div>

        <!-- Zigbee / Z-Wave tab -->
        <div class="tab-content" id="tab-zigbee">
            <div class="card">
                <h2 data-i18n="h_zigbee"></h2>
                <p style="color:var(--tx3);font-size:12px;margin-bottom:12px" data-i18n="zigbee_info"></p>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_zigbee_autoreg"></div>
                        <div class="toggle-desc" data-i18n="tgl_zigbee_autoreg_desc"></div>
                    </div>
                    <input type="checkbox" id="zigbee-auto-register" checked />
                </div>
            </div>
            <div class="card">
                <h2 data-i18n="h_zwave"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_zwave"></div>
                        <div class="toggle-desc">zwave-js-ui/+/status topic</div>
                    </div>
                    <input type="checkbox" id="zwave-enabled" />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_zwave_topic"></label>
                    <input id="zwave-topic" value="zwave" />
                </div>
            </div>
        </div>

        <!-- Advanced tab -->
        <div class="tab-content" id="tab-advanced">
            <div class="card">
                <h2 data-i18n="h_general"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_reconnect"></div>
                        <div class="toggle-desc" data-i18n="tgl_reconnect_desc"></div>
                    </div>
                    <input type="checkbox" id="reconnect" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_reconnect_max"></label>
                    <input id="reconnect-max" type="number" value="60" />
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="save-btn" onclick="save()" data-i18n="save_btn"></button>
            <span id="save-msg" data-i18n="saved"></span>
        </div>
    </div>

    <script src="/api/shared/widget-common.js"></script>
    <script>
    // Module-specific i18n: strings live in system_modules/protocol_bridge/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/protocol-bridge. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/protocol-bridge?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[protocol-bridge] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

        function switchTab(name) {
            document.querySelectorAll(".tab").forEach(function (el) { el.classList.remove("active"); });
            document.querySelectorAll(".tab-content").forEach(function (c) { c.classList.remove("active"); });
            event.target.classList.add("active");
            document.getElementById("tab-" + name).classList.add("active");
        }

        function loadStatus() {
            apiGet("/status").then(function (d) {
                $("s-bridged").textContent = d.bridged_devices != null ? d.bridged_devices : 0;
                $("s-msg").textContent = d.messages_per_min != null ? d.messages_per_min : 0;
                $("s-err").textContent = d.error_count != null ? d.error_count : 0;
                var badge = $("s-mqtt-badge");
                if (d.mqtt && d.mqtt.connected) {
                    badge.textContent = t('mqtt_online');
                    badge.className = "badge connected";
                } else {
                    badge.textContent = t('mqtt_offline');
                    badge.className = "badge disconnected";
                }
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function loadConfig() {
            apiGet("/config").then(function (d) {
                var set = function (id, val) { var el = $(id); if (el && val != null) el.value = val; };
                var chk = function (id, val) { var el = $(id); if (el) el.checked = !!val; };
                set("mqtt-host", d.mqtt_host);
                set("mqtt-port", d.mqtt_port);
                set("mqtt-user", d.mqtt_username);
                set("z2m-topic", d.z2m_base_topic);
                chk("ha-discovery", d.ha_discovery_enabled !== false);
                chk("z2m-enabled", d.z2m_enabled !== false);
                chk("zigbee-auto-register", d.zigbee_auto_register !== false);
                set("http-interval", d.http_poll_interval);
                set("http-timeout", d.http_timeout);
                chk("http-enabled", d.http_enabled !== false);
                chk("reconnect", d.reconnect !== false);
                set("reconnect-max", d.reconnect_max_delay);
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function save() {
            var btn = $("save-btn");
            withLoading(btn, function () {
                var cfg = {
                    mqtt_host: $("mqtt-host").value,
                    mqtt_port: parseInt($("mqtt-port").value) || 1883,
                    mqtt_username: $("mqtt-user").value || null,
                    mqtt_password: $("mqtt-pass").value || null,
                    ha_discovery_enabled: $("ha-discovery").checked,
                    z2m_enabled: $("z2m-enabled").checked,
                    z2m_base_topic: $("z2m-topic").value,
                    zigbee_auto_register: $("zigbee-auto-register").checked,
                    http_enabled: $("http-enabled").checked,
                    http_poll_interval: parseInt($("http-interval").value) || 30,
                    http_timeout: parseFloat($("http-timeout").value) || 5,
                    reconnect: $("reconnect").checked,
                    reconnect_max_delay: parseInt($("reconnect-max").value) || 60
                };
                return apiPost("/config", cfg).then(function () {
                    showToast(t("saved"), "success");
                });
            });
        }

        loadI18n().then(function () {
            applyLang();
            loadStatus();
            loadConfig();
            setInterval(loadStatus, 10000);
        });
    </script>
</body>

</html>
