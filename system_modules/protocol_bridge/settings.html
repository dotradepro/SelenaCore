<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Protocol Bridge Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            font-size: 14px;
            min-height: 100%;
            overflow-y: auto;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--tx3);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--sf);
            margin-bottom: 20px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            color: var(--tx2);
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--sf);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tx);
        }

        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--b2);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--tx);
            font-size: 13px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--ac);
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--sf);
        }

        .toggle-row:last-child {
            border-bottom: none;
        }

        .toggle-label {
            font-size: 13px;
        }

        .toggle-desc {
            font-size: 11px;
            color: var(--tx3);
            margin-top: 2px;
        }

        input[type=checkbox] {
            width: auto;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.connected {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.disconnected {
            background: rgba(248, 113, 113, 0.15);
            color: var(--rd);
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background .15s;
        }

        .btn-primary {
            background: var(--ac);
            color: var(--tx);
        }

        .btn-primary:hover {
            background: var(--ac);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--rd);
        }

        .status-bar {
            display: flex;
            gap: 24px;
            background: var(--sf);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--ac);
        }

        .stat .desc {
            font-size: 11px;
            color: var(--tx3);
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 20px;
        }

        #save-msg {
            font-size: 12px;
            color: var(--gr);
            margin-left: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <!-- Status bar -->
        <div class="status-bar">
            <div class="stat">
                <div class="num" id="s-bridged">0</div>
                <div class="desc" data-i18n="lbl_bridged"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-msg">0</div>
                <div class="desc" data-i18n="lbl_msgrate"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-err">0</div>
                <div class="desc" data-i18n="lbl_errors"></div>
            </div>
            <div class="stat">
                <div id="s-mqtt-badge" class="badge disconnected" data-i18n="mqtt_offline"></div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('mqtt')" data-i18n="tab_mqtt"></div>
            <div class="tab" onclick="switchTab('http')" data-i18n="tab_http"></div>
            <div class="tab" onclick="switchTab('zigbee')" data-i18n="tab_zigbee"></div>
            <div class="tab" onclick="switchTab('advanced')" data-i18n="tab_advanced"></div>
        </div>

        <!-- MQTT tab -->
        <div class="tab-content active" id="tab-mqtt">
            <div class="card">
                <h2 data-i18n="h_mqtt_broker"></h2>
                <div class="form-row">
                    <label data-i18n="lbl_broker_host"></label>
                    <input id="mqtt-host" placeholder="localhost" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_port"></label>
                    <input id="mqtt-port" type="number" value="1883" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_user_opt"></label>
                    <input id="mqtt-user" placeholder="mqtt_user" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_pass_opt"></label>
                    <input id="mqtt-pass" type="password" placeholder="••••••••" />
                </div>
            </div>
            <div class="card">
                <h2 data-i18n="h_subscriptions"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_ha_discovery"></div>
                        <div class="toggle-desc">homeassistant/+/+/config</div>
                    </div>
                    <input type="checkbox" id="ha-discovery" checked />
                </div>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label">zigbee2mqtt</div>
                        <div class="toggle-desc">zigbee2mqtt/bridge/devices + states</div>
                    </div>
                    <input type="checkbox" id="z2m-enabled" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_z2m_topic"></label>
                    <input id="z2m-topic" value="zigbee2mqtt" />
                </div>
            </div>
        </div>

        <!-- HTTP Poll tab -->
        <div class="tab-content" id="tab-http">
            <div class="card">
                <h2 data-i18n="h_http_polling"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_http_enable"></div>
                        <div class="toggle-desc" data-i18n="tgl_http_desc"></div>
                    </div>
                    <input type="checkbox" id="http-enabled" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_poll_interval"></label>
                    <input id="http-interval" type="number" value="30" />
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_req_timeout"></label>
                    <input id="http-timeout" type="number" value="5" />
                </div>
            </div>
        </div>

        <!-- Zigbee / Z-Wave tab -->
        <div class="tab-content" id="tab-zigbee">
            <div class="card">
                <h2 data-i18n="h_zigbee"></h2>
                <p style="color:var(--tx3);font-size:12px;margin-bottom:12px" data-i18n="zigbee_info"></p>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_zigbee_autoreg"></div>
                        <div class="toggle-desc" data-i18n="tgl_zigbee_autoreg_desc"></div>
                    </div>
                    <input type="checkbox" id="zigbee-auto-register" checked />
                </div>
            </div>
            <div class="card">
                <h2 data-i18n="h_zwave"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_zwave"></div>
                        <div class="toggle-desc">zwave-js-ui/+/status topic</div>
                    </div>
                    <input type="checkbox" id="zwave-enabled" />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_zwave_topic"></label>
                    <input id="zwave-topic" value="zwave" />
                </div>
            </div>
        </div>

        <!-- Advanced tab -->
        <div class="tab-content" id="tab-advanced">
            <div class="card">
                <h2 data-i18n="h_general"></h2>
                <div class="toggle-row">
                    <div>
                        <div class="toggle-label" data-i18n="tgl_reconnect"></div>
                        <div class="toggle-desc" data-i18n="tgl_reconnect_desc"></div>
                    </div>
                    <input type="checkbox" id="reconnect" checked />
                </div>
                <div class="form-row" style="margin-top:10px">
                    <label data-i18n="lbl_reconnect_max"></label>
                    <input id="reconnect-max" type="number" value="60" />
                </div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" onclick="save()" data-i18n="save_btn"></button>
            <span id="save-msg" data-i18n="saved"></span>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: '⚡ Protocol Bridge', subtitle: 'MQTT / HTTP / Zigbee gateway — device state synchronization',
                lbl_bridged: 'Bridged devices', lbl_msgrate: 'Messages/min', lbl_errors: 'Errors',
                mqtt_offline: 'MQTT offline', mqtt_online: 'MQTT online',
                tab_mqtt: 'MQTT', tab_http: 'HTTP Poll', tab_zigbee: 'Zigbee / Z-Wave', tab_advanced: 'Advanced',
                h_mqtt_broker: 'MQTT Broker', lbl_broker_host: 'Broker host', lbl_port: 'Port',
                lbl_user_opt: 'Username (optional)', lbl_pass_opt: 'Password (optional)',
                h_subscriptions: 'Subscriptions', tgl_ha_discovery: 'Home Assistant Discovery', lbl_z2m_topic: 'zigbee2mqtt base topic',
                h_http_polling: 'HTTP Polling', tgl_http_enable: 'Enable HTTP polling', tgl_http_desc: 'Auto-poll devices with poll_url in meta',
                lbl_poll_interval: 'Default poll interval (seconds)', lbl_req_timeout: 'Request timeout (seconds)',
                h_zigbee: 'Zigbee via MQTT', zigbee_info: 'Zigbee devices are bridged via zigbee2mqtt. Configure the zigbee2mqtt topic in the MQTT tab.',
                tgl_zigbee_autoreg: 'Auto-register discovered Zigbee devices', tgl_zigbee_autoreg_desc: 'Add to Device Registry on first message',
                h_zwave: 'Z-Wave via MQTT', tgl_zwave: 'Enable Z-Wave JS UI discovery', lbl_zwave_topic: 'Z-Wave MQTT base topic',
                h_general: 'General', tgl_reconnect: 'Reconnect on disconnect', tgl_reconnect_desc: 'Exponential backoff up to 60s',
                lbl_reconnect_max: 'Max reconnect delay (seconds)',
                save_btn: 'Save & Reconnect', saved: '✓ Saved'
            },
            uk: {
                title: '⚡ Міст протоколів', subtitle: 'MQTT / HTTP / Zigbee шлюз — синхронізація стану пристроїв',
                lbl_bridged: 'Пристрої', lbl_msgrate: 'Повід./хв', lbl_errors: 'Помилки',
                mqtt_offline: 'MQTT офлайн', mqtt_online: 'MQTT онлайн',
                tab_mqtt: 'MQTT', tab_http: 'HTTP Poll', tab_zigbee: 'Zigbee / Z-Wave', tab_advanced: 'Налаштування',
                h_mqtt_broker: 'MQTT брокер', lbl_broker_host: 'Хост брокера', lbl_port: 'Порт',
                lbl_user_opt: 'Користувач (необов\'язково)', lbl_pass_opt: 'Пароль (необов\'язково)',
                h_subscriptions: 'Підписки', tgl_ha_discovery: 'Виявлення Home Assistant', lbl_z2m_topic: 'zigbee2mqtt base topic',
                h_http_polling: 'HTTP опитування', tgl_http_enable: 'Увімкнути HTTP-опитування', tgl_http_desc: 'Автоопит пристроїв з poll_url у meta',
                lbl_poll_interval: 'Інтервал опитування (секунд)', lbl_req_timeout: 'Таймаут запиту (секунд)',
                h_zigbee: 'Zigbee через MQTT', zigbee_info: 'Zigbee-пристрої бриджуються через zigbee2mqtt. Налаштуйте zigbee2mqtt topic у вкладці MQTT.',
                tgl_zigbee_autoreg: 'Автореєстрація Zigbee-пристроїв', tgl_zigbee_autoreg_desc: 'Додати в Device Registry при першому повідомленні',
                h_zwave: 'Z-Wave через MQTT', tgl_zwave: 'Z-Wave JS UI discovery', lbl_zwave_topic: 'Z-Wave MQTT base topic',
                h_general: 'Загальне', tgl_reconnect: 'Відновлення після роз\'єднання', tgl_reconnect_desc: 'Експоненціальне збільшення до 60с',
                lbl_reconnect_max: 'Макс. затримка перед повторним підключенням (с)',
                save_btn: 'Зберегти і перепідключити', saved: '✓ Збережено'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadStatus(); loadConfig(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const h = { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" };

        function switchTab(name) {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
            event.target.classList.add("active");
            document.getElementById("tab-" + name).classList.add("active");
        }

        async function loadStatus() {
            try {
                const r = await fetch(BASE + "/status", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                document.getElementById("s-bridged").textContent = d.bridged_devices ?? 0;
                document.getElementById("s-msg").textContent = d.messages_per_min ?? 0;
                document.getElementById("s-err").textContent = d.error_count ?? 0;
                const badge = document.getElementById("s-mqtt-badge");
                if (d.mqtt?.connected) { badge.textContent = t('mqtt_online'); badge.className = "badge connected"; }
                else { badge.textContent = t('mqtt_offline'); badge.className = "badge disconnected"; }
            } catch { }
        }

        async function loadConfig() {
            try {
                const r = await fetch(BASE + "/config", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val ?? el.value; };
                const chk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
                set("mqtt-host", d.mqtt_host);
                set("mqtt-port", d.mqtt_port);
                set("mqtt-user", d.mqtt_username);
                set("z2m-topic", d.z2m_base_topic);
                chk("ha-discovery", d.ha_discovery_enabled !== false);
                chk("z2m-enabled", d.z2m_enabled !== false);
                chk("zigbee-auto-register", d.zigbee_auto_register !== false);
                set("http-interval", d.http_poll_interval);
                set("http-timeout", d.http_timeout);
                chk("http-enabled", d.http_enabled !== false);
                chk("reconnect", d.reconnect !== false);
                set("reconnect-max", d.reconnect_max_delay);
            } catch { }
        }

        async function save() {
            const cfg = {
                mqtt_host: document.getElementById("mqtt-host").value,
                mqtt_port: parseInt(document.getElementById("mqtt-port").value) || 1883,
                mqtt_username: document.getElementById("mqtt-user").value || null,
                mqtt_password: document.getElementById("mqtt-pass").value || null,
                ha_discovery_enabled: document.getElementById("ha-discovery").checked,
                z2m_enabled: document.getElementById("z2m-enabled").checked,
                z2m_base_topic: document.getElementById("z2m-topic").value,
                zigbee_auto_register: document.getElementById("zigbee-auto-register").checked,
                http_enabled: document.getElementById("http-enabled").checked,
                http_poll_interval: parseInt(document.getElementById("http-interval").value) || 30,
                http_timeout: parseFloat(document.getElementById("http-timeout").value) || 5,
                reconnect: document.getElementById("reconnect").checked,
                reconnect_max_delay: parseInt(document.getElementById("reconnect-max").value) || 60,
            };
            try {
                const r = await fetch(BASE + "/config", { method: "POST", headers: h, body: JSON.stringify(cfg) });
                if (r.ok) {
                    const msg = document.getElementById("save-msg");
                    msg.style.display = "inline";
                    setTimeout(() => msg.style.display = "none", 2000);
                }
            } catch { }
        }

        applyLang();
        loadStatus();
        loadConfig();
        setInterval(loadStatus, 10000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
