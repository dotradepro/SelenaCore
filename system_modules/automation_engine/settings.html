<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Engine Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            font-size: 14px;
            min-height: 100%;
            overflow-y: auto;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--tx);
            margin: 0;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 10px;
        }

        .form-row label {
            font-size: 12px;
            color: var(--tx2);
        }

        .form-row input:focus,
        .form-row select:focus {
            border-color: var(--ac);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 12px;
        }

        .dyn-fields {
            background: var(--bg);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 10px;
            display: none;
        }

        .dyn-fields.visible {
            display: block;
        }

        details>summary {
            cursor: pointer;
            color: var(--tx3);
            font-size: 12px;
            padding: 6px 0;
        }

        details textarea:focus {
            outline: none;
            border-color: var(--ac);
        }

        .rule-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--sf);
        }

        .rule-name {
            flex: 1;
            font-size: 13px;
        }

        .rule-trigger {
            font-size: 11px;
            color: var(--tx3);
        }

        .badge.on {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.off {
            background: rgba(148, 163, 184, 0.15);
            color: var(--tx2);
        }

        .stat-bar {
            display: flex;
            gap: 24px;
            background: var(--sf);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--am);
        }

        .stat .desc {
            font-size: 11px;
            color: var(--tx3);
        }

        .msg {
            font-size: 12px;
            color: var(--gr);
            margin-left: 10px;
            display: none;
        }

        .err-msg {
            color: var(--rd);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <div class="stat-bar">
            <div class="stat">
                <div class="num" id="s-total">0</div>
                <div class="desc" data-i18n="total_rules"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-enabled">0</div>
                <div class="desc" data-i18n="enabled"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-runs">0</div>
                <div class="desc" data-i18n="runs"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-errors" style="color:var(--rd)">0</div>
                <div class="desc" data-i18n="errors"></div>
            </div>
        </div>

        <!-- Rule list -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="active_rules"></h2>
                <button class="btn btn-primary btn-sm" onclick="loadRules()" data-i18n="refresh"></button>
            </div>
            <div id="rules-container" data-i18n="loading"></div>
        </div>

        <!-- Add Rule form -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="add_rule_title"></h2>
            </div>

            <div class="form-row">
                <label data-i18n="f_name"></label>
                <input type="text" id="f-name" data-placeholder-i18n="f_name_ph">
            </div>

            <div class="form-grid">
                <div class="form-row">
                    <label data-i18n="f_trigger_type"></label>
                    <select id="f-trigger" onchange="onTriggerChange()">
                        <option value="time" data-i18n="trig_time"></option>
                        <option value="event" data-i18n="trig_event"></option>
                        <option value="device" data-i18n="trig_device"></option>
                        <option value="presence" data-i18n="trig_presence"></option>
                    </select>
                </div>
                <div class="form-row">
                    <label data-i18n="f_action_type"></label>
                    <select id="f-action" onchange="onActionChange()">
                        <option value="device_command" data-i18n="act_device"></option>
                        <option value="publish_event" data-i18n="act_event"></option>
                        <option value="notify" data-i18n="act_notify"></option>
                    </select>
                </div>
            </div>

            <!-- Trigger dynamic fields -->
            <div class="dyn-fields visible" id="trig-time">
                <div class="form-row"><label data-i18n="f_at_time"></label><input type="time" id="f-at" value="07:00">
                </div>
            </div>
            <div class="dyn-fields" id="trig-event">
                <div class="form-row"><label data-i18n="f_event_type"></label><input type="text" id="f-trig-event"
                        placeholder="device.state_changed"></div>
            </div>
            <div class="dyn-fields" id="trig-device">
                <div class="form-row"><label data-i18n="f_device_id"></label><input type="text" id="f-trig-dev-id"
                        placeholder="uuid-..."></div>
                <div class="form-grid">
                    <div class="form-row"><label data-i18n="f_state_key"></label><input type="text" id="f-trig-key"
                            placeholder="state"></div>
                    <div class="form-row"><label data-i18n="f_state_val"></label><input type="text" id="f-trig-val"
                            placeholder="ON"></div>
                </div>
            </div>
            <div class="dyn-fields" id="trig-presence">
                <div class="form-row"><label data-i18n="f_user_id"></label><input type="text" id="f-trig-user"
                        placeholder="user-uuid-001"></div>
                <div class="form-row">
                    <label data-i18n="f_presence_status"></label>
                    <select id="f-trig-presence-st">
                        <option value="home" data-i18n="pres_home"></option>
                        <option value="away" data-i18n="pres_away"></option>
                    </select>
                </div>
            </div>

            <!-- Action dynamic fields -->
            <div class="dyn-fields visible" id="act-device_command">
                <div class="form-row"><label data-i18n="f_act_device_id"></label><input type="text" id="f-act-dev-id"
                        placeholder="uuid-..."></div>
                <div class="form-grid">
                    <div class="form-row"><label data-i18n="f_state_key"></label><input type="text" id="f-act-key"
                            placeholder="state"></div>
                    <div class="form-row"><label data-i18n="f_state_val"></label><input type="text" id="f-act-val"
                            placeholder="ON"></div>
                </div>
            </div>
            <div class="dyn-fields" id="act-publish_event">
                <div class="form-row"><label data-i18n="f_pub_event_type"></label><input type="text" id="f-pub-event"
                        placeholder="custom.my_event"></div>
            </div>
            <div class="dyn-fields" id="act-notify">
                <div class="form-row"><label data-i18n="f_notify_msg"></label><input type="text" id="f-notify-msg"
                        placeholder="Lights turned on"></div>
                <div class="form-row">
                    <label data-i18n="f_notify_channel"></label>
                    <select id="f-notify-ch">
                        <option value="voice">TTS (Voice)</option>
                        <option value="push">Web Push</option>
                        <option value="telegram">Telegram</option>
                    </select>
                </div>
            </div>

            <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
                <button class="btn btn-primary" id="btn-add-rule" data-i18n="add_rule_btn"></button>
                <span class="msg" id="add-msg"></span>
                <span class="msg err-msg" id="add-err"></span>
            </div>

            <!-- Advanced YAML (collapsed) -->
            <details style="margin-top:14px">
                <summary data-i18n="adv_yaml"></summary>
                <p style="color:var(--tx3);font-size:12px;margin:8px 0 4px" data-i18n="adv_yaml_hint"></p>
                <textarea id="yaml-input" placeholder="automations:"></textarea>
                <div style="margin-top:6px">
                    <button class="btn btn-primary btn-sm" id="btn-import-yaml" data-i18n="import_btn"></button>
                </div>
            </details>
        </div>
    </div>

    <script src="/api/shared/widget-common.js"></script>
    <script>
    // Module-specific i18n: strings live in system_modules/automation_engine/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/automation-engine. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/automation-engine?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[automation-engine] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

        async function loadStatus() {
            try {
                var d = await apiGet('/status');
                $('s-total').textContent = d.rules_total ?? 0;
                $('s-enabled').textContent = d.rules_enabled ?? 0;
                $('s-runs').textContent = d.run_count ?? 0;
                $('s-errors').textContent = d.error_count ?? 0;
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        async function loadRules() {
            var refBtn = document.querySelector('[onclick="loadRules()"]');
            if (refBtn) { refBtn.disabled = true; }
            try {
                var d = await apiGet('/rules');
                var container = $('rules-container');
                var rules = d.rules ?? [];
                if (rules.length === 0) {
                    container.innerHTML = '<p style="color:var(--tx3);font-size:13px">' + esc(t('no_rules')) + '</p>';
                    return;
                }
                container.innerHTML = rules.map(function (rule) { return '\
      <div class="rule-row">\
        <div>\
          <div class="rule-name">' + esc(rule.name) + '</div>\
          <div class="rule-trigger">' + esc(t('trigger_lbl')) + esc(rule.trigger && rule.trigger.type ? rule.trigger.type : '?') + ' ' + esc(rule.trigger && (rule.trigger.at || rule.trigger.event_type) || '') + '</div>\
        </div>\
        <span class="badge ' + (rule.enabled ? 'on' : 'off') + '">' + (rule.enabled ? t('on') : t('off')) + '</span>\
        <button class="btn btn-sm ' + (rule.enabled ? 'btn-danger' : 'btn-primary') + '"\
          onclick="toggleRule(\'' + esc(rule.id) + '\', ' + (!rule.enabled) + ')">\
          ' + (rule.enabled ? t('disable') : t('enable')) + '\
        </button>\
        <button class="btn btn-danger btn-sm" onclick="deleteRule(\'' + esc(rule.id) + '\')">✕</button>\
      </div>'; }).join('');
            } catch (e) { showToast(e.message || 'Error', 'error'); } finally {
                if (refBtn) { refBtn.disabled = false; }
            }
        }

        async function toggleRule(id, enabled) {
            try {
                await apiPatch('/rules/' + id + '/enabled', { enabled: enabled });
                showToast(enabled ? t('rule_enabled') : t('rule_disabled'));
                loadRules();
                loadStatus();
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        async function deleteRule(id) {
            if (!confirm(t('delete_confirm'))) return;
            try {
                await apiDelete('/rules/' + id);
                showToast(t('deleted'));
                loadRules();
                loadStatus();
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        function onTriggerChange() {
            var v = $('f-trigger').value;
            ['time', 'event', 'device', 'presence'].forEach(function (k) {
                var el = $('trig-' + k);
                if (el) el.className = 'dyn-fields' + (k === v ? ' visible' : '');
            });
        }
        function onActionChange() {
            var v = $('f-action').value;
            ['device_command', 'publish_event', 'notify'].forEach(function (k) {
                var el = $('act-' + k);
                if (el) el.className = 'dyn-fields' + (k === v ? ' visible' : '');
            });
        }

        function showAddOk(msg) {
            $('add-msg').textContent = msg;
            $('add-err').textContent = '';
            setTimeout(function () { $('add-msg').textContent = ''; }, 3000);
        }
        function showAddErr(msg) {
            $('add-err').textContent = msg;
            $('add-msg').textContent = '';
        }

        $('btn-add-rule').addEventListener('click', function () {
            var name = $('f-name').value.trim();
            if (!name) { showAddErr(t('err_name')); return; }

            var trigType = $('f-trigger').value;
            var actType = $('f-action').value;
            var trigger = { type: trigType };
            var action = { type: actType };

            if (trigType === 'time') {
                trigger.at = $('f-at').value || '07:00';
            } else if (trigType === 'event') {
                trigger.event_type = $('f-trig-event').value.trim();
            } else if (trigType === 'device') {
                trigger.device_id = $('f-trig-dev-id').value.trim();
                var key = $('f-trig-key').value.trim();
                var val = $('f-trig-val').value.trim();
                if (key) { trigger.state = {}; trigger.state[key] = val; }
            } else if (trigType === 'presence') {
                trigger.user_id = $('f-trig-user').value.trim();
                trigger.status = $('f-trig-presence-st').value;
            }

            if (actType === 'device_command') {
                action.device_id = $('f-act-dev-id').value.trim();
                var akey = $('f-act-key').value.trim();
                var aval = $('f-act-val').value.trim();
                action.state = {};
                if (akey) action.state[akey] = aval; else action.state = { state: 'ON' };
            } else if (actType === 'publish_event') {
                action.event_type = $('f-pub-event').value.trim();
            } else if (actType === 'notify') {
                action.message = $('f-notify-msg').value.trim();
                action.channel = $('f-notify-ch').value;
            }

            var id = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
            var yaml_text = 'automations:\n  - id: ' + id + '\n    name: "' + name.replace(/"/g, "'") + '"\n    trigger:\n      type: ' + trigger.type;
            if (trigger.at) yaml_text += '\n      at: "' + trigger.at + '"';
            if (trigger.event_type) yaml_text += '\n      event_type: ' + trigger.event_type;
            if (trigger.device_id) yaml_text += '\n      device_id: ' + trigger.device_id;
            if (trigger.state) { var sk = Object.keys(trigger.state)[0]; yaml_text += '\n      state:\n        ' + sk + ': ' + trigger.state[sk]; }
            if (trigger.user_id) yaml_text += '\n      user_id: ' + trigger.user_id;
            if (trigger.status) yaml_text += '\n      status: ' + trigger.status;
            yaml_text += '\n    actions:\n      - type: ' + action.type;
            if (action.device_id) yaml_text += '\n        device_id: ' + action.device_id;
            if (action.state) { var ak = Object.keys(action.state)[0]; yaml_text += '\n        state:\n          ' + ak + ': ' + action.state[ak]; }
            if (action.event_type) yaml_text += '\n        event_type: ' + action.event_type;
            if (action.message) yaml_text += '\n        message: "' + action.message.replace(/"/g, "'") + '"';
            if (action.channel) yaml_text += '\n        channel: ' + action.channel;

            var self = this;
            withLoading(self, async function () {
                var r = await fetch(BASE + '/rules/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ yaml_text: yaml_text }) });
                if (r.ok) {
                    showAddOk(t('added_ok'));
                    $('f-name').value = '';
                    loadRules(); loadStatus();
                } else {
                    var e = await r.json();
                    throw new Error(e.detail || 'Error');
                }
            });
        });

        $('btn-import-yaml').addEventListener('click', function () {
            var yaml_text = $('yaml-input').value.trim();
            if (!yaml_text) return;
            var self = this;
            withLoading(self, async function () {
                var r = await fetch(BASE + '/rules/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ yaml_text: yaml_text }) });
                if (r.ok) {
                    var d = await r.json();
                    showAddOk(t('imported_ok') + ' ' + d.imported + ' rule(s)');
                    loadRules(); loadStatus();
                } else {
                    var e = await r.json();
                    throw new Error(e.detail || 'Import failed');
                }
            });
        });

        /* refresh() is called by widget-common.js on lang_changed */
        function refresh() {
            loadRules();
            loadStatus();
        }

        loadI18n().then(function () {
            applyLang();
            loadStatus();
            loadRules();
            setInterval(loadStatus, 10000);
        });
    </script>
</body>

</html>
