<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Automation Engine Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            font-size: 14px;
            min-height: 100%;
            overflow-y: auto;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--tx3);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--sf);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--tx);
            margin: 0;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-primary {
            background: var(--ac);
            color: var(--tx);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--rd);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--b2);
            border-radius: 6px;
            padding: 10px;
            color: var(--tx);
            font-size: 12px;
            font-family: monospace;
            resize: vertical;
            min-height: 200px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--ac);
        }

        .rule-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--sf);
        }

        .rule-name {
            flex: 1;
            font-size: 13px;
        }

        .rule-trigger {
            font-size: 11px;
            color: var(--tx3);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.on {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.off {
            background: rgba(148, 163, 184, 0.15);
            color: var(--tx2);
        }

        .stat-bar {
            display: flex;
            gap: 24px;
            background: var(--sf);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--am);
        }

        .stat .desc {
            font-size: 11px;
            color: var(--tx3);
        }

        .msg {
            font-size: 12px;
            color: var(--gr);
            margin-left: 10px;
            display: none;
        }

        .err-msg {
            color: var(--rd);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <div class="stat-bar">
            <div class="stat">
                <div class="num" id="s-total">0</div>
                <div class="desc" data-i18n="total_rules"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-enabled">0</div>
                <div class="desc" data-i18n="enabled"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-runs">0</div>
                <div class="desc" data-i18n="runs"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-errors" style="color:var(--rd)">0</div>
                <div class="desc" data-i18n="errors"></div>
            </div>
        </div>

        <!-- Rule list -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="active_rules"></h2>
                <button class="btn btn-primary btn-sm" onclick="loadRules()" data-i18n="refresh"></button>
            </div>
            <div id="rules-container" data-i18n="loading"></div>
        </div>

        <!-- YAML import -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="import_title"></h2>
            </div>
            <p style="color:var(--tx3);font-size:12px;margin-bottom:8px" data-i18n="paste_yaml"></p>
            <textarea id="yaml-input" placeholder="automations:
  - id: lights_morning
    name: &quot;Turn on lights at 7:00&quot;
    trigger:
      type: time
      at: &quot;07:00&quot;
    actions:
      - type: device_command
        device_id: &quot;your-device-id&quot;
        state:
          state: ON
"></textarea>
            <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
                <button class="btn btn-primary" onclick="importYaml()" data-i18n="import_btn"></button>
                <span class="msg" id="import-msg"></span>
                <span class="msg err-msg" id="import-err"></span>
            </div>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { title: '⚙️ Automation Engine', subtitle: 'YAML-based rule engine — triggers → actions', total_rules: 'Total rules', enabled: 'Enabled', runs: 'Runs', errors: 'Errors', active_rules: 'Active Rules', refresh: '↻ Refresh', loading: 'Loading…', no_rules: 'No rules loaded.', import_title: 'Import / Add Rules (YAML)', paste_yaml: 'Paste a YAML list of automation rules:', import_btn: 'Import Rules', imported_ok: '✓ Imported', trigger_lbl: 'trigger: ', on: 'ON', off: 'OFF', disable: 'Disable', enable: 'Enable', delete_confirm: 'Delete this rule?' },
            uk: { title: '⚙️ Рушій автоматизації', subtitle: 'Рушій правил на базі YAML — тригери → дії', total_rules: 'Всього правил', enabled: 'Увімкнено', runs: 'Запуски', errors: 'Помилки', active_rules: 'Активні правила', refresh: '↻ Оновити', loading: 'Завантаження…', no_rules: 'Правила не завантажені.', import_title: 'Імпорт / Додати правила (YAML)', paste_yaml: 'Вставте список правил автоматизації у форматі YAML:', import_btn: 'Імпортувати правила', imported_ok: '✓ Імпортовано', trigger_lbl: 'тригер: ', on: 'ВКЛ', off: 'ВИКЛ', disable: 'Вимкнути', enable: 'Увімкнути', delete_confirm: 'Видалити це правило?' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadRules(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const h = { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" };

        async function loadStatus() {
            try {
                const r = await fetch(BASE + "/status", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                document.getElementById("s-total").textContent = d.rules_total ?? 0;
                document.getElementById("s-enabled").textContent = d.rules_enabled ?? 0;
                document.getElementById("s-runs").textContent = d.run_count ?? 0;
                document.getElementById("s-errors").textContent = d.error_count ?? 0;
            } catch { }
        }

        async function loadRules() {
            try {
                const r = await fetch(BASE + "/rules", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                const container = document.getElementById("rules-container");
                const rules = d.rules ?? [];
                if (rules.length === 0) {
                    container.innerHTML = '<p style="color:var(--tx3);font-size:13px">' + t('no_rules') + '</p>';
                    return;
                }
                container.innerHTML = rules.map(rule => `
      <div class="rule-row">
        <div>
          <div class="rule-name">${rule.name}</div>
          <div class="rule-trigger">${t('trigger_lbl')}${rule.trigger?.type ?? "?"} ${rule.trigger?.at || rule.trigger?.event_type || ""}</div>
        </div>
        <span class="badge ${rule.enabled ? 'on' : 'off'}">${rule.enabled ? t('on') : t('off')}</span>
        <button class="btn btn-sm ${rule.enabled ? 'btn-danger' : 'btn-primary'}"
          onclick="toggleRule('${rule.id}', ${!rule.enabled})">
          ${rule.enabled ? t('disable') : t('enable')}
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteRule('${rule.id}')">✕</button>
      </div>
    `).join("");
            } catch { }
        }

        async function toggleRule(id, enabled) {
            try {
                await fetch(BASE + "/rules/" + id + "/enabled", {
                    method: "PATCH", headers: h, body: JSON.stringify({ enabled })
                });
                loadRules();
                loadStatus();
            } catch { }
        }

        async function deleteRule(id) {
            if (!confirm(t('delete_confirm'))) return;
            try {
                await fetch(BASE + "/rules/" + id, { method: "DELETE", headers: h });
                loadRules();
                loadStatus();
            } catch { }
        }

        async function importYaml() {
            const yaml_text = document.getElementById("yaml-input").value.trim();
            if (!yaml_text) return;
            const errEl = document.getElementById("import-err");
            const okEl = document.getElementById("import-msg");
            errEl.style.display = "none";
            try {
                const r = await fetch(BASE + "/rules/import", {
                    method: "POST", headers: h, body: JSON.stringify({ yaml_text })
                });
                if (r.ok) {
                    const d = await r.json();
                    okEl.textContent = t('imported_ok') + ' ' + d.imported + ' rule(s)';
                    okEl.style.display = "inline";
                    setTimeout(() => okEl.style.display = "none", 3000);
                    loadRules();
                    loadStatus();
                } else {
                    const e = await r.json();
                    errEl.textContent = e.detail || "Import failed";
                    errEl.style.display = "inline";
                }
            } catch (ex) {
                errEl.textContent = String(ex);
                errEl.style.display = "inline";
            }
        }

        applyLang();
        loadStatus();
        loadRules();
        setInterval(loadStatus, 10000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
