<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: var(--tx);
            font-size: 13px;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .val {
            font-weight: 600;
        }

        .rule-item {
            font-size: 11px;
            color: var(--tx2);
            border-bottom: 1px solid var(--b);
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .rule-item .name {
            color: var(--tx);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            padding: 1px 6px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge.on {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.off {
            background: rgba(148, 163, 184, 0.15);
            color: var(--tx2);
        }

        .big {
            font-size: 28px;
            font-weight: 700;
            color: var(--am);
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- Left: stats -->
        <div class="panel">
            <h3>Automation Engine</h3>
            <div class="big" id="rules-total">—</div>
            <div style="font-size:11px;color:var(--tx3);margin-bottom:10px">rules loaded</div>
            <div class="stat"><span>Enabled</span><span class="val" id="rules-enabled">—</span></div>
            <div class="stat"><span>Runs today</span><span class="val" id="run-count">—</span></div>
            <div class="stat"><span>Errors</span><span class="val" style="color:var(--rd)" id="err-count">—</span></div>
        </div>
        <!-- Right: rule list -->
        <div class="panel">
            <h3>Rules</h3>
            <div id="rules-list">
                <div class="rule-item" style="color:var(--tx3)">Loading…</div>
            </div>
        </div>
    </div>
    <script>
        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const h = { "Authorization": "Bearer " + TOKEN };

        async function refresh() {
            try {
                const [statusR, rulesR] = await Promise.all([
                    fetch(BASE + "/status", { headers: h }),
                    fetch(BASE + "/rules", { headers: h }),
                ]);
                if (statusR.ok) {
                    const s = await statusR.json();
                    document.getElementById("rules-total").textContent = s.rules_total ?? 0;
                    document.getElementById("rules-enabled").textContent = s.rules_enabled ?? 0;
                    document.getElementById("run-count").textContent = s.run_count ?? 0;
                    document.getElementById("err-count").textContent = s.error_count ?? 0;
                }
                if (rulesR.ok) {
                    const d = await rulesR.json();
                    const rules = d.rules ?? [];
                    const el = document.getElementById("rules-list");
                    if (rules.length === 0) {
                        el.innerHTML = '<div class="rule-item" style="color:var(--tx3)">No rules defined</div>';
                    } else {
                        el.innerHTML = rules.slice(0, 7).map(r =>
                            `<div class="rule-item">
            <span class="name">${r.name}</span>
            <span class="badge ${r.enabled ? 'on' : 'off'}">${r.enabled ? 'ON' : 'OFF'}</span>
          </div>`
                        ).join("");
                    }
                }
            } catch { }
        }

        refresh();
        setInterval(refresh, 8000);
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
