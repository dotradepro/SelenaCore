<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>
        body {
            background: transparent;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .val {
            font-weight: 600;
        }

        .rule-item {
            font-size: 11px;
            color: var(--tx2);
            border-bottom: 1px solid var(--b);
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .rule-item .name {
            color: var(--tx);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .big {
            font-size: 28px;
            font-weight: 700;
            color: var(--am);
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- Left: stats -->
        <div class="panel">
            <h3 data-i18n="panel_title"></h3>
            <div class="big" id="rules-total">—</div>
            <div style="font-size:11px;color:var(--tx3);margin-bottom:10px" data-i18n="rules_loaded"></div>
            <div class="stat"><span data-i18n="enabled"></span><span class="val" id="rules-enabled">—</span></div>
            <div class="stat"><span data-i18n="runs_today"></span><span class="val" id="run-count">—</span></div>
            <div class="stat"><span data-i18n="errors"></span><span class="val" style="color:var(--rd)"
                    id="err-count">—</span></div>
        </div>
        <!-- Right: rule list -->
        <div class="panel">
            <h3 data-i18n="rules_title"></h3>
            <div id="rules-list">
                <div class="rule-item" style="color:var(--tx3)" data-i18n="loading"></div>
            </div>
        </div>
    </div>
    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: { panel_title: 'Automation Engine', rules_loaded: 'rules loaded', enabled: 'Enabled', runs_today: 'Runs today', errors: 'Errors', rules_title: 'Rules', loading: 'Loading…', no_rules: 'No rules defined', on: 'ON', off: 'OFF' },
            uk: { panel_title: 'Автоматизація', rules_loaded: 'правил завантажено', enabled: 'Увімкнено', runs_today: 'Запусків сьогодні', errors: 'Помилки', rules_title: 'Правила', loading: 'Завантаження…', no_rules: 'Правила не визначені', on: 'ВКЛ', off: 'ВИКЛ' }
        };

        async function refresh() {
            try {
                const [s, d] = await Promise.all([
                    apiGet("/status"),
                    apiGet("/rules"),
                ]);
                $("rules-total").textContent = s.rules_total ?? 0;
                $("rules-enabled").textContent = s.rules_enabled ?? 0;
                $("run-count").textContent = s.run_count ?? 0;
                $("err-count").textContent = s.error_count ?? 0;

                const rules = d.rules ?? [];
                const el = $("rules-list");
                if (rules.length === 0) {
                    el.innerHTML = '<div class="rule-item" style="color:var(--tx3)">' + esc(t('no_rules')) + '</div>';
                } else {
                    el.innerHTML = rules.slice(0, 7).map(r =>
                        `<div class="rule-item">
            <span class="name">${esc(r.name)}</span>
            <span class="badge ${r.enabled ? 'badge-on' : 'badge-off'}">${r.enabled ? esc(t('on')) : esc(t('off'))}</span>
          </div>`
                    ).join("");
                }
            } catch (e) {
                showToast(e.message || 'Error', 'error');
            }
        }

        applyLang();
        refresh();
        setInterval(refresh, 8000);
    </script>
</body>

</html>
