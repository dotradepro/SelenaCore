<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: var(--tx);
            font-size: 13px;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .val {
            font-weight: 600;
        }

        .rule-item {
            font-size: 11px;
            color: var(--tx2);
            border-bottom: 1px solid var(--b);
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .rule-item .name {
            color: var(--tx);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            padding: 1px 6px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge.on {
            background: rgba(52, 211, 153, 0.15);
            color: var(--gr);
        }

        .badge.off {
            background: rgba(148, 163, 184, 0.15);
            color: var(--tx2);
        }

        .big {
            font-size: 28px;
            font-weight: 700;
            color: var(--am);
            margin-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="widget">
        <!-- Left: stats -->
        <div class="panel">
            <h3 data-i18n="panel_title"></h3>
            <div class="big" id="rules-total">—</div>
            <div style="font-size:11px;color:var(--tx3);margin-bottom:10px" data-i18n="rules_loaded"></div>
            <div class="stat"><span data-i18n="enabled"></span><span class="val" id="rules-enabled">—</span></div>
            <div class="stat"><span data-i18n="runs_today"></span><span class="val" id="run-count">—</span></div>
            <div class="stat"><span data-i18n="errors"></span><span class="val" style="color:var(--rd)"
                    id="err-count">—</span></div>
        </div>
        <!-- Right: rule list -->
        <div class="panel">
            <h3 data-i18n="rules_title"></h3>
            <div id="rules-list">
                <div class="rule-item" style="color:var(--tx3)" data-i18n="loading"></div>
            </div>
        </div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { panel_title: 'Automation Engine', rules_loaded: 'rules loaded', enabled: 'Enabled', runs_today: 'Runs today', errors: 'Errors', rules_title: 'Rules', loading: 'Loading…', no_rules: 'No rules defined', on: 'ON', off: 'OFF' },
            uk: { panel_title: 'Автоматизація', rules_loaded: 'правил завантажено', enabled: 'Увімкнено', runs_today: 'Запусків сьогодні', errors: 'Помилки', rules_title: 'Правила', loading: 'Завантаження…', no_rules: 'Правила не визначені', on: 'ВКЛ', off: 'ВИКЛ' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); refresh(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const TOKEN = window.SELENA_TOKEN || "";
        const h = { "Authorization": "Bearer " + TOKEN };

        async function refresh() {
            try {
                const [statusR, rulesR] = await Promise.all([
                    fetch(BASE + "/status", { headers: h }),
                    fetch(BASE + "/rules", { headers: h }),
                ]);
                if (statusR.ok) {
                    const s = await statusR.json();
                    document.getElementById("rules-total").textContent = s.rules_total ?? 0;
                    document.getElementById("rules-enabled").textContent = s.rules_enabled ?? 0;
                    document.getElementById("run-count").textContent = s.run_count ?? 0;
                    document.getElementById("err-count").textContent = s.error_count ?? 0;
                }
                if (rulesR.ok) {
                    const d = await rulesR.json();
                    const rules = d.rules ?? [];
                    const el = document.getElementById("rules-list");
                    if (rules.length === 0) {
                        el.innerHTML = '<div class="rule-item" style="color:var(--tx3)">' + t('no_rules') + '</div>';
                    } else {
                        el.innerHTML = rules.slice(0, 7).map(r =>
                            `<div class="rule-item">
            <span class="name">${r.name}</span>
            <span class="badge ${r.enabled ? 'on' : 'off'}">${r.enabled ? t('on') : t('off')}</span>
          </div>`
                        ).join("");
                    }
                }
            } catch { }
        }

        applyLang();
        refresh();
        setInterval(refresh, 8000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")); document.documentElement.classList.toggle("has-wallpaper", p.classList.contains("has-wallpaper")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
