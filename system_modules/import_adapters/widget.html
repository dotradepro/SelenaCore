<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Adapters</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 16px;
        }

        h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--ac);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label {
            font-size: 12px;
            color: var(--tx2);
        }

        .value {
            font-size: 12px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-idle {
            background: var(--b2);
            color: var(--tx2);
        }

        .badge-running {
            background: var(--ac);
            color: #bfdbfe;
        }

        .badge-completed {
            background: #166534;
            color: #bbf7d0;
        }

        .badge-failed {
            background: #991b1b;
            color: #fecaca;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--sf);
            margin: 10px 0;
        }

        .adapters {
            display: flex;
            gap: 8px;
        }

        .adapter-pill {
            flex: 1;
            text-align: center;
            padding: 4px 6px;
            border-radius: 6px;
            font-size: 11px;
            background: var(--sf);
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <h3>Import Adapters</h3>
    <div id="status-display">
        <div class="status-row">
            <span class="label">Status</span>
            <span id="status-badge" class="badge badge-idle">idle</span>
        </div>
        <div class="status-row">
            <span class="label">Last import</span>
            <span id="source-val" class="value">—</span>
        </div>
        <div class="status-row">
            <span class="label">Devices imported</span>
            <span id="count-val" class="value">—</span>
        </div>
    </div>
    <hr class="divider">
    <div class="adapters">
        <div class="adapter-pill">🏠 HA</div>
        <div class="adapter-pill">🔌 Tuya</div>
        <div class="adapter-pill">💡 Hue</div>
    </div>
    <script>
        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function refresh() {
            try {
                const r = await fetch(BASE + '/import/status');
                if (!r.ok) return;
                const d = await r.json();
                const badge = document.getElementById('status-badge');
                badge.textContent = d.status;
                badge.className = 'badge badge-' + d.status;
                document.getElementById('source-val').textContent = d.source || '—';
                document.getElementById('count-val').textContent = d.imported_count ?? '—';
            } catch { }
        }
        applyLang();
        refresh();
        setInterval(refresh, 10000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
