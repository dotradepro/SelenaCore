<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Adapters</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 16px;
        }

        h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--ac);
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .label {
            font-size: 12px;
            color: var(--tx2);
        }

        .value {
            font-size: 12px;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-idle {
            background: var(--b2);
            color: var(--tx2);
        }

        .badge-running {
            background: var(--ac);
            color: #bfdbfe;
        }

        .badge-completed {
            background: #166534;
            color: #bbf7d0;
        }

        .badge-failed {
            background: #991b1b;
            color: #fecaca;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--sf);
            margin: 10px 0;
        }

        .adapters {
            display: flex;
            gap: 8px;
        }

        .adapter-pill {
            flex: 1;
            text-align: center;
            padding: 4px 6px;
            border-radius: 6px;
            font-size: 11px;
            background: var(--sf);
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <h3 data-i18n="title">Import Adapters</h3>
    <div id="status-display">
        <div class="status-row">
            <span class="label" data-i18n="status">Status</span>
            <span id="status-badge" class="badge badge-idle">idle</span>
        </div>
        <div class="status-row">
            <span class="label" data-i18n="last_import">Last import</span>
            <span id="source-val" class="value">—</span>
        </div>
        <div class="status-row">
            <span class="label" data-i18n="devices_imported">Devices imported</span>
            <span id="count-val" class="value">—</span>
        </div>
    </div>
    <hr class="divider">
    <div class="adapters">
        <div class="adapter-pill">🏠 HA</div>
        <div class="adapter-pill">🔌 Tuya</div>
        <div class="adapter-pill">💡 Hue</div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { title: 'Import Adapters', status: 'Status', last_import: 'Last import', devices_imported: 'Devices imported' },
            uk: { title: 'Імпорт адаптерів', status: 'Статус', last_import: 'Останній імпорт', devices_imported: 'Пристроїв імпортовано' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
        }
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'lang_changed') {
                try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { }
                applyLang();
                refresh();
            }
        });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function refresh() {
            try {
                const r = await fetch(BASE + '/import/status');
                if (!r.ok) return;
                const d = await r.json();
                const badge = document.getElementById('status-badge');
                badge.textContent = d.status;
                badge.className = 'badge badge-' + d.status;
                document.getElementById('source-val').textContent = d.source || '—';
                document.getElementById('count-val').textContent = d.imported_count ?? '—';
            } catch (e) { /* fetch error */ }
        }
        applyLang();
        refresh();
        setInterval(refresh, 10000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
