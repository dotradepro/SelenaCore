<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Adapters — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 24px;
            min-height: 100%;
            overflow-y: auto;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--ac);
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--sf);
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--tx2);
            border-bottom: 2px solid transparent;
            transition: all .15s;
        }

        .tab.active {
            color: var(--ac);
            border-bottom-color: var(--ac);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--tx2);
            margin-bottom: 4px;
            margin-top: 14px;
        }

        input {
            width: 100%;
            padding: 8px 12px;
            background: var(--sf);
            border: 1px solid var(--b2);
            border-radius: 6px;
            color: var(--tx);
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--ac);
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
        }

        input[type=checkbox] {
            width: auto;
        }

        .btn {
            margin-top: 16px;
            width: 100%;
            padding: 10px;
            background: var(--ac);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--ac);
        }

        .result {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .result.ok {
            background: #166534;
            color: #bbf7d0;
        }

        .result.err {
            background: #991b1b;
            color: #fecaca;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 13px;
        }

        .history-table th,
        .history-table td {
            text-align: left;
            padding: 6px 10px;
            border-bottom: 1px solid var(--sf);
        }

        .history-table th {
            color: var(--tx2);
            font-weight: 600;
        }
    </style>
</head>

<body>
    <h2>Import Adapters</h2>

    <div class="tabs">
        <div class="tab active" onclick="showTab('ha')">Home Assistant</div>
        <div class="tab" onclick="showTab('tuya')">Tuya</div>
        <div class="tab" onclick="showTab('hue')">Philips Hue</div>
        <div class="tab" onclick="showTab('hist')">History</div>
    </div>

    <!-- HA -->
    <div id="tab-ha" class="panel active">
        <label>HA Base URL (e.g. http://homeassistant.local:8123)</label>
        <input id="ha-url" type="url" placeholder="http://homeassistant.local:8123">
        <label>Long-Lived Access Token</label>
        <input id="ha-token" type="password" placeholder="eyJ...">
        <div class="row"><input type="checkbox" id="ha-dry"><label for="ha-dry" style="margin:0">Dry run (preview
                only)</label></div>
        <button class="btn" onclick="runHA()">Import from Home Assistant</button>
        <div id="ha-result" class="result"></div>
    </div>

    <!-- Tuya -->
    <div id="tab-tuya" class="panel">
        <label>Scan timeout (seconds)</label>
        <input id="tuya-timeout" type="number" value="6" min="2" max="30">
        <div class="row"><input type="checkbox" id="tuya-dry"><label for="tuya-dry" style="margin:0">Dry run (preview
                only)</label></div>
        <button class="btn" onclick="runTuya()">Scan Tuya Devices</button>
        <div id="tuya-result" class="result"></div>
    </div>

    <!-- Hue -->
    <div id="tab-hue" class="panel">
        <label>Bridge IP Address</label>
        <input id="hue-ip" type="text" placeholder="192.168.1.10">
        <label>Application Key (username)</label>
        <input id="hue-user" type="text" placeholder="your-hue-app-key">
        <div class="row"><input type="checkbox" id="hue-dry"><label for="hue-dry" style="margin:0">Dry run (preview
                only)</label></div>
        <button class="btn" onclick="runHue()">Import from Hue Bridge</button>
        <div id="hue-result" class="result"></div>
    </div>

    <!-- History -->
    <div id="tab-hist" class="panel">
        <button class="btn" onclick="loadHistory()" style="margin-bottom:12px">Refresh History</button>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Source</th>
                    <th>Status</th>
                    <th>Count</th>
                    <th>Started</th>
                </tr>
            </thead>
            <tbody id="hist-body">
                <tr>
                    <td colspan="4" style="color:var(--tx3);text-align:center">Load history...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        function showTab(name) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            const tabs = ['ha', 'tuya', 'hue', 'hist'];
            document.querySelectorAll('.tab')[tabs.indexOf(name)].classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'hist') loadHistory();
        }

        function showResult(id, ok, msg) {
            const el = document.getElementById(id);
            el.className = 'result ' + (ok ? 'ok' : 'err');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function runHA() {
            const url = document.getElementById('ha-url').value.trim();
            const token = document.getElementById('ha-token').value.trim();
            const dry_run = document.getElementById('ha-dry').checked;
            if (!url || !token) return showResult('ha-result', false, 'URL and token are required.');
            try {
                const r = await fetch(BASE + '/import/ha', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ base_url: url, token, dry_run })
                });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || 'Import failed');
                showResult('ha-result', true, `✅ Imported ${d.imported_count} devices (${d.status})`);
            } catch (e) { showResult('ha-result', false, '❌ ' + e.message); }
        }

        async function runTuya() {
            const scan_timeout = parseFloat(document.getElementById('tuya-timeout').value) || 6;
            const dry_run = document.getElementById('tuya-dry').checked;
            try {
                const r = await fetch(BASE + '/import/tuya', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ scan_timeout, dry_run })
                });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || 'Import failed');
                showResult('tuya-result', true, `✅ Found ${d.imported_count} Tuya devices (${d.status})`);
            } catch (e) { showResult('tuya-result', false, '❌ ' + e.message); }
        }

        async function runHue() {
            const bridge_ip = document.getElementById('hue-ip').value.trim();
            const username = document.getElementById('hue-user').value.trim();
            const dry_run = document.getElementById('hue-dry').checked;
            if (!bridge_ip || !username) return showResult('hue-result', false, 'Bridge IP and username are required.');
            try {
                const r = await fetch(BASE + '/import/hue', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bridge_ip, username, dry_run })
                });
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || 'Import failed');
                showResult('hue-result', true, `✅ Imported ${d.imported_count} Hue lights (${d.status})`);
            } catch (e) { showResult('hue-result', false, '❌ ' + e.message); }
        }

        async function loadHistory() {
            try {
                const r = await fetch(BASE + '/import/history');
                const data = await r.json();
                const tbody = document.getElementById('hist-body');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--tx3);text-align:center">No imports yet</td></tr>';
                    return;
                }
                tbody.innerHTML = data.map(s => `<tr>
      <td>${s.source}</td>
      <td>${s.status}</td>
      <td>${s.imported_count}</td>
      <td>${s.started_at ? s.started_at.substring(0, 16).replace('T', ' ') : '—'}</td>
    </tr>`).join('');
            } catch { }
        }
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
