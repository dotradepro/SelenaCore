<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoLearner — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
            --pp: #9B6DFF;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
            --pp: #7B4FD4;
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--tx);
            min-height: 100%;
            overflow-y: auto;
        }

        h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .subtitle { font-size: 0.85rem; color: var(--tx2); margin-bottom: 20px; }

        /* ── Cards ──────────────────────────────────────────────── */
        .card {
            background: var(--sf);
            border: 1px solid var(--b);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        /* ── Stats ─────────────────────────────────────────────── */
        .stats-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            flex: 1;
            min-width: 70px;
            background: var(--sf2);
            border-radius: 8px;
            padding: 10px 6px;
        }

        .stat .num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ac);
            line-height: 1.2;
        }

        .stat .num.green { color: var(--gr); }
        .stat .num.amber { color: var(--am); }
        .stat .num.purple { color: var(--pp); }

        .stat .lbl {
            font-size: 0.7rem;
            color: var(--tx2);
            margin-top: 3px;
        }

        /* ── Toggle switch ─────────────────────────────────────── */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }

        .toggle-desc {
            font-size: 0.78rem;
            color: var(--tx2);
            margin-top: 2px;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--sf3);
            border-radius: 24px;
            transition: .25s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--tx);
            border-radius: 50%;
            transition: .25s;
        }

        .switch input:checked + .slider { background: var(--ac); }
        .switch input:checked + .slider::before { transform: translateX(20px); }

        /* ── Toolbar (search + filters) ────────────────────────── */
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 160px;
            padding: 7px 10px 7px 30px;
            background: var(--sf2);
            border: 1px solid var(--b2);
            border-radius: 6px;
            color: var(--tx);
            font-size: 0.84rem;
            outline: none;
        }

        .search-box:focus { border-color: var(--ac); }

        .search-wrap {
            position: relative;
            flex: 1;
            min-width: 160px;
        }

        .search-icon {
            position: absolute;
            left: 9px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--tx3);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .filter-select {
            padding: 7px 10px;
            background: var(--sf2);
            border: 1px solid var(--b2);
            border-radius: 6px;
            color: var(--tx);
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
            min-width: 100px;
        }

        .filter-select option { background: var(--sf); color: var(--tx); }

        /* ── Table ─────────────────────────────────────────────── */
        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th {
            text-align: left;
            padding: 8px 10px;
            background: var(--sf2);
            color: var(--tx2);
            font-weight: 500;
            border-bottom: 1px solid var(--b2);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        th:hover { color: var(--tx); }
        th .sort-arrow { font-size: 0.7rem; margin-left: 3px; opacity: 0.4; }
        th.sorted .sort-arrow { opacity: 1; color: var(--ac); }

        td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--b);
            vertical-align: middle;
        }

        tr:hover td { background: var(--sf2); }

        .col-text { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-intent { white-space: nowrap; }
        .col-class { white-space: nowrap; }
        .col-uses { text-align: center; width: 50px; }
        .col-status { white-space: nowrap; width: 100px; }
        .col-actions { width: 36px; text-align: center; }

        .text-mono { font-family: 'SF Mono', Menlo, monospace; font-size: 0.8rem; }

        code {
            background: var(--sf2);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.78rem;
        }

        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-ok { background: rgba(46, 201, 138, .15); color: var(--gr); }
        .badge-warn { background: rgba(245, 169, 58, .15); color: var(--am); }
        .badge-src { background: rgba(79, 140, 247, .12); color: var(--ac); }

        .btn-del {
            background: none;
            border: none;
            color: var(--tx3);
            cursor: pointer;
            font-size: 0.85rem;
            padding: 3px 6px;
            border-radius: 4px;
            transition: .15s;
        }

        .btn-del:hover { color: var(--rd); background: rgba(224, 84, 84, .12); }

        .empty {
            text-align: center;
            color: var(--tx3);
            padding: 32px 16px;
            font-size: 0.88rem;
        }

        /* ── Pagination ────────────────────────────────────────── */
        .pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--tx2);
        }

        .pager-info { }

        .pager-btns {
            display: flex;
            gap: 4px;
        }

        .pager-btn {
            padding: 4px 10px;
            background: var(--sf2);
            border: 1px solid var(--b2);
            border-radius: 5px;
            color: var(--tx);
            cursor: pointer;
            font-size: 0.8rem;
        }

        .pager-btn:hover { background: var(--sf3); }
        .pager-btn.active { background: var(--ac); color: #fff; border-color: var(--ac); }
        .pager-btn:disabled { opacity: 0.35; cursor: default; }

        /* ── Toast ─────────────────────────────────────────────── */
        #msg {
            margin-top: 6px;
            font-size: 0.8rem;
            color: var(--gr);
            min-height: 16px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>
    <div class="subtitle" data-i18n="subtitle"></div>

    <!-- Stats -->
    <div class="card">
        <div class="card-row">
            <div class="card-title" data-i18n="stats_title" style="margin-bottom:0"></div>
        </div>
        <div class="stats-row" style="margin-top:10px">
            <div class="stat">
                <div class="num" id="st-index">0</div>
                <div class="lbl" data-i18n="st_index"></div>
            </div>
            <div class="stat">
                <div class="num green" id="st-confirmed">0</div>
                <div class="lbl" data-i18n="st_confirmed"></div>
            </div>
            <div class="stat">
                <div class="num amber" id="st-unconfirmed">0</div>
                <div class="lbl" data-i18n="st_unconfirmed"></div>
            </div>
            <div class="stat">
                <div class="num purple" id="st-total">0</div>
                <div class="lbl" data-i18n="st_total"></div>
            </div>
        </div>
    </div>

    <!-- LLM Two-Step Toggle -->
    <div class="card">
        <div class="card-title" data-i18n="llm_title"></div>
        <div class="toggle-row">
            <div>
                <div data-i18n="two_step_label"></div>
                <div class="toggle-desc" data-i18n="two_step_desc"></div>
            </div>
            <label class="switch">
                <input type="checkbox" id="llm_two_step" onchange="saveConfig()" />
                <span class="slider"></span>
            </label>
        </div>
        <div id="msg"></div>
    </div>

    <!-- Learned Examples -->
    <div class="card">
        <div class="card-title" data-i18n="learned_title"></div>

        <!-- Toolbar: search + filters -->
        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">&#x1F50D;</span>
                <input type="text" class="search-box" id="search" oninput="applyFilters()" />
            </div>
            <select class="filter-select" id="f-intent" onchange="applyFilters()">
                <option value="" data-i18n="all_intents"></option>
            </select>
            <select class="filter-select" id="f-class" onchange="applyFilters()">
                <option value="" data-i18n="all_classes"></option>
            </select>
            <select class="filter-select" id="f-status" onchange="applyFilters()">
                <option value="" data-i18n="all_statuses"></option>
                <option value="confirmed" data-i18n="confirmed"></option>
                <option value="pending" data-i18n="pending"></option>
            </select>
        </div>

        <!-- Table -->
        <div id="learned-content"></div>

        <!-- Pagination -->
        <div class="pager" id="pager" style="display:none">
            <div class="pager-info" id="pager-info"></div>
            <div class="pager-btns" id="pager-btns"></div>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: 'AutoLearner',
                subtitle: 'Self-improving intent recognition — learns from LLM results',
                stats_title: 'SmartMatcher Index',
                st_index: 'Index entries',
                st_confirmed: 'Confirmed',
                st_unconfirmed: 'Unconfirmed',
                st_total: 'Learned total',
                llm_title: 'LLM Classification',
                two_step_label: 'Two-step LLM',
                two_step_desc: 'Step 1: classify category (~100ms) \u2192 Step 2: extract intent (~400ms). Faster than single prompt.',
                learned_title: 'Learned Examples',
                th_text: 'Phrase',
                th_intent: 'Intent',
                th_class: 'Class',
                th_uses: 'Uses',
                th_status: 'Status',
                confirmed: 'confirmed',
                pending: 'pending',
                all_intents: 'All intents',
                all_classes: 'All classes',
                all_statuses: 'All statuses',
                empty: 'No learned examples yet. Speak a command that goes to LLM \u2014 it will appear here.',
                saved: '\u2713 Saved',
                deleted: '\u2713 Deleted',
                pager_of: 'of',
                pager_showing: 'Showing'
            },
            uk: {
                title: 'AutoLearner',
                subtitle: 'Самонавчання розпізнавання намірів \u2014 вчиться з результатів LLM',
                stats_title: '\u0406ндекс SmartMatcher',
                st_index: '\u0417аписів в індексі',
                st_confirmed: 'Підтверджених',
                st_unconfirmed: 'Непідтверджених',
                st_total: 'Вивчено',
                llm_title: 'Класифікація LLM',
                two_step_label: 'Двоетапний LLM',
                two_step_desc: 'Крок 1: визначити категорію (~100мс) \u2192 Крок 2: витягти намір (~400мс). Швидше за один промт.',
                learned_title: 'Вивчені приклади',
                th_text: 'Фраза',
                th_intent: 'Намір',
                th_class: 'Клас',
                th_uses: 'Разів',
                th_status: 'Статус',
                confirmed: 'підтв.',
                pending: 'очік.',
                all_intents: 'Всі наміри',
                all_classes: 'Всі класи',
                all_statuses: 'Всі статуси',
                empty: 'Ще немає вивчених прикладів. Скажіть команду яка піде на LLM \u2014 вона з\'явиться тут.',
                saved: '\u2713 Збережено',
                deleted: '\u2713 Видалено',
                pager_of: 'з',
                pager_showing: 'Показано'
            }
        };

        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                if (el.tagName === 'OPTION') el.textContent = t(el.getAttribute('data-i18n'));
                else if (el.tagName === 'INPUT') el.placeholder = t(el.getAttribute('data-i18n'));
                else el.textContent = t(el.getAttribute('data-i18n'));
            });
        }
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'lang_changed') {
                try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { }
                applyLang();
                refresh();
            }
        });

        var BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        // ── State ──────────────────────────────────────────────────
        var allEntries = [];
        var filtered = [];
        var page = 0;
        var perPage = 15;
        var sortCol = 'use_count';
        var sortAsc = false;

        function showMsg(text) {
            var el = document.getElementById('msg');
            el.textContent = text;
            setTimeout(function () { el.textContent = ''; }, 3000);
        }

        // ── Data loading ───────────────────────────────────────────
        async function loadStats() {
            try {
                var r = await fetch(BASE + '/health');
                var d = await r.json();
                document.getElementById('st-index').textContent = d.smart_matcher_entries || 0;
                var ls = d.learner_stats || {};
                document.getElementById('st-confirmed').textContent = ls.confirmed || 0;
                document.getElementById('st-unconfirmed').textContent = ls.unconfirmed || 0;
                document.getElementById('st-total').textContent = ls.total || 0;
            } catch (e) { }
        }

        async function loadConfig() {
            try {
                var r = await fetch(BASE + '/config');
                var d = await r.json();
                document.getElementById('llm_two_step').checked = !!d.llm_two_step;
            } catch (e) { }
        }

        async function saveConfig() {
            var val = document.getElementById('llm_two_step').checked;
            await fetch(BASE + '/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ llm_two_step: val })
            });
            showMsg(t('saved'));
        }

        async function loadLearned() {
            try {
                var r = await fetch(BASE + '/learned');
                var d = await r.json();
                allEntries = d.entries || [];
            } catch (e) {
                allEntries = [];
            }
            populateFilterDropdowns();
            applyFilters();
        }

        // ── Filter dropdowns ───────────────────────────────────────
        function populateFilterDropdowns() {
            var intents = {}, classes = {};
            allEntries.forEach(function (e) {
                if (e.intent) intents[e.intent] = 1;
                if (e.noun_class) classes[e.noun_class] = 1;
            });

            var fIntent = document.getElementById('f-intent');
            var fClass = document.getElementById('f-class');
            var curI = fIntent.value, curC = fClass.value;

            // Keep first option (All), rebuild rest
            while (fIntent.options.length > 1) fIntent.remove(1);
            while (fClass.options.length > 1) fClass.remove(1);

            Object.keys(intents).sort().forEach(function (k) {
                var o = document.createElement('option');
                o.value = k; o.textContent = k;
                fIntent.appendChild(o);
            });
            Object.keys(classes).sort().forEach(function (k) {
                var o = document.createElement('option');
                o.value = k; o.textContent = k;
                fClass.appendChild(o);
            });

            fIntent.value = curI;
            fClass.value = curC;
        }

        // ── Filtering + sorting ────────────────────────────────────
        function applyFilters() {
            var q = (document.getElementById('search').value || '').toLowerCase();
            var fi = document.getElementById('f-intent').value;
            var fc = document.getElementById('f-class').value;
            var fs = document.getElementById('f-status').value;

            filtered = allEntries.filter(function (e) {
                if (q && (e.text || '').toLowerCase().indexOf(q) === -1
                    && (e.intent || '').toLowerCase().indexOf(q) === -1) return false;
                if (fi && e.intent !== fi) return false;
                if (fc && e.noun_class !== fc) return false;
                if (fs === 'confirmed' && !e.confirmed) return false;
                if (fs === 'pending' && e.confirmed) return false;
                return true;
            });

            doSort();
            page = 0;
            renderTable();
        }

        function doSort() {
            filtered.sort(function (a, b) {
                var va = a[sortCol], vb = b[sortCol];
                if (typeof va === 'number' && typeof vb === 'number') {
                    return sortAsc ? va - vb : vb - va;
                }
                va = String(va || '').toLowerCase();
                vb = String(vb || '').toLowerCase();
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
        }

        function toggleSort(col) {
            if (sortCol === col) { sortAsc = !sortAsc; }
            else { sortCol = col; sortAsc = true; }
            doSort();
            page = 0;
            renderTable();
        }

        // ── Render table ───────────────────────────────────────────
        function renderTable() {
            var wrap = document.getElementById('learned-content');
            var pager = document.getElementById('pager');

            if (!filtered.length) {
                wrap.innerHTML = '<div class="empty">' + t('empty') + '</div>';
                pager.style.display = 'none';
                return;
            }

            var totalPages = Math.ceil(filtered.length / perPage);
            if (page >= totalPages) page = totalPages - 1;
            var start = page * perPage;
            var slice = filtered.slice(start, start + perPage);

            var cols = [
                { key: 'text', label: 'th_text', cls: 'col-text' },
                { key: 'intent', label: 'th_intent', cls: 'col-intent' },
                { key: 'noun_class', label: 'th_class', cls: 'col-class' },
                { key: 'use_count', label: 'th_uses', cls: 'col-uses' },
                { key: 'confirmed', label: 'th_status', cls: 'col-status' },
            ];

            var html = '<div class="table-wrap"><table><thead><tr>';
            cols.forEach(function (c) {
                var arrow = sortCol === c.key ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25B4';
                var sorted = sortCol === c.key ? ' sorted' : '';
                html += '<th class="' + sorted + '" onclick="toggleSort(\'' + c.key + '\')">'
                    + t(c.label) + '<span class="sort-arrow">' + arrow + '</span></th>';
            });
            html += '<th></th></tr></thead><tbody>';

            slice.forEach(function (e) {
                var statusBadge = e.confirmed
                    ? '<span class="badge badge-ok">' + t('confirmed') + '</span>'
                    : '<span class="badge badge-warn">' + t('pending') + '</span>';
                if (e.source && e.source !== 'llm') {
                    statusBadge += ' <span class="badge badge-src">' + esc(e.source) + '</span>';
                }

                html += '<tr>'
                    + '<td class="col-text text-mono" title="' + esc(e.text || e.key || '') + '">' + esc(e.text || e.key || '') + '</td>'
                    + '<td class="col-intent"><code>' + esc(e.intent || '') + '</code></td>'
                    + '<td class="col-class"><span class="badge badge-src">' + esc(e.noun_class || '') + '</span></td>'
                    + '<td class="col-uses">' + (e.use_count || 1) + '</td>'
                    + '<td class="col-status">' + statusBadge + '</td>'
                    + '<td class="col-actions"><button class="btn-del" title="Delete" onclick="delEntry(\'' + escAttr(e.key || '') + '\')">\u2715</button></td>'
                    + '</tr>';
            });
            html += '</tbody></table></div>';
            wrap.innerHTML = html;

            // Pagination
            if (totalPages > 1) {
                pager.style.display = 'flex';
                var info = t('pager_showing') + ' ' + (start + 1) + '\u2013' + Math.min(start + perPage, filtered.length)
                    + ' ' + t('pager_of') + ' ' + filtered.length;
                document.getElementById('pager-info').textContent = info;

                var btns = '';
                btns += '<button class="pager-btn" onclick="goPage(0)" ' + (page === 0 ? 'disabled' : '') + '>\u00AB</button>';
                btns += '<button class="pager-btn" onclick="goPage(' + (page - 1) + ')" ' + (page === 0 ? 'disabled' : '') + '>\u2039</button>';

                var range = pageRange(page, totalPages);
                range.forEach(function (p) {
                    if (p === '...') {
                        btns += '<span style="padding:4px 6px;color:var(--tx3)">\u2026</span>';
                    } else {
                        btns += '<button class="pager-btn' + (p === page ? ' active' : '') + '" onclick="goPage(' + p + ')">' + (p + 1) + '</button>';
                    }
                });

                btns += '<button class="pager-btn" onclick="goPage(' + (page + 1) + ')" ' + (page >= totalPages - 1 ? 'disabled' : '') + '>\u203A</button>';
                btns += '<button class="pager-btn" onclick="goPage(' + (totalPages - 1) + ')" ' + (page >= totalPages - 1 ? 'disabled' : '') + '>\u00BB</button>';
                document.getElementById('pager-btns').innerHTML = btns;
            } else {
                pager.style.display = 'none';
            }
        }

        function pageRange(cur, total) {
            if (total <= 7) {
                var arr = [];
                for (var i = 0; i < total; i++) arr.push(i);
                return arr;
            }
            var pages = [0];
            var lo = Math.max(1, cur - 1), hi = Math.min(total - 2, cur + 1);
            if (lo > 1) pages.push('...');
            for (var i = lo; i <= hi; i++) pages.push(i);
            if (hi < total - 2) pages.push('...');
            pages.push(total - 1);
            return pages;
        }

        function goPage(p) {
            var totalPages = Math.ceil(filtered.length / perPage);
            page = Math.max(0, Math.min(p, totalPages - 1));
            renderTable();
        }

        // ── Actions ────────────────────────────────────────────────
        async function delEntry(key) {
            await fetch(BASE + '/learned/' + encodeURIComponent(key), { method: 'DELETE' });
            allEntries = allEntries.filter(function (e) { return e.key !== key; });
            applyFilters();
            loadStats();
            showMsg(t('deleted'));
        }

        // ── Helpers ────────────────────────────────────────────────
        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function escAttr(s) {
            return s.replace(/'/g, "\\'").replace(/\\/g, "\\\\");
        }

        function refresh() {
            loadStats();
            loadConfig();
            loadLearned();
        }

        applyLang();
        refresh();
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
