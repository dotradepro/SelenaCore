<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoLearner — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
            --pp: #9B6DFF;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
            --pp: #7B4FD4;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--tx);
            min-height: 100%;
            overflow-y: auto;
        }

        h1 { font-size: 1.4rem; margin-bottom: 4px; }
        .subtitle { font-size: 0.85rem; color: var(--tx2); margin-bottom: 20px; }

        .card {
            background: var(--sf);
            border: 1px solid var(--b);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }

        .stat .num {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--ac);
        }

        .stat .num.green { color: var(--gr); }
        .stat .num.amber { color: var(--am); }
        .stat .num.purple { color: var(--pp); }

        .stat .lbl {
            font-size: 0.75rem;
            color: var(--tx2);
            margin-top: 2px;
        }

        /* Toggle switch */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
        }

        .toggle-label {
            font-size: 0.9rem;
        }

        .toggle-desc {
            font-size: 0.78rem;
            color: var(--tx2);
            margin-top: 2px;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--sf3);
            border-radius: 24px;
            transition: .25s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: var(--tx);
            border-radius: 50%;
            transition: .25s;
        }

        .switch input:checked + .slider {
            background: var(--ac);
        }

        .switch input:checked + .slider::before {
            transform: translateX(20px);
        }

        /* Table */
        .table-wrap {
            overflow-x: auto;
            margin-top: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        th {
            text-align: left;
            padding: 8px 10px;
            background: var(--sf2);
            color: var(--tx2);
            font-weight: 500;
            border-bottom: 1px solid var(--b2);
            white-space: nowrap;
        }

        td {
            padding: 7px 10px;
            border-bottom: 1px solid var(--b);
            vertical-align: top;
        }

        tr:hover td {
            background: var(--sf2);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .badge-ok {
            background: rgba(46, 201, 138, .15);
            color: var(--gr);
        }

        .badge-warn {
            background: rgba(245, 169, 58, .15);
            color: var(--am);
        }

        .badge-src {
            background: rgba(79, 140, 247, .15);
            color: var(--ac);
        }

        .text-mono {
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
        }

        .text-sm {
            font-size: 0.78rem;
            color: var(--tx2);
        }

        .btn-del {
            background: none;
            border: none;
            color: var(--rd);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .btn-del:hover {
            background: rgba(224, 84, 84, .15);
        }

        .empty {
            text-align: center;
            color: var(--tx3);
            padding: 24px;
            font-size: 0.9rem;
        }

        #msg {
            margin-top: 8px;
            font-size: 0.82rem;
            color: var(--gr);
            min-height: 18px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>
    <div class="subtitle" data-i18n="subtitle"></div>

    <!-- Stats -->
    <div class="card">
        <div class="card-title" data-i18n="stats_title"></div>
        <div class="stats-row">
            <div class="stat">
                <div class="num" id="st-index">0</div>
                <div class="lbl" data-i18n="st_index"></div>
            </div>
            <div class="stat">
                <div class="num green" id="st-confirmed">0</div>
                <div class="lbl" data-i18n="st_confirmed"></div>
            </div>
            <div class="stat">
                <div class="num amber" id="st-unconfirmed">0</div>
                <div class="lbl" data-i18n="st_unconfirmed"></div>
            </div>
            <div class="stat">
                <div class="num purple" id="st-total">0</div>
                <div class="lbl" data-i18n="st_total"></div>
            </div>
        </div>
    </div>

    <!-- LLM Two-Step Toggle -->
    <div class="card">
        <div class="card-title" data-i18n="llm_title"></div>
        <div class="toggle-row">
            <div>
                <div class="toggle-label" data-i18n="two_step_label"></div>
                <div class="toggle-desc" data-i18n="two_step_desc"></div>
            </div>
            <label class="switch">
                <input type="checkbox" id="llm_two_step" onchange="saveConfig()" />
                <span class="slider"></span>
            </label>
        </div>
        <div id="msg"></div>
    </div>

    <!-- Learned Examples Table -->
    <div class="card">
        <div class="card-title" data-i18n="learned_title"></div>
        <div id="learned-content"></div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: 'AutoLearner',
                subtitle: 'Self-improving intent recognition — learns from LLM results',
                stats_title: 'SmartMatcher Index',
                st_index: 'Index entries',
                st_confirmed: 'Confirmed',
                st_unconfirmed: 'Unconfirmed',
                st_total: 'Learned total',
                llm_title: 'LLM Classification',
                two_step_label: 'Two-step LLM',
                two_step_desc: 'Step 1: classify category (~100ms) → Step 2: extract intent (~400ms). Faster than single prompt.',
                learned_title: 'Learned Examples',
                th_text: 'Phrase',
                th_intent: 'Intent',
                th_class: 'Class',
                th_uses: 'Uses',
                th_status: 'Status',
                th_actions: '',
                confirmed: 'confirmed',
                pending: 'pending',
                empty: 'No learned examples yet. Speak a command that goes to LLM — it will appear here.',
                saved: 'Saved',
                deleted: 'Deleted'
            },
            uk: {
                title: 'AutoLearner',
                subtitle: 'Самонавчання розпізнавання намірів — вчиться з результатів LLM',
                stats_title: 'Індекс SmartMatcher',
                st_index: 'Записів в індексі',
                st_confirmed: 'Підтверджених',
                st_unconfirmed: 'Непідтверджених',
                st_total: 'Вивчено всього',
                llm_title: 'Класифікація LLM',
                two_step_label: 'Двоетапний LLM',
                two_step_desc: 'Крок 1: визначити категорію (~100мс) → Крок 2: витягти намір (~400мс). Швидше за один промт.',
                learned_title: 'Вивчені приклади',
                th_text: 'Фраза',
                th_intent: 'Намір',
                th_class: 'Клас',
                th_uses: 'Разів',
                th_status: 'Статус',
                th_actions: '',
                confirmed: 'підтв.',
                pending: 'очік.',
                empty: 'Ще немає вивчених прикладів. Скажіть команду яка піде на LLM — вона з\'явиться тут.',
                saved: 'Збережено',
                deleted: 'Видалено'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
        }
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'lang_changed') {
                try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { }
                applyLang();
                refresh();
            }
        });

        var BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        function showMsg(text) {
            var el = document.getElementById('msg');
            el.textContent = text;
            setTimeout(function () { el.textContent = ''; }, 3000);
        }

        async function loadStats() {
            try {
                var r = await fetch(BASE + '/health');
                var d = await r.json();
                document.getElementById('st-index').textContent = d.smart_matcher_entries || 0;
                var ls = d.learner_stats || {};
                document.getElementById('st-confirmed').textContent = ls.confirmed || 0;
                document.getElementById('st-unconfirmed').textContent = ls.unconfirmed || 0;
                document.getElementById('st-total').textContent = ls.total || 0;
            } catch (e) { }
        }

        async function loadConfig() {
            try {
                var r = await fetch(BASE + '/config');
                var d = await r.json();
                document.getElementById('llm_two_step').checked = !!d.llm_two_step;
            } catch (e) { }
        }

        async function saveConfig() {
            var val = document.getElementById('llm_two_step').checked;
            await fetch(BASE + '/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ llm_two_step: val })
            });
            showMsg(t('saved'));
        }

        async function loadLearned() {
            var wrap = document.getElementById('learned-content');
            try {
                var r = await fetch(BASE + '/learned');
                var d = await r.json();
                var entries = d.entries || [];

                if (!entries.length) {
                    wrap.innerHTML = '<div class="empty">' + t('empty') + '</div>';
                    return;
                }

                var html = '<div class="table-wrap"><table><thead><tr>'
                    + '<th>' + t('th_text') + '</th>'
                    + '<th>' + t('th_intent') + '</th>'
                    + '<th>' + t('th_class') + '</th>'
                    + '<th>' + t('th_uses') + '</th>'
                    + '<th>' + t('th_status') + '</th>'
                    + '<th>' + t('th_actions') + '</th>'
                    + '</tr></thead><tbody>';

                entries.forEach(function (e) {
                    var badge = e.confirmed
                        ? '<span class="badge badge-ok">' + t('confirmed') + '</span>'
                        : '<span class="badge badge-warn">' + t('pending') + '</span>';
                    var src = e.source ? '<span class="badge badge-src">' + e.source + '</span>' : '';
                    html += '<tr>'
                        + '<td class="text-mono">' + esc(e.text || e.key || '') + '</td>'
                        + '<td><code>' + esc(e.intent || '') + '</code></td>'
                        + '<td class="text-sm">' + esc(e.noun_class || '') + '</td>'
                        + '<td style="text-align:center">' + (e.use_count || 1) + '</td>'
                        + '<td>' + badge + ' ' + src + '</td>'
                        + '<td><button class="btn-del" onclick="delEntry(\'' + esc(e.key || '') + '\')">&#x2715;</button></td>'
                        + '</tr>';
                });
                html += '</tbody></table></div>';
                wrap.innerHTML = html;
            } catch (e) {
                wrap.innerHTML = '<div class="empty">Error loading data</div>';
            }
        }

        async function delEntry(key) {
            await fetch(BASE + '/learned/' + encodeURIComponent(key), { method: 'DELETE' });
            showMsg(t('deleted'));
            refresh();
        }

        function esc(s) {
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function refresh() {
            loadStats();
            loadConfig();
            loadLearned();
        }

        applyLang();
        refresh();
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
