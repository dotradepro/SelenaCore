<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* iframe fills the grid cell — NO viewport units */
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e8eaf0;
            background: #0e1220;
            background-image:
                linear-gradient(rgba(255, 255, 255, .022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .022) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Root fills 100% of whatever size the iframe has */
        .root {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 14px 16px 12px;
            gap: 10px;
        }

        /* ── Top: big reading ── */
        .top {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .main-emoji {
            font-size: 2.8rem;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(100, 160, 255, .3));
            flex-shrink: 0;
        }

        .main-info {
            flex: 1;
            min-width: 0;
        }

        .main-temp {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: #fff;
        }

        .main-temp .unit {
            font-size: 1.1rem;
            font-weight: 400;
            color: #5a6180;
            margin-left: 1px;
        }

        .main-cond {
            font-size: 0.82rem;
            color: #7880a0;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Pills row ── */
        .pills {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .07);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.75rem;
            color: #8890b0;
            white-space: nowrap;
        }

        .pill .val {
            color: #c8cce8;
            font-weight: 500;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, .07) 25%,
                    rgba(255, 255, 255, .07) 75%,
                    transparent);
            flex-shrink: 0;
        }

        /* ── Forecast strip — stretches to fill remaining height ── */
        .forecast {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            flex: 1;
            min-height: 0;
            /* crucial: lets flex child shrink below content */
        }

        .fday {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .055);
            border-radius: 10px;
            padding: 8px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 2px;
            overflow: hidden;
        }

        .fday-date {
            font-size: 0.65rem;
            color: #454c6a;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .fday-emoji {
            font-size: 1.35rem;
            line-height: 1;
        }

        .fday-cond {
            font-size: 0.61rem;
            color: #5a6080;
            text-align: center;
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .fday-temps {
            font-size: 0.75rem;
            white-space: nowrap;
        }

        .tmax {
            color: #e8b840;
            font-weight: 600;
        }

        .tmin {
            color: #6aa8d8;
        }

        .tsep {
            color: #252c44;
            margin: 0 2px;
        }

        .fday-prec {
            font-size: 0.6rem;
            color: #4878a0;
        }

        /* ── Bottom: feels-like + timestamp ── */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .feels {
            font-size: 0.72rem;
            color: #404866;
        }

        .feels span {
            color: #666e90;
        }

        .updated {
            font-size: 0.63rem;
            color: #252c40;
        }

        /* ── States ── */
        .state-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 8px;
            color: #30364e;
            font-size: 0.82rem;
        }

        .state-center .ico {
            font-size: 1.8rem;
            opacity: .45;
        }

        .pulse {
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .9
            }
        }

        /* ── Compact mode: auto-applied when height < 190px ──
       Hides condition text in forecast, shrinks fonts          */
        .compact .main-emoji {
            font-size: 2rem;
        }

        .compact .main-temp {
            font-size: 1.9rem;
        }

        .compact .fday-emoji {
            font-size: 1.05rem;
        }

        .compact .fday-cond {
            display: none;
        }

        .compact .pill {
            padding: 3px 8px;
            font-size: 0.68rem;
        }

        .compact .bottom-bar {
            display: none;
        }
    </style>
</head>

<body>

    <div class="root" id="root">
        <div class="state-center">
            <div class="ico pulse">🌤</div>
            <div>Loading…</div>
        </div>
    </div>

    <script>
        (function () {
            const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

            function r(v, d) {
                if (v == null) return '—';
                return d != null ? Number(v).toFixed(d) : Math.round(v);
            }

            function shortDay(s) {
                if (!s) return '—';
                return new Date(s + 'T12:00:00').toLocaleDateString('en', {
                    weekday: 'short', month: 'short', day: 'numeric'
                });
            }

            function checkCompact() {
                const el = document.getElementById('root');
                if (!el) return;
                el.classList.toggle('compact', el.offsetHeight < 190);
            }

            function render(cur, forecast) {
                const imperial = cur.units === 'imperial';
                const tu = imperial ? '°F' : '°C';
                const wu = imperial ? 'mph' : 'km/h';

                const pills = [
                    cur.humidity != null ? `<div class="pill">💧 <span class="val">${cur.humidity}%</span></div>` : '',
                    cur.wind_speed != null ? `<div class="pill">💨 <span class="val">${r(cur.wind_speed, 1)} ${wu}</span></div>` : '',
                    cur.precipitation ? `<div class="pill">🌧 <span class="val">${cur.precipitation} mm</span></div>` : '',
                ].join('');

                const days = (forecast || []).slice(0, 3).map(f => `
      <div class="fday">
        <div class="fday-date">${shortDay(f.date)}</div>
        <div class="fday-emoji">${f.condition_emoji || '❓'}</div>
        <div class="fday-cond">${f.condition || '—'}</div>
        <div class="fday-temps">
          <span class="tmax">${r(f.temp_max)}°</span>
          <span class="tsep">/</span>
          <span class="tmin">${r(f.temp_min)}°</span>
        </div>
        ${f.precipitation ? `<div class="fday-prec">💧 ${f.precipitation}mm</div>` : '<div></div>'}
      </div>`).join('');

                const now = new Date().toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit' });

                document.getElementById('root').innerHTML = `
      <div class="top">
        <div class="main-emoji">${cur.condition_emoji || '❓'}</div>
        <div class="main-info">
          <div class="main-temp">${r(cur.temperature)}<span class="unit">${tu}</span></div>
          <div class="main-cond">${cur.condition || '—'}</div>
        </div>
      </div>

      ${pills ? `<div class="pills">${pills}</div>` : ''}

      <div class="divider"></div>

      <div class="forecast">${days}</div>

      <div class="bottom-bar">
        <div class="feels">Feels like <span>${r(cur.feels_like)}${tu}</span></div>
        <div class="updated">↻ ${now}</div>
      </div>`;

                checkCompact();
            }

            async function load() {
                try {
                    const [cr, fr] = await Promise.all([
                        fetch(`${BASE}/weather/current`),
                        fetch(`${BASE}/weather/forecast`),
                    ]);
                    if (!cr.ok) throw new Error(`HTTP ${cr.status}`);
                    const cur = await cr.json();
                    const fore = await fr.json();
                    render(cur, fore.forecast || []);
                } catch (e) {
                    document.getElementById('root').innerHTML = `
        <div class="state-center">
          <div class="ico">⚠️</div>
          <div>${e.message}</div>
        </div>`;
                }
            }

            load();
            setInterval(load, 5 * 60 * 1000);
            window.addEventListener('resize', checkCompact);
        })();
    </script>
</body>

</html>
