<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* iframe fills the grid cell — NO viewport units */
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--tx);
            background: var(--bg);
            background-image:
                linear-gradient(var(--b) 1px, transparent 1px),
                linear-gradient(90deg, var(--b) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Root fills 100% of whatever size the iframe has */
        .root {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 8px 11px 7px;
            gap: 6px;
        }

        /* ── Top: big reading ── */
        .top {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .main-emoji {
            font-size: 2.6rem;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(100, 160, 255, .3));
            flex-shrink: 0;
        }

        .main-info {
            flex: 1;
            min-width: 0;
        }

        .main-temp {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1;
            color: var(--tx);
        }

        .main-temp .unit {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--tx3);
            margin-left: 1px;
        }

        .main-cond {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Pills row ── */
        .pills {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .pill {
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--b);
            border: 1px solid var(--b);
            border-radius: 20px;
            padding: 4px 9px;
            font-size: 0.85rem;
            color: var(--tx2);
            white-space: nowrap;
        }

        .pill .val {
            color: var(--tx2);
            font-weight: 500;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg,
                    transparent,
                    var(--b) 25%,
                    var(--b) 75%,
                    transparent);
            flex-shrink: 0;
        }

        /* ── Forecast strip — sized to content, doesn't stretch ── */
        .forecast {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            flex: 0 0 auto;
            min-height: 0;
        }

        .fday {
            background: var(--b);
            border: 1px solid var(--b);
            border-radius: 9px;
            padding: 6px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 2px;
            overflow: hidden;
        }

        .fday-date {
            font-size: 0.72rem;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .fday-emoji {
            font-size: 1.5rem;
            line-height: 1;
        }

        .fday-cond {
            font-size: 0.68rem;
            color: var(--tx3);
            text-align: center;
            line-height: 1.2;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .fday-temps {
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .tmax {
            color: #e8b840;
            font-weight: 600;
        }

        .tmin {
            color: #6aa8d8;
        }

        .tsep {
            color: var(--tx3);
            margin: 0 2px;
        }

        .fday-prec {
            font-size: 0.68rem;
            color: #4878a0;
        }

        /* ── Bottom: feels-like + timestamp ── */
        .bottom-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            margin-top: auto;
        }

        .feels {
            font-size: 0.82rem;
            color: var(--tx3);
        }

        .feels span {
            color: var(--tx2);
        }

        .updated {
            font-size: 0.72rem;
            color: var(--tx3);
        }

        /* ── States ── */
        .state-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 8px;
            color: var(--tx3);
            font-size: 0.82rem;
        }

        .state-center .ico {
            font-size: 1.8rem;
            opacity: .45;
        }

        .pulse {
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: .3
            }

            50% {
                opacity: .9
            }
        }

        /* ═══ Per-size layouts (driven by data-span-cols/rows from dashboard) ═══ */

        /* sz-1x1 — minimal: large emoji + temperature, centered */
        .sz-1x1 {
            flex-direction: row;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            gap: 8px;
        }

        .sz-1x1 .top {
            gap: 8px;
            align-items: center;
        }

        .sz-1x1 .main-emoji {
            font-size: 3rem;
        }

        .sz-1x1 .main-temp {
            font-size: 2.8rem;
        }

        .sz-1x1 .main-temp .unit {
            font-size: 1.2rem;
        }

        .sz-1x1 .main-cond,
        .sz-1x1 .pills,
        .sz-1x1 .divider,
        .sz-1x1 .forecast,
        .sz-1x1 .bottom-bar {
            display: none;
        }

        /* sz-2x1 — single horizontal row: emoji + temp + humidity + wind */
        .sz-2x1 {
            flex-direction: row;
            align-items: center;
            padding: 7px 12px 6px;
            gap: 10px;
        }

        .sz-2x1 .top {
            flex: 0 0 auto;
            gap: 8px;
        }

        .sz-2x1 .main-emoji {
            font-size: 2rem;
        }

        .sz-2x1 .main-temp {
            font-size: 2rem;
        }

        .sz-2x1 .main-temp .unit {
            font-size: 1rem;
        }

        .sz-2x1 .main-cond {
            display: none;
        }

        .sz-2x1 .pills {
            flex: 1;
            justify-content: flex-end;
            gap: 5px;
            flex-wrap: nowrap;
            min-width: 0;
            overflow: hidden;
        }

        .sz-2x1 .pill {
            padding: 3px 8px;
            font-size: 0.78rem;
        }

        .sz-2x1 .pill:nth-child(n+3) {
            display: none;
        }

        .sz-2x1 .divider,
        .sz-2x1 .forecast,
        .sz-2x1 .bottom-bar {
            display: none;
        }

        /* sz-2x2 — top + pills + 3-day forecast.
           Forecast stretches to fill remaining height so there's no empty
           space at the bottom on taller PC displays. */
        .sz-2x2 {
            padding: 9px 11px 9px;
            gap: 6px;
        }

        .sz-2x2 .main-emoji {
            font-size: 2.2rem;
        }

        .sz-2x2 .main-temp {
            font-size: 2.2rem;
        }

        .sz-2x2 .main-cond {
            display: none;
        }

        .sz-2x2 .divider {
            display: none;
        }

        .sz-2x2 .forecast {
            flex: 1 1 auto;
            min-height: 0;
        }

        .sz-2x2 .fday {
            padding: 6px 5px;
        }

        .sz-2x2 .fday-cond {
            display: none;
        }

        .sz-2x2 .fday-emoji {
            font-size: 1.35rem;
        }

        .sz-2x2 .fday-temps {
            font-size: 0.82rem;
        }

        .sz-2x2 .fday-prec {
            display: none;
        }

        .sz-2x2 .bottom-bar {
            display: none;
        }
    </style>
</head>

<body>

    <div class="root" id="root">
        <div class="state-center">
            <div class="ico pulse">🌤</div>
            <div data-i18n="loading"></div>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { loading: 'Loading…', feels_like: 'Feels like' },
            uk: { loading: 'Завантаження…', feels_like: 'Відчувається' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        (function () {
            const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

            function r(v, d) {
                if (v == null) return '—';
                return d != null ? Number(v).toFixed(d) : Math.round(v);
            }

            function shortDay(s) {
                if (!s) return '—';
                return new Date(s + 'T12:00:00').toLocaleDateString(LANG, {
                    weekday: 'short', month: 'short', day: 'numeric'
                });
            }

            // Apply size class based on grid span injected by dashboard.
            // Falls back to height heuristic when running outside the dashboard.
            const SIZE_CLASSES = ['sz-1x1', 'sz-2x1', 'sz-1x2', 'sz-2x2', 'sz-2x3', 'sz-3x2', 'sz-3x3'];

            function applySize() {
                const el = document.getElementById('root');
                if (!el) return;
                const ds = document.documentElement.dataset || {};
                const cols = parseInt(ds.spanCols || '0', 10);
                const rows = parseInt(ds.spanRows || '0', 10);
                SIZE_CLASSES.forEach(c => el.classList.remove(c));
                if (cols >= 1 && rows >= 1) {
                    el.classList.add('sz-' + cols + 'x' + rows);
                } else if (el.offsetHeight < 130) {
                    el.classList.add('sz-2x1');
                } else if (el.offsetHeight < 200) {
                    el.classList.add('sz-2x2');
                }
            }

            function render(cur, forecast) {
                const imperial = cur.units === 'imperial';
                const tu = imperial ? '°F' : '°C';
                const wu = imperial ? 'mph' : 'km/h';

                const pills = [
                    cur.humidity != null ? `<div class="pill">💧 <span class="val">${cur.humidity}%</span></div>` : '',
                    cur.wind_speed != null ? `<div class="pill">💨 <span class="val">${r(cur.wind_speed, 1)} ${wu}</span></div>` : '',
                    cur.precipitation ? `<div class="pill">🌧 <span class="val">${cur.precipitation} mm</span></div>` : '',
                ].join('');

                const days = (forecast || []).slice(0, 3).map(f => `
      <div class="fday">
        <div class="fday-date">${shortDay(f.date)}</div>
        <div class="fday-emoji">${f.condition_emoji || '❓'}</div>
        <div class="fday-cond">${f.condition || '—'}</div>
        <div class="fday-temps">
          <span class="tmax">${r(f.temp_max)}°</span>
          <span class="tsep">/</span>
          <span class="tmin">${r(f.temp_min)}°</span>
        </div>
        ${f.precipitation ? `<div class="fday-prec">💧 ${f.precipitation}mm</div>` : '<div></div>'}
      </div>`).join('');

                const now = new Date().toLocaleTimeString(LANG, { hour: '2-digit', minute: '2-digit' });

                document.getElementById('root').innerHTML = `
      <div class="top">
        <div class="main-emoji">${cur.condition_emoji || '❓'}</div>
        <div class="main-info">
          <div class="main-temp">${r(cur.temperature)}<span class="unit">${tu}</span></div>
          <div class="main-cond">${cur.condition || '—'}</div>
        </div>
      </div>

      ${pills ? `<div class="pills">${pills}</div>` : ''}

      <div class="divider"></div>

      <div class="forecast">${days}</div>

      <div class="bottom-bar">
        <div class="feels">${t('feels_like')} <span>${r(cur.feels_like)}${tu}</span></div>
        <div class="updated">↻ ${now}</div>
      </div>`;

                applySize();
            }

            async function load() {
                try {
                    const [cr, fr] = await Promise.all([
                        fetch(`${BASE}/weather/current`),
                        fetch(`${BASE}/weather/forecast`),
                    ]);
                    if (!cr.ok) throw new Error(`HTTP ${cr.status}`);
                    const cur = await cr.json();
                    const fore = await fr.json();
                    render(cur, fore.forecast || []);
                } catch (e) {
                    document.getElementById('root').innerHTML = `
        <div class="state-center">
          <div class="ico">⚠️</div>
          <div>${e.message}</div>
        </div>`;
                }
            }

            window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); load(); } });
            applyLang();
            applySize();
            load();
            setInterval(load, 5 * 60 * 1000);
            window.addEventListener('resize', applySize);
            // React to dashboard injecting new data-span-cols/rows on <html>
            if (window.MutationObserver) {
                new MutationObserver(applySize).observe(document.documentElement, {
                    attributes: true, attributeFilter: ['data-span-cols', 'data-span-rows']
                });
            }
        })();
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
