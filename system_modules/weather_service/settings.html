<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Service Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--tx);
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--b2);
            border-radius: 8px;
            color: var(--tx);
            padding: 9px 12px;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--ac);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button,
        .btn {
            display: inline-block;
            background: var(--ac);
            color: var(--tx);
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            text-align: center;
        }

        button:hover,
        .btn:hover {
            background: var(--ac);
        }

        .btn-secondary {
            background: var(--sf3);
        }

        .btn-secondary:hover {
            background: var(--sf3);
        }

        .btn-detect {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            margin-bottom: 12px;
        }

        .btn-detect:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        /* Location display */
        .location-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--sf2);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            min-height: 48px;
        }

        .location-display .pin {
            font-size: 1.4rem;
        }

        .location-display .info {
            flex: 1;
        }

        .location-display .name {
            font-size: 0.95rem;
            color: var(--tx);
            font-weight: 500;
        }

        .location-display .coords {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .location-display .change-btn {
            background: none;
            border: 1px solid var(--b2);
            color: var(--tx2);
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .location-display .change-btn:hover {
            border-color: var(--ac);
            color: var(--ac);
        }

        /* Search */
        .search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .search-wrap input {
            margin-bottom: 0;
            padding-right: 36px;
        }

        .search-wrap .spinner {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 16px;
            height: 16px;
            border: 2px solid var(--b2);
            border-top-color: var(--ac);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .search-results {
            background: var(--sf2);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .search-results .item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--b2);
            font-size: 0.85rem;
            transition: background .15s;
        }

        .search-results .item:hover {
            background: var(--sf);
        }

        .search-results .item .city {
            color: var(--tx);
        }

        .search-results .item .region {
            color: var(--tx3);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        /* Map */
        #map {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            margin-bottom: 12px;
            z-index: 0;
        }

        /* Messages */
        .msg {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .msg.ok {
            background: rgba(80, 200, 120, .15);
            color: var(--gr);
        }

        .msg.err {
            background: rgba(220, 50, 50, .15);
            color: var(--rd);
        }

        #status-panel {
            background: var(--sf2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 8px;
            white-space: pre-wrap;
            max-height: 160px;
            overflow-y: auto;
        }

        /* Dark scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--sf3);
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <!-- Location Section -->
    <div class="section">
        <h2 data-i18n="h_location"></h2>

        <div class="location-display" id="loc-display" style="display:none">
            <div class="pin">📌</div>
            <div class="info">
                <div class="name" id="loc-name">—</div>
                <div class="coords" id="loc-coords">—</div>
            </div>
            <button class="change-btn" onclick="showLocationPicker()" data-i18n="change_btn"></button>
        </div>

        <div id="loc-picker">
            <button class="btn-detect" onclick="detectLocation()" data-i18n="detect_btn"></button>

            <div class="search-wrap">
                <input type="text" id="search-city" placeholder="Search city name…" oninput="onSearchInput()"
                    autocomplete="off">
                <div class="spinner" id="search-spinner"></div>
            </div>
            <div class="search-results" id="search-results"></div>

            <div id="map"></div>

            <div class="row" style="margin-bottom:4px">
                <div>
                    <label data-i18n="lbl_lat"></label>
                    <input type="number" id="lat" step="0.0001" placeholder="50.4501">
                </div>
                <div>
                    <label data-i18n="lbl_lon"></label>
                    <input type="number" id="lon" step="0.0001" placeholder="30.5234">
                </div>
            </div>
        </div>
    </div>

    <!-- Preferences -->
    <div class="section">
        <h2 data-i18n="h_prefs"></h2>
        <label data-i18n="lbl_units"></label>
        <select id="units">
            <option value="metric" data-i18n="opt_metric"></option>
            <option value="imperial" data-i18n="opt_imperial"></option>
        </select>
        <label data-i18n="lbl_interval"></label>
        <input type="number" id="interval" step="60" min="60" placeholder="1800">
    </div>

    <!-- Alert Thresholds -->
    <div class="section">
        <h2 data-i18n="h_alerts"></h2>
        <div class="row">
            <div>
                <label data-i18n="lbl_rain"></label>
                <input type="number" id="alert_rain" step="0.5" min="0" placeholder="10">
            </div>
            <div>
                <label data-i18n="lbl_wind"></label>
                <input type="number" id="alert_wind" step="1" min="0" placeholder="50">
            </div>
        </div>
    </div>

    <button onclick="save()" style="width:100%" data-i18n="save_btn"></button>
    <button onclick="refreshWeather()" class="btn-secondary" style="width:100%;margin-top:8px;"
        data-i18n="refresh_btn"></button>
    <div id="msg"></div>

    <div class="section" style="margin-top:14px">
        <h2 data-i18n="h_status"></h2>
        <div id="status-panel" data-i18n="loading"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var TR = {
            en: {
                title: '🌤️ Weather Service Settings',
                h_location: '📍 Location', change_btn: 'Change', detect_btn: '📡 Detect My Location',
                lbl_lat: 'Latitude', lbl_lon: 'Longitude',
                h_prefs: '⚙️ Preferences', lbl_units: 'Units',
                opt_metric: 'Metric (°C, km/h)', opt_imperial: 'Imperial (°F, mph)',
                lbl_interval: 'Update interval (seconds, min 60)',
                h_alerts: '⚠️ Alert Thresholds', lbl_rain: 'Rain alert (mm)', lbl_wind: 'Wind alert (km/h)',
                save_btn: '💾 Save Settings', refresh_btn: '🔄 Refresh Now',
                h_status: 'Status', loading: 'Loading…',
                geo_notsupported: 'Geolocation is not supported by this browser',
                detecting: 'Detecting location…', detected: 'Location detected!',
                detected_ip: '⚠️ Approximate location via IP (city level). Use the map to refine.',
                detect_failed: 'Could not detect location. Please search for your city.',
                detect_failed_err: 'Could not detect location: ',
                saved: 'Settings saved! Weather will refresh shortly.',
                refreshed: 'Weather refreshed!'
            },
            uk: {
                title: '🌤️ Налаштування погоди',
                h_location: '📍 Місцезнаходження', change_btn: 'Змінити', detect_btn: '📡 Визначити моє місцезнаходження',
                lbl_lat: 'Широта', lbl_lon: 'Довгота',
                h_prefs: '⚙️ Настрої', lbl_units: 'Одиниці',
                opt_metric: 'Метричні (°C, км/г)', opt_imperial: 'Імперські (°F, миля/г)',
                lbl_interval: 'Інтервал оновлення (секунд, мін 60)',
                h_alerts: '⚠️ Пороги сповіщень', lbl_rain: 'Сповіщення про дощ (mm)', lbl_wind: 'Сповіщення про вітер (км/г)',
                save_btn: '💾 Зберегти', refresh_btn: '🔄 Оновити',
                h_status: 'Статус', loading: 'Завантаження…',
                geo_notsupported: 'Геолокація не підтримується цим браузером',
                detecting: 'Визначення місцезнаходження…', detected: 'Місцезнаходження визначено!',
                detected_ip: '⚠️ Приблизне місце через IP (рівень міста). Уточніть на карті.',
                detect_failed: 'Не вдалося визначити місце. Шукайте місто.',
                detect_failed_err: 'Не вдалося визначити місце: ',
                saved: 'Налаштування збережено! Погода скоро оновиться.',
                refreshed: 'Погода оновлена!'
            }
        };
        function t(k) { return (TR[LANG] || TR.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        let map, marker, accuracyCircle;
        let selectedLat = null, selectedLon = null, selectedName = '';
        let searchTimeout = null;

        // ── Init Map ──
        function initMap(lat, lon, accuracy) {
            if (map) { map.remove(); accuracyCircle = null; }
            map = L.map('map', {
                center: [lat, lon], zoom: 10,
                zoomControl: true, attributionControl: false,
            });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 18,
            }).addTo(map);
            // Show accuracy radius circle (only if meaningful, < 50 km)
            if (accuracy && accuracy < 50000) {
                accuracyCircle = L.circle([lat, lon], {
                    radius: accuracy,
                    color: '#4F8CF7',
                    fillColor: '#4F8CF7',
                    fillOpacity: 0.08,
                    weight: 1,
                }).addTo(map);
                // Zoom map to fit the accuracy circle
                map.fitBounds(accuracyCircle.getBounds());
            }
            marker = L.marker([lat, lon], { draggable: true }).addTo(map);
            marker.on('dragend', function () {
                const pos = marker.getLatLng();
                setLocation(pos.lat, pos.lng, '');
                reverseGeocode(pos.lat, pos.lng);
            });
            map.on('click', function (e) {
                marker.setLatLng(e.latlng);
                setLocation(e.latlng.lat, e.latlng.lng, '');
                reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
        }

        function setLocation(lat, lon, name) {
            selectedLat = Math.round(lat * 10000) / 10000;
            selectedLon = Math.round(lon * 10000) / 10000;
            document.getElementById('lat').value = selectedLat;
            document.getElementById('lon').value = selectedLon;
            if (name) {
                selectedName = name;
                document.getElementById('loc-name').textContent = name;
            }
            document.getElementById('loc-coords').textContent = `${selectedLat}, ${selectedLon}`;
            if (map && marker) {
                marker.setLatLng([selectedLat, selectedLon]);
                map.setView([selectedLat, selectedLon], map.getZoom());
            }
        }

        function showLocationCompact() {
            if (!selectedName && !selectedLat) return;
            document.getElementById('loc-display').style.display = 'flex';
            document.getElementById('loc-picker').style.display = 'none';
        }

        function showLocationPicker() {
            document.getElementById('loc-display').style.display = 'none';
            document.getElementById('loc-picker').style.display = 'block';
            setTimeout(() => { if (map) map.invalidateSize(); }, 100);
        }

        // ── Detect Location (Browser Geolocation API) ──
        function detectLocation() {
            if (!navigator.geolocation) {
                showMsg(t('geo_notsupported'), 'err');
                return;
            }
            showMsg(t('detecting'), 'ok');
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const acc = pos.coords.accuracy; // metres
                    setLocation(lat, lon, '');
                    initMap(lat, lon, acc);
                    reverseGeocode(lat, lon);
                    // Show human-readable accuracy
                    const accLabel = acc < 1000
                        ? '\xb1' + Math.round(acc) + 'm'
                        : '\xb1' + (acc / 1000).toFixed(1) + 'km';
                    showMsg(t('detected') + ' (' + accLabel + ')', 'ok');
                },
                function (err) {
                    // Fallback: use IP-based location
                    fetchIpLocation();
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        async function fetchIpLocation() {
            try {
                let loc = null;
                // 1st try: ipapi.co (HTTPS, free, ~city accuracy)
                try {
                    const r1 = await fetch('https://ipapi.co/json/');
                    const j1 = await r1.json();
                    if (j1.latitude && j1.longitude) {
                        loc = {
                            lat: j1.latitude, lon: j1.longitude,
                            city: j1.city, country: j1.country_name
                        };
                    }
                } catch (_) { /* try next service */ }

                // 2nd try: ip-api.com (HTTP, free fallback)
                if (!loc) {
                    const r2 = await fetch('http://ip-api.com/json/?fields=lat,lon,city,country');
                    const j2 = await r2.json();
                    if (j2.lat && j2.lon) {
                        loc = { lat: j2.lat, lon: j2.lon, city: j2.city, country: j2.country };
                    }
                }

                if (loc) {
                    const name = [loc.city, loc.country].filter(Boolean).join(', ');
                    setLocation(loc.lat, loc.lon, name);
                    initMap(loc.lat, loc.lon); // no accuracy circle — IP is city-level
                    showMsg(t('detected_ip'), 'err'); // amber warning — approximate
                } else {
                    showMsg(t('detect_failed'), 'err');
                }
            } catch (e) {
                showMsg(t('detect_failed_err') + e.message, 'err');
            }
        }

        // ── Reverse Geocode (coordinates → city name) ──
        async function reverseGeocode(lat, lon) {
            try {
                const r = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10&accept-language=en`,
                    { headers: { 'User-Agent': 'SelenaCore/0.3' } }
                );
                const d = await r.json();
                const parts = [];
                if (d.address) {
                    parts.push(d.address.city || d.address.town || d.address.village || d.address.county || '');
                    parts.push(d.address.country || '');
                }
                const name = parts.filter(Boolean).join(', ') || d.display_name || '';
                if (name) {
                    selectedName = name;
                    document.getElementById('loc-name').textContent = name;
                }
            } catch (e) { /* silent */ }
        }

        // ── City Search ──
        function onSearchInput() {
            clearTimeout(searchTimeout);
            const q = document.getElementById('search-city').value.trim();
            if (q.length < 2) {
                document.getElementById('search-results').style.display = 'none';
                return;
            }
            document.getElementById('search-spinner').style.display = 'block';
            searchTimeout = setTimeout(() => searchCity(q), 350);
        }

        async function searchCity(q) {
            try {
                const r = await fetch(`${BASE}/weather/geocode?q=${encodeURIComponent(q)}`);
                const d = await r.json();
                const el = document.getElementById('search-results');
                if (!d.results || d.results.length === 0) {
                    el.innerHTML = '<div class="item"><span class="city" style="color:var(--tx3)">No results</span></div>';
                    el.style.display = 'block';
                    return;
                }
                el.innerHTML = d.results.map((r, i) => `
                    <div class="item" onclick='pickResult(${i})'>
                        <div class="city">${esc(r.name)}</div>
                        <div class="region">${esc([r.admin1, r.country].filter(Boolean).join(', '))} · ${r.latitude.toFixed(2)}, ${r.longitude.toFixed(2)}</div>
                    </div>
                `).join('');
                el.style.display = 'block';
                window._searchResults = d.results;
            } catch (e) {
                showMsg('Search failed: ' + e.message, 'err');
            } finally {
                document.getElementById('search-spinner').style.display = 'none';
            }
        }

        function pickResult(i) {
            const r = window._searchResults[i];
            const name = [r.name, r.admin1, r.country].filter(Boolean).join(', ');
            setLocation(r.latitude, r.longitude, name);
            initMap(r.latitude, r.longitude);
            document.getElementById('search-results').style.display = 'none';
            document.getElementById('search-city').value = '';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }

        // ── Load Status ──
        async function loadStatus() {
            try {
                const s = await fetch(`${BASE}/weather/status`).then(r => r.json());
                document.getElementById('status-panel').textContent = JSON.stringify(s, null, 2);
                if (s.latitude) {
                    selectedLat = s.latitude;
                    document.getElementById('lat').value = s.latitude;
                }
                if (s.longitude) {
                    selectedLon = s.longitude;
                    document.getElementById('lon').value = s.longitude;
                }
                if (s.location_name) {
                    selectedName = s.location_name;
                    document.getElementById('loc-name').textContent = s.location_name;
                }
                if (s.units) document.getElementById('units').value = s.units;
                if (s.update_interval_sec) document.getElementById('interval').value = s.update_interval_sec;
                if (s.alert_rain_mm) document.getElementById('alert_rain').value = s.alert_rain_mm;
                if (s.alert_wind_kmh) document.getElementById('alert_wind').value = s.alert_wind_kmh;

                // Show coordinates
                if (selectedLat && selectedLon) {
                    document.getElementById('loc-coords').textContent = `${selectedLat}, ${selectedLon}`;
                    initMap(selectedLat, selectedLon);
                    if (selectedName) {
                        showLocationCompact();
                    }
                }
            } catch (e) {
                document.getElementById('status-panel').textContent = 'Error loading status: ' + e.message;
            }
        }

        // ── Save ──
        async function save() {
            const body = {};
            const lat = parseFloat(document.getElementById('lat').value);
            const lon = parseFloat(document.getElementById('lon').value);
            const interval = parseInt(document.getElementById('interval').value);
            const units = document.getElementById('units').value;
            const alertRain = parseFloat(document.getElementById('alert_rain').value);
            const alertWind = parseFloat(document.getElementById('alert_wind').value);
            if (!isNaN(lat)) body.latitude = lat;
            if (!isNaN(lon)) body.longitude = lon;
            if (selectedName) body.location_name = selectedName;
            if (!isNaN(interval) && interval >= 60) body.update_interval_sec = interval;
            if (units) body.units = units;
            if (!isNaN(alertRain)) body.alert_rain_mm = alertRain;
            if (!isNaN(alertWind)) body.alert_wind_kmh = alertWind;
            try {
                const r = await fetch(`${BASE}/weather/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                showMsg(t('saved'), 'ok');
                if (selectedName) showLocationCompact();
                loadStatus();
            } catch (e) {
                showMsg('Error: ' + e.message, 'err');
            }
        }

        async function refreshWeather() {
            try {
                await fetch(`${BASE}/weather/refresh`, { method: 'POST' });
                showMsg(t('refreshed'), 'ok');
                loadStatus();
            } catch (e) {
                showMsg('Error: ' + e.message, 'err');
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.className = 'msg ' + type;
            el.textContent = text;
            setTimeout(() => { el.textContent = ''; el.className = ''; }, 5000);
        }

        // ── Init ──
        applyLang();
        loadStatus();
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")); document.documentElement.classList.toggle("has-wallpaper", p.classList.contains("has-wallpaper")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
