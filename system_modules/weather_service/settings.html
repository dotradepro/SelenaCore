<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Service Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--tx);
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .btn-detect {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            width: 100%;
            padding: 12px;
            font-size: 0.95rem;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            color: var(--tx);
            cursor: pointer;
        }

        .btn-detect:hover {
            background: linear-gradient(135deg, #16a34a, #15803d);
        }

        /* Location display */
        .location-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--sf2);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            min-height: 48px;
        }

        .location-display .pin {
            font-size: 1.4rem;
        }

        .location-display .info {
            flex: 1;
        }

        .location-display .name {
            font-size: 0.95rem;
            color: var(--tx);
            font-weight: 500;
        }

        .location-display .coords {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .location-display .change-btn {
            background: none;
            border: 1px solid var(--b2);
            color: var(--tx2);
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .location-display .change-btn:hover {
            border-color: var(--ac);
            color: var(--ac);
        }

        /* Search */
        .search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .search-wrap input {
            margin-bottom: 0;
            padding-right: 36px;
        }

        .search-wrap .search-spinner {
            position: absolute;
            right: 10px;
            top: 10px;
            width: 16px;
            height: 16px;
            border: 2px solid var(--b2);
            border-top-color: var(--ac);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none;
        }

        .search-results {
            background: var(--sf2);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .search-results .item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--b2);
            font-size: 0.85rem;
            transition: background .15s;
        }

        .search-results .item:hover {
            background: var(--sf);
        }

        .search-results .item .city {
            color: var(--tx);
        }

        .search-results .item .region {
            color: var(--tx3);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        /* Map */
        #map {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            margin-bottom: 12px;
            z-index: 0;
        }

        /* Messages */
        .msg {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .msg.ok {
            background: rgba(80, 200, 120, .15);
            color: var(--gr);
        }

        .msg.err {
            background: rgba(220, 50, 50, .15);
            color: var(--rd);
        }

        #status-panel {
            background: var(--sf2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 8px;
            white-space: pre-wrap;
            max-height: 160px;
            overflow-y: auto;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <!-- Location Section -->
    <div class="section">
        <h2 data-i18n="h_location"></h2>

        <div class="location-display" id="loc-display" style="display:none">
            <div class="pin">📌</div>
            <div class="info">
                <div class="name" id="loc-name">—</div>
                <div class="coords" id="loc-coords">—</div>
            </div>
            <button class="change-btn" id="btn-change" data-i18n="change_btn"></button>
        </div>

        <div id="loc-picker">
            <button class="btn-detect" id="btn-detect" data-i18n="detect_btn"></button>

            <div class="search-wrap">
                <input type="text" id="search-city" placeholder="Search city name…" autocomplete="off">
                <div class="search-spinner" id="search-spinner"></div>
            </div>
            <div class="search-results" id="search-results"></div>

            <div id="map"></div>

            <div class="row" style="margin-bottom:4px">
                <div>
                    <label data-i18n="lbl_lat"></label>
                    <input type="number" id="lat" step="0.0001" placeholder="50.4501">
                </div>
                <div>
                    <label data-i18n="lbl_lon"></label>
                    <input type="number" id="lon" step="0.0001" placeholder="30.5234">
                </div>
            </div>
        </div>
    </div>

    <!-- Preferences -->
    <div class="section">
        <h2 data-i18n="h_prefs"></h2>
        <label data-i18n="lbl_units"></label>
        <select id="units">
            <option value="metric" data-i18n="opt_metric"></option>
            <option value="imperial" data-i18n="opt_imperial"></option>
        </select>
        <label data-i18n="lbl_interval"></label>
        <input type="number" id="interval" step="60" min="60" placeholder="1800">
    </div>

    <!-- Alert Thresholds -->
    <div class="section">
        <h2 data-i18n="h_alerts"></h2>
        <div class="row">
            <div>
                <label data-i18n="lbl_rain"></label>
                <input type="number" id="alert_rain" step="0.5" min="0" placeholder="10">
            </div>
            <div>
                <label data-i18n="lbl_wind"></label>
                <input type="number" id="alert_wind" step="1" min="0" placeholder="50">
            </div>
        </div>
    </div>

    <button class="btn btn-primary" id="btn-save" style="width:100%" data-i18n="save_btn"></button>
    <button class="btn btn-secondary" id="btn-refresh" style="width:100%;margin-top:8px;" data-i18n="refresh_btn"></button>
    <div id="msg"></div>

    <div class="section" style="margin-top:14px">
        <h2 data-i18n="h_status"></h2>
        <div id="status-panel" data-i18n="loading"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* Leaflet claims window.L — save it before widget-common.js loads,
           because widget-common.js expects window.L to be the i18n dict. */
        var _LF = window.L;
    </script>
    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: {
                title: '🌤️ Weather Service Settings',
                h_location: '📍 Location', change_btn: 'Change', detect_btn: '📡 Detect My Location',
                lbl_lat: 'Latitude', lbl_lon: 'Longitude',
                h_prefs: '⚙️ Preferences', lbl_units: 'Units',
                opt_metric: 'Metric (°C, km/h)', opt_imperial: 'Imperial (°F, mph)',
                lbl_interval: 'Update interval (seconds, min 60)',
                h_alerts: '⚠️ Alert Thresholds', lbl_rain: 'Rain alert (mm)', lbl_wind: 'Wind alert (km/h)',
                save_btn: '💾 Save Settings', refresh_btn: '🔄 Refresh Now',
                h_status: 'Status', loading: 'Loading…',
                geo_notsupported: 'Geolocation is not supported by this browser',
                detecting: 'Detecting location…', detected: 'Location detected!',
                detected_ip: '⚠️ Approximate location via IP (city level). Use the map to refine.',
                detect_failed: 'Could not detect location. Please search for your city.',
                detect_failed_err: 'Could not detect location: ',
                saved: 'Settings saved! Weather will refresh shortly.',
                refreshed: 'Weather refreshed!'
            },
            uk: {
                title: '🌤️ Налаштування погоди',
                h_location: '📍 Місцезнаходження', change_btn: 'Змінити', detect_btn: '📡 Визначити моє місцезнаходження',
                lbl_lat: 'Широта', lbl_lon: 'Довгота',
                h_prefs: '⚙️ Настрої', lbl_units: 'Одиниці',
                opt_metric: 'Метричні (°C, км/г)', opt_imperial: 'Імперські (°F, миля/г)',
                lbl_interval: 'Інтервал оновлення (секунд, мін 60)',
                h_alerts: '⚠️ Пороги сповіщень', lbl_rain: 'Сповіщення про дощ (mm)', lbl_wind: 'Сповіщення про вітер (км/г)',
                save_btn: '💾 Зберегти', refresh_btn: '🔄 Оновити',
                h_status: 'Статус', loading: 'Завантаження…',
                geo_notsupported: 'Геолокація не підтримується цим браузером',
                detecting: 'Визначення місцезнаходження…', detected: 'Місцезнаходження визначено!',
                detected_ip: '⚠️ Приблизне місце через IP (рівень міста). Уточніть на карті.',
                detect_failed: 'Не вдалося визначити місце. Шукайте місто.',
                detect_failed_err: 'Не вдалося визначити місце: ',
                saved: 'Налаштування збережено! Погода скоро оновиться.',
                refreshed: 'Погода оновлена!'
            }
        };

        var leafletMap, marker, accuracyCircle;
        var selectedLat = null, selectedLon = null, selectedName = '';
        var searchTimeout = null;

        // ── Init Map ──
        function initMap(lat, lon, accuracy) {
            if (leafletMap) { leafletMap.remove(); accuracyCircle = null; }
            leafletMap = _LF.map('map', {
                center: [lat, lon], zoom: 10,
                zoomControl: true, attributionControl: false,
            });
            _LF.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 18,
            }).addTo(leafletMap);
            // Show accuracy radius circle (only if meaningful, < 50 km)
            if (accuracy && accuracy < 50000) {
                accuracyCircle = _LF.circle([lat, lon], {
                    radius: accuracy,
                    color: '#4F8CF7',
                    fillColor: '#4F8CF7',
                    fillOpacity: 0.08,
                    weight: 1,
                }).addTo(leafletMap);
                // Zoom map to fit the accuracy circle
                leafletMap.fitBounds(accuracyCircle.getBounds());
            }
            marker = _LF.marker([lat, lon], { draggable: true }).addTo(leafletMap);
            marker.on('dragend', function () {
                var pos = marker.getLatLng();
                setLocation(pos.lat, pos.lng, '');
                reverseGeocode(pos.lat, pos.lng);
            });
            leafletMap.on('click', function (e) {
                marker.setLatLng(e.latlng);
                setLocation(e.latlng.lat, e.latlng.lng, '');
                reverseGeocode(e.latlng.lat, e.latlng.lng);
            });
        }

        function setLocation(lat, lon, name) {
            selectedLat = Math.round(lat * 10000) / 10000;
            selectedLon = Math.round(lon * 10000) / 10000;
            $('lat').value = selectedLat;
            $('lon').value = selectedLon;
            if (name) {
                selectedName = name;
                $('loc-name').textContent = name;
            }
            $('loc-coords').textContent = selectedLat + ', ' + selectedLon;
            if (leafletMap && marker) {
                marker.setLatLng([selectedLat, selectedLon]);
                leafletMap.setView([selectedLat, selectedLon], leafletMap.getZoom());
            }
        }

        function showLocationCompact() {
            if (!selectedName && !selectedLat) return;
            $('loc-display').style.display = 'flex';
            $('loc-picker').style.display = 'none';
        }

        function showLocationPicker() {
            $('loc-display').style.display = 'none';
            $('loc-picker').style.display = 'block';
            setTimeout(function () { if (leafletMap) leafletMap.invalidateSize(); }, 100);
        }

        // ── Detect Location (Browser Geolocation API) ──
        function detectLocation() {
            if (!navigator.geolocation) {
                showMsg(t('geo_notsupported'), 'err');
                return;
            }
            showMsg(t('detecting'), 'ok');
            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    var lat = pos.coords.latitude;
                    var lon = pos.coords.longitude;
                    var acc = pos.coords.accuracy; // metres
                    setLocation(lat, lon, '');
                    initMap(lat, lon, acc);
                    reverseGeocode(lat, lon);
                    // Show human-readable accuracy
                    var accLabel = acc < 1000
                        ? '\xb1' + Math.round(acc) + 'm'
                        : '\xb1' + (acc / 1000).toFixed(1) + 'km';
                    showMsg(t('detected') + ' (' + accLabel + ')', 'ok');
                },
                function () {
                    // Fallback: use IP-based location
                    fetchIpLocation();
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        async function fetchIpLocation() {
            try {
                var loc = null;
                // 1st try: ipapi.co (HTTPS, free, ~city accuracy)
                try {
                    var r1 = await fetch('https://ipapi.co/json/');
                    var j1 = await r1.json();
                    if (j1.latitude && j1.longitude) {
                        loc = {
                            lat: j1.latitude, lon: j1.longitude,
                            city: j1.city, country: j1.country_name
                        };
                    }
                } catch (_) { /* try next service */ }

                // 2nd try: ip-api.com (HTTP, free fallback)
                if (!loc) {
                    var r2 = await fetch('http://ip-api.com/json/?fields=lat,lon,city,country');
                    var j2 = await r2.json();
                    if (j2.lat && j2.lon) {
                        loc = { lat: j2.lat, lon: j2.lon, city: j2.city, country: j2.country };
                    }
                }

                if (loc) {
                    var name = [loc.city, loc.country].filter(Boolean).join(', ');
                    setLocation(loc.lat, loc.lon, name);
                    initMap(loc.lat, loc.lon); // no accuracy circle — IP is city-level
                    showMsg(t('detected_ip'), 'err'); // amber warning — approximate
                } else {
                    showMsg(t('detect_failed'), 'err');
                }
            } catch (e) {
                showMsg(t('detect_failed_err') + e.message, 'err');
            }
        }

        // ── Reverse Geocode (coordinates → city name) ──
        async function reverseGeocode(lat, lon) {
            try {
                var r = await fetch(
                    'https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&zoom=10&accept-language=en',
                    { headers: { 'User-Agent': 'SelenaCore/0.3' } }
                );
                var d = await r.json();
                var parts = [];
                if (d.address) {
                    parts.push(d.address.city || d.address.town || d.address.village || d.address.county || '');
                    parts.push(d.address.country || '');
                }
                var name = parts.filter(Boolean).join(', ') || d.display_name || '';
                if (name) {
                    selectedName = name;
                    $('loc-name').textContent = name;
                }
            } catch (e) {
                showToast(e.message || 'Reverse geocode failed', 'error');
            }
        }

        // ── City Search ──
        function onSearchInput() {
            clearTimeout(searchTimeout);
            var q = $('search-city').value.trim();
            if (q.length < 2) {
                $('search-results').style.display = 'none';
                return;
            }
            $('search-spinner').style.display = 'block';
            searchTimeout = setTimeout(function () { searchCity(q); }, 350);
        }

        async function searchCity(q) {
            try {
                var r = await fetch(BASE + '/weather/geocode?q=' + encodeURIComponent(q));
                var d = await r.json();
                var el = $('search-results');
                if (!d.results || d.results.length === 0) {
                    el.innerHTML = '<div class="item"><span class="city" style="color:var(--tx3)">No results</span></div>';
                    el.style.display = 'block';
                    return;
                }
                el.innerHTML = d.results.map(function (r, i) {
                    return '<div class="item" data-idx="' + i + '">'
                        + '<div class="city">' + esc(r.name) + '</div>'
                        + '<div class="region">' + esc([r.admin1, r.country].filter(Boolean).join(', ')) + ' · ' + r.latitude.toFixed(2) + ', ' + r.longitude.toFixed(2) + '</div>'
                        + '</div>';
                }).join('');
                el.style.display = 'block';
                window._searchResults = d.results;
                // Attach click handlers
                el.querySelectorAll('[data-idx]').forEach(function (item) {
                    item.addEventListener('click', function () {
                        pickResult(parseInt(item.getAttribute('data-idx'), 10));
                    });
                });
            } catch (e) {
                showToast(e.message || 'Search failed', 'error');
            } finally {
                $('search-spinner').style.display = 'none';
            }
        }

        function pickResult(i) {
            var r = window._searchResults[i];
            var name = [r.name, r.admin1, r.country].filter(Boolean).join(', ');
            setLocation(r.latitude, r.longitude, name);
            initMap(r.latitude, r.longitude);
            $('search-results').style.display = 'none';
            $('search-city').value = '';
        }

        // ── Load Status ──
        async function loadStatus() {
            try {
                var s = await apiGet('/weather/status');
                $('status-panel').textContent = JSON.stringify(s, null, 2);
                if (s.latitude) {
                    selectedLat = s.latitude;
                    $('lat').value = s.latitude;
                }
                if (s.longitude) {
                    selectedLon = s.longitude;
                    $('lon').value = s.longitude;
                }
                if (s.location_name) {
                    selectedName = s.location_name;
                    $('loc-name').textContent = s.location_name;
                }
                if (s.units) $('units').value = s.units;
                if (s.update_interval_sec) $('interval').value = s.update_interval_sec;
                if (s.alert_rain_mm) $('alert_rain').value = s.alert_rain_mm;
                if (s.alert_wind_kmh) $('alert_wind').value = s.alert_wind_kmh;

                // Show coordinates
                if (selectedLat && selectedLon) {
                    $('loc-coords').textContent = selectedLat + ', ' + selectedLon;
                    initMap(selectedLat, selectedLon);
                    if (selectedName) {
                        showLocationCompact();
                    }
                }
            } catch (e) {
                $('status-panel').textContent = 'Error loading status: ' + e.message;
            }
        }

        // ── Save ──
        async function doSave() {
            var body = {};
            var lat = parseFloat($('lat').value);
            var lon = parseFloat($('lon').value);
            var interval = parseInt($('interval').value);
            var units = $('units').value;
            var alertRain = parseFloat($('alert_rain').value);
            var alertWind = parseFloat($('alert_wind').value);
            if (!isNaN(lat)) body.latitude = lat;
            if (!isNaN(lon)) body.longitude = lon;
            if (selectedName) body.location_name = selectedName;
            if (!isNaN(interval) && interval >= 60) body.update_interval_sec = interval;
            if (units) body.units = units;
            if (!isNaN(alertRain)) body.alert_rain_mm = alertRain;
            if (!isNaN(alertWind)) body.alert_wind_kmh = alertWind;
            await apiPost('/weather/config', body);
            showToast(t('saved'));
            if (selectedName) showLocationCompact();
            loadStatus();
        }

        async function refreshWeather() {
            await apiPost('/weather/refresh');
            showToast(t('refreshed'));
            loadStatus();
        }

        function showMsg(text, type) {
            var el = $('msg');
            el.className = 'msg ' + type;
            el.textContent = text;
            setTimeout(function () { el.textContent = ''; el.className = ''; }, 5000);
        }

        // ── Event listeners ──
        $('btn-change').addEventListener('click', showLocationPicker);
        $('btn-detect').addEventListener('click', detectLocation);
        $('search-city').addEventListener('input', onSearchInput);

        $('btn-save').addEventListener('click', function () {
            withLoading(this, doSave);
        });

        $('btn-refresh').addEventListener('click', function () {
            withLoading(this, refreshWeather);
        });

        // ── Init ──
        applyLang();
        loadStatus();
    </script>
</body>

</html>
