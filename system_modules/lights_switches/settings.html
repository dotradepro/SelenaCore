<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="/api/shared/theme.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lights & Switches</title>
<style>
.wrap{padding:14px;max-width:980px;margin:0 auto}
.help{font-size:11px;color:var(--tx2);line-height:1.55;margin-bottom:10px}
.muted{color:var(--tx2)}
pre{background:var(--sf2);padding:6px 8px;border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;margin:0;white-space:pre-wrap;word-break:break-all;color:var(--tx2)}
.badge-on.switch,.badge-on.outlet{background:rgba(34,197,94,.18);color:var(--gr)}
</style>
</head>
<body>
<div class="wrap">
  <h2 data-i18n="title">Lights & Switches</h2>
  <div class="card">
    <div class="help" data-i18n="help">
      Diagnostic view of every device with entity_type light / switch / outlet.
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="muted" data-i18n="detected">Detected lights / switches</div>
      <button id="refreshBtn" class="btn" data-i18n="refresh">Refresh</button>
    </div>
    <table>
      <thead><tr>
        <th data-i18n="col_room">Room</th>
        <th data-i18n="col_name">Name</th>
        <th data-i18n="col_type">Type</th>
        <th data-i18n="col_protocol">Protocol</th>
        <th data-i18n="col_status">Status</th>
        <th data-i18n="col_state">State</th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="muted" data-i18n="loading">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script src="/api/shared/widget-common.js"></script>
<script>
var L = {
  en: {
    title:'Lights & Switches',
    help:'Diagnostic view of every device with entity_type \u2208 light / switch / outlet. Devices are added through Device Control \u2192 Tuya Cloud Wizard. Voice commands (\u201cturn on the kitchen light\u201d) are owned by the Device Control module \u2014 there is no separate intent layer here.',
    detected:'Detected lights / switches', refresh:'Refresh',
    col_room:'Room', col_name:'Name', col_type:'Type', col_protocol:'Protocol', col_status:'Status', col_state:'State',
    loading:'Loading\u2026',
    empty:'No lights, switches or outlets yet \u2014 add some via Device Control.',
    on:'on', off:'off', unassigned:'unassigned',
  },
  uk: {
    title:'Світло та вимикачі',
    help:'Діагностичний перегляд усіх пристроїв з entity_type \u2208 light / switch / outlet. Пристрої додаються через Керування пристроями \u2192 Tuya Cloud майстер. Голосові команди (\u201cувімкни світло на кухні\u201d) належать модулю Керування пристроями \u2014 окремого шару інтентів тут немає.',
    detected:'Знайдені лампи / вимикачі', refresh:'Оновити',
    col_room:'Кімната', col_name:'Назва', col_type:'Тип', col_protocol:'Протокол', col_status:'Стан', col_state:'Дані',
    loading:'Завантаження\u2026',
    empty:'Немає пристроїв \u2014 додайте через Керування пристроями.',
    on:'увімк', off:'вимк', unassigned:'без кімнати',
  }
};

function load(){
  apiGet('/devices').then(function(res){
    var devs = res.devices || [];
    var tb = $('rows');
    if(devs.length===0){
      tb.innerHTML='<tr><td colspan="6" class="muted">'+esc(t('empty'))+'</td></tr>';
      return;
    }
    tb.innerHTML = devs.map(function(d){
      var s = d.state || {};
      var on = s.on === true;
      var et = (d.entity_type||'switch').toLowerCase();
      var statusCls = on ? 'badge-on '+et : 'badge-off';
      var statusBadge = '<span class="badge '+statusCls+'">'+esc(on?t('on'):t('off'))+'</span>';
      return '<tr>'+
        '<td>'+esc(d.location || t('unassigned'))+'</td>'+
        '<td>'+esc(d.name)+'</td>'+
        '<td>'+esc(d.entity_type||'\u2014')+'</td>'+
        '<td><span class="badge badge-pr">'+esc(d.protocol)+'</span></td>'+
        '<td>'+statusBadge+'</td>'+
        '<td><pre>'+esc(JSON.stringify(s))+'</pre></td>'+
      '</tr>';
    }).join('');
  }).catch(function(e){
    showToast(e.message || 'error', 'error');
  });
}

$('refreshBtn').onclick = function(){ withLoading(this, load); };

applyLang();
load();
</script>
</body>
</html>
