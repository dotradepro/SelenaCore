<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="/api/shared/theme.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lights & Switches</title>
<style>
.wrap{padding:14px;max-width:980px;margin:0 auto}
.help{font-size:11px;color:var(--tx2);line-height:1.55;margin-bottom:10px}
.muted{color:var(--tx2)}
pre{background:var(--sf2);padding:6px 8px;border-radius:5px;font-size:10px;font-family:'DM Mono',monospace;margin:0;white-space:pre-wrap;word-break:break-all;color:var(--tx2)}
.badge-on.switch,.badge-on.outlet{background:rgba(34,197,94,.18);color:var(--gr)}
</style>
</head>
<body>
<div class="wrap">
  <h2 data-i18n="title">Lights & Switches</h2>
  <div class="card">
    <div class="help" data-i18n="help">
      Diagnostic view of every device with entity_type light / switch / outlet.
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="muted" data-i18n="detected">Detected lights / switches</div>
      <button id="refreshBtn" class="btn" data-i18n="refresh">Refresh</button>
    </div>
    <table>
      <thead><tr>
        <th data-i18n="col_room">Room</th>
        <th data-i18n="col_name">Name</th>
        <th data-i18n="col_type">Type</th>
        <th data-i18n="col_protocol">Protocol</th>
        <th data-i18n="col_status">Status</th>
        <th data-i18n="col_state">State</th>
      </tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="muted" data-i18n="loading">Loading…</td></tr></tbody>
    </table>
  </div>
</div>

<script src="/api/shared/widget-common.js"></script>
<script>
    // Module-specific i18n: strings live in system_modules/lights_switches/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/lights-switches. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/lights-switches?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[lights-switches] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

function load(){
  apiGet('/devices').then(function(res){
    var devs = res.devices || [];
    var tb = $('rows');
    if(devs.length===0){
      tb.innerHTML='<tr><td colspan="6" class="muted">'+esc(t('empty'))+'</td></tr>';
      return;
    }
    tb.innerHTML = devs.map(function(d){
      var s = d.state || {};
      var on = s.on === true;
      var et = (d.entity_type||'switch').toLowerCase();
      var statusCls = on ? 'badge-on '+et : 'badge-off';
      var statusBadge = '<span class="badge '+statusCls+'">'+esc(on?t('on'):t('off'))+'</span>';
      return '<tr>'+
        '<td>'+esc(d.location || t('unassigned'))+'</td>'+
        '<td>'+esc(d.name)+'</td>'+
        '<td>'+esc(d.entity_type||'\u2014')+'</td>'+
        '<td><span class="badge badge-pr">'+esc(d.protocol)+'</span></td>'+
        '<td>'+statusBadge+'</td>'+
        '<td><pre>'+esc(JSON.stringify(s))+'</pre></td>'+
      '</tr>';
    }).join('');
  }).catch(function(e){
    showToast(e.message || 'error', 'error');
  });
}

$('refreshBtn').onclick = function(){ withLoading(this, load); };

loadI18n().then(function () {
    applyLang();
    load();
});
</script>
</body>
</html>
