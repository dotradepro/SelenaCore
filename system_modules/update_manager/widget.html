<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Manager</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
        }

        .card {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
        }

        .version {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gr);
        }

        .label {
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .state {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 10px 0;
            background: var(--b2);
        }

        .state.update_available {
            background: rgba(255, 200, 0, 0.2);
            color: var(--am);
        }

        .state.applied {
            background: rgba(80, 200, 120, 0.2);
            color: var(--gr);
        }

        .state.error {
            background: rgba(220, 50, 50, 0.2);
            color: var(--rd);
        }

        button {
            background: var(--ac);
            color: var(--tx);
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--ac);
        }

        #msg {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="label">Current version</div>
        <div class="version" id="cur-ver">—</div>
        <div class="label" style="margin-top:12px;">Latest available</div>
        <div id="latest-ver" style="font-size:1.2rem;color:var(--tx2);">—</div>
        <div><span class="state" id="state-badge">idle</span></div>
        <button onclick="checkNow()">🔄 Check for Updates</button>
        <div id="msg"></div>
    </div>
    <script>
        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function load() {
            try {
                const s = await fetch(`${base}/update/status`).then(r => r.json());
                document.getElementById('cur-ver').textContent = s.current_version || '—';
                document.getElementById('latest-ver').textContent = s.latest_version || '—';
                const badge = document.getElementById('state-badge');
                badge.textContent = s.state;
                badge.className = 'state ' + s.state;
                if (s.error) document.getElementById('msg').textContent = '⚠️ ' + s.error;
            } catch (e) { document.getElementById('msg').textContent = e.message; }
        }
        async function checkNow() {
            document.getElementById('msg').textContent = 'Checking…';
            try {
                const r = await fetch(`${base}/update/check`, { method: 'POST' }).then(r => r.json());
                document.getElementById('msg').textContent = r.update_available ? `✅ Update available: ${r.version}` : '✓ Up to date';
                load();
            } catch (e) { document.getElementById('msg').textContent = '⚠️ ' + e.message; }
        }
        load(); setInterval(load, 30000);
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
