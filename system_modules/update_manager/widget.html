<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Manager</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        /* Module-specific: state pill colors. Layout/tile padding is intentional
           so the card doesn't sit flush to the tile edge. Everything else comes
           from /api/shared/theme.css. */
        body { padding: 20px; }
        .state {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 10px 0;
            background: var(--b2);
        }
        .state.update_available { background: rgba(245, 169, 58, 0.2); color: var(--am); }
        .state.applied          { background: rgba(46, 201, 138, 0.2); color: var(--gr); }
        .state.error            { background: rgba(224, 84, 84, 0.2);  color: var(--rd); }
    </style>
</head>

<body>
    <div class="card">
        <div class="label-sm" data-i18n="lbl_current"></div>
        <div class="kpi-val kpi-val-success" id="cur-ver">—</div>
        <div class="label-sm mt12" data-i18n="lbl_latest"></div>
        <div id="latest-ver" style="font-size:1.2rem;color:var(--tx2);">—</div>
        <div><span class="state" id="state-badge" data-i18n="state_idle"></span></div>
        <button class="btn btn-primary" onclick="checkNow(this)" data-i18n="check_btn"></button>
    </div>
    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: { lbl_current: 'Current version', lbl_latest: 'Latest available', state_idle: 'idle', check_btn: 'Check for Updates', update_available: 'Update available: ', up_to_date: 'Up to date' },
            uk: { lbl_current: 'Поточна версія', lbl_latest: 'Остання доступна', state_idle: 'очікування', check_btn: 'Перевірити оновлення', update_available: 'Доступне оновлення: ', up_to_date: 'Актуально' }
        };

        function load() {
            apiGet('/update/status')
                .then(function (s) {
                    $('cur-ver').textContent = s.current_version || '—';
                    $('latest-ver').textContent = s.latest_version || '—';
                    var badge = $('state-badge');
                    badge.textContent = s.state;
                    badge.className = 'state ' + s.state;
                    if (s.error) showToast(s.error, 'error');
                })
                .catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function checkNow(btn) {
            withLoading(btn, function () {
                return apiPost('/update/check').then(function (r) {
                    showToast(
                        r.update_available ? t('update_available') + r.version : t('up_to_date'),
                        r.update_available ? 'info' : 'success'
                    );
                    load();
                });
            });
        }

        applyLang();
        load();
        setInterval(load, 30000);
    </script>
</body>

</html>
