<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Manager</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
        }

        .card {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
        }

        .version {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gr);
        }

        .label {
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .state {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin: 10px 0;
            background: var(--b2);
        }

        .state.update_available {
            background: rgba(255, 200, 0, 0.2);
            color: var(--am);
        }

        .state.applied {
            background: rgba(80, 200, 120, 0.2);
            color: var(--gr);
        }

        .state.error {
            background: rgba(220, 50, 50, 0.2);
            color: var(--rd);
        }

        button {
            background: var(--ac);
            color: var(--tx);
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            cursor: pointer;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--ac);
        }

        #msg {
            margin-top: 10px;
            font-size: 0.85rem;
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="label" data-i18n="lbl_current"></div>
        <div class="version" id="cur-ver">—</div>
        <div class="label" style="margin-top:12px;" data-i18n="lbl_latest"></div>
        <div id="latest-ver" style="font-size:1.2rem;color:var(--tx2);">—</div>
        <div><span class="state" id="state-badge" data-i18n="state_idle"></span></div>
        <button onclick="checkNow()" data-i18n="check_btn"></button>
        <div id="msg"></div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { lbl_current: 'Current version', lbl_latest: 'Latest available', state_idle: 'idle', check_btn: '🔄 Check for Updates', checking: 'Checking…', update_available: '✅ Update available: ', up_to_date: '✓ Up to date' },
            uk: { lbl_current: 'Поточна версія', lbl_latest: 'Остання доступна', state_idle: 'очікування', check_btn: '🔄 Перевірити оновлення', checking: 'Перевірка…', update_available: '✅ Доступне оновлення: ', up_to_date: '✓ Актуально' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); load(); } });

        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function load() {
            try {
                const s = await fetch(`${base}/update/status`).then(r => r.json());
                document.getElementById('cur-ver').textContent = s.current_version || '—';
                document.getElementById('latest-ver').textContent = s.latest_version || '—';
                const badge = document.getElementById('state-badge');
                badge.textContent = s.state;
                badge.className = 'state ' + s.state;
                if (s.error) document.getElementById('msg').textContent = '⚠️ ' + s.error;
            } catch (e) { document.getElementById('msg').textContent = e.message; }
        }
        async function checkNow() {
            document.getElementById('msg').textContent = 'Checking…';
            try {
                const r = await fetch(`${base}/update/check`, { method: 'POST' }).then(r => r.json());
                document.getElementById('msg').textContent = r.update_available ? t('update_available') + r.version : t('up_to_date');
                load();
            } catch (e) { document.getElementById('msg').textContent = '⚠️ ' + e.message; }
        }
        applyLang();
        load(); setInterval(load, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")); document.documentElement.classList.toggle("has-wallpaper", p.classList.contains("has-wallpaper")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
