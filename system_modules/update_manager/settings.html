<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Manager Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 24px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 1rem;
            color: var(--tx2);
            margin-bottom: 14px;
        }

        pre {
            background: var(--sf2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            color: var(--tx2);
            white-space: pre-wrap;
        }

        button {
            background: var(--ac);
            color: var(--tx);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            margin-right: 8px;
            font-size: 0.9rem;
        }

        button.danger {
            background: #733;
        }

        button:hover {
            opacity: 0.85;
        }

        .msg {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .ok {
            color: var(--gr);
        }

        .err {
            color: var(--rd);
        }
    </style>
</head>

<body>
    <h1>🔄 Update Manager</h1>

    <div class="section">
        <h2>Status</h2>
        <pre id="status-pre">Loading…</pre>
    </div>

    <div class="section">
        <h2>Actions</h2>
        <button onclick="doCheck()">Check for Updates</button>
        <button onclick="doDownload()">Download Update</button>
        <button onclick="doRollback()" class="danger">Rollback</button>
        <div id="action-msg" class="msg"></div>
    </div>

    <script>
        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function loadStatus() {
            try {
                const s = await fetch(`${base}/update/status`).then(r => r.json());
                document.getElementById('status-pre').textContent = JSON.stringify(s, null, 2);
            } catch (e) { document.getElementById('status-pre').textContent = 'Error: ' + e.message; }
        }
        async function doCheck() {
            showMsg('Checking…', '');
            try {
                const r = await fetch(`${base}/update/check`, { method: 'POST' }).then(r => r.json());
                showMsg(r.update_available ? `✅ Update ${r.version} available` : '✓ Up to date', 'ok');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        async function doDownload() {
            showMsg('Downloading…', '');
            try {
                const r = await fetch(`${base}/update/download`, { method: 'POST' }).then(r => r.json());
                showMsg(r.ok ? '✅ Downloaded: ' + r.path : '⚠️ Failed', r.ok ? 'ok' : 'err');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        async function doRollback() {
            if (!confirm('Roll back to previous version?')) return;
            showMsg('Rolling back…', '');
            try {
                const r = await fetch(`${base}/update/rollback`, { method: 'POST' }).then(r => r.json());
                showMsg('✅ Rolled back. State: ' + r.state, 'ok');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        function showMsg(text, cls) {
            const el = document.getElementById('action-msg');
            el.textContent = text;
            el.className = 'msg ' + cls;
        }
        loadStatus(); setInterval(loadStatus, 30000);
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
