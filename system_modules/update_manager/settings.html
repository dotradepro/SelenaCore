<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Manager Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        /* Module-specific: version card rows and state banner.
           Everything else (layout, cards, buttons, forms, progress, badges,
           toasts) comes from /api/shared/theme.css — see widget-development.md. */
        .ver-card { background: var(--sf2); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .ver-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--b); }
        .ver-row:last-child { border-bottom: none; }
        .ver-value { font-size: 0.9rem; font-weight: 600; color: var(--tx); }
        .ver-value.big { font-size: 1.2rem; color: var(--ac); }
        .update-banner { border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .update-banner.available { background: rgba(46,201,138,.1); border: 1px solid rgba(46,201,138,.3); }
        .update-banner.current   { background: rgba(79,140,247,.07); border: 1px solid var(--b); }
        .update-banner .ico { font-size: 1.4rem; }
        .update-banner .text .head { font-weight: 700; font-size: 0.95rem; }
        .update-banner .text .sub  { font-size: 0.8rem; color: var(--tx2); margin-top: 2px; }
    </style>
</head>
<body>
    <h2 data-i18n="title"></h2>

    <!-- Current version banner -->
    <div id="upd-banner" class="update-banner current">
        <div class="ico">🔄</div>
        <div class="text">
            <div class="head" id="banner-head" data-i18n="checking"></div>
            <div class="sub" id="banner-sub"></div>
        </div>
    </div>

    <!-- Version details -->
    <div class="card">
        <div class="section-title" data-i18n="h_version"></div>
        <div class="ver-card">
            <div class="ver-row">
                <span class="label-xs" data-i18n="lbl_current"></span>
                <span class="ver-value big" id="v-current">—</span>
            </div>
            <div class="ver-row">
                <span class="label-xs" data-i18n="lbl_latest"></span>
                <span class="ver-value" id="v-latest">—</span>
            </div>
            <div class="ver-row">
                <span class="label-xs" data-i18n="lbl_state"></span>
                <span id="v-state"><span class="badge badge-info" data-i18n="loading"></span></span>
            </div>
            <div class="ver-row">
                <span class="label-xs" data-i18n="lbl_last_check"></span>
                <span class="ver-value" id="v-last-check">—</span>
            </div>
            <div class="ver-row" id="row-downloaded" style="display:none">
                <span class="label-xs" data-i18n="lbl_downloaded"></span>
                <span class="ver-value" id="v-downloaded">—</span>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="card">
        <div class="section-title" data-i18n="h_actions"></div>
        <div class="row" style="justify-content:flex-start;gap:8px;flex-wrap:wrap">
            <button class="btn btn-sec" id="btn-check" data-i18n="check_btn"></button>
            <button class="btn btn-primary" id="btn-download" disabled data-i18n="download_btn"></button>
            <button class="btn btn-danger" id="btn-rollback" data-i18n="rollback_btn"></button>
        </div>
        <div class="progress-bar hidden" id="prog-wrap"><div class="fill" id="prog-bar"></div></div>
    </div>

    <script src="/api/shared/widget-common.js"></script>
    <script>
    // Module-specific i18n: strings live in system_modules/update_manager/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/update-manager. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/update-manager?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[update-manager] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

        function stateLabel(state) {
            var map = { idle: 'state_idle', update_available: 'state_update_available', downloading: 'state_downloading', applying: 'state_applying', rolling_back: 'state_rolling_back', error: 'state_error' };
            return t(map[state] || state);
        }
        function stateBadgeClass(state) {
            if (state === 'idle') return 'badge-ok';
            if (state === 'update_available') return 'badge-warn';
            if (state === 'error') return 'badge-err';
            return 'badge-info';
        }
        function fmtDate(ts) {
            if (!ts) return t('never');
            try {
                var d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
                return d.toLocaleString();
            } catch (e) { return String(ts); }
        }

        async function loadStatus() {
            try {
                var s = await apiGet('/update/status');
                $('v-current').textContent = s.current_version || '—';
                $('v-latest').textContent = s.latest_version || '—';
                $('v-last-check').textContent = fmtDate(s.last_check);

                var stateKey = s.update_available ? 'update_available' : (s.state || 'idle');
                $('v-state').innerHTML = '<span class="badge ' + stateBadgeClass(stateKey) + '">' + esc(stateLabel(stateKey)) + '</span>';

                if (s.downloaded_version) {
                    $('v-downloaded').textContent = s.downloaded_version;
                    show('row-downloaded');
                } else {
                    hide('row-downloaded');
                }

                // Banner
                var banner = $('upd-banner');
                var head = $('banner-head');
                var sub = $('banner-sub');
                if (s.update_available) {
                    banner.className = 'update-banner available';
                    banner.querySelector('.ico').textContent = '🆕';
                    head.textContent = t('update_avail');
                    sub.textContent = t('new_version') + s.latest_version;
                } else {
                    banner.className = 'update-banner current';
                    banner.querySelector('.ico').textContent = '✅';
                    head.textContent = t('state_idle');
                    sub.textContent = s.current_version || '';
                }

                // Enable download button only if update is available
                $('btn-download').disabled = !s.update_available;
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        $('btn-check').addEventListener('click', function () {
            var btn = this;
            withLoading(btn, async function () {
                var r = await apiPost('/update/check');
                showToast(
                    r.update_available ? t('update_avail') + ' — ' + r.version : t('up_to_date'),
                    r.update_available ? 'info' : 'success'
                );
                await loadStatus();
            });
        });

        $('btn-download').addEventListener('click', function () {
            var btn = this;
            var wrap = $('prog-wrap');
            var bar = $('prog-bar');
            show(wrap);
            var pct = 0;
            var prog = setInterval(function () { pct = Math.min(pct + 5, 90); bar.style.width = pct + '%'; }, 300);
            withLoading(btn, async function () {
                var r = await apiPost('/update/download');
                clearInterval(prog);
                bar.style.width = '100%';
                showToast(r.ok !== false ? t('downloaded') : t('failed'), r.ok !== false ? 'success' : 'error');
                await loadStatus();
                setTimeout(function () { hide(wrap); bar.style.width = '0'; }, 1500);
            }).catch(function () {
                clearInterval(prog);
                hide(wrap);
                bar.style.width = '0';
            });
        });

        $('btn-rollback').addEventListener('click', function () {
            if (!confirm(t('rollback_confirm'))) return;
            var btn = this;
            withLoading(btn, async function () {
                await apiPost('/update/rollback');
                showToast(t('rolled_back'), 'success');
                await loadStatus();
            });
        });

        loadI18n().then(function () {
            applyLang();
            loadStatus();
            setInterval(loadStatus, 30000);
        });
    </script>
</body>
</html>
