<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Manager Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 24px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 1rem;
            color: var(--tx2);
            margin-bottom: 14px;
        }

        pre {
            background: var(--sf2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            color: var(--tx2);
            white-space: pre-wrap;
        }

        button {
            background: var(--ac);
            color: var(--tx);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            margin-right: 8px;
            font-size: 0.9rem;
        }

        button.danger {
            background: #733;
        }

        button:hover {
            opacity: 0.85;
        }

        .msg {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .ok {
            color: var(--gr);
        }

        .err {
            color: var(--rd);
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <div class="section">
        <h2 data-i18n="h_status"></h2>
        <pre id="status-pre" data-i18n="loading"></pre>
    </div>

    <div class="section">
        <h2 data-i18n="h_actions"></h2>
        <button onclick="doCheck()" data-i18n="check_btn"></button>
        <button onclick="doDownload()" data-i18n="download_btn"></button>
        <button onclick="doRollback()" class="danger" data-i18n="rollback_btn"></button>
        <div id="action-msg" class="msg"></div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: '🔄 Update Manager', h_status: 'Status', loading: 'Loading…', h_actions: 'Actions',
                check_btn: 'Check for Updates', download_btn: 'Download Update', rollback_btn: 'Rollback',
                checking: 'Checking…', update_avail: '✅ Update available', up_to_date: '✓ Up to date',
                downloading: 'Downloading…', downloaded: '✅ Downloaded: ', failed: '⚠️ Failed',
                rolling_back: 'Rolling back…', rolled_back: '✅ Rolled back. State: ',
                rollback_confirm: 'Roll back to previous version?'
            },
            uk: {
                title: '🔄 Менеджер оновлень', h_status: 'Статус', loading: 'Завантаження…', h_actions: 'Дії',
                check_btn: 'Перевірити оновлення', download_btn: 'Завантажити', rollback_btn: 'Відкат',
                checking: 'Перевірка…', update_avail: '✅ Доступне оновлення', up_to_date: '✓ Актуально',
                downloading: 'Завантаження…', downloaded: '✅ Завантажено: ', failed: '⚠️ Помилка',
                rolling_back: 'Відкат…', rolled_back: '✅ Відкачено. Стан: ',
                rollback_confirm: 'Відкатити до попередньої версії?'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadStatus(); } });

        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function loadStatus() {
            try {
                const s = await fetch(`${base}/update/status`).then(r => r.json());
                document.getElementById('status-pre').textContent = JSON.stringify(s, null, 2);
            } catch (e) { document.getElementById('status-pre').textContent = 'Error: ' + e.message; }
        }
        async function doCheck() {
            showMsg(t('checking'), '');
            try {
                const r = await fetch(`${base}/update/check`, { method: 'POST' }).then(r => r.json());
                showMsg(r.update_available ? t('update_avail') + ' ' + r.version : t('up_to_date'), 'ok');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        async function doDownload() {
            showMsg(t('downloading'), '');
            try {
                const r = await fetch(`${base}/update/download`, { method: 'POST' }).then(r => r.json());
                showMsg(r.ok ? t('downloaded') + r.path : t('failed'), r.ok ? 'ok' : 'err');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        async function doRollback() {
            if (!confirm(t('rollback_confirm'))) return;
            showMsg(t('rolling_back'), '');
            try {
                const r = await fetch(`${base}/update/rollback`, { method: 'POST' }).then(r => r.json());
                showMsg(t('rolled_back') + r.state, 'ok');
                loadStatus();
            } catch (e) { showMsg('⚠️ ' + e.message, 'err'); }
        }
        function showMsg(text, cls) {
            const el = document.getElementById('action-msg');
            el.textContent = text;
            el.className = 'msg ' + cls;
        }
        applyLang();
        loadStatus(); setInterval(loadStatus, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
