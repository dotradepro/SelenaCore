<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/api/shared/theme.css">
<title>Clock — Settings</title>
<style>
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.row .seg { flex: 1 1 auto; min-width: 80px; text-align: center; padding: 8px 12px;
  border-radius: 8px; border: 1px solid var(--b); background: var(--sf2);
  color: var(--tx2); font-size: 13px; font-weight: 500; cursor: pointer;
  transition: .15s; user-select: none; }
.row .seg:hover { color: var(--tx); }
.row .seg.active { background: var(--ac); color: var(--on-accent); border-color: var(--ac); }
select { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--b);
  background: var(--sf2); color: var(--tx); font-size: 13px; font-family: inherit; }
.field { margin-bottom: 18px; }
.field-label { font-size: 11px; font-weight: 600; color: var(--tx3);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.status { font-size: 12px; color: var(--tx3); margin-top: 8px; min-height: 16px; }
.status.ok { color: var(--gr); }
.status.err { color: var(--rd); }
</style>
</head>
<body class="sc-settings">
<div style="max-width:480px">
  <h2 style="margin-top:0">Clock widget</h2>

  <div class="field">
    <div class="field-label">Style</div>
    <div class="row" id="styleRow">
      <div class="seg" data-val="digital">Digital</div>
      <div class="seg" data-val="analog">Analog</div>
    </div>
  </div>

  <div class="field">
    <div class="field-label">Time format</div>
    <div class="row" id="formatRow">
      <div class="seg" data-val="24h">24-hour</div>
      <div class="seg" data-val="12h">12-hour</div>
    </div>
  </div>

  <div class="field">
    <div class="field-label">Timezone</div>
    <select id="tzSelect"></select>
  </div>

  <div class="status" id="status"></div>
</div>

<script src="/api/shared/widget-common.js"></script>
<script>
(function() {
  var MODULE_BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
  var statusEl = document.getElementById('status');
  var styleRow = document.getElementById('styleRow');
  var formatRow = document.getElementById('formatRow');
  var tzSelect = document.getElementById('tzSelect');

  function setStatus(text, kind) {
    statusEl.textContent = text || '';
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  function setSegActive(row, value) {
    Array.prototype.forEach.call(row.querySelectorAll('.seg'), function(el) {
      el.classList.toggle('active', el.getAttribute('data-val') === value);
    });
  }

  function getZones() {
    try {
      if (typeof Intl.supportedValuesOf === 'function') {
        return Intl.supportedValuesOf('timeZone');
      }
    } catch (e) {}
    return [
      'UTC', 'Europe/Kyiv', 'Europe/London', 'Europe/Berlin', 'Europe/Paris',
      'America/New_York', 'America/Chicago', 'America/Denver', 'America/Los_Angeles',
      'Asia/Tokyo', 'Asia/Shanghai', 'Asia/Singapore', 'Asia/Dubai', 'Asia/Kolkata',
      'Australia/Sydney', 'Pacific/Auckland'
    ];
  }

  function populateZones(current) {
    var zones = getZones();
    if (current && zones.indexOf(current) === -1) zones.unshift(current);
    var html = '';
    for (var i = 0; i < zones.length; i++) {
      var z = zones[i];
      html += '<option value="' + z + '"' + (z === current ? ' selected' : '') + '>' + z + '</option>';
    }
    tzSelect.innerHTML = html;
  }

  async function load() {
    try {
      var r = await fetch(MODULE_BASE + '/widget/data/config');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var cfg = await r.json();
      setSegActive(styleRow, cfg.style);
      setSegActive(formatRow, cfg.format);
      populateZones(cfg.timezone);
      setStatus('');
    } catch (e) {
      setStatus('Failed to load: ' + e.message, 'err');
    }
  }

  async function save(patch) {
    setStatus('Saving…');
    try {
      var r = await fetch(MODULE_BASE + '/widget/data/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      });
      if (!r.ok) {
        var detail = '';
        try { detail = (await r.json()).detail || ''; } catch (e) {}
        throw new Error(detail || ('HTTP ' + r.status));
      }
      var cfg = await r.json();
      setSegActive(styleRow, cfg.style);
      setSegActive(formatRow, cfg.format);
      setStatus('Saved', 'ok');
      setTimeout(function() { setStatus(''); }, 1500);
    } catch (e) {
      setStatus('Save failed: ' + e.message, 'err');
    }
  }

  styleRow.addEventListener('click', function(e) {
    var seg = e.target.closest('.seg');
    if (!seg) return;
    save({ style: seg.getAttribute('data-val') });
  });
  formatRow.addEventListener('click', function(e) {
    var seg = e.target.closest('.seg');
    if (!seg) return;
    save({ format: seg.getAttribute('data-val') });
  });
  tzSelect.addEventListener('change', function() {
    save({ timezone: tzSelect.value });
  });

  load();
})();
</script>
</body>
</html>
