<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="/api/shared/theme.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clock</title>
<style>
html,body{width:100%;height:100%;margin:0;padding:0;background:var(--sf2);font-family:'DM Sans',system-ui,sans-serif}
iframe{width:100%;height:100%;border:0;display:block;background:transparent}
</style>
</head>
<body>
<iframe src="widget?modal=1" title="Clock"></iframe>
<script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>
</html>
