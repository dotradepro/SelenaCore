<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="/api/shared/theme.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clock</title>
<style>
/* Clock-specific styles only. Buttons, inputs, fields, sheets, toggles,
   chips, icon-btn, fab, fs-close, empty-state, list-row outer come from
   /api/shared/theme.css (Shared Component Library). */

body{background:transparent}

.wrap{padding:8px;display:flex;flex-direction:column;gap:6px;height:100vh;overflow-y:auto;min-width:0;margin:0}
.wrap.modal{padding:18px 18px 80px;max-width:560px;margin:0 auto;gap:14px;height:100%;max-height:100vh;overflow-y:auto;min-height:0}

/* ── Compact dashboard tile (3 lines: time / date / status icons) ─ */
.compact{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;padding:6px 6px;gap:1px;
  background:var(--sf);border:1px solid var(--b);border-radius:10px;
  cursor:pointer;transition:border-color .15s,transform .08s;
  user-select:none;-webkit-tap-highlight-color:transparent;
  text-align:center;overflow:hidden;
}
.compact:hover{border-color:var(--ac)}
.compact:active{transform:scale(.985)}
.compact *{pointer-events:none}
.compact .now{font-size:24px;font-weight:700;color:var(--tx);font-variant-numeric:tabular-nums;line-height:1.05}
.compact .date{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.compact .icons{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:3px}
.compact .icons:empty{display:none;margin-top:0}
.compact .ico{display:inline-flex;align-items:center;gap:2px;font-size:12px;color:var(--tx2);line-height:1}
.compact .ico.alarm{color:var(--am)}
.compact .ico.timer{color:var(--ac)}
.compact .ico.reminder{color:var(--gr)}
.compact .ico.ringing{color:var(--rd);animation:pulse 1s infinite}
.compact .ico .count{font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}

/* Tab pane container (tab buttons themselves use shared .settings-tabs/.settings-tab). */
.pane{display:none;flex-direction:column;gap:10px}
.pane.active{display:flex}

/* List-row child slots used by alarms / timers / reminders. */
.list-row .lr-time{font-size:24px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums;line-height:1.1}
.list-row .lr-clickable{flex:1;min-width:0;cursor:pointer}
.list-row .lr-repeat{font-size:11px;color:var(--tx3);margin-top:3px;text-transform:uppercase;letter-spacing:.04em}

/* ── Big numeric display (timer / stopwatch) ────────────────────── */
.big-display{text-align:center;padding:24px 0 18px;font-size:54px;font-weight:300;letter-spacing:1px;font-variant-numeric:tabular-nums;color:var(--tx)}

.big-controls{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.preset-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}

.lap-list{margin-top:14px;border-top:1px solid var(--b);padding-top:6px}
.lap-list .lap-row{display:grid;grid-template-columns:auto 1fr 1fr;gap:10px;padding:9px 4px;border-bottom:1px solid var(--b);font-variant-numeric:tabular-nums;font-size:12px;color:var(--tx2)}
.lap-list .lap-row:last-child{border-bottom:none}
.lap-list .lap-row span:first-child{color:var(--tx3);font-weight:600}
.lap-list .lap-row span:last-child{text-align:right;color:var(--tx)}

/* ── World clock rows ───────────────────────────────────────────── */
.city-row{display:flex;align-items:center;gap:12px;min-width:0;padding:12px 14px;background:var(--sf);border:1px solid var(--b);border-radius:10px;transition:border-color .15s}
.city-row:hover{border-color:var(--ac)}
.city-row .left{flex:1;min-width:0}
.city-row .name{font-size:14px;font-weight:500;color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.city-row .tz{font-size:11px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.city-row .ct{font-size:22px;font-weight:600;color:var(--tx);font-variant-numeric:tabular-nums;flex-shrink:0}
</style>
</head>
<body>

<!-- Compact widget body: line 1 time / line 2 date / line 3 status icons -->
<div class="wrap" id="compactWrap" style="display:none;padding:0">
  <div class="compact" id="compactRoot">
    <div class="now" id="cNowTime">--:--</div>
    <div class="date" id="cNowDate"></div>
    <div class="icons" id="cIcons"></div>
  </div>
</div>

<!-- Modal body (5-tab UI) -->
<div class="wrap modal" id="modalWrap" style="display:none">
  <div class="settings-tabs">
    <button data-tab="alarms" class="settings-tab active" data-i18n="tab_alarms"></button>
    <button data-tab="timers" class="settings-tab" data-i18n="tab_timers"></button>
    <button data-tab="reminders" class="settings-tab" data-i18n="tab_reminders"></button>
    <button data-tab="world" class="settings-tab" data-i18n="tab_world"></button>
    <button data-tab="stopwatch" class="settings-tab" data-i18n="tab_stopwatch"></button>
  </div>

  <div id="paneAlarms" class="pane active">
    <div id="alarmsList"></div>
    <button class="fab" onclick="openAlarmEditor(null)">+</button>
  </div>

  <div id="paneTimers" class="pane">
    <div class="big-display" id="timerBig">00:00</div>
    <div class="preset-row">
      <button class="btn btn-secondary btn-sm" onclick="quickTimer(60)">1m</button>
      <button class="btn btn-secondary btn-sm" onclick="quickTimer(300)">5m</button>
      <button class="btn btn-secondary btn-sm" onclick="quickTimer(600)">10m</button>
      <button class="btn btn-secondary btn-sm" onclick="quickTimer(1800)">30m</button>
    </div>
    <div id="timersList"></div>
    <button class="fab" onclick="openTimerEditor()">+</button>
  </div>

  <div id="paneReminders" class="pane">
    <div id="remindersList"></div>
    <button class="fab" onclick="openReminderEditor()">+</button>
  </div>

  <div id="paneWorld" class="pane">
    <div id="citiesList"></div>
    <button class="fab" onclick="openCityEditor()">+</button>
  </div>

  <div id="paneStopwatch" class="pane">
    <div class="big-display" id="swDisplay">00:00.00</div>
    <div class="big-controls">
      <button id="swStartBtn" class="btn btn-primary" onclick="swStart()" data-i18n="sw_start"></button>
      <button id="swLapBtn" class="btn btn-secondary" onclick="swLap()" data-i18n="sw_lap"></button>
      <button id="swResetBtn" class="btn btn-secondary" onclick="swReset()" data-i18n="sw_reset"></button>
    </div>
    <div id="lapList" class="lap-list"></div>
  </div>
</div>

<!-- Editor sheet -->
<div id="sheetOverlay" class="sheet-overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<!-- Fullscreen close button (modal mode only) -->
<button id="fsClose" class="fs-close" title="Close">×</button>

<script src="/api/shared/widget-common.js"></script>
<script>
// ── i18n dictionary ────────────────────────────────────────────────────
var L = {
  en:{
    tab_alarms:'Alarms',tab_timers:'Timers',tab_reminders:'Reminders',
    tab_world:'World Clock',tab_stopwatch:'Stopwatch',
    no_alarms:'No alarms',no_timers:'No active timers',
    no_reminders:'No reminders',no_cities:'No cities added',
    add_alarm:'New alarm',edit_alarm:'Edit alarm',
    add_timer:'New timer',add_reminder:'New reminder',add_city:'Add city',
    lbl_time:'Time',lbl_label:'Label',lbl_repeat:'Repeat',
    lbl_snooze:'Snooze (min, 0 = off)',
    lbl_duration:'Duration',lbl_minutes:'Minutes',lbl_seconds:'Seconds',
    lbl_due:'When',lbl_city_name:'City name',lbl_timezone:'IANA timezone',
    ph_label_alarm:'e.g. Wake up',ph_label_timer:'e.g. Tea',
    ph_label_reminder:'e.g. Call mom',
    ph_city_name:'e.g. Tokyo',ph_tz:'e.g. Asia/Tokyo',
    btn_save:'Save',btn_cancel:'Cancel',btn_delete:'Delete',
    day_mon:'Mon',day_tue:'Tue',day_wed:'Wed',day_thu:'Thu',
    day_fri:'Fri',day_sat:'Sat',day_sun:'Sun',
    repeat_once:'One time',repeat_weekdays:'Weekdays',
    repeat_weekends:'Weekends',repeat_daily:'Every day',
    sw_start:'Start',sw_pause:'Pause',sw_lap:'Lap',sw_reset:'Reset',
    saved:'Saved',deleted:'Deleted',error_save:'Save failed',
  },
  uk:{
    tab_alarms:'Будильники',tab_timers:'Таймери',tab_reminders:'Нагадування',
    tab_world:'Світовий час',tab_stopwatch:'Секундомір',
    no_alarms:'Немає будильників',no_timers:'Немає активних таймерів',
    no_reminders:'Немає нагадувань',no_cities:'Немає міст',
    add_alarm:'Новий будильник',edit_alarm:'Редагувати будильник',
    add_timer:'Новий таймер',add_reminder:'Нове нагадування',add_city:'Додати місто',
    lbl_time:'Час',lbl_label:'Назва',lbl_repeat:'Повтор',
    lbl_snooze:'Відкласти (хв, 0 = вимкнено)',
    lbl_duration:'Тривалість',lbl_minutes:'Хвилин',lbl_seconds:'Секунд',
    lbl_due:'Коли',lbl_city_name:'Назва міста',lbl_timezone:'IANA часовий пояс',
    ph_label_alarm:'напр. Прокинутися',ph_label_timer:'напр. Чай',
    ph_label_reminder:'напр. Подзвонити мамі',
    ph_city_name:'напр. Токіо',ph_tz:'напр. Asia/Tokyo',
    btn_save:'Зберегти',btn_cancel:'Скасувати',btn_delete:'Видалити',
    day_mon:'Пн',day_tue:'Вт',day_wed:'Ср',day_thu:'Чт',
    day_fri:'Пт',day_sat:'Сб',day_sun:'Нд',
    repeat_once:'Один раз',repeat_weekdays:'Будні',
    repeat_weekends:'Вихідні',repeat_daily:'Щодня',
    sw_start:'Старт',sw_pause:'Пауза',sw_lap:'Коло',sw_reset:'Скинути',
    saved:'Збережено',deleted:'Видалено',error_save:'Помилка збереження',
  }
};

// Extra postMessage refresh handler (shared listener already handles lang_changed)
window.addEventListener('message', function(e){
  if(e.data && e.data.type === 'refresh') refreshAll();
});

// ── Helpers ────────────────────────────────────────────────────────────
var IS_MODAL = (new URLSearchParams(window.location.search).get('modal') || '') === '1';
var inFrame = window.self !== window.top;

function pad2(n){return (n<10?'0':'')+n;}

// Error-aware wrappers. We want the "null on failure" behaviour of the
// old apiGet/apiPost, but also want the user to see errors via toast.
function safeGet(p){
  return apiGet(p).catch(function(e){ showToast(e.message || 'Error', 'error'); return null; });
}
function safePost(p, b){
  return apiPost(p, b || {}).catch(function(e){ showToast(e.message || 'Error', 'error'); return null; });
}
function safePatch(p, b){
  return apiPatch(p, b).catch(function(e){ showToast(e.message || 'Error', 'error'); return null; });
}
function safeDel(p){
  return apiDelete(p).then(function(){ return true; }).catch(function(e){ showToast(e.message || 'Error', 'error'); return false; });
}

// ── Compact widget ─────────────────────────────────────────────────────
function openModal(){
  if(!inFrame) return;
  try{
    window.parent.postMessage({
      type:'openWidgetModal', module:'clock',
      width: 480, height: 600,
    }, '*');
  }catch(_){}
}

function tickCompactClock(){
  var d = new Date();
  var t1 = $('cNowTime'); if(t1) t1.textContent = pad2(d.getHours())+':'+pad2(d.getMinutes());
  var d1 = $('cNowDate');
  if(d1) d1.textContent = d.toLocaleDateString(LANG==='uk'?'uk-UA':'en-US',
    {day:'numeric',month:'long'});
}

function refreshCompact(){
  safeGet('/state').then(function(s){
    if(!s) return;
    var icons = [];
    var ringingCount = (s.ringing_alarms||[]).length;
    var hasAlarm = !!s.next_alarm;
    var timerCount = (s.active_timers||[]).length;
    var reminderCount = s.pending_reminders_count || 0;

    if(ringingCount > 0){
      icons.push('<span class="ico ringing" title="ringing">!</span>');
    } else if(hasAlarm){
      icons.push('<span class="ico alarm" title="alarm">A</span>');
    }
    if(timerCount > 0){
      icons.push('<span class="ico timer" title="timers">T<span class="count">'+timerCount+'</span></span>');
    }
    if(reminderCount > 0){
      icons.push('<span class="ico reminder" title="reminders">R<span class="count">'+reminderCount+'</span></span>');
    }
    $('cIcons').innerHTML = icons.join('');
  });
}

// Tap-on-first-click handler (pointerdown + click fallback)
function bindCompactClick(){
  var root = $('compactRoot');
  if(!root) return;
  var fired = false;
  var trigger = function(e){
    if(fired) return;
    fired = true;
    setTimeout(function(){fired = false;}, 350);
    if(e && e.preventDefault) e.preventDefault();
    openModal();
  };
  root.addEventListener('pointerdown', trigger);
  root.addEventListener('click', trigger);
}

// ── Modal: tabs ────────────────────────────────────────────────────────
function selectTab(name){
  document.querySelectorAll('.settings-tab').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-tab') === name);
  });
  document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active');});
  var pane = $('pane'+name.charAt(0).toUpperCase()+name.slice(1));
  if(pane) pane.classList.add('active');
  if(name === 'alarms') loadAlarms();
  else if(name === 'timers') loadTimers();
  else if(name === 'reminders') loadReminders();
  else if(name === 'world') loadCities();
  else if(name === 'stopwatch') loadStopwatch();
  reportModalSize();
}

// ── Alarms ─────────────────────────────────────────────────────────────
var _alarmsCache = [];
function loadAlarms(){
  safeGet('/alarms').then(function(d){
    _alarmsCache = (d && d.alarms) || [];
    renderAlarms();
    reportModalSize();
  });
}
function renderAlarms(){
  var c = $('alarmsList');
  if(!_alarmsCache.length){c.innerHTML = '<div class="empty-state">'+esc(t('no_alarms'))+'</div>';return;}
  var listHtml = '<div style="display:flex;flex-direction:column;gap:8px">';
  listHtml += _alarmsCache.map(function(a){
    return '<div class="list-row '+(a.enabled?'':'off')+'">'+
      '<div class="lr-clickable" onclick="openAlarmEditor(\''+a.id+'\')">'+
        '<div class="lr-time">'+pad2(a.hour)+':'+pad2(a.minute)+'</div>'+
        (a.label?'<div class="lr-sub">'+esc(a.label)+'</div>':'')+
        '<div class="lr-repeat">'+esc(formatRepeat(a.repeat_days))+'</div>'+
      '</div>'+
      '<label class="toggle toggle-sm" onclick="event.stopPropagation()">'+
        '<input type="checkbox" '+(a.enabled?'checked':'')+' onchange="toggleAlarm(\''+a.id+'\',this.checked)">'+
        '<span class="slider"></span>'+
      '</label>'+
    '</div>';
  }).join('');
  listHtml += '</div>';
  c.innerHTML = listHtml;
}
function formatRepeat(days){
  if(!days || !days.length) return t('repeat_once');
  if(days.length === 7) return t('repeat_daily');
  var weekdays = [0,1,2,3,4], weekends = [5,6];
  if(days.length === 5 && weekdays.every(function(d){return days.indexOf(d) !== -1;})) return t('repeat_weekdays');
  if(days.length === 2 && weekends.every(function(d){return days.indexOf(d) !== -1;})) return t('repeat_weekends');
  var names = ['day_mon','day_tue','day_wed','day_thu','day_fri','day_sat','day_sun'];
  return days.slice().sort().map(function(d){return t(names[d]);}).join(' ');
}
function toggleAlarm(id, enabled){
  safePatch('/alarms/'+id, {enabled:enabled}).then(function(a){if(a) loadAlarms();});
}

var _editorDays = [];
function openAlarmEditor(id){
  var existing = id ? _alarmsCache.find(function(a){return a.id === id;}) : null;
  _editorDays = existing ? existing.repeat_days.slice() : [];
  var hour = existing ? existing.hour : 7;
  var minute = existing ? existing.minute : 0;
  var label = existing ? existing.label : '';
  var snooze = existing ? existing.snooze_minutes : 9;
  var dayBtns = ['day_mon','day_tue','day_wed','day_thu','day_fri','day_sat','day_sun']
    .map(function(k,i){
      var on = _editorDays.indexOf(i) !== -1 ? ' on' : '';
      return '<button type="button" class="chip'+on+'" data-day="'+i+'">'+t(k)+'</button>';
    }).join('');
  var deleteBtn = id ? '<button class="btn btn-danger" onclick="deleteAlarm(\''+id+'\')">'+t('btn_delete')+'</button>' : '';
  var html = '<h3>'+(id?t('edit_alarm'):t('add_alarm'))+'</h3>'+
    '<div class="field"><label>'+t('lbl_time')+'</label>'+
      '<div class="field-row">'+
        '<input type="number" id="aHour" min="0" max="23" value="'+hour+'">'+
        '<input type="number" id="aMin" min="0" max="59" value="'+minute+'">'+
      '</div></div>'+
    '<div class="field"><label>'+t('lbl_label')+'</label>'+
      '<input type="text" id="aLabel" placeholder="'+t('ph_label_alarm')+'" value="'+esc(label)+'"></div>'+
    '<div class="field"><label>'+t('lbl_repeat')+'</label>'+
      '<div class="chip-picker" id="aDays">'+dayBtns+'</div></div>'+
    '<div class="field"><label>'+t('lbl_snooze')+'</label>'+
      '<input type="number" id="aSnooze" min="0" max="60" value="'+snooze+'"></div>'+
    '<div class="sheet-actions">'+
      deleteBtn+
      '<button class="btn btn-secondary" onclick="closeSheet()">'+t('btn_cancel')+'</button>'+
      '<button class="btn btn-primary" onclick="saveAlarm('+(id?"'"+id+"'":'null')+')">'+t('btn_save')+'</button>'+
    '</div>';
  openSheet(html);
  document.querySelectorAll('#aDays button').forEach(function(b){
    b.onclick = function(){
      var d = parseInt(b.getAttribute('data-day'),10);
      var idx = _editorDays.indexOf(d);
      if(idx === -1){_editorDays.push(d);b.classList.add('on');}
      else{_editorDays.splice(idx,1);b.classList.remove('on');}
    };
  });
}
function saveAlarm(id){
  var hour = parseInt($('aHour').value,10);
  var minute = parseInt($('aMin').value,10);
  var label = $('aLabel').value;
  var snooze = parseInt($('aSnooze').value,10) || 0;
  var body = {hour:hour,minute:minute,label:label,repeat_days:_editorDays.slice(),snooze_minutes:snooze,enabled:true};
  var p = id ? safePatch('/alarms/'+id, body) : safePost('/alarms', body);
  p.then(function(r){
    if(r){showToast(t('saved'), 'success');closeSheet();loadAlarms();}
    else{showToast(t('error_save'), 'error');}
  });
}
function deleteAlarm(id){
  safeDel('/alarms/'+id).then(function(ok){
    if(ok){showToast(t('deleted'), 'success');closeSheet();loadAlarms();}
  });
}

// ── Timers ─────────────────────────────────────────────────────────────
var _timersCache = [];
var _timerTickHandle = null;
function loadTimers(){
  safeGet('/timers').then(function(d){
    _timersCache = (d && d.timers) || [];
    _timersCache.sort(function(a,b){return (a.remaining_sec||0) - (b.remaining_sec||0);});
    renderTimers();
    if(_timerTickHandle) clearInterval(_timerTickHandle);
    _timerTickHandle = setInterval(tickTimers, 1000);
    reportModalSize();
  });
}
function fmtDuration(sec){
  sec = Math.max(0, Math.floor(sec));
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  return h ? (h+':'+pad2(m)+':'+pad2(s)) : (pad2(m)+':'+pad2(s));
}
function renderTimers(){
  var bigEl = $('timerBig');
  var running = _timersCache.filter(function(t){return t.state === 'running';});
  bigEl.textContent = running.length ? fmtDuration(running[0].remaining_sec) : '00:00';
  var c = $('timersList');
  if(!_timersCache.length){
    c.innerHTML = '<div class="empty-state">'+esc(t('no_timers'))+'</div>';
    return;
  }
  var html = '<div style="display:flex;flex-direction:column;gap:8px">';
  html += _timersCache.map(function(tm){
    var left = fmtDuration(tm.remaining_sec);
    var btn = '';
    if(tm.state === 'running') btn = '<button class="icon-btn" onclick="pauseTimer(\''+tm.id+'\')" title="pause">||</button>';
    else if(tm.state === 'paused') btn = '<button class="icon-btn" onclick="resumeTimer(\''+tm.id+'\')" title="resume">&gt;</button>';
    return '<div class="list-row">'+
      '<div class="lr-main">'+
        '<div class="lr-time" data-tid="'+tm.id+'">'+left+'</div>'+
        (tm.label?'<div class="lr-sub">'+esc(tm.label)+'</div>':'')+
      '</div>'+
      btn+
      '<button class="icon-btn danger" onclick="deleteTimer(\''+tm.id+'\')" title="delete">×</button>'+
    '</div>';
  }).join('');
  html += '</div>';
  c.innerHTML = html;
}
function tickTimers(){
  var changed = false;
  _timersCache.forEach(function(tm){
    if(tm.state === 'running' && tm.remaining_sec > 0){
      tm.remaining_sec -= 1;
      var el = document.querySelector('[data-tid="'+tm.id+'"]');
      if(el) el.textContent = fmtDuration(tm.remaining_sec);
      if(tm.remaining_sec === 0) changed = true;
    }
  });
  var running = _timersCache.filter(function(t){return t.state === 'running';});
  var bigEl = $('timerBig');
  if(bigEl) bigEl.textContent = running.length ? fmtDuration(running[0].remaining_sec) : '00:00';
  if(changed) loadTimers();
}
function quickTimer(seconds){
  safePost('/timers', {duration_sec:seconds, label:''}).then(function(r){if(r) loadTimers();});
}
function pauseTimer(id){safePost('/timers/'+id+'/pause').then(function(){loadTimers();});}
function resumeTimer(id){safePost('/timers/'+id+'/resume').then(function(){loadTimers();});}
function deleteTimer(id){safeDel('/timers/'+id).then(function(){loadTimers();});}
function openTimerEditor(){
  var html = '<h3>'+t('add_timer')+'</h3>'+
    '<div class="field"><label>'+t('lbl_label')+'</label>'+
      '<input type="text" id="tLabel" placeholder="'+t('ph_label_timer')+'"></div>'+
    '<div class="field"><label>'+t('lbl_duration')+'</label>'+
      '<div class="field-row">'+
        '<input type="number" id="tMin" min="0" value="5" placeholder="'+t('lbl_minutes')+'">'+
        '<input type="number" id="tSec" min="0" max="59" value="0" placeholder="'+t('lbl_seconds')+'">'+
      '</div></div>'+
    '<div class="sheet-actions">'+
      '<button class="btn btn-secondary" onclick="closeSheet()">'+t('btn_cancel')+'</button>'+
      '<button class="btn btn-primary" onclick="saveTimer()">'+t('btn_save')+'</button>'+
    '</div>';
  openSheet(html);
}
function saveTimer(){
  var m = parseInt($('tMin').value,10) || 0;
  var s = parseInt($('tSec').value,10) || 0;
  var label = $('tLabel').value;
  var total = m*60 + s;
  if(total <= 0){showToast(t('error_save'), 'error');return;}
  safePost('/timers', {duration_sec:total, label:label}).then(function(r){
    if(r){showToast(t('saved'), 'success');closeSheet();loadTimers();}
    else{showToast(t('error_save'), 'error');}
  });
}

// ── Reminders ──────────────────────────────────────────────────────────
var _remindersCache = [];
function loadReminders(){
  safeGet('/reminders').then(function(d){
    _remindersCache = (d && d.reminders) || [];
    _remindersCache.sort(function(a,b){return (a.due_at||'').localeCompare(b.due_at||'');});
    renderReminders();
    reportModalSize();
  });
}
function renderReminders(){
  var c = $('remindersList');
  var pending = _remindersCache.filter(function(r){return !r.fired;});
  if(!pending.length){c.innerHTML = '<div class="empty-state">'+esc(t('no_reminders'))+'</div>';return;}
  var html = '<div style="display:flex;flex-direction:column;gap:8px">';
  html += pending.map(function(r){
    var d = new Date(r.due_at);
    var dateStr = d.toLocaleString(LANG==='uk'?'uk-UA':'en-US',
      {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return '<div class="list-row">'+
      '<div class="lr-main">'+
        '<div class="lr-title" style="font-size:14px;font-weight:500">'+esc(r.label||'')+'</div>'+
        '<div class="lr-repeat">'+esc(dateStr)+'</div>'+
      '</div>'+
      '<button class="icon-btn danger" onclick="deleteReminder(\''+r.id+'\')">×</button>'+
    '</div>';
  }).join('');
  html += '</div>';
  c.innerHTML = html;
}
function deleteReminder(id){safeDel('/reminders/'+id).then(function(){loadReminders();});}
function openReminderEditor(){
  var now = new Date();
  now.setMinutes(now.getMinutes() + 10 - (now.getMinutes() % 5));
  var defaultLocal = now.getFullYear()+'-'+pad2(now.getMonth()+1)+'-'+pad2(now.getDate())+
    'T'+pad2(now.getHours())+':'+pad2(now.getMinutes());
  var html = '<h3>'+t('add_reminder')+'</h3>'+
    '<div class="field"><label>'+t('lbl_label')+'</label>'+
      '<input type="text" id="rLabel" placeholder="'+t('ph_label_reminder')+'"></div>'+
    '<div class="field"><label>'+t('lbl_due')+'</label>'+
      '<input type="datetime-local" id="rDue" value="'+defaultLocal+'"></div>'+
    '<div class="sheet-actions">'+
      '<button class="btn btn-secondary" onclick="closeSheet()">'+t('btn_cancel')+'</button>'+
      '<button class="btn btn-primary" onclick="saveReminder()">'+t('btn_save')+'</button>'+
    '</div>';
  openSheet(html);
}
function saveReminder(){
  var label = $('rLabel').value;
  var dueLocal = $('rDue').value;
  if(!dueLocal){showToast(t('error_save'), 'error');return;}
  var d = new Date(dueLocal);
  safePost('/reminders', {due_at:d.toISOString(), label:label}).then(function(r){
    if(r){showToast(t('saved'), 'success');closeSheet();loadReminders();}
    else{showToast(t('error_save'), 'error');}
  });
}

// ── World clock ────────────────────────────────────────────────────────
var _citiesCache = [];
var _worldTickHandle = null;
function loadCities(){
  safeGet('/world-clock').then(function(d){
    _citiesCache = (d && d.cities) || [];
    renderCities();
    if(_worldTickHandle) clearInterval(_worldTickHandle);
    _worldTickHandle = setInterval(updateCityTimes, 1000);
    updateCityTimes();
    reportModalSize();
  });
}
function renderCities(){
  var c = $('citiesList');
  if(!_citiesCache.length){c.innerHTML = '<div class="empty-state">'+esc(t('no_cities'))+'</div>';return;}
  var html = '<div style="display:flex;flex-direction:column;gap:8px">';
  html += _citiesCache.map(function(city){
    return '<div class="city-row">'+
      '<div class="left">'+
        '<div class="name">'+esc(city.label)+'</div>'+
        '<div class="tz">'+esc(city.tz_name)+'</div>'+
      '</div>'+
      '<div class="ct" data-tz="'+esc(city.tz_name)+'">--:--</div>'+
      '<button class="icon-btn danger" onclick="deleteCity(\''+city.id+'\')">×</button>'+
    '</div>';
  }).join('');
  html += '</div>';
  c.innerHTML = html;
}
function updateCityTimes(){
  var now = new Date();
  document.querySelectorAll('.ct[data-tz]').forEach(function(el){
    var tz = el.getAttribute('data-tz');
    try{
      var fmt = new Intl.DateTimeFormat(LANG==='uk'?'uk-UA':'en-US',
        {timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false});
      el.textContent = fmt.format(now);
    }catch(e){el.textContent = '??:??';}
  });
}
function deleteCity(id){safeDel('/world-clock/'+id).then(function(){loadCities();});}
function openCityEditor(){
  var html = '<h3>'+t('add_city')+'</h3>'+
    '<div class="field"><label>'+t('lbl_city_name')+'</label>'+
      '<input type="text" id="cName" placeholder="'+t('ph_city_name')+'"></div>'+
    '<div class="field"><label>'+t('lbl_timezone')+'</label>'+
      '<input type="text" id="cTz" placeholder="'+t('ph_tz')+'"></div>'+
    '<div class="sheet-actions">'+
      '<button class="btn btn-secondary" onclick="closeSheet()">'+t('btn_cancel')+'</button>'+
      '<button class="btn btn-primary" onclick="saveCity()">'+t('btn_save')+'</button>'+
    '</div>';
  openSheet(html);
}
function saveCity(){
  var label = $('cName').value.trim();
  var tz = $('cTz').value.trim();
  if(!label || !tz){showToast(t('error_save'), 'error');return;}
  safePost('/world-clock', {label:label, tz_name:tz}).then(function(r){
    if(r){showToast(t('saved'), 'success');closeSheet();loadCities();}
    else{showToast(t('error_save'), 'error');}
  });
}

// ── Stopwatch ──────────────────────────────────────────────────────────
var _swState = null;
var _swTickHandle = null;
function loadStopwatch(){
  safeGet('/stopwatch').then(function(d){
    _swState = d || {state:'idle',elapsed_ms:0,started_at:null,laps:[]};
    renderStopwatch();
    if(_swTickHandle) cancelAnimationFrame(_swTickHandle);
    tickStopwatch();
    reportModalSize();
  });
}
function fmtSwTime(ms){
  ms = Math.max(0, ms);
  var totalSec = Math.floor(ms/1000);
  var cs = Math.floor((ms%1000)/10);
  var h = Math.floor(totalSec/3600);
  var m = Math.floor((totalSec%3600)/60);
  var s = totalSec%60;
  return (h?(h+':'+pad2(m)):pad2(m))+':'+pad2(s)+'.'+pad2(cs);
}
function currentSwMs(){
  if(!_swState) return 0;
  var ms = _swState.elapsed_ms || 0;
  if(_swState.state === 'running' && _swState.started_at){
    ms += (Date.now() - new Date(_swState.started_at).getTime());
  }
  return ms;
}
function tickStopwatch(){
  var el = $('swDisplay');
  if(el) el.textContent = fmtSwTime(currentSwMs());
  if(_swState && _swState.state === 'running'){
    _swTickHandle = requestAnimationFrame(tickStopwatch);
  }
}
function renderStopwatch(){
  var startBtn = $('swStartBtn');
  if(_swState && _swState.state === 'running'){
    startBtn.textContent = t('sw_pause');
    startBtn.onclick = swPause;
  } else {
    startBtn.textContent = t('sw_start');
    startBtn.onclick = swStart;
  }
  var lapList = $('lapList');
  var laps = (_swState && _swState.laps) || [];
  if(!laps.length){lapList.innerHTML = '';return;}
  var rows = [];
  for(var i = laps.length-1; i >= 0; i--){
    var prev = i > 0 ? laps[i-1] : 0;
    var diff = laps[i] - prev;
    rows.push('<div class="lap-row"><span>#'+(i+1)+'</span><span>'+fmtSwTime(diff)+'</span><span>'+fmtSwTime(laps[i])+'</span></div>');
  }
  lapList.innerHTML = rows.join('');
}
function swStart(){safePost('/stopwatch/start').then(function(d){if(d){_swState = d;renderStopwatch();tickStopwatch();}});}
function swPause(){safePost('/stopwatch/pause').then(function(d){if(d){_swState = d;renderStopwatch();tickStopwatch();}});}
function swLap(){safePost('/stopwatch/lap').then(function(d){if(d){_swState = d;renderStopwatch();}});}
function swReset(){safePost('/stopwatch/reset').then(function(d){if(d){_swState = d;renderStopwatch();tickStopwatch();}});}

// ── Sheet helpers ──────────────────────────────────────────────────────
function openSheet(html){
  $('sheet').innerHTML = html;
  $('sheetOverlay').classList.add('open');
}
function closeSheet(){$('sheetOverlay').classList.remove('open');}

// ── Modal sizing ───────────────────────────────────────────────────────
function reportModalSize(){
  if(!IS_MODAL || !inFrame) return;
  requestAnimationFrame(function(){
    var root = $('modalWrap');
    if(!root) return;
    var w = Math.min(560, Math.max(360, root.scrollWidth + 36));
    var h = Math.min(820, Math.max(420, root.scrollHeight + 36));
    try{window.parent.postMessage({type:'modal_resize', width:w, height:h}, '*');}catch(_){}
  });
}

function refreshAll(){
  applyLang();
  if(IS_MODAL){
    var active = document.querySelector('.settings-tab.active');
    var name = active ? active.getAttribute('data-tab') : 'alarms';
    selectTab(name);
  } else {
    tickCompactClock();
    refreshCompact();
  }
}

// Expose refresh() for the shared lang_changed handler.
function refresh(){ refreshAll(); }

// ── Init ───────────────────────────────────────────────────────────────
applyLang();
if(IS_MODAL){
  document.body.classList.add('modal-mode');
  $('modalWrap').style.display = 'flex';
  document.querySelectorAll('.settings-tab').forEach(function(b){
    b.onclick = function(){selectTab(b.getAttribute('data-tab'));};
  });
  if(inFrame){
    var btn = $('fsClose');
    btn.style.display = 'flex';
    btn.onclick = function(){
      try{window.parent.postMessage({type:'closeWidgetModal', module:'clock'}, '*');}catch(_){}
    };
    window.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        try{window.parent.postMessage({type:'closeWidgetModal', module:'clock'}, '*');}catch(_){}
      }
    });
  }
  selectTab('alarms');
  setInterval(function(){
    var active = document.querySelector('.settings-tab.active');
    if(!active) return;
    var n = active.getAttribute('data-tab');
    if(n === 'alarms') loadAlarms();
    else if(n === 'reminders') loadReminders();
  }, 15000);
} else {
  $('compactWrap').style.display = 'flex';
  $('compactWrap').style.height = '100%';
  tickCompactClock();
  refreshCompact();
  bindCompactClick();
  setInterval(tickCompactClock, 1000);
  setInterval(refreshCompact, 10000);
}
</script>
