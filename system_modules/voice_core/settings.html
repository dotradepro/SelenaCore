<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Core — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            font-size: 13px;
            line-height: 1.5;
            padding: 16px;
            min-height: 100%;
            overflow-y: auto;
        }

        h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--tx2);
            margin: 18px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--sf);
            border: 1px solid var(--b);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--b);
        }

        .row:last-child {
            border-bottom: none;
        }

        .row-label {
            font-size: 13px;
            color: var(--tx);
        }

        .row-sub {
            font-size: 11px;
            color: var(--tx3);
            margin-top: 2px;
        }

        select,
        input[type="number"],
        input[type="range"] {
            background: var(--sf2);
            color: var(--tx);
            border: 1px solid var(--b2);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
            min-width: 160px;
        }

        select:focus,
        input:focus {
            border-color: var(--ac);
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            border: none;
            cursor: pointer;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            cursor: pointer;
        }

        .toggle input {
            display: none;
        }

        .toggle .slider {
            position: absolute;
            inset: 0;
            background: var(--sf2);
            border-radius: 11px;
            transition: .2s;
            border: 1px solid var(--b2);
        }

        .toggle .slider::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: var(--tx2);
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: .2s;
        }

        .toggle input:checked+.slider {
            background: var(--ac);
            border-color: var(--ac);
        }

        .toggle input:checked+.slider::after {
            transform: translateX(18px);
            background: #fff;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: .15s;
        }

        .btn-primary {
            background: var(--ac);
            color: var(--tx);
        }

        .btn-primary:hover {
            background: var(--ac);
        }

        .btn-danger {
            background: var(--rd);
            color: var(--tx);
        }

        .btn-danger:hover {
            background: var(--rd);
        }

        .btn-secondary {
            background: var(--sf2);
            color: var(--tx);
            border: 1px solid var(--b2);
        }

        .btn-secondary:hover {
            background: var(--sf2);
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.ok {
            background: var(--gr);
        }

        .status-dot.off {
            background: var(--rd);
        }

        .status-dot.warn {
            background: var(--am);
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .range-val {
            font-size: 12px;
            color: var(--ac);
            min-width: 36px;
            text-align: right;
        }

        .device-list {
            list-style: none;
        }

        .device-list li {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 12px;
            color: var(--tx2);
        }

        .device-list li .name {
            color: var(--tx);
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-ok {
            background: rgba(46, 201, 138, .15);
            color: var(--gr);
        }

        .badge-off {
            background: rgba(224, 84, 84, .15);
            color: var(--rd);
        }

        .badge-warn {
            background: rgba(245, 169, 58, .15);
            color: var(--am);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gr);
            color: #0B0C10;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: opacity .3s;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
        }

        .empty {
            text-align: center;
            color: var(--tx3);
            padding: 20px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <h2 data-i18n="title"></h2>

    <!-- Status -->
    <div class="card" id="statusCard">
        <div class="row">
            <div>
                <div class="row-label">Module Status</div>
            </div>
            <span id="moduleStatus" class="badge badge-ok">Loading…</span>
        </div>
        <div class="row">
            <div>
                <div class="row-label">Privacy Mode</div>
                <div class="row-sub">Disables microphone and wake word</div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="privacyToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- STT Settings -->
    <h3 data-i18n="h_stt"></h3>
    <div class="card">
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_stt_model"></div>
                <div class="row-sub" data-i18n="sub_stt_model"></div>
            </div>
            <select id="sttModel">
                <option value="vosk-model-small-uk">🇺🇦 Ukrainian (small)</option>
                <option value="vosk-model-small-en-us">🇺🇸 English (small)</option>
                <option value="vosk-model-small-ru">🇷🇺 Russian (small)</option>
                <option value="vosk-model-uk">🇺🇦 Ukrainian (large)</option>
                <option value="vosk-model-en-us-0.22">🇺🇸 English (large)</option>
            </select>
        </div>
    </div>

    <!-- TTS Settings -->
    <h3 data-i18n="h_tts"></h3>
    <div class="card">
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_tts_voice"></div>
                <div class="row-sub" data-i18n="sub_tts_voice"></div>
            </div>
            <select id="ttsVoice">
                <option value="uk_UA-ukrainian_tts-medium">🇺🇦 Ukrainian TTS</option>
                <option value="uk_UA-lada-medium">🇺🇦 Lada (UK)</option>
                <option value="en_US-amy-medium">🇺🇸 Amy (EN)</option>
                <option value="en_US-ryan-high">🇺🇸 Ryan (EN)</option>
                <option value="ru_RU-irina-medium">🇷🇺 Irina (RU)</option>
                <option value="ru_RU-ruslan-medium">🇷🇺 Ruslan (RU)</option>
            </select>
        </div>
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_test_tts"></div>
                <div class="row-sub" data-i18n="sub_test_tts"></div>
            </div>
            <button class="btn btn-secondary" id="testTtsBtn" data-i18n="test_btn"></button>
        </div>
    </div>

    <!-- Wake Word -->
    <h3 data-i18n="h_wake"></h3>
    <div class="card">
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_wake_model"></div>
                <div class="row-sub" data-i18n="sub_wake_model"></div>
            </div>
            <select id="wakeWordModel">
                <option value="hey_selena">hey selena</option>
                <option value="hey_jarvis">hey jarvis</option>
                <option value="alexa">alexa</option>
            </select>
        </div>
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_threshold"></div>
                <div class="row-sub" data-i18n="sub_threshold"></div>
            </div>
            <div class="range-row">
                <input type="range" id="wakeThreshold" min="0.1" max="1.0" step="0.05" value="0.5">
                <span class="range-val" id="wakeThresholdVal">0.50</span>
            </div>
        </div>
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_detector_status"></div>
            </div>
            <span id="wakeStatus" class="badge badge-off">—</span>
        </div>
    </div>

    <!-- Speaker ID -->
    <h3 data-i18n="h_speaker"></h3>
    <div class="card">
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_similarity"></div>
                <div class="row-sub" data-i18n="sub_similarity"></div>
            </div>
            <div class="range-row">
                <input type="range" id="speakerThreshold" min="0.3" max="1.0" step="0.05" value="0.75">
                <span class="range-val" id="speakerThresholdVal">0.75</span>
            </div>
        </div>
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_enrolled"></div>
            </div>
            <span id="speakerCount" class="badge badge-ok">—</span>
        </div>
        <ul class="device-list" id="speakerList"></ul>
    </div>

    <!-- Audio Devices -->
    <h3 data-i18n="h_audio"></h3>
    <div class="card" id="audioCard">
        <div class="row">
            <div>
                <div class="row-label" data-i18n="lbl_inputs"></div>
            </div>
            <span id="inputCount" class="badge badge-ok">—</span>
        </div>
        <ul class="device-list" id="inputList"></ul>
        <div class="row" style="margin-top:8px">
            <div>
                <div class="row-label" data-i18n="lbl_outputs"></div>
            </div>
            <span id="outputCount" class="badge badge-ok">—</span>
        </div>
        <ul class="device-list" id="outputList"></ul>
    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="btn btn-primary" id="saveBtn" data-i18n="save_btn"></button>
        <button class="btn btn-secondary" id="refreshBtn" data-i18n="refresh_btn"></button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: '�️ Voice Core Settings', loading: 'Loading…',
                lbl_module_status: 'Module Status', lbl_privacy: 'Privacy Mode', sub_privacy: 'Disables microphone and wake word',
                h_stt: 'Speech-to-Text (STT)', lbl_stt_model: 'STT Model', sub_stt_model: 'Vosk offline recognition model',
                h_tts: 'Text-to-Speech (TTS)', lbl_tts_voice: 'TTS Voice', sub_tts_voice: 'Piper offline voice model',
                lbl_test_tts: 'Test TTS', sub_test_tts: 'Speak a test phrase', test_btn: '▶ Test',
                h_wake: 'Wake Word', lbl_wake_model: 'Wake Word Model', sub_wake_model: 'openWakeWord activation phrase',
                lbl_threshold: 'Detection Threshold', sub_threshold: 'Higher = fewer false positives',
                lbl_detector_status: 'Detector Status',
                h_speaker: 'Speaker Identification', lbl_similarity: 'Similarity Threshold', sub_similarity: 'Min confidence for voice match',
                lbl_enrolled: 'Enrolled Speakers',
                h_audio: 'Audio Devices', lbl_inputs: 'Input Devices', lbl_outputs: 'Output Devices',
                save_btn: 'Save Settings', refresh_btn: '↻ Refresh',
                status_running: 'Running', status_offline: 'Offline',
                wake_active: 'Active', wake_stopped: 'Stopped',
                no_speakers: 'No speakers enrolled', speaker_removed: ' removed', no_devices: 'No devices detected',
                saved_ok: 'Settings saved ✓', save_failed: 'Save failed: ',
                priv_on: 'Privacy mode ON 🔇', priv_off: 'Privacy mode OFF 🎤️',
                toggle_failed: 'Toggle failed',
                speaking: '⏳ Speaking…', tts_test_ok: 'TTS test complete ✓', tts_test_failed: 'TTS test failed',
                refreshed: 'Refreshed'
            },
            uk: {
                title: '�️ Налаштування Voice Core', loading: 'Завантаження…',
                lbl_module_status: 'Статус модуля', lbl_privacy: 'Режим приватності', sub_privacy: 'Вимикає мікрофон та wake word',
                h_stt: 'Розпізнавання мовлення (STT)', lbl_stt_model: 'Модель STT', sub_stt_model: 'Офлайн-модель Vosk',
                h_tts: 'Синтез мовлення (TTS)', lbl_tts_voice: 'Голос TTS', sub_tts_voice: 'Офлайн-голос Piper',
                lbl_test_tts: 'Тест TTS', sub_test_tts: 'Вимовити тестову фразу', test_btn: '▶ Тест',
                h_wake: 'Wake Word', lbl_wake_model: 'Модель Wake Word', sub_wake_model: 'Фраза активації openWakeWord',
                lbl_threshold: 'Поріг виявлення', sub_threshold: 'Вищий = менше хибних спрацьовувань',
                lbl_detector_status: 'Статус детектора',
                h_speaker: 'Ідентифікація мовця', lbl_similarity: 'Поріг схожості', sub_similarity: 'Мін. впевненість для збігу голосу',
                lbl_enrolled: 'Зареєстровані мовці',
                h_audio: 'Аудіопристрої', lbl_inputs: 'Пристрої введення', lbl_outputs: 'Пристрої виведення',
                save_btn: 'Зберегти', refresh_btn: '↻ Оновити',
                status_running: 'Запущено', status_offline: 'Офлайн',
                wake_active: 'Активний', wake_stopped: 'Зупинено',
                no_speakers: 'Немає зареєстрованих мовців', speaker_removed: ' видалено', no_devices: 'Пристроїв не виявлено',
                saved_ok: 'Збережено ✓', save_failed: 'Помилка збереження: ',
                priv_on: 'Режим приватності УВІМК 🔇', priv_off: 'Режим приватності ВИМК 🎤️',
                toggle_failed: 'Помилка перемикання',
                speaking: '⏳ Вимовляється…', tts_test_ok: 'Тест TTS завершено ✓', tts_test_failed: 'Тест TTS не вдався',
                refreshed: 'Оновлено'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        (function () {
            const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

            const $ = (id) => document.getElementById(id);

            function showToast(msg, ms) {
                const t = $('toast');
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), ms || 2000);
            }

            async function api(path, opts) {
                const resp = await fetch(BASE + path, opts);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                return resp.json();
            }

            // ── Load config ──────────────────────────────────────────────
            async function loadConfig() {
                try {
                    const cfg = await api('/config');
                    $('sttModel').value = cfg.stt_model || 'vosk-model-small-uk';
                    $('ttsVoice').value = cfg.tts_voice || 'uk_UA-ukrainian_tts-medium';
                    $('wakeWordModel').value = cfg.wake_word_model || 'hey_selena';
                    $('wakeThreshold').value = cfg.wake_word_threshold || 0.5;
                    $('wakeThresholdVal').textContent = (cfg.wake_word_threshold || 0.5).toFixed(2);
                    $('speakerThreshold').value = cfg.speaker_threshold || 0.75;
                    $('speakerThresholdVal').textContent = (cfg.speaker_threshold || 0.75).toFixed(2);
                    $('privacyToggle').checked = cfg.privacy_mode || false;
                    $('moduleStatus').textContent = t('status_running');
                    $('moduleStatus').className = 'badge badge-ok';
                } catch (e) {
                    $('moduleStatus').textContent = t('status_offline');
                    $('moduleStatus').className = 'badge badge-off';
                }
            }

            // ── Load wake word status ────────────────────────────────────
            async function loadWakeStatus() {
                try {
                    const s = await api('/wakeword/status');
                    $('wakeStatus').textContent = s.running ? t('wake_active') : t('wake_stopped');
                    $('wakeStatus').className = s.running ? 'badge badge-ok' : 'badge badge-off';
                } catch { $('wakeStatus').textContent = '—'; }
            }

            // ── Load speakers ─────────────────────────────────────────────
            async function loadSpeakers() {
                try {
                    const s = await api('/speakers');
                    const list = s.speakers || [];
                    $('speakerCount').textContent = list.length;
                    const ul = $('speakerList');
                    ul.innerHTML = '';
                    if (list.length === 0) {
                        ul.innerHTML = '<li class="empty">' + t('no_speakers') + '</li>';
                    } else {
                        list.forEach(id => {
                            const li = document.createElement('li');
                            li.innerHTML = '<span class="name">' + id + '</span>' +
                                '<button class="btn btn-danger" style="padding:2px 8px;font-size:11px" data-uid="' + id + '">✕</button>';
                            ul.appendChild(li);
                        });
                        ul.querySelectorAll('[data-uid]').forEach(btn => {
                            btn.addEventListener('click', async function () {
                                const uid = this.getAttribute('data-uid');
                                await api('/speakers/' + encodeURIComponent(uid), { method: 'DELETE' });
                                showToast('Speaker ' + uid + t('speaker_removed'));
                                loadSpeakers();
                            });
                        });
                    }
                } catch { $('speakerCount').textContent = '—'; }
            }

            // ── Load audio devices ─────────────────────────────────────────
            async function loadAudio() {
                try {
                    const d = await api('/audio/devices');
                    const inputs = d.inputs || [];
                    const outputs = d.outputs || [];
                    $('inputCount').textContent = inputs.length;
                    $('outputCount').textContent = outputs.length;

                    const renderList = (items, ul) => {
                        ul.innerHTML = '';
                        if (items.length === 0) {
                            ul.innerHTML = '<li class="empty">' + t('no_devices') + '</li>';
                        } else {
                            items.forEach(dev => {
                                const li = document.createElement('li');
                                li.innerHTML = '<span class="status-dot ok"></span><span class="name">' +
                                    dev.name + '</span> <span style="color:var(--tx3)">(' + dev.type + ')</span>';
                                ul.appendChild(li);
                            });
                        }
                    };
                    renderList(inputs, $('inputList'));
                    renderList(outputs, $('outputList'));
                } catch {
                    $('inputCount').textContent = '—';
                    $('outputCount').textContent = '—';
                }
            }

            // ── Save ──────────────────────────────────────────────────────
            $('saveBtn').addEventListener('click', async () => {
                try {
                    await api('/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            stt_model: $('sttModel').value,
                            tts_voice: $('ttsVoice').value,
                            wake_word_model: $('wakeWordModel').value,
                            wake_word_threshold: parseFloat($('wakeThreshold').value),
                            speaker_threshold: parseFloat($('speakerThreshold').value),
                            privacy_mode: $('privacyToggle').checked,
                        }),
                    });
                    showToast(t('saved_ok'));
                } catch (e) {
                    showToast(t('save_failed') + e.message);
                }
            });

            // ── Privacy toggle ────────────────────────────────────────────
            $('privacyToggle').addEventListener('change', async function () {
                try {
                    await api('/config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ privacy_mode: this.checked }),
                    });
                    showToast(this.checked ? t('priv_on') : t('priv_off'));
                    loadWakeStatus();
                } catch (e) {
                    showToast(t('toggle_failed'));
                }
            });

            // ── Test TTS ──────────────────────────────────────────────────
            $('testTtsBtn').addEventListener('click', async () => {
                const btn = $('testTtsBtn');
                btn.disabled = true;
                btn.textContent = t('speaking');
                try {
                    await api('/tts/test', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: 'Привіт! Голосовий модуль працює.', voice: $('ttsVoice').value }),
                    });
                    showToast(t('tts_test_ok'));
                } catch (e) {
                    showToast(t('tts_test_failed'));
                } finally {
                    btn.disabled = false;
                    btn.textContent = t('test_btn');
                }
            });

            // ── Range sliders ─────────────────────────────────────────────
            $('wakeThreshold').addEventListener('input', function () {
                $('wakeThresholdVal').textContent = parseFloat(this.value).toFixed(2);
            });
            $('speakerThreshold').addEventListener('input', function () {
                $('speakerThresholdVal').textContent = parseFloat(this.value).toFixed(2);
            });

            // ── Refresh ──────────────────────────────────────────────────
            $('refreshBtn').addEventListener('click', () => {
                loadConfig(); loadWakeStatus(); loadSpeakers(); loadAudio();
                showToast(t('refreshed'));
            });

            // ── Init ──────────────────────────────────────────────────────
            window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadConfig(); loadWakeStatus(); loadSpeakers(); loadAudio(); } });
            applyLang();
            loadConfig(); loadWakeStatus(); loadSpeakers(); loadAudio();
        })();
    </script>
