<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Core</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * { margin: 0; padding: 0; box-sizing: border-box }

        body {
            font-family: "DM Sans", system-ui, sans-serif;
            background: transparent;
            color: var(--tx);
            font-size: 12px;
            line-height: 1.4;
            padding: 8px 10px;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lbl {
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--tx3)
        }

        .sdot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            transition: all .3s
        }
        .sdot.ok { background: var(--gr) }
        .sdot.off { background: var(--rd) }

        .center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
        }

        .mic {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(79, 140, 247, .1);
            border: 1.5px solid rgba(79, 140, 247, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--tx);
            transition: all .2s;
        }
        .mic svg { width: 20px; height: 20px }

        .privacy-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--b2);
            background: var(--sf2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s;
            color: var(--tx3);
            font-size: 16px;
            position: absolute;
            right: 8px;
        }
        .privacy-btn:hover {
            border-color: var(--tx3);
            color: var(--tx2);
        }
        .privacy-btn.active {
            background: rgba(224, 84, 84, .15);
            border-color: var(--rd);
            color: var(--rd);
        }
        .privacy-btn.active:hover {
            background: rgba(224, 84, 84, .25);
        }

        .bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end
        }

        .status {
            font-size: 10px;
            transition: color .3s
        }

        .info {
            display: flex;
            gap: 8px;
            font-size: 9px;
            color: var(--tx3)
        }
        .info .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 2px;
            vertical-align: middle
        }
        .info .dot.ok { background: var(--gr) }
        .info .dot.off { background: var(--rd) }
    </style>
</head>

<body>

    <!-- Top label -->
    <div class="top">
        <div class="lbl" data-i18n="voice_label"></div>
        <div class="sdot" id="statusDot"></div>
    </div>

    <!-- Center: mic icon + privacy button -->
    <div class="center" style="position:relative">
        <div class="mic" id="micIcon">
            <svg viewBox="0 0 26 26" fill="none">
                <rect x="9" y="2" width="8" height="13" rx="4" stroke="currentColor" stroke-width="1.5" />
                <path d="M4.5 12c0 4.7 3.8 8.5 8.5 8.5S21.5 16.7 21.5 12M13 20.5V24M9 24h8" stroke="currentColor"
                    stroke-width="1.5" stroke-linecap="round" />
            </svg>
        </div>
        <button class="privacy-btn" id="privacyBtn" title="Privacy Mode">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" y1="1" x2="23" y2="23"/>
                <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/>
                <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .76-.13 1.49-.35 2.17"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
    </div>

    <!-- Bottom: status + info -->
    <div class="bottom">
        <div class="status" id="statusText" style="color:var(--tx3)" data-i18n="ready"></div>
        <div class="info">
            <span><span class="dot" id="sttDot"></span>STT</span>
            <span><span class="dot" id="wakeDot"></span>Wake</span>
            <span><span class="dot" id="ttsDot"></span>TTS</span>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { voice_label: 'Voice · Core', ready: 'Ready', offline: 'Offline', priv_on: 'Privacy ON', priv_off: 'Privacy OFF' },
            uk: { voice_label: 'Voice · Core', ready: 'Готово', offline: 'Офлайн', priv_on: 'Приватнiсть УВIМК', priv_off: 'Приватнiсть ВИМК' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); } });
        (function () {
            var BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
            var $ = function(id) { return document.getElementById(id); };
            var privacyMode = false;

            async function load() {
                try {
                    var cfg = await (await fetch(BASE + '/config')).json();
                    privacyMode = cfg.privacy_mode || false;
                    $('statusDot').className = 'sdot ' + (privacyMode ? 'off' : 'ok');
                    updatePrivacyBtn();
                    $('sttDot').className = 'dot ok';
                    $('ttsDot').className = 'dot ok';
                    $('statusText').textContent = t('ready');
                    $('statusText').style.color = 'var(--tx3)';
                } catch(e) {
                    $('statusDot').className = 'sdot off';
                    $('sttDot').className = 'dot off';
                    $('ttsDot').className = 'dot off';
                    $('wakeDot').className = 'dot off';
                    $('statusText').textContent = t('offline');
                    $('statusText').style.color = 'var(--rd)';
                }
                try {
                    var wk = await (await fetch(BASE + '/wakeword/status')).json();
                    $('wakeDot').className = wk.running ? 'dot ok' : 'dot off';
                } catch(e) { $('wakeDot').className = 'dot off'; }
            }

            function updatePrivacyBtn() {
                var btn = $('privacyBtn');
                if (privacyMode) {
                    btn.classList.add('active');
                    btn.title = t('priv_on');
                } else {
                    btn.classList.remove('active');
                    btn.title = t('priv_off');
                }
            }

            $('privacyBtn').addEventListener('click', async function() {
                this.style.opacity = '0.5';
                this.style.pointerEvents = 'none';
                try {
                    var res = await fetch(BASE + '/privacy/toggle', { method: 'POST' });
                    var data = await res.json();
                    privacyMode = data.privacy_mode;
                    $('statusDot').className = 'sdot ' + (privacyMode ? 'off' : 'ok');
                    updatePrivacyBtn();
                    // Reload wake word status
                    try {
                        var wk = await (await fetch(BASE + '/wakeword/status')).json();
                        $('wakeDot').className = wk.running ? 'dot ok' : 'dot off';
                    } catch(e) {}
                } catch(e) { /* ignore */ }
                this.style.opacity = '';
                this.style.pointerEvents = '';
            });

            load();
            setInterval(load, 30000);
        })();
        applyLang();
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
