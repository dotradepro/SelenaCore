<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Router Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        body {
            max-width: 700px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 1rem;
            color: var(--tx2);
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .msg {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .msg.ok {
            background: rgba(80, 200, 120, 0.15);
            color: var(--gr);
        }

        .msg.err {
            background: rgba(220, 50, 50, 0.15);
            color: var(--rd);
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <div class="section">
        <h2 data-i18n="add_channel"></h2>
        <label data-i18n="channel_type"></label>
        <select id="ch-type">
            <option value="telegram" data-i18n="opt_telegram">Telegram</option>
            <option value="webhook" data-i18n="opt_webhook">Webhook</option>
            <option value="tts" data-i18n="opt_tts">TTS (voice)</option>
            <option value="push" data-i18n="opt_push">Web Push</option>
        </select>
        <div id="ch-fields"></div>
        <button class="btn btn-primary" id="btn-add-channel" data-i18n="add_channel_btn"></button>
        <div id="ch-msg"></div>
    </div>

    <div class="section">
        <h2 data-i18n="add_rule"></h2>
        <label data-i18n="channel_lbl"></label>
        <select id="rule-channel">
            <option value="telegram">telegram</option>
            <option value="webhook">webhook</option>
            <option value="tts">tts</option>
            <option value="push">push</option>
        </select>
        <label data-i18n="priority_lbl"></label>
        <input type="number" id="rule-priority" value="100" min="1">
        <label data-i18n="level_filter"></label>
        <select id="rule-level">
            <option value="" data-i18n="opt_all">All</option>
            <option value="info">info</option>
            <option value="warning">warning</option>
            <option value="critical">critical</option>
        </select>
        <button class="btn btn-primary" id="btn-add-rule" data-i18n="add_rule_btn"></button>
        <div id="rule-msg"></div>
    </div>

    <div class="section">
        <h2 data-i18n="active_channels"></h2>
        <table>
            <thead>
                <tr>
                    <th data-i18n="col_name"></th>
                    <th data-i18n="col_sent"></th>
                </tr>
            </thead>
            <tbody id="channels-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2 data-i18n="active_rules"></h2>
        <table>
            <thead>
                <tr>
                    <th data-i18n="col_priority"></th>
                    <th data-i18n="col_channel"></th>
                    <th data-i18n="col_level"></th>
                    <th data-i18n="col_events"></th>
                </tr>
            </thead>
            <tbody id="rules-body"></tbody>
        </table>
    </div>

    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: { title: '🔔 Notification Router Settings', add_channel: 'Add Channel', channel_type: 'Channel type', opt_telegram: 'Telegram', opt_webhook: 'Webhook', opt_tts: 'TTS (voice)', opt_push: 'Web Push', add_channel_btn: 'Add Channel', add_rule: 'Add Routing Rule', channel_lbl: 'Channel', priority_lbl: 'Priority (lower = first)', level_filter: 'Level filter (blank = all)', opt_all: 'All', add_rule_btn: 'Add Rule', active_channels: 'Active Channels', col_name: 'Name', col_sent: 'Sent', active_rules: 'Active Rules', col_priority: 'Priority', col_channel: 'Channel', col_level: 'Level', col_events: 'Events', tg_token: 'Bot Token', tg_chat: 'Chat ID', wh_url: 'Webhook URL', ch_added: '✓ Channel added', rule_added: '✓ Rule added', no_channels: 'No channels', no_rules: 'No rules', saving: 'Saving…', deleted: 'Deleted', error: 'Error', adding: 'Adding…' },
            uk: { title: '🔔 Налаштування маршрутизації сповіщень', add_channel: 'Додати канал', channel_type: 'Тип каналу', opt_telegram: 'Telegram', opt_webhook: 'Webhook', opt_tts: 'TTS (голос)', opt_push: 'Web Push', add_channel_btn: 'Додати канал', add_rule: 'Додати правило маршрутизації', channel_lbl: 'Канал', priority_lbl: 'Пріоритет (Менший = перший)', level_filter: 'Фільтр рівня (пусто = усі)', opt_all: 'Усі', add_rule_btn: 'Додати правило', active_channels: 'Активні канали', col_name: 'Назва', col_sent: 'Надіслано', active_rules: 'Активні правила', col_priority: 'Пріоритет', col_channel: 'Канал', col_level: 'Рівень', col_events: 'Події', tg_token: 'Bot Token', tg_chat: 'Chat ID', wh_url: 'Webhook URL', ch_added: '✓ Канал додано', rule_added: '✓ Правило додано', no_channels: 'Немає каналів', no_rules: 'Немає правил', saving: 'Збереження…', deleted: 'Видалено', error: 'Помилка', adding: 'Додавання…' }
        };

        $('ch-type').addEventListener('change', renderChFields);

        function renderChFields() {
            var type = $('ch-type').value;
            var f = $('ch-fields');
            if (type === 'telegram') {
                f.innerHTML =
                    '<label>' + t('tg_token') + '</label><input id="tg-token" type="password" placeholder="1234:ABCD...">' +
                    '<label>' + t('tg_chat') + '</label><input id="tg-chat" placeholder="-1001234567890">';
            } else if (type === 'webhook') {
                f.innerHTML = '<label>' + t('wh_url') + '</label><input id="wh-url" placeholder="https://...">';
            } else {
                f.innerHTML = '';
            }
        }
        renderChFields();

        $('btn-add-channel').addEventListener('click', function () {
            var btn = this;
            withLoading(btn, async function () {
                var name = $('ch-type').value;
                var config = {};
                if (name === 'telegram') {
                    config = { bot_token: $('tg-token').value, chat_id: $('tg-chat').value };
                } else if (name === 'webhook') {
                    config = { url: $('wh-url').value };
                }
                var r = await fetch(BASE + '/channels', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, config: config }) });
                var d = await r.json();
                if (r.ok) {
                    showMsg('ch-msg', t('ch_added'), 'ok');
                    await loadStatus();
                } else {
                    throw new Error(d.detail || 'Error');
                }
            });
        });

        $('btn-add-rule').addEventListener('click', function () {
            var btn = this;
            withLoading(btn, async function () {
                var body = {
                    channel: $('rule-channel').value,
                    priority: parseInt($('rule-priority').value) || 100,
                    level: $('rule-level').value || null,
                };
                var r = await fetch(BASE + '/rules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                var d = await r.json();
                if (r.ok) {
                    showMsg('rule-msg', t('rule_added'), 'ok');
                    await loadStatus();
                } else {
                    throw new Error(d.detail || 'Error');
                }
            });
        });

        async function loadStatus() {
            try {
                var results = await Promise.all([
                    fetch(BASE + '/channels').then(function (r) { return r.json(); }),
                    fetch(BASE + '/rules').then(function (r) { return r.json(); }),
                ]);
                var chs = results[0];
                var rules = results[1];
                $('channels-body').innerHTML = Object.entries(chs.channels || {})
                    .map(function (e) { return '<tr><td>' + esc(e[0]) + '</td><td>' + esc(e[1].stats || 0) + '</td></tr>'; }).join('') ||
                    '<tr><td colspan="2" style="color:var(--tx3)">' + t('no_channels') + '</td></tr>';
                $('rules-body').innerHTML = (rules.rules || [])
                    .map(function (r) { return '<tr><td>' + esc(r.priority) + '</td><td>' + esc(r.channel) + '</td><td>' + esc(r.level || 'all') + '</td><td>' + esc((r.event_types || []).join(',') || 'all') + '</td></tr>'; })
                    .join('') || '<tr><td colspan="4" style="color:var(--tx3)">' + t('no_rules') + '</td></tr>';
            } catch (e) {
                showToast(e.message || 'Error', 'error');
            }
        }

        function showMsg(id, text, type) {
            var el = $(id);
            el.className = 'msg ' + type;
            el.textContent = text;
            setTimeout(function () { el.textContent = ''; el.className = ''; }, 4000);
        }

        applyLang();
        loadStatus();
    </script>
</body>

</html>
