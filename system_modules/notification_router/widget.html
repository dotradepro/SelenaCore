<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        h2 {
            font-size: 1.1rem;
        }

        .badge {
            background: var(--ac);
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.8rem;
        }

        .notif {
            background: var(--sf);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-left: 3px solid var(--ac);
        }

        .notif.warning {
            border-color: var(--am);
        }

        .notif.critical {
            border-color: var(--rd);
        }

        .notif-msg {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .notif-meta {
            font-size: 0.75rem;
            color: var(--tx3);
        }

        .empty {
            text-align: center;
            color: var(--tx3);
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2>🔔 Notifications</h2>
        <span class="badge" id="count">0</span>
    </div>
    <div id="list">
        <div class="empty">No notifications</div>
    </div>
    <script>
        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function load() {
            try {
                const data = await fetch(`${base}/notify/history?limit=20`).then(r => r.json());
                const items = (data.history || []).reverse();
                document.getElementById('count').textContent = items.length;
                if (!items.length) {
                    document.getElementById('list').innerHTML = '<div class="empty">No notifications</div>';
                    return;
                }
                document.getElementById('list').innerHTML = items.map(n => `
      <div class="notif ${n.level}">
        <div class="notif-msg">${n.message}</div>
        <div class="notif-meta">${n.level.toUpperCase()} · ${n.ts?.slice(0, 19).replace('T', ' ')} · ${(n.channels || []).join(', ') || '—'}</div>
      </div>
    `).join('');
            } catch (e) {
                document.getElementById('list').innerHTML = `<div class="empty">⚠️ ${e.message}</div>`;
            }
        }
        load(); setInterval(load, 10000);
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
