<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        h2 {
            font-size: 1.1rem;
        }

        .badge {
            background: var(--ac);
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.8rem;
        }

        .notif {
            background: var(--sf);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-left: 3px solid var(--ac);
        }

        .notif.warning {
            border-color: var(--am);
        }

        .notif.critical {
            border-color: var(--rd);
        }

        .notif-msg {
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .notif-meta {
            font-size: 0.75rem;
            color: var(--tx3);
        }

        .empty {
            text-align: center;
            color: var(--tx3);
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="header">
        <h2 data-i18n="title"></h2>
        <span class="badge" id="count">0</span>
    </div>
    <div id="list">
        <div class="empty" data-i18n="no_notifications"></div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { title: '🔔 Notifications', no_notifications: 'No notifications' },
            uk: { title: '🔔 Сповіщення', no_notifications: 'Немає сповіщень' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); load(); } });

        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function load() {
            try {
                const data = await fetch(`${base}/notify/history?limit=20`).then(r => r.json());
                const items = (data.history || []).reverse();
                document.getElementById('count').textContent = items.length;
                if (!items.length) {
                    document.getElementById('list').innerHTML = '<div class="empty">' + t('no_notifications') + '</div>';
                    return;
                }
                document.getElementById('list').innerHTML = items.map(n => `
      <div class="notif ${n.level}">
        <div class="notif-msg">${n.message}</div>
        <div class="notif-meta">${n.level.toUpperCase()} · ${n.ts?.slice(0, 19).replace('T', ' ')} · ${(n.channels || []).join(', ') || '—'}</div>
      </div>
    `).join('');
            } catch (e) {
                document.getElementById('list').innerHTML = `<div class="empty">⚠️ ${e.message}</div>`;
            }
        }
        applyLang();
        load(); setInterval(load, 10000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
