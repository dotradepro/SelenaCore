<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a0a00 0%, #1e1400 100%);
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 16px;
  }
  .widget { width: 100%; max-width: 400px; }
  .total-card {
    background: rgba(255,200,0,0.1);
    border: 1px solid rgba(255,200,0,0.3);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    margin-bottom: 14px;
  }
  .total-w { font-size: 3rem; font-weight: 700; color: #FFD700; }
  .total-label { color: #aaa; font-size: 0.9rem; }
  .kwh-badge {
    display: inline-block;
    margin-top: 8px;
    background: rgba(255,200,0,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    color: #FFD700;
  }
  .devices-list { }
  .device-row {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .device-name { font-size: 0.9rem; color: #ccc; }
  .device-watts { font-size: 1.1rem; font-weight: 600; color: #FFD700; }
  .loading { text-align: center; color: #666; padding: 40px; }
</style>
</head>
<body>
<div class="widget">
  <div id="content" class="loading">⚡ Loading…</div>
</div>
<script>
const base = window.location.origin;

async function load() {
  try {
    const [cur, today] = await Promise.all([
      fetch(`${base}/energy/current`).then(r => r.json()),
      fetch(`${base}/energy/today`).then(r => r.json()),
    ]);

    const power = cur.power || {};
    const deviceRows = Object.entries(power)
      .sort(([,a],[,b]) => b - a)
      .map(([id, w]) => `
        <div class="device-row">
          <div class="device-name">${id}</div>
          <div>
            <span class="device-watts">${w.toFixed(0)} W</span>
            <div style="font-size:0.75rem;color:#888;">${((today.devices||{})[id]||0).toFixed(3)} kWh</div>
          </div>
        </div>
      `).join('');

    document.getElementById('content').innerHTML = `
      <div class="total-card">
        <div class="total-w">${(cur.total_w||0).toFixed(0)} W</div>
        <div class="total-label">Total current power</div>
        <span class="kwh-badge">Today: ${(today.total_kwh||0).toFixed(3)} kWh</span>
      </div>
      <div class="devices-list">${deviceRows || '<div style="text-align:center;color:#555;padding:20px;">No devices</div>'}</div>
    `;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="loading" style="color:#e06c75;">⚠️ ${e.message}</div>`;
  }
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
