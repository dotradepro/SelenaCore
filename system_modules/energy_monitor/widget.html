<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--tx2);
            line-height: 1;
        }

        .top .icon {
            font-size: 0.95rem;
            color: var(--am);
        }

        .top .active {
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .top .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gn, #22c55e);
            display: inline-block;
        }

        .top .dot.idle {
            background: var(--tx3, #6b7280);
        }

        .center {
            text-align: center;
            line-height: 1;
        }

        .watts {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--am);
            white-space: nowrap;
        }

        .watts .unit {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--tx2);
            margin-left: 2px;
        }

        .label {
            margin-top: 3px;
            font-size: 0.65rem;
            color: var(--tx3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bottom {
            text-align: center;
            font-size: 0.72rem;
            color: var(--tx2);
            line-height: 1;
        }

        .bottom .kwh {
            font-weight: 600;
            color: var(--tx);
        }

        .err {
            text-align: center;
            color: var(--rd, #ef4444);
            font-size: 0.75rem;
            padding: 8px;
        }
    </style>
</head>

<body>
    <div class="top">
        <span class="icon">⚡</span>
        <span class="active">
            <span class="dot" id="dot"></span>
            <span id="active">—</span>
        </span>
    </div>
    <div class="center">
        <div class="watts"><span id="watts">—</span><span class="unit">W</span></div>
        <div class="label" data-i18n="now"></div>
    </div>
    <div class="bottom">
        <span data-i18n="today"></span> <span class="kwh" id="kwh">—</span> kWh
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { now: 'now', today: 'today', err: 'error' },
            uk: { now: 'зараз', today: 'сьогодні', err: 'помилка' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                el.textContent = t(el.getAttribute('data-i18n'));
            });
        }
        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'lang_changed') {
                try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { }
                applyLang();
                refresh();
            }
        });

        var BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        function fmtWatts(w) {
            if (w == null || isNaN(w)) return '—';
            if (w >= 1000) return (w / 1000).toFixed(1) + 'k';
            if (w >= 100) return Math.round(w).toString();
            return w.toFixed(1);
        }

        function fmtKwh(k) {
            if (k == null || isNaN(k)) return '—';
            if (k >= 10) return k.toFixed(1);
            if (k >= 1) return k.toFixed(2);
            return k.toFixed(3);
        }

        async function refresh() {
            try {
                var r = await fetch(BASE + '/energy/status');
                if (!r.ok) throw new Error('HTTP ' + r.status);
                var d = await r.json();
                var total = d.devices || 0;
                var active = d.active_devices || 0;
                document.getElementById('watts').textContent = fmtWatts(d.total_power_w);
                document.getElementById('kwh').textContent = fmtKwh(d.total_today_kwh);
                document.getElementById('active').textContent = active + '/' + total;
                document.getElementById('dot').className = 'dot' + (active > 0 ? '' : ' idle');
            } catch (e) {
                document.getElementById('watts').textContent = '—';
                document.getElementById('kwh').textContent = '—';
                document.getElementById('active').textContent = '—';
            }
        }

        applyLang();
        refresh();
        setInterval(refresh, 5000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
