<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor Settings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            padding: 24px;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            color: #fff;
        }

        .section {
            background: #1a1d27;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 1rem;
            color: #aaa;
            margin-bottom: 16px;
        }

        #status-pre {
            background: #111;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            color: #aaa;
            white-space: pre-wrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th,
        td {
            border: 1px solid #2a2a3a;
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background: #1a1d27;
            color: #aaa;
        }
    </style>
</head>

<body>
    <h1>⚡ Energy Monitor Settings</h1>

    <div class="section">
        <h2>Status</h2>
        <pre id="status-pre">Loading…</pre>
    </div>

    <div class="section">
        <h2>All Devices</h2>
        <table id="devices-table">
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Current (W)</th>
                    <th>Today (kWh)</th>
                </tr>
            </thead>
            <tbody id="devices-body">
                <tr>
                    <td colspan="3" style="text-align:center;color:#555">Loading…</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        async function load() {
            try {
                const [status, cur, today] = await Promise.all([
                    fetch(`${base}/energy/status`).then(r => r.json()),
                    fetch(`${base}/energy/current`).then(r => r.json()),
                    fetch(`${base}/energy/today`).then(r => r.json()),
                ]);

                document.getElementById('status-pre').textContent = JSON.stringify(status, null, 2);

                const power = cur.power || {};
                const kwh = today.devices || {};
                const ids = Object.keys(power);

                if (!ids.length) {
                    document.getElementById('devices-body').innerHTML =
                        '<tr><td colspan="3" style="text-align:center;color:#555">No readings yet</td></tr>';
                } else {
                    document.getElementById('devices-body').innerHTML = ids
                        .sort()
                        .map(id => `<tr>
          <td>${id}</td>
          <td>${power[id]?.toFixed(1) ?? '—'} W</td>
          <td>${(kwh[id] || 0).toFixed(4)} kWh</td>
        </tr>`).join('');
                }
            } catch (e) {
                document.getElementById('status-pre').textContent = 'Error: ' + e.message;
            }
        }

        load();
        setInterval(load, 30000);
    </script>
</body>

</html>
