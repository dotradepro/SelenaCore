<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 24px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 24px;
            color: var(--tx);
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 1rem;
            color: var(--tx2);
            margin-bottom: 16px;
        }

        #status-pre {
            background: var(--sf2);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            color: var(--tx2);
            white-space: pre-wrap;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th,
        td {
            border: 1px solid var(--b2);
            padding: 8px 10px;
            text-align: left;
        }

        th {
            background: var(--sf);
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <div class="section">
        <h2 data-i18n="status"></h2>
        <pre id="status-pre" data-i18n="loading"></pre>
    </div>

    <div class="section">
        <h2 data-i18n="all_devices"></h2>
        <table id="devices-table">
            <thead>
                <tr>
                    <th data-i18n="device_id"></th>
                    <th data-i18n="current_w"></th>
                    <th data-i18n="today_kwh"></th>
                </tr>
            </thead>
            <tbody id="devices-body">
                <tr>
                    <td colspan="3" style="text-align:center;color:var(--tx3)" data-i18n="loading"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { title: '⚡ Energy Monitor Settings', status: 'Status', loading: 'Loading…', all_devices: 'All Devices', device_id: 'Device ID', current_w: 'Current (W)', today_kwh: 'Today (kWh)', no_readings: 'No readings yet', error_prefix: 'Error: ' },
            uk: { title: '⚡ Налаштування енергомонітору', status: 'Статус', loading: 'Завантаження…', all_devices: 'Усі пристрої', device_id: 'ID пристрою', current_w: 'Потужність (W)', today_kwh: 'Сьогодні (kWh)', no_readings: 'Даних ще немає', error_prefix: 'Помилка: ' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); load(); } });

        const base = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        async function load() {
            try {
                const [status, cur, today] = await Promise.all([
                    fetch(`${base}/energy/status`).then(r => r.json()),
                    fetch(`${base}/energy/current`).then(r => r.json()),
                    fetch(`${base}/energy/today`).then(r => r.json()),
                ]);

                document.getElementById('status-pre').textContent = JSON.stringify(status, null, 2);

                const power = cur.power || {};
                const kwh = today.devices || {};
                const ids = Object.keys(power);

                if (!ids.length) {
                    document.getElementById('devices-body').innerHTML =
                        '<tr><td colspan="3" style="text-align:center;color:var(--tx3)">' + t('no_readings') + '</td></tr>';
                } else {
                    document.getElementById('devices-body').innerHTML = ids
                        .sort()
                        .map(id => `<tr>
          <td>${id}</td>
          <td>${power[id]?.toFixed(1) ?? '—'} W</td>
          <td>${(kwh[id] || 0).toFixed(4)} kWh</td>
        </tr>`).join('');
                }
            } catch (e) {
                document.getElementById('status-pre').textContent = t('error_prefix') + e.message;
            }
        }

        applyLang();
        load();
        setInterval(load, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
