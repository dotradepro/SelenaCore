<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Monitor Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* Stat card extensions */
        .stat-card .val {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--am);
            line-height: 1.1;
        }

        .stat-card .val.ok {
            color: var(--gr);
        }

        .stat-card .val.err {
            color: var(--rd);
        }

        .stat-card .lbl {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 4px;
        }

        /* Form */
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .form-row label {
            font-size: 0.8rem;
            color: var(--tx2);
        }

        select option {
            background: var(--sf2);
            color: var(--tx);
        }

        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .msg {
            font-size: 0.82rem;
            margin-top: 8px;
            min-height: 18px;
        }

        .ok-msg {
            color: var(--gr);
        }

        .err-msg {
            color: var(--rd);
        }

        td.power {
            color: var(--am);
            font-weight: 600;
        }

        td.kwh {
            color: var(--ac);
        }

        /* Source cards */
        .source-card {
            background: var(--sf2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .source-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .source-dot.active {
            background: var(--gr);
        }

        .source-dot.inactive {
            background: var(--tx3);
        }

        .source-dot.no-data {
            background: var(--am);
        }

        .source-info {
            flex: 1;
            min-width: 0;
        }

        .source-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .source-meta {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .source-type {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: var(--sf3);
            color: var(--tx2);
        }

        .source-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .dyn-fields {
            display: none;
        }

        .dyn-fields.visible {
            display: block;
        }

        .hint {
            font-size: 0.72rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .filter-row input,
        .filter-row select {
            flex: 1;
            min-width: 130px;
            padding: 6px 9px;
            background: var(--sf3);
            border: 1px solid var(--b);
            border-radius: 6px;
            color: var(--tx);
            font-size: 0.8rem;
            font-family: inherit;
        }
        table.unified th {
            cursor: pointer;
            user-select: none;
        }
        table.unified th:hover {
            color: var(--ac);
        }
        table.unified th.sort-asc::after { content: ' \u25B2'; opacity: .7; }
        table.unified th.sort-desc::after { content: ' \u25BC'; opacity: .7; }
        .pill {
            display: inline-block;
            padding: 1px 7px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .pill.on { background: rgba(34,197,94,.18); color: var(--gn,#22c55e); }
        .pill.off { background: rgba(239,68,68,.18); color: var(--rd); }
        .pill.unknown { background: rgba(154,161,177,.15); color: var(--tx3); }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <!-- Overview -->
    <div class="section">
        <h2 data-i18n="h_overview"></h2>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="val" id="s-status">&mdash;</div>
                <div class="lbl" data-i18n="lbl_status"></div>
            </div>
            <div class="stat-card">
                <div class="val" id="s-devices">&mdash;</div>
                <div class="lbl" data-i18n="lbl_tracked"></div>
            </div>
            <div class="stat-card">
                <div class="val" id="s-power">&mdash;</div>
                <div class="lbl" data-i18n="lbl_total_w"></div>
            </div>
            <div class="stat-card">
                <div class="val" id="s-kwh">&mdash;</div>
                <div class="lbl" data-i18n="lbl_kwh_today"></div>
            </div>
        </div>
        <div class="btn-row">
            <button class="btn btn-sec btn-sm" id="btn-refresh" data-i18n="refresh"></button>
        </div>
    </div>

    <!-- Unified device table with filters and sorting -->
    <div class="section">
        <h2 data-i18n="h_devices_unified"></h2>
        <p style="color: var(--tx3); font-size: 0.78rem; margin: 0 0 10px 0" data-i18n="hint_auto_sources"></p>
        <div class="filter-row">
            <input type="text" id="filter-search" data-placeholder-i18n="ph_filter_search">
            <select id="filter-type">
                <option value="" data-i18n="filter_type_all">All types</option>
                <option value="light" data-i18n="filter_type_light">Lights</option>
                <option value="switch" data-i18n="filter_type_switch">Switches</option>
                <option value="outlet" data-i18n="filter_type_outlet">Outlets</option>
                <option value="air_conditioner" data-i18n="filter_type_ac">A/C</option>
                <option value="thermostat" data-i18n="filter_type_thermostat">Thermostats</option>
                <option value="sensor" data-i18n="filter_type_sensor">Sensors</option>
            </select>
            <select id="filter-room">
                <option value="" data-i18n="filter_room_all">All rooms</option>
            </select>
            <select id="filter-status">
                <option value="" data-i18n="filter_status_all">All status</option>
                <option value="on" data-i18n="filter_status_on">On</option>
                <option value="off" data-i18n="filter_status_off">Off</option>
            </select>
            <button class="btn btn-sec btn-sm" id="btn-refresh-full" data-i18n="refresh"></button>
        </div>
        <table class="unified">
            <thead>
                <tr>
                    <th data-sort="name" data-i18n="col_name"></th>
                    <th data-sort="location" data-i18n="col_room"></th>
                    <th data-sort="entity_type" data-i18n="col_type"></th>
                    <th data-sort="state" data-i18n="col_state"></th>
                    <th data-sort="watts" data-i18n="col_power"></th>
                    <th data-sort="kwh_today" data-i18n="col_kwh"></th>
                </tr>
            </thead>
            <tbody id="full-body">
                <tr><td colspan="6" style="text-align:center;color:var(--tx3)" data-i18n="loading"></td></tr>
            </tbody>
        </table>
    </div>

    <!-- Compact thresholds -->
    <div class="section">
        <h2 data-i18n="h_thresholds"></h2>
        <div class="form-row">
            <label data-i18n="lbl_alert_w"></label>
            <input type="number" id="alert-w" min="0" step="10" placeholder="500">
        </div>
        <div class="form-row">
            <label data-i18n="lbl_low_w"></label>
            <input type="number" id="low-w" min="0" step="1" placeholder="5">
        </div>
        <div class="form-row">
            <label data-i18n="lbl_report_min"></label>
            <input type="number" id="report-min" min="5" step="5" placeholder="60">
        </div>
        <button class="btn" id="btn-save-thr" data-i18n="save"></button>
        <div class="msg" id="thr-msg"></div>
    </div>

    <script src="/api/shared/widget-common.js"></script>

                saved_ok: '\u2713 \u0417\u0431\u0435\u0440\u0435\u0436\u0435\u043D\u043E', error_prefix: '\u041F\u043E\u043C\u0438\u043B\u043A\u0430: ',
                source_added: '\u2713 \u0414\u0436\u0435\u0440\u0435\u043B\u043E \u0434\u043E\u0434\u0430\u043D\u043E', source_deleted: '\u0414\u0436\u0435\u0440\u0435\u043B\u043E \u0432\u0438\u0434\u0430\u043B\u0435\u043D\u043E',
                src_active: '\u041E\u0442\u0440\u0438\u043C\u0443\u044E \u0434\u0430\u043D\u0456', src_no_data: '\u0414\u0430\u043D\u0438\u0445 \u0449\u0435 \u043D\u0435\u043C\u0430\u0454', src_disabled: '\u0412\u0438\u043C\u043A\u043D\u0435\u043D\u043E',
                last_reading: '\u041E\u0441\u0442\u0430\u043D\u043D\u0456\u0439 \u043F\u043E\u043A\u0430\u0437\u043D\u0438\u043A', never: '\u043D\u0456\u043A\u043E\u043B\u0438',
                confirm_delete_source: '\u0412\u0438\u0434\u0430\u043B\u0438\u0442\u0438 \u0446\u0435 \u0434\u0436\u0435\u0440\u0435\u043B\u043E \u0434\u0430\u043D\u0438\u0445?',
                err_name_required: '\u0412\u0432\u0435\u0434\u0456\u0442\u044C \u043D\u0430\u0437\u0432\u0443 \u0434\u0436\u0435\u0440\u0435\u043B\u0430',
                saving: '\u0417\u0431\u0435\u0440\u0435\u0436\u0435\u043D\u043D\u044F\u2026', deleted: '\u0412\u0438\u0434\u0430\u043B\u0435\u043D\u043E', error: '\u041F\u043E\u043C\u0438\u043B\u043A\u0430', loading_btn: '\u0417\u0430\u0432\u0430\u043D\u0442\u0430\u0436\u0435\u043D\u043D\u044F\u2026',
                toggled_on: '\u0414\u0436\u0435\u0440\u0435\u043B\u043E \u0443\u0432\u0456\u043C\u043A\u043D\u0435\u043D\u043E', toggled_off: '\u0414\u0436\u0435\u0440\u0435\u043B\u043E \u0432\u0438\u043C\u043A\u043D\u0435\u043D\u043E', adding: '\u0414\u043E\u0434\u0430\u0432\u0430\u043D\u043D\u044F\u2026',
                h_devices_unified: '\u041F\u0440\u0438\u0441\u0442\u0440\u043E\u0457',
                hint_auto_sources: '\u041F\u0440\u0438\u0441\u0442\u0440\u043E\u0457 \u0442\u0430 \u0457\u0445\u043D\u0456 \u0434\u0436\u0435\u0440\u0435\u043B\u0430 \u0435\u043D\u0435\u0440\u0433\u0456\u0457 \u043A\u0435\u0440\u0443\u044E\u0442\u044C\u0441\u044F \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u043D\u043E \u2014 \u043A\u043E\u0436\u0435\u043D \u043F\u0440\u0438\u0441\u0442\u0440\u0456\u0439, \u0434\u043E\u0434\u0430\u043D\u0438\u0439 \u0447\u0435\u0440\u0435\u0437 \u041A\u0435\u0440\u0443\u0432\u0430\u043D\u043D\u044F \u043F\u0440\u0438\u0441\u0442\u0440\u043E\u044F\u043C\u0438, \u0437\u2019\u044F\u0432\u043B\u044F\u0454\u0442\u044C\u0441\u044F \u0442\u0443\u0442 \u0441\u0430\u043C\u043E\u0441\u0442\u0456\u0439\u043D\u043E.',
                col_name: '\u041D\u0430\u0437\u0432\u0430', col_room: '\u041A\u0456\u043C\u043D\u0430\u0442\u0430', col_type: '\u0422\u0438\u043F', col_state: '\u0421\u0442\u0430\u043D', col_power: '\u041F\u043E\u0442\u0443\u0436\u043D\u0456\u0441\u0442\u044C (W)', col_kwh: '\u0421\u044C\u043E\u0433\u043E\u0434\u043D\u0456 (\u043A\u0412\u0442\u00B7\u0433\u043E\u0434)',
                ph_filter_search: '\u041F\u043E\u0448\u0443\u043A \u0437\u0430 \u043D\u0430\u0437\u0432\u043E\u044E\u2026',
                filter_type_all: '\u0423\u0441\u0456 \u0442\u0438\u043F\u0438', filter_type_light: '\uD83D\uDCA1 \u041B\u0430\u043C\u043F\u0438', filter_type_switch: '\u23FB \u0412\u0438\u043C\u0438\u043A\u0430\u0447\u0456', filter_type_outlet: '\uD83D\uDD0C \u0420\u043E\u0437\u0435\u0442\u043A\u0438', filter_type_ac: '\u2744 \u041A\u043E\u043D\u0434\u0438\u0446\u0456\u043E\u043D\u0435\u0440\u0438', filter_type_thermostat: '\uD83C\uDF21 \u0422\u0435\u0440\u043C\u043E\u0441\u0442\u0430\u0442\u0438', filter_type_sensor: '\uD83D\uDCD0 \u0421\u0435\u043D\u0441\u043E\u0440\u0438',
                filter_room_all: '\u0423\u0441\u0456 \u043A\u0456\u043C\u043D\u0430\u0442\u0438',
                filter_status_all: '\u0411\u0443\u0434\u044C-\u044F\u043A\u0438\u0439 \u0441\u0442\u0430\u043D', filter_status_on: '\u0423\u0432\u0456\u043C\u043A\u043D\u0435\u043D\u043E', filter_status_off: '\u0412\u0438\u043C\u043A\u043D\u0435\u043D\u043E',
            }
        };

        /* ── Source type toggle ──────────────────────────────────── */
        function onSourceTypeChange() {
            var v = $('src-type').value;
            ['device_registry', 'mqtt_topic', 'manual'].forEach(function (k) {
                var el = $('src-fields-' + k);
                if (el) el.className = 'dyn-fields' + (k === v ? ' visible' : '');
            });
        }

        /* ── Load registry devices for dropdown ─────────────────── */
        async function loadRegistryDevices() {
            try {
                var r = await fetch('/api/ui/devices', { headers: _apiHeaders() });
                if (!r.ok) return;
                var d = await r.json();
                var devices = d.devices || d || [];
                var sel = $('src-device-id');
                if (!sel) return;
                sel.innerHTML = '<option value="">\u2014 ' + t('lbl_device_id') + ' \u2014</option>';
                devices.forEach(function (dev) {
                    var id = dev.device_id || dev.id;
                    var name = dev.name || id;
                    var proto = dev.protocol ? ' (' + dev.protocol + ')' : '';
                    var opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = name + proto;
                    sel.appendChild(opt);
                });
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        /* ── Load sources list ──────────────────────────────────── */
        async function loadSources() {
            try {
                var d = await apiGet('/energy/sources');
                var sources = d.sources || [];
                var container = $('sources-list');
                if (!container) return;
                if (sources.length === 0) {
                    container.innerHTML = '<p style="color:var(--tx3);font-size:0.85rem">' + t('no_sources') + '</p>';
                    return;
                }
                container.innerHTML = sources.map(function (src) {
                    var hasData = !!src.last_reading_ts;
                    var dotClass = !src.enabled ? 'inactive' : (hasData ? 'active' : 'no-data');
                    var statusText = !src.enabled ? t('src_disabled') : (hasData ? t('src_active') : t('src_no_data'));
                    var typeLabels = { device_registry: t('type_device'), mqtt_topic: t('type_mqtt'), manual: t('type_manual') };
                    var configInfo = '';
                    if (src.type === 'device_registry') configInfo = src.config.device_id || '';
                    else if (src.type === 'mqtt_topic') configInfo = src.config.mqtt_topic || '';
                    else configInfo = src.config.device_id || '';
                    var lastTs = src.last_reading_ts ? new Date(src.last_reading_ts).toLocaleString() : t('never');
                    return '<div class="source-card">' +
                        '<div class="source-dot ' + dotClass + '"></div>' +
                        '<div class="source-info">' +
                        '<div class="source-name">' + esc(src.name) + '</div>' +
                        '<div class="source-meta">' +
                        '<span class="source-type">' + (typeLabels[src.type] || esc(src.type)) + '</span> ' +
                        (configInfo ? ' &nbsp;' + esc(configInfo) : '') +
                        '</div>' +
                        '<div class="source-meta">' + t('last_reading') + ': ' + esc(lastTs) + ' &nbsp; ' + esc(statusText) + '</div>' +
                        '</div>' +
                        '<div class="source-actions">' +
                        '<button class="btn btn-sm btn-sec" onclick="toggleSource(\'' + esc(src.id) + '\',' + !src.enabled + ')">' + (src.enabled ? '\u23F8' : '\u25B6') + '</button>' +
                        '<button class="btn btn-sm btn-danger" onclick="deleteSource(\'' + esc(src.id) + '\')">\u2715</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        async function addSource() {
            var name = $('src-name').value.trim();
            if (!name) { showSrcMsg(t('err_name_required'), true); return; }
            var addBtn = document.querySelector('[onclick="addSource()"]');
            if (!addBtn) return;
            var type = $('src-type').value;
            var config = {};

            if (type === 'device_registry') {
                config.device_id = $('src-device-id').value;
                if (!config.device_id) { showSrcMsg(t('err_name_required'), true); return; }
            } else if (type === 'mqtt_topic') {
                config.mqtt_topic = $('src-mqtt-topic').value.trim();
                config.state_key = $('src-mqtt-key').value.trim() || 'power';
                if (!config.mqtt_topic) { showSrcMsg(t('err_name_required'), true); return; }
            } else {
                config.device_id = $('src-manual-id').value.trim() || name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
            }

            withLoading(addBtn, async function () {
                var d = await apiPost('/energy/sources', { name: name, type: type, config: config });
                showSrcMsg(t('source_added'), false);
                $('src-name').value = '';
                loadSources();
            });
        }

        async function deleteSource(id) {
            if (!confirm(t('confirm_delete_source'))) return;
            try {
                await apiDelete('/energy/sources/' + id);
                showToast(t('deleted'));
                loadSources();
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        async function toggleSource(id, enabled) {
            try {
                await apiPatch('/energy/sources/' + id + '/toggle', { enabled: enabled });
                showToast(enabled ? t('toggled_on') : t('toggled_off'));
                loadSources();
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        function showSrcMsg(msg, isErr) {
            var el = $('src-msg');
            if (!el) return;
            el.textContent = msg;
            el.className = 'msg ' + (isErr ? 'err-msg' : 'ok-msg');
            setTimeout(function () { el.textContent = ''; }, 3000);
        }

        /* ── Load overview + devices ────────────────────────────── */
        async function load() {
            try {
                var results = await Promise.all([
                    apiGet('/energy/status').catch(function () { return {}; }),
                    apiGet('/energy/current').catch(function () { return {}; }),
                    apiGet('/energy/today').catch(function () { return {}; }),
                ]);
                var status = results[0], cur = results[1], today = results[2];

                // Overview cards
                var stEl = $('s-status');
                stEl.textContent = '\u2713 OK';
                stEl.className = 'val ok';
                $('s-devices').textContent = status.devices ?? Object.keys(cur).length;

                var totalW = 0;
                var power = cur;
                if (typeof power === 'object' && power !== null) {
                    Object.keys(power).forEach(function (k) { totalW += power[k] || 0; });
                }
                $('s-power').textContent = totalW.toFixed(1) + ' W';

                var totalKwh = today.total_kwh || 0;
                $('s-kwh').textContent = totalKwh.toFixed(3) + ' kWh';

                // Threshold inputs
                if (status.alert_threshold_w != null) $('alert-w').value = status.alert_threshold_w;
                if (status.low_power_threshold_w != null) $('low-w').value = status.low_power_threshold_w;
                if (status.report_interval_min != null) $('report-min').value = status.report_interval_min;

                // Device table
                var ids = typeof power === 'object' && power !== null ? Object.keys(power).sort() : [];
                var devBody = $('devices-body');
                if (devBody) {
                    devBody.innerHTML = ids.length ? ids.map(function (id) {
                        return '<tr><td>' + esc(id) + '</td><td class="power">' + (power[id] != null ? power[id].toFixed(1) : '\u2014') + ' W</td><td class="kwh">\u2014</td></tr>';
                    }).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--tx3)">' + t('no_readings') + '</td></tr>';
                }

            } catch (e) {
                var stEl2 = $('s-status');
                if (stEl2) {
                    stEl2.textContent = '\u2717';
                    stEl2.className = 'val err';
                }
            }
        }

        $('btn-refresh').addEventListener('click', function () {
            withLoading(this, load);
        });

        $('btn-save-thr').addEventListener('click', function () {
            var msg = $('thr-msg');
            withLoading(this, async function () {
                var body = {
                    alert_threshold_w: parseFloat($('alert-w').value) || null,
                    low_power_threshold_w: parseFloat($('low-w').value) || null,
                    report_interval_min: parseInt($('report-min').value) || null,
                };
                await apiPost('/energy/config', body);
                msg.textContent = t('saved_ok');
                msg.className = 'msg ok-msg';
                setTimeout(function () { msg.textContent = ''; }, 3000);
            });
        });

        /* ── Unified device table ─────────────────────────────────── */
        var FULL_ROWS = [];
        var SORT_KEY = 'location';
        var SORT_DIR = 1;

        async function loadFull() {
            try {
                var d = await apiGet('/energy/devices/full');
                FULL_ROWS = d.devices || [];
                _populateRoomFilter();
                _renderFull();
            } catch (e) { showToast(e.message || 'Error', 'error'); }
        }

        $('btn-refresh-full').addEventListener('click', function () {
            withLoading(this, loadFull);
        });

        function _populateRoomFilter() {
            var sel = $('filter-room');
            if (!sel) return;
            var current = sel.value;
            var rooms = {};
            FULL_ROWS.forEach(function (r) { if (r.location) rooms[r.location] = true; });
            sel.innerHTML = '<option value="">' + t('filter_room_all') + '</option>' +
                Object.keys(rooms).sort().map(function (r) { return '<option value="' + esc(r) + '">' + esc(r) + '</option>'; }).join('');
            sel.value = current;
        }

        function _renderFull() {
            var search = ($('filter-search').value || '').toLowerCase();
            var typeF = $('filter-type').value;
            var roomF = $('filter-room').value;
            var statusF = $('filter-status').value;

            var filtered = FULL_ROWS.filter(function (r) {
                if (search && r.name.toLowerCase().indexOf(search) === -1) return false;
                if (typeF && r.entity_type !== typeF) return false;
                if (roomF && r.location !== roomF) return false;
                if (statusF) {
                    var on = (r.state || {}).on === true;
                    if (statusF === 'on' && !on) return false;
                    if (statusF === 'off' && on) return false;
                }
                return true;
            });

            filtered.sort(function (a, b) {
                var av = a[SORT_KEY], bv = b[SORT_KEY];
                if (SORT_KEY === 'state') { av = (a.state || {}).on ? 1 : 0; bv = (b.state || {}).on ? 1 : 0; }
                if (av == null) av = '';
                if (bv == null) bv = '';
                if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * SORT_DIR;
                return String(av).localeCompare(String(bv)) * SORT_DIR;
            });

            var tb = $('full-body');
            if (filtered.length === 0) {
                tb.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--tx3)">\u2014</td></tr>';
                return;
            }
            tb.innerHTML = filtered.map(function (r) {
                var s = r.state || {};
                var onPill = s.on === true
                    ? '<span class="pill on">' + t('filter_status_on') + '</span>'
                    : (s.on === false
                        ? '<span class="pill off">' + t('filter_status_off') + '</span>'
                        : '<span class="pill unknown">?</span>');
                var watts = (r.watts != null) ? Math.round(r.watts).toString() : '\u2014';
                var kwh = (r.kwh_today != null) ? r.kwh_today.toFixed(3) : '\u2014';
                return '<tr>' +
                    '<td>' + esc(r.name) + '</td>' +
                    '<td>' + esc(r.location || '\u2014') + '</td>' +
                    '<td>' + esc(r.entity_type || '\u2014') + '</td>' +
                    '<td>' + onPill + '</td>' +
                    '<td>' + watts + '</td>' +
                    '<td>' + kwh + '</td>' +
                    '</tr>';
            }).join('');

            // Update sort indicators
            document.querySelectorAll('table.unified th').forEach(function (th) {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.getAttribute('data-sort') === SORT_KEY) {
                    th.classList.add(SORT_DIR > 0 ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        // Wire up filters and sortable headers
        function _wireFilterUI() {
            ['filter-search', 'filter-type', 'filter-room', 'filter-status'].forEach(function (id) {
                var el = $(id);
                if (el) el.addEventListener('input', _renderFull);
            });
            document.querySelectorAll('table.unified th[data-sort]').forEach(function (th) {
                th.addEventListener('click', function () {
                    var key = th.getAttribute('data-sort');
                    if (SORT_KEY === key) SORT_DIR = -SORT_DIR; else { SORT_KEY = key; SORT_DIR = 1; }
                    _renderFull();
                });
            });
        }

        applyLang();
        load();
        loadSources();
        loadRegistryDevices();
        _wireFilterUI();
        loadFull();
        setInterval(load, 30000);
        setInterval(loadSources, 30000);
        setInterval(loadFull, 15000);
    </script>
</body>

</html>
