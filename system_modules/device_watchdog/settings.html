<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Watchdog — Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        body {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 { font-size: 1.4rem; }

        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        #msg {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--gr);
            min-height: 20px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <h2 data-i18n="scan_settings"></h2>
    <div class="form-group">
        <label data-i18n="check_interval"></label>
        <input type="number" id="check_interval_sec" min="10" max="3600" style="width:100%" />
    </div>
    <div class="form-group">
        <label data-i18n="ping_timeout"></label>
        <input type="number" id="ping_timeout_sec" min="0.5" max="10" step="0.5" style="width:100%" />
    </div>
    <div class="form-group">
        <label data-i18n="mqtt_timeout"></label>
        <input type="number" id="mqtt_timeout_sec" min="30" style="width:100%" />
    </div>
    <div class="form-group">
        <label data-i18n="protocol_timeout"></label>
        <input type="number" id="protocol_timeout_sec" min="60" style="width:100%" />
    </div>
    <div class="form-group">
        <label data-i18n="offline_threshold"></label>
        <input type="number" id="offline_threshold" min="1" max="10" style="width:100%" />
    </div>
    <div class="form-group">
        <label><input type="checkbox" id="notify_on_offline" /> <span data-i18n="notify_offline"></span></label>
    </div>
    <button class="btn btn-primary" id="btnSave" data-i18n="save"></button>
    <button class="btn btn-secondary" id="btnScan" data-i18n="scan_now"></button>
    <div id="msg"></div>

    <script src="/api/shared/widget-common.js"></script>
    <script>
    // Module-specific i18n: strings live in system_modules/device_watchdog/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/device-watchdog. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/device-watchdog?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[device-watchdog] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

        async function loadConfig() {
            try {
                var d = await apiGet('/config');
                for (var k in d) {
                    var el = $(k);
                    if (!el) continue;
                    if (el.type === 'checkbox') el.checked = d[k];
                    else el.value = d[k];
                }
            } catch (e) {
                showToast(t('error') + ': ' + e.message, 'error');
            }
        }

        $('btnSave').addEventListener('click', function () {
            withLoading(this, async function () {
                var body = {};
                ['check_interval_sec', 'ping_timeout_sec', 'mqtt_timeout_sec', 'protocol_timeout_sec', 'offline_threshold'].forEach(function (k) {
                    body[k] = parseFloat($(k).value);
                });
                body.notify_on_offline = $('notify_on_offline').checked;
                await apiPost('/config', body);
                showToast(t('saved'));
            });
        });

        $('btnScan').addEventListener('click', function () {
            withLoading(this, async function () {
                var d = await apiPost('/scan');
                var msg = t('scan_done') + d.online + '/' + d.checked + t('online_suffix') + d.offline + t('offline_suffix');
                showToast(msg, 'info');
            });
        });

        loadI18n().then(function () {
            applyLang();
            loadConfig();
        });
    </script>
</body>

</html>
