<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Device Watchdog — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--tx);
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--tx2);
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input[type=number],
        input[type=checkbox] {
            padding: 7px 10px;
            background: var(--sf);
            border: 1px solid var(--b2);
            border-radius: 6px;
            color: var(--tx);
            width: 100%;
            box-sizing: border-box;
        }

        input[type=checkbox] {
            width: auto;
        }

        button {
            padding: 8px 18px;
            background: var(--ac);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 8px;
        }

        button.secondary {
            background: var(--b2);
        }

        #msg {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--gr);
            min-height: 20px;
        }
    </style>
</head>

<body>
    <h1>🔍 Device Watchdog</h1>

    <h2>Scan Settings</h2>
    <div class="form-group">
        <label>Check interval (seconds)</label>
        <input type="number" id="check_interval_sec" min="10" max="3600" />
    </div>
    <div class="form-group">
        <label>Ping timeout (seconds)</label>
        <input type="number" id="ping_timeout_sec" min="0.5" max="10" step="0.5" />
    </div>
    <div class="form-group">
        <label>MQTT offline threshold (seconds)</label>
        <input type="number" id="mqtt_timeout_sec" min="30" />
    </div>
    <div class="form-group">
        <label>Zigbee/Z-Wave offline threshold (seconds)</label>
        <input type="number" id="protocol_timeout_sec" min="60" />
    </div>
    <div class="form-group">
        <label>Consecutive failures before marking offline</label>
        <input type="number" id="offline_threshold" min="1" max="10" />
    </div>
    <div class="form-group">
        <label><input type="checkbox" id="notify_on_offline" /> Publish device.offline event</label>
    </div>
    <button onclick="saveConfig()">Save</button>
    <button class="secondary" onclick="scanNow()">Scan Now</button>
    <div id="msg"></div>

    <script>
        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function loadConfig() {
            const r = await fetch(BASE + '/config');
            const d = await r.json();
            for (const [k, v] of Object.entries(d)) {
                const el = document.getElementById(k);
                if (!el) continue;
                if (el.type === 'checkbox') el.checked = v;
                else el.value = v;
            }
        }

        async function saveConfig() {
            const body = {};
            ['check_interval_sec', 'ping_timeout_sec', 'mqtt_timeout_sec', 'protocol_timeout_sec', 'offline_threshold'].forEach(k => {
                body[k] = parseFloat(document.getElementById(k).value);
            });
            body.notify_on_offline = document.getElementById('notify_on_offline').checked;
            await fetch(BASE + '/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            document.getElementById('msg').textContent = '✓ Saved';
            setTimeout(() => document.getElementById('msg').textContent = '', 3000);
        }

        async function scanNow() {
            const r = await fetch(BASE + '/scan', { method: 'POST' });
            const d = await r.json();
            document.getElementById('msg').textContent = `Scan done: ${d.online}/${d.checked} online, ${d.offline} offline`;
        }

        loadConfig();
    </script>
    <script>(function(){try{var p=window.parent.document.documentElement;function s(){document.documentElement.classList.toggle("light",p.classList.contains("light"))}s();new MutationObserver(s).observe(p,{attributes:true,attributeFilter:["class"]});}catch(e){}})();</script>
</body>

</html>
