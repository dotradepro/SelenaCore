<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pulse {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .online {
            background: #14532d;
        }

        .warning {
            background: #713f12;
        }

        .count {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .label {
            font-size: 0.75rem;
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <div class="pulse" id="indicator">💓</div>
    <div class="count" id="count">—</div>
    <div class="label" data-i18n="online"></div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { online: 'online' },
            uk: { online: 'онлайн' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function refresh() {
            try {
                const r = await fetch(BASE + '/status');
                const d = await r.json();
                const ok = d.offline === 0;
                document.getElementById('indicator').className = 'pulse ' + (ok ? 'online' : 'warning');
                document.getElementById('count').textContent = d.online + '/' + d.total;
            } catch { }
        }
        refresh();
        applyLang();
        setInterval(refresh, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
