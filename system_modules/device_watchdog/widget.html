<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pulse {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .online {
            background: rgba(52,214,147,.15);
        }

        .warning {
            background: rgba(245,169,58,.15);
        }

        .count {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .label {
            font-size: 0.75rem;
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <div class="pulse" id="indicator">💓</div>
    <div class="count" id="count">—</div>
    <div class="label" data-i18n="online"></div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: { online: 'online' },
            uk: { online: 'онлайн' }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        async function refresh() {
            try {
                const r = await fetch(BASE + '/status');
                const d = await r.json();
                const ok = d.offline === 0;
                document.getElementById('indicator').className = 'pulse ' + (ok ? 'online' : 'warning');
                document.getElementById('count').textContent = d.online + '/' + d.total;
            } catch { }
        }
        refresh();
        applyLang();
        setInterval(refresh, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")); document.documentElement.classList.toggle("has-wallpaper", p.classList.contains("has-wallpaper")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
