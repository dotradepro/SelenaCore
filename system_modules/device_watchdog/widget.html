<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>
        /* Module-specific: centered tile layout + heartbeat icon with state colors. */
        body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .pulse-ico {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .pulse-ico.online  { background: rgba(52,214,147,.15); }
        .pulse-ico.warning { background: rgba(245,169,58,.15); }
    </style>
</head>

<body>
    <div class="pulse-ico" id="indicator">♥</div>
    <div class="kpi">
        <div class="kpi-val" id="count">—</div>
        <div class="kpi-lbl" data-i18n="online"></div>
    </div>
    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: { online: 'online' },
            uk: { online: 'онлайн' }
        };

        function refresh() {
            apiGet('/status')
                .then(function (d) {
                    var ok = d.offline === 0;
                    $('indicator').className = 'pulse-ico ' + (ok ? 'online' : 'warning');
                    $('count').textContent = d.online + '/' + d.total;
                })
                .catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        applyLang();
        refresh();
        setInterval(refresh, 30000);
    </script>
</body>

</html>
