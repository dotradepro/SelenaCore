<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <meta charset="UTF-8" />
    <style>
        body {
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pulse-ico {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .pulse-ico.online {
            background: rgba(52,214,147,.15);
        }

        .pulse-ico.warning {
            background: rgba(245,169,58,.15);
        }

        .count {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .label-bottom {
            font-size: 0.75rem;
            color: var(--tx2);
        }
    </style>
</head>

<body>
    <div class="pulse-ico" id="indicator">♥</div>
    <div class="count" id="count">—</div>
    <div class="label-bottom" data-i18n="online"></div>
    <script src="/api/shared/widget-common.js"></script>
    <script>
        var L = {
            en: { online: 'online' },
            uk: { online: 'онлайн' }
        };

        function refresh() {
            apiGet('/status')
                .then(function (d) {
                    var ok = d.offline === 0;
                    $('indicator').className = 'pulse-ico ' + (ok ? 'online' : 'warning');
                    $('count').textContent = d.online + '/' + d.total;
                })
                .catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        applyLang();
        refresh();
        setInterval(refresh, 30000);
    </script>
</body>

</html>
