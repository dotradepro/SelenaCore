<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
            width: 140px;
            text-align: center;
        }

        .pulse {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 8px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .online {
            background: #14532d;
        }

        .warning {
            background: #713f12;
        }

        .count {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .label {
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="pulse" id="indicator">💓</div>
    <div class="count" id="count">—</div>
    <div class="label">online</div>
    <script>
        async function refresh() {
            try {
                const r = await fetch('/status');
                const d = await r.json();
                const ok = d.offline === 0;
                document.getElementById('indicator').className = 'pulse ' + (ok ? 'online' : 'warning');
                document.getElementById('count').textContent = d.online + '/' + d.total;
            } catch { }
        }
        refresh();
        setInterval(refresh, 30000);
    </script>
</body>

</html>
