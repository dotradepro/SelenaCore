<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler — Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        body {
            font-family: system-ui, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--tx);
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 24px;
            color: var(--tx2);
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            padding: 8px 10px;
            background: var(--sf);
            border: 1px solid var(--b2);
            border-radius: 6px;
            color: var(--tx);
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        button {
            padding: 8px 18px;
            background: var(--ac);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover {
            background: var(--ac);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th,
        td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--sf);
        }

        th {
            color: var(--tx2);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            background: #1e3a5f;
            font-size: 0.78rem;
        }

        #msg {
            margin-top: 10px;
            font-size: 0.88rem;
            color: var(--gr);
            min-height: 20px;
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>

    <h2 data-i18n="h_loc_tz"></h2>
    <div class="form-group">
        <label data-i18n="lbl_lat"></label>
        <input type="number" id="lat" step="0.0001" min="-90" max="90" />
    </div>
    <div class="form-group">
        <label data-i18n="lbl_lon"></label>
        <input type="number" id="lon" step="0.0001" min="-180" max="180" />
    </div>
    <div class="form-group">
        <label data-i18n="lbl_tz"></label>
        <input type="text" id="tz" placeholder="Europe/Kyiv" />
    </div>
    <button onclick="saveConfig()" data-i18n="save"></button>
    <div id="msg"></div>

    <h2 data-i18n="h_jobs"></h2>
    <table id="jobs-table">
        <thead>
            <tr>
                <th data-i18n="col_jobid"></th>
                <th data-i18n="col_trigger"></th>
                <th data-i18n="col_owner"></th>
                <th data-i18n="col_next"></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
    </table>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: '⏱ Scheduler', h_loc_tz: 'Location & Timezone',
                lbl_lat: 'Latitude (° -90..90)', lbl_lon: 'Longitude (° -180..180)', lbl_tz: 'Timezone',
                save: 'Save', saved: '✓ Saved',
                h_jobs: 'Active Jobs', col_jobid: 'Job ID', col_trigger: 'Trigger', col_owner: 'Owner', col_next: 'Next Run',
                remove_confirm: 'Remove job '
            },
            uk: {
                title: '⏱ Планувальник', h_loc_tz: 'Місцезнаходження і часовий пояс',
                lbl_lat: 'Широта (° -90..90)', lbl_lon: 'Довгота (° -180..180)', lbl_tz: 'Часовий пояс',
                save: 'Зберегти', saved: '✓ Збережено',
                h_jobs: 'Активні завдання', col_jobid: 'Job ID', col_trigger: 'Trigger', col_owner: 'Власник', col_next: 'Наступний запуск',
                remove_confirm: 'Видалити завдання '
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadConfig(); loadJobs(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        async function loadConfig() {
            const r = await fetch(BASE + '/config');
            const d = await r.json();
            document.getElementById('lat').value = d.latitude ?? '';
            document.getElementById('lon').value = d.longitude ?? '';
            document.getElementById('tz').value = d.timezone ?? 'UTC';
        }

        async function saveConfig() {
            const body = {
                latitude: parseFloat(document.getElementById('lat').value) || null,
                longitude: parseFloat(document.getElementById('lon').value) || null,
                timezone: document.getElementById('tz').value || 'UTC',
            };
            await fetch(BASE + '/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
            document.getElementById('msg').textContent = t('saved');
            setTimeout(() => document.getElementById('msg').textContent = '', 3000);
        }

        async function loadJobs() {
            const r = await fetch(BASE + '/jobs');
            const d = await r.json();
            const tbody = document.getElementById('jobs-body');
            tbody.innerHTML = '';
            for (const j of (d.jobs || [])) {
                const row = document.createElement('tr');
                const next = j.next_run ? new Date(j.next_run).toLocaleString() : '—';
                row.innerHTML = `<td>${j.job_id}</td><td><span class="badge">${j.trigger}</span></td><td>${j.owner}</td><td>${next}</td><td><button onclick="removeJob('${j.job_id}')">✕</button></td>`;
                tbody.appendChild(row);
            }
        }

        async function removeJob(jobId) {
            if (!confirm(t('remove_confirm') + jobId + '?')) return;
            await fetch(BASE + '/jobs/' + encodeURIComponent(jobId), { method: 'DELETE' });
            loadJobs();
        }

        applyLang();
        loadConfig();
        loadJobs();
        setInterval(loadJobs, 30000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
