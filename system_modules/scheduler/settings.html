<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scheduler — Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        body {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        #msg {
            margin-top: 10px;
            font-size: 12px;
            color: var(--gr);
            min-height: 20px;
        }

        .btn-detect {
            padding: 6px 14px;
            background: var(--sf2);
            color: var(--ac);
            border: 1px solid var(--ac);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 10px;
            transition: background .2s;
        }
        .btn-detect:hover { background: var(--ac); color: var(--on-accent); }
        .btn-detect:disabled { opacity: 0.5; cursor: not-allowed; }

        .detect-msg { font-size: 12px; color: var(--tx2); min-height: 18px; margin-bottom: 6px; }
        .detect-msg.error { color: var(--rd); }

        .loc-info {
            font-size: 12px;
            color: var(--tx2);
            margin-bottom: 10px;
            padding: 8px 12px;
            background: var(--sf);
            border: 1px solid var(--b);
            border-radius: 8px;
            min-height: 20px;
        }
        .loc-info .coords { color: var(--tx3); font-size: 11px; }

        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: var(--tx2); margin-bottom: 4px; }
    </style>
</head>

<body>
    <h2 data-i18n="title"></h2>

    <div class="section-sub" data-i18n="h_loc_tz"></div>
    <input type="hidden" id="lat" />
    <input type="hidden" id="lon" />
    <div id="loc-info" class="loc-info"></div>
    <button class="btn-detect" id="btn-detect" data-i18n="detect"></button>
    <div id="detect-msg" class="detect-msg"></div>
    <div class="form-group">
        <label data-i18n="lbl_tz"></label>
        <input type="text" id="tz" placeholder="Europe/Kyiv" style="width:100%" />
    </div>
    <button class="btn btn-primary" id="btnSave" data-i18n="save"></button>
    <div id="msg"></div>

    <div class="section-title mt16" data-i18n="h_jobs"></div>
    <table id="jobs-table">
        <thead>
            <tr>
                <th data-i18n="col_jobid"></th>
                <th data-i18n="col_trigger"></th>
                <th data-i18n="col_owner"></th>
                <th data-i18n="col_next"></th>
                <th></th>
            </tr>
        </thead>
        <tbody id="jobs-body"></tbody>
    </table>

    <script src="/api/shared/widget-common.js"></script>
    <script>
    // Module-specific i18n: strings live in system_modules/scheduler/locales/
    // {en,uk,<lang>}.json, merged with core/i18n/common/<lang>.json and served
    // via /api/i18n/bundle/scheduler. widget-common.js provides t(), applyLang().
    var L = { en: {} };
    var _i18nLoaded = new Set();

    async function loadI18nBundle(lang) {
        if (_i18nLoaded.has(lang)) return;
        try {
            var r = await fetch('/api/i18n/bundle/scheduler?lang=' + encodeURIComponent(lang));
            if (!r.ok) throw new Error('HTTP ' + r.status);
            L[lang] = await r.json();
            _i18nLoaded.add(lang);
        } catch (e) {
            console.warn('[scheduler] i18n bundle load failed for', lang, e);
            L[lang] = L[lang] || {};
        }
    }

    async function loadI18n() {
        var targets = ['en'];
        if (LANG !== 'en') targets.push(LANG);
        await Promise.all(targets.map(loadI18nBundle));
    }

        function updateLocInfo() {
            var el = $('loc-info');
            var lat = $('lat').value;
            var lon = $('lon').value;
            if (lat && lon && lat !== '' && lon !== '') {
                el.innerHTML = t('loc_set') + ': <span class="coords">' + esc(lat) + ', ' + esc(lon) + '</span>';
            } else {
                el.textContent = t('loc_not_set');
            }
        }

        async function loadConfig() {
            try {
                var d = await apiGet('/config');
                $('lat').value = d.latitude ?? '';
                $('lon').value = d.longitude ?? '';
                $('tz').value = d.timezone ?? 'UTC';
                updateLocInfo();
            } catch (e) {
                showToast(t('error') + ': ' + e.message, 'error');
            }
        }

        $('btnSave').addEventListener('click', function () {
            withLoading(this, async function () {
                var body = {
                    latitude: parseFloat($('lat').value) || null,
                    longitude: parseFloat($('lon').value) || null,
                    timezone: $('tz').value || 'UTC',
                };
                await apiPost('/config', body);
                showToast(t('saved'));
            });
        });

        async function loadJobs() {
            try {
                var d = await apiGet('/jobs');
                var tbody = $('jobs-body');
                tbody.innerHTML = '';
                var jobs = d.jobs || [];
                for (var i = 0; i < jobs.length; i++) {
                    var j = jobs[i];
                    var row = document.createElement('tr');
                    var next = j.next_run ? new Date(j.next_run).toLocaleString() : '\u2014';
                    row.innerHTML = '<td>' + esc(j.job_id) + '</td><td><span class="badge badge-info">' + esc(j.trigger) + '</span></td><td>' + esc(j.owner) + '</td><td>' + esc(next) + '</td><td><button class="btn btn-danger btn-xs" data-job="' + esc(j.job_id) + '">\u2715</button></td>';
                    tbody.appendChild(row);
                }
                tbody.querySelectorAll('[data-job]').forEach(function (btn) {
                    btn.addEventListener('click', function () { removeJob(btn.getAttribute('data-job')); });
                });
            } catch (e) {
                showToast(t('error') + ': ' + e.message, 'error');
            }
        }

        async function removeJob(jobId) {
            if (!confirm(t('remove_confirm') + jobId + '?')) return;
            try {
                await apiDelete('/jobs/' + encodeURIComponent(jobId));
                showToast(t('removed_ok'));
            } catch (e) {
                showToast(t('error') + ': ' + e.message, 'error');
            }
            loadJobs();
        }

        function detectLocation() {
            var msgEl = $('detect-msg');
            var btn = $('btn-detect');
            msgEl.className = 'detect-msg';

            if (!navigator.geolocation) {
                msgEl.className = 'detect-msg error';
                msgEl.textContent = t('detect_err_nosupport');
                return;
            }

            btn.disabled = true;
            btn.textContent = t('detecting');
            msgEl.textContent = '';

            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    var lat = Math.round(pos.coords.latitude * 10000) / 10000;
                    var lon = Math.round(pos.coords.longitude * 10000) / 10000;
                    $('lat').value = lat;
                    $('lon').value = lon;

                    try {
                        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
                        if (tz) $('tz').value = tz;
                    } catch (e) { }

                    updateLocInfo();
                    msgEl.className = 'detect-msg';
                    msgEl.style.color = 'var(--gr)';
                    msgEl.textContent = t('detect_ok');
                    btn.disabled = false;
                    btn.textContent = t('detect');
                },
                function (err) {
                    msgEl.className = 'detect-msg error';
                    switch (err.code) {
                        case 1: msgEl.textContent = t('detect_err_denied'); break;
                        case 2: msgEl.textContent = t('detect_err_unavail'); break;
                        case 3: msgEl.textContent = t('detect_err_timeout'); break;
                        default: msgEl.textContent = t('detect_err_unknown'); break;
                    }
                    btn.disabled = false;
                    btn.textContent = t('detect');
                },
                { enableHighAccuracy: false, timeout: 15000, maximumAge: 300000 }
            );
        }

        $('btn-detect').addEventListener('click', detectLocation);

        loadI18n().then(function () {
            applyLang();
            loadConfig();
            loadJobs();
            setInterval(loadJobs, 30000);
        });
    </script>
</body>

</html>
