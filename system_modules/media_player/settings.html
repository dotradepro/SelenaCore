<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Player Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>

        body {
            width: 100%;
            min-height: 100%;
            background-image: linear-gradient(var(--b) 1px, transparent 1px),
                linear-gradient(90deg, var(--b) 1px, transparent 1px);
            background-size: 32px 32px;
            overflow-y: auto;
        }

        /* ── Tabs ── */
        .tabs-bar {
            display: flex;
            padding: 12px 16px 0;
            gap: 2px;
            border-bottom: 1px solid var(--b2);
            background: var(--sf);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab {
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 6px 6px 0 0;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--tx2);
            transition: color .15s, background .15s;
            pointer-events: auto;
            position: relative;
            z-index: 11;
        }

        .tab.active {
            color: var(--ac);
            background: var(--sf3);
        }

        .tab:hover:not(.active) {
            color: var(--tx);
            background: var(--sf2);
        }

        .pane {
            display: none;
            padding: 16px;
            flex-direction: column;
            gap: 14px;
        }

        .pane.active {
            display: flex;
        }

        /* ── Field ── */
        .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field label {
            font-size: 12px;
            color: var(--tx2);
        }

        input[type=range] {
            appearance: none;
            height: 4px;
            border-radius: 2px;
            background: var(--sf3);
            cursor: pointer;
            outline: none;
            flex: 1;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--ac);
        }

        /* Toggle */
        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
            cursor: pointer;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-track {
            position: absolute;
            inset: 0;
            border-radius: 10px;
            background: var(--sf3);
            transition: background .2s;
        }

        .toggle input:checked+.toggle-track {
            background: var(--ac);
        }

        .toggle-thumb {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--tx);
            transition: left .2s, background .2s;
        }

        .toggle input:checked~.toggle-thumb {
            left: 19px;
            background: #fff;
        }

        .toggle-label {
            font-size: 13px;
            color: var(--tx);
        }

        /* ── Station / result card (module-specific layout) ── */
        .card-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--sf3);
            flex-shrink: 0;
        }

        .card-meta {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-sub {
            font-size: 11px;
            color: var(--tx2);
        }

        .card-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Status chip */
        .chip {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .chip-ok {
            background: rgba(46, 201, 138, .18);
            color: var(--gr);
        }

        .chip-err {
            background: rgba(224, 84, 84, .18);
            color: var(--rd);
        }

        .chip-info {
            background: rgba(79, 140, 247, .18);
            color: var(--ac);
        }
    </style>
</head>

<body>

    <div class="tabs-bar" id="tabsBar">
        <button class="tab active" data-tab="playback" data-i18n="tab_playback">Playback</button>
        <button class="tab" data-tab="radio" data-i18n="tab_radio">Radio</button>
        <button class="tab" data-tab="usb" data-i18n="tab_usb">USB / Files</button>
        <button class="tab" data-tab="network" data-i18n="tab_network">Network</button>
        <button class="tab" data-tab="archive" data-i18n="tab_archive">Archive</button>
        <button class="tab" data-tab="covers" data-i18n="tab_covers">Covers &amp; Voice</button>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 1 — Playback
     ═════════════════════════════════════════════════════════ -->
    <div class="pane active" id="pane-playback">
        <div class="section-title" data-i18n="sec_audio_out">Audio output</div>
        <div class="field">
            <label data-i18n="lbl_output">Output device</label>
            <select id="selOutput">
                <option value="">—</option>
            </select>
        </div>

        <div class="section-title" data-i18n="sec_stream">Stream settings</div>
        <div class="field">
            <label data-i18n="lbl_buffer">Stream buffer (ms)</label>
            <select id="selBuffer">
                <option value="500">500 ms</option>
                <option value="1000" selected>1000 ms</option>
                <option value="2000">2000 ms</option>
            </select>
        </div>
        <div class="field">
            <div class="toggle-wrap">
                <label class="toggle">
                    <input type="checkbox" id="chkNormalize">
                    <div class="toggle-track"></div>
                    <div class="toggle-thumb"></div>
                </label>
                <span class="toggle-label" data-i18n="lbl_normalize">Normalize volume</span>
            </div>
        </div>
        <div class="field">
            <label><span data-i18n="lbl_def_vol">Default volume</span>: <span id="lblVolVal">70</span></label>
            <input type="range" id="rngDefVol" min="0" max="100" value="70"
                oninput="var l=document.getElementById('lblVolVal'); if(l) l.textContent=this.value">
        </div>
        <button class="btn btn-sm" id="btnSavePlayback" onclick="savePlaybackConfig()" data-i18n="btn_save">Save</button>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 2 — Radio
     ═════════════════════════════════════════════════════════ -->
    <div class="pane" id="pane-radio">
        <!-- Library stats -->
        <div class="section-title" data-i18n="sec_radio_library">Radio library</div>
        <div id="radioStats" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;"></div>

        <!-- Local search -->
        <div class="section-title" data-i18n="sec_radio_search">Search library</div>
        <div class="row">
            <input type="text" id="radioName" placeholder="Name" style="flex:2" oninput="applyRadioFilter()">
            <select id="radioGenre" style="flex:2" onchange="applyRadioFilter()">
                <option value="" data-i18n="opt_any_genre">Any genre</option>
            </select>
            <select id="radioCountry" style="flex:1.5" onchange="applyRadioFilter()">
                <option value="" data-i18n="opt_any_country">Any country</option>
            </select>
        </div>
        <div class="row">
            <select id="radioBitrate" style="flex:1" onchange="applyRadioFilter()">
                <option value="0" data-i18n="opt_any_bitrate">Any bitrate</option>
                <option value="128">128+ kbps</option>
                <option value="256">256+ kbps</option>
                <option value="320">320 kbps</option>
            </select>
            <select id="radioCodec" style="flex:1" onchange="applyRadioFilter()">
                <option value="" data-i18n="opt_any_codec">Any codec</option>
                <option value="MP3">MP3</option>
                <option value="AAC">AAC</option>
                <option value="OGG">OGG</option>
                <option value="FLAC">FLAC</option>
            </select>
            <span id="radioCount" style="flex:0 0 auto;align-self:center;font-size:12px;color:var(--tx3)"></span>
        </div>
        <div id="radioResults"></div>

        <!-- Favourites -->
        <div class="section-title" data-i18n="sec_fav_stations">Favourite stations</div>
        <div id="favStations"></div>

        <!-- Add manually -->
        <button class="btn btn-sm btn-outline" onclick="showSection('addStationForm')" data-i18n="btn_add_station">+ Add
            station</button>
        <div id="addStationForm" style="display:none;margin-top:8px">
            <div class="field">
                <label data-i18n="lbl_station_name">Station name</label>
                <input type="text" id="inpStationName">
            </div>
            <div class="field">
                <label data-i18n="lbl_stream_url">Stream URL</label>
                <input type="text" id="inpStationUrl">
            </div>
            <div class="row">
                <input type="text" id="inpStationGenre" placeholder="Genre" style="flex:1">
                <input type="text" id="inpStationCountry" placeholder="Country" style="flex:1">
            </div>
            <button class="btn btn-sm" id="btnAddStation" onclick="addStation()" data-i18n="btn_add">Add</button>
        </div>

        <!-- Import -->
        <div class="section-title" data-i18n="sec_radio_import">Import stations</div>
        <button class="btn btn-sm btn-outline" onclick="showSection('importM3UForm')" data-i18n="btn_import_m3u">&#8593;
            Import M3U8</button>
        <div id="importM3UForm" style="display:none;margin-top:8px">
            <div class="field">
                <label data-i18n="lbl_paste_m3u">Paste M3U8 content</label>
                <textarea id="inpM3UContent" rows="5"
                    style="width:100%;font-size:11px;font-family:monospace;background:var(--bg2);color:var(--tx1);border:1px solid var(--sf3);border-radius:4px;padding:6px;box-sizing:border-box;resize:vertical;"></textarea>
            </div>
            <button class="btn btn-sm" id="btnDoImport" onclick="importM3U()" data-i18n="btn_do_import">Import</button>
            <span id="importM3UResult" style="margin-left:8px;font-size:12px;color:var(--tx3);"></span>
        </div>
        <button class="btn btn-sm btn-outline" style="margin-top:6px" onclick="showSection('importRBForm'); rbInit()"
            data-i18n="btn_import_rb">&#8595; Fetch from radio-browser.info</button>
        <div id="importRBForm" style="display:none;margin-top:8px">
            <div class="row" style="gap:6px;flex-wrap:wrap">
                <input type="text" id="inpRBName" placeholder="Station name" style="flex:2;min-width:100px"
                    oninput="if(_rb.timer)clearTimeout(_rb.timer);_rb.timer=setTimeout(function(){rbSearch(true);},380)">
                <select id="inpRBCountry" style="flex:1;min-width:90px" onchange="rbSearch(true)">
                    <option value="" data-i18n="opt_any_country">Any country</option>
                </select>
            </div>
            <div class="row" style="gap:6px;flex-wrap:wrap;margin-top:4px">
                <input type="text" id="inpRBTag" placeholder="Genre / tag" style="flex:2;min-width:80px"
                    oninput="if(_rb.timer)clearTimeout(_rb.timer);_rb.timer=setTimeout(function(){rbSearch(true);},380)">
                <select id="inpRBBitrate" style="flex:1" onchange="rbSearch(true)">
                    <option value="0" data-i18n="opt_any_bitrate">Any bitrate</option>
                    <option value="96">96+ kbps</option>
                    <option value="128">128+ kbps</option>
                    <option value="192">192+ kbps</option>
                    <option value="256">256+ kbps</option>
                    <option value="320">320 kbps</option>
                </select>
                <select id="inpRBCodecF" style="flex:1" onchange="rbSearch(true)">
                    <option value="" data-i18n="opt_any_codec">Any codec</option>
                    <option value="MP3">MP3</option>
                    <option value="AAC">AAC</option>
                    <option value="OGG">OGG</option>
                    <option value="FLAC">FLAC</option>
                </select>
            </div>
            <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
                <span id="rbCountLabel" style="font-size:12px;color:var(--tx3);flex:1"></span>
                <button id="btnRBImportAll" class="btn btn-sm btn-outline" style="display:none" onclick="rbImportAll()"
                    data-i18n="btn_rb_import_all">Import all visible</button>
            </div>
            <div id="rbResults" style="margin-top:6px"></div>
            <div style="text-align:center;margin-top:4px">
                <button id="btnRBMore" class="btn btn-sm btn-outline" onclick="rbLoadMore()" style="display:none"
                    data-i18n="btn_rb_load_more">Load more</button>
            </div>
            <span id="importRBResult" style="display:block;margin-top:6px;font-size:12px;color:var(--tx3)"></span>
        </div>

        <!-- Export & clear -->
        <div class="row" style="margin-top:12px;gap:8px">
            <button class="btn btn-sm btn-outline" onclick="exportM3U()" data-i18n="btn_export_m3u">&#8595; Export
                M3U8</button>
            <button class="btn btn-sm btn-outline" style="color:var(--err,#f55)" onclick="clearLibrary()"
                data-i18n="btn_clear_library">&#128465; Clear library</button>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 3 — USB / Files
     ═════════════════════════════════════════════════════════ -->
    <div class="pane" id="pane-usb">
        <div class="section-title" data-i18n="sec_usb_settings">USB / SD settings</div>
        <div class="field">
            <div class="toggle-wrap">
                <label class="toggle">
                    <input type="checkbox" id="chkAutoScan" checked>
                    <div class="toggle-track"></div>
                    <div class="toggle-thumb"></div>
                </label>
                <span class="toggle-label" data-i18n="lbl_auto_scan">Auto-scan on USB connect</span>
            </div>
        </div>
        <div class="field">
            <label data-i18n="lbl_sort">Sort by</label>
            <select id="selSort">
                <option value="folder" data-i18n="opt_folder">Folder</option>
                <option value="artist" data-i18n="opt_artist">Artist</option>
                <option value="album" data-i18n="opt_album">Album</option>
                <option value="date" data-i18n="opt_date">Date modified</option>
            </select>
        </div>

        <div class="section-title" data-i18n="sec_mounted">Mounted devices</div>
        <div id="mountedDevices"><span style="color:var(--tx3);font-size:12px">—</span></div>

        <button class="btn btn-sm" id="btnScanUSB" onclick="scanUSB()" data-i18n="btn_scan_now">Scan now</button>
        <div id="usbResults" style="max-height:220px;overflow-y:auto;margin-top:4px;"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 4 — Network (SMB / NFS)
     ═════════════════════════════════════════════════════════ -->
    <div class="pane" id="pane-network">
        <div class="section-title" data-i18n="sec_shares">Network shares</div>
        <div id="sharesList"></div>
        <button class="btn btn-sm btn-outline" onclick="showAddShare()" data-i18n="btn_add_share">
            + Add share
        </button>
        <div id="addShareForm" style="display:none;margin-top:10px;">
            <div class="field">
                <label data-i18n="lbl_type">Type</label>
                <select id="shareType" onchange="toggleShareFields()">
                    <option value="smb">SMB / Samba</option>
                    <option value="nfs">NFS</option>
                </select>
            </div>
            <div class="field">
                <label data-i18n="lbl_host">Host / IP</label>
                <input type="text" id="shareHost" placeholder="192.168.1.100">
            </div>
            <div class="field" id="shareShareField">
                <label data-i18n="lbl_share">Share name</label>
                <input type="text" id="shareShare" placeholder="music">
            </div>
            <div class="field" id="shareExportField" style="display:none">
                <label data-i18n="lbl_export">NFS export path</label>
                <input type="text" id="shareExport" placeholder="/srv/music">
            </div>
            <div id="smbCreds">
                <div class="field">
                    <label data-i18n="lbl_username">Username</label>
                    <input type="text" id="shareUser" value="guest">
                </div>
                <div class="field">
                    <label data-i18n="lbl_password">Password</label>
                    <input type="password" id="sharePass">
                </div>
            </div>
            <button class="btn btn-sm" id="btnMount" onclick="mountShare()" data-i18n="btn_mount">Mount</button>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 5 — Internet Archive
     ═════════════════════════════════════════════════════════ -->
    <div class="pane" id="pane-archive">
        <div class="section-title" data-i18n="sec_archive_search">Search archive.org</div>
        <div class="row">
            <input type="text" id="archiveQuery" placeholder="jazz, classical, concert…" style="flex:3">
            <select id="archiveCollection" style="flex:1.5">
                <option value="" data-i18n="opt_all_coll">All collections</option>
                <option value="etree">etree (live)</option>
                <option value="librivox">LibriVox</option>
                <option value="georgeblood">78rpm HD</option>
                <option value="classical_music_library">Classical</option>
            </select>
            <button class="btn btn-sm" id="btnSearchArchive" onclick="searchArchive()" data-i18n="btn_search">Search</button>
        </div>
        <div id="archiveResults" style="max-height:300px;overflow-y:auto;margin-top:8px;"></div>

        <div class="section-title" data-i18n="sec_fav_archive">Saved items</div>
        <div id="favArchive"></div>
    </div>

    <!-- ══════════════════════════════════════════════════════════
     TAB 6 — Covers & Voice
     ═════════════════════════════════════════════════════════ -->
    <div class="pane" id="pane-covers">
        <div class="section-title">Last.fm API</div>
        <div class="field">
            <label data-i18n="lbl_lastfm_key">
                Last.fm API key
                (<a href="https://www.last.fm/api/account/create" target="_blank" rel="noopener"
                    style="color:var(--ac)">get free key</a>)
            </label>
            <div class="row">
                <input type="text" id="inpLastfmKey" placeholder="abc123…">
                <button class="btn btn-sm" id="btnVerifyLastfm" onclick="verifyLastfm()" data-i18n="btn_verify">Verify</button>
            </div>
            <span id="lastfmStatus"></span>
        </div>

        <div class="section-title" data-i18n="sec_cover_cache">Cover cache</div>
        <div class="row">
            <span style="font-size:13px;color:var(--tx2)" data-i18n="lbl_cache_size">Size:</span>
            <span id="cacheSize" style="font-size:13px">—</span>
            <button class="btn btn-sm btn-outline btn-danger" id="btnClearCache" onclick="clearCache()" data-i18n="btn_clear_cache">
                Clear cache
            </button>
        </div>

        <div class="section-title" data-i18n="sec_voice_cmds">Voice commands</div>
        <table>
            <thead>
                <tr>
                    <th data-i18n="th_phrase">Phrase</th>
                    <th data-i18n="th_action">Action</th>
                </tr>
            </thead>
            <tbody id="voiceCmdTable"></tbody>
        </table>

        <div class="section-title" data-i18n="sec_test_voice">Test voice command</div>
        <div class="row">
            <input type="text" id="inpTestVoice" placeholder="включи радио джаз" style="flex:1">
            <button class="btn btn-sm" id="btnTestVoice" onclick="testVoice()" data-i18n="btn_test">Test</button>
        </div>
        <div id="testVoiceResult" style="font-size:12px;color:var(--tx2);margin-top:6px;"></div>
    </div>

        function loadRadioFilters() {
            // Build genre/country selects from cached data (no extra API call if already loaded)

            _allStations.forEach(function (s) {

            var gCur = gSel.value; var cCur = cSel.value;
            gSel.innerHTML = '<option value="">' + t('opt_any_genre') + '</option>';

            cSel.innerHTML = '<option value="">' + t('opt_any_country') + '</option>';
            Object.keys(countries).sort().forEach(function (c) {
                var o = document.createElement('option'); o.value = c; o.textContent = c; cSel.appendChild(o);

        function applyRadioFilter() {
            var name = (document.getElementById('radioName').value || '').toLowerCase();
            var genre = (document.getElementById('radioGenre').value || '').toLowerCase();
            var country = (document.getElementById('radioCountry').value || '').toLowerCase();
            var minBr = parseInt(document.getElementById('radioBitrate').value) || 0;
            var codec = (document.getElementById('radioCodec').value || '').toLowerCase();

            var filtered = _allStations.filter(function (s) {
                if (name && s.name.toLowerCase().indexOf(name) === -1) return false;
                if (genre) {
                    var inGenre = (s.genre || '').toLowerCase().indexOf(genre) !== -1;
                    var inTags = (s.tags || []).some(function (tag) { return tag.toLowerCase().indexOf(genre) !== -1; });
                    if (!inGenre && !inTags) return false;
                }
                if (country && (s.country || '').toLowerCase().indexOf(country) === -1) return false;
                if (minBr > 0 && (s.bitrate || 0) < minBr) return false;
                if (codec && (s.codec || '').toLowerCase() !== codec) return false;
                return true;
            });

            var count = document.getElementById('radioCount');
            if (count) count.textContent = filtered.length + ' / ' + _allStations.length;

            var res = document.getElementById('radioResults');
            res.innerHTML = '';
            if (!filtered.length) {
                res.innerHTML = '<span style="color:var(--tx3);font-size:12px">' + t('no_results') + '</span>';
                return;
            }
            // Render max 100 at a time to keep DOM light
            filtered.slice(0, 100).forEach(function (s) { res.appendChild(makeStationCard(s)); });
            if (filtered.length > 100) {
                var more = document.createElement('div');
                more.style.cssText = 'text-align:center;padding:8px;';
                more.innerHTML = '<button class="btn btn-sm btn-outline" onclick="renderMore(this,' + JSON.stringify(filtered.length) + ')" data-offset="100" data-all=\'\'>+' + (filtered.length - 100) + ' more</button>';
                // Store filtered array in closure
                (function (arr, btn) {
                    btn.querySelector('button').onclick = function () {
                        var offset = parseInt(this.getAttribute('data-offset'));
                        arr.slice(offset, offset + 100).forEach(function (s) { res.insertBefore(makeStationCard(s), btn); });
                        var next = offset + 100;
                        if (next >= arr.length) { btn.remove(); }
                        else { this.setAttribute('data-offset', next); this.textContent = '+' + (arr.length - next) + ' more'; }
                    };
                })(filtered, more);
                res.appendChild(more);
            }
        }

        function makeStationCard(s) {

                '<div class="card-icon" style="background:var(--sf3);' + (logo ? 'display:none' : '') + '">&#128251;</div>' +
                '<div class="card-meta">' +
                '<div class="card-title">' + esc(s.name) + '</div>' +
                '<div class="card-sub">' +
                (s.country ? esc(s.country) + ' · ' : '') +
                (s.genre || (s.tags && s.tags[0]) || '') +
                (s.bitrate ? ' · ' + s.bitrate + ' kbps' : '') +
                (s.codec ? ' · ' + esc(s.codec) : '') +
                '</div></div>' +
                '<div class="card-actions">' +
                '<button class="btn btn-sm" title="Play">' + t('play') + '</button>' +
                '<button class="btn btn-sm btn-outline" title="Favourite" style="' + (s.favourite ? 'color:var(--acc)' : '') + '">&#9829;</button>' +
                '<button class="btn btn-sm btn-outline" title="Remove">&#10005;</button>' +
                '</div>';
            card.querySelectorAll('button')[0].onclick = function () {
                fetch(BASE + '/player/play', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: s.url, source_type: 'radio' }) });
            };
            card.querySelectorAll('button')[1].onclick = function (e) {
                apiPost('/sources/radio/favourite/' + s.id, {}).then(function (r) {
                    if (r) { e.target.style.color = r.favourite ? 'var(--acc)' : ''; loadFavourites(); loadRadioStats(); }
                }).catch(function (err) { showToast(err.message || 'Error', 'error'); });
            };
            card.querySelectorAll('button')[2].onclick = function () {
                fetch(BASE + '/sources/radio/station/' + s.id, { method: 'DELETE' }).then(function () {
                    card.remove(); loadRadioStats();
                }).catch(function (err) { showToast(err.message || 'Error', 'error'); });
            };
            return card;
        }

        var _rb = { offset: 0, limit: 20, loading: false, inited: false, stations: [], timer: null };

        function rbInit() {
            if (_rb.inited) return;

            // populate country dropdown

        function rbBuildUrl(offset) {
            var name = document.getElementById('inpRBName') ? document.getElementById('inpRBName').value.trim() : '';
            var tag = document.getElementById('inpRBTag') ? document.getElementById('inpRBTag').value.trim() : '';
            var cc = document.getElementById('inpRBCountry') ? document.getElementById('inpRBCountry').value : '';
            var br = document.getElementById('inpRBBitrate') ? document.getElementById('inpRBBitrate').value : '0';
            var codec = document.getElementById('inpRBCodecF') ? document.getElementById('inpRBCodecF').value : '';
            var q = '/sources/radio-browser/search?limit=' + _rb.limit + '&offset=' + offset;
            if (name) q += '&name=' + encodeURIComponent(name);
            if (tag) q += '&tag=' + encodeURIComponent(tag);
            if (cc) q += '&countrycode=' + encodeURIComponent(cc);
            if (br && br !== '0') q += '&min_bitrate=' + br;
            if (codec) q += '&codec=' + encodeURIComponent(codec);
            return q;
        }

        function rbSearch(reset) {
            if (_rb.loading) return;
            if (reset) {
                _rb.offset = 0;
                _rb.stations = [];
                var container = document.getElementById('rbResults');
                if (container) container.innerHTML = '';
                var btnMore = document.getElementById('btnRBMore');
                if (btnMore) btnMore.style.display = 'none';
                var btnAll = document.getElementById('btnRBImportAll');
                if (btnAll) btnAll.style.display = 'none';
            }
            _rb.loading = true;
            var lbl = document.getElementById('rbCountLabel');
            if (lbl) lbl.textContent = t('fetching') + '\u2026';
            apiGet(rbBuildUrl(_rb.offset)).then(function (r) {
                _rb.loading = false;
                if (!r || !r.items) {
                    if (lbl) lbl.textContent = t('no_results');
                    return;
                }
                r.items.forEach(function (s) { _rb.stations.push(s); });
                _rb.offset = _rb.offset + r.items.length;
                if (lbl) lbl.textContent = _rb.stations.length + ' ' + t('rb_loaded');
                var cont = document.getElementById('rbResults');
                if (cont) r.items.forEach(function (s) { cont.appendChild(makeRBCard(s)); });
                var hasMore = r.items.length >= _rb.limit;
                var bMore = document.getElementById('btnRBMore');
                if (bMore) bMore.style.display = hasMore ? '' : 'none';
                var bAll = document.getElementById('btnRBImportAll');
                if (bAll) bAll.style.display = _rb.stations.length > 0 ? '' : 'none';
            }).catch(function () {
                // Silent: radio-browser.info fetch may fail due to network; label serves as feedback
                _rb.loading = false;
                if (lbl) lbl.textContent = t('no_results');
            });
        }

                    return;
                }
                el.innerHTML = '';
                devs.forEach(function (d) {
                    var span = document.createElement('span');
                    span.className = 'chip chip-ok'; span.style.marginRight = '6px';
                    span.textContent = d.mountpoint;
                    el.appendChild(span);
                });
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function scanUSB() {
            var el = document.getElementById('usbResults');
            var btn = document.getElementById('btnScanUSB');
            el.innerHTML = '<span style="color:var(--tx3);font-size:12px">' + t('scan_running') + '</span>';
            withLoading(btn, function () {
                return apiGet('/sources/usb/scan').then(function (tracks) {
                    if (!tracks || !tracks.length) {
                        el.innerHTML = '<span style="color:var(--tx3);font-size:12px">' + t('no_results') + '</span>';
                        showToast(t('scan_done') + ': 0');
                        return;
                    }
                    el.innerHTML = '';
                    tracks.slice(0, 50).forEach(function (tr) {
                        var card = document.createElement('div');
                        card.className = 'card'; card.style.marginBottom = '4px';
                        card.innerHTML =
                            '<div class="card-meta">' +
                            '<div class="card-title">' + esc(tr.title || tr.name) + '</div>' +
                            '<div class="card-sub">' + esc(tr.artist) + (tr.album ? ' · ' + esc(tr.album) : '') + (tr.duration_sec ? ' · ' + fmtTime(tr.duration_sec) : '') + '</div>' +
                            '</div>' +
                            '<button class="btn btn-sm">' + t('play') + '</button>';
                        card.querySelector('button').onclick = function () {
                            fetch(BASE + '/player/play', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: tr.path, source_type: 'usb' }) });
                        };
                        el.appendChild(card);
                    });
                    if (tracks.length > 50) el.innerHTML += '<div style="color:var(--tx3);font-size:11px;padding:4px">+' + (tracks.length - 50) + ' more</div>';
                    showToast(t('scan_done') + ': ' + tracks.length);
                });
            });
        }

        // ── Tab 4: Network ────────────────────────────────────────────────────────────
        function showAddShare() {
            var f = document.getElementById('addShareForm');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        function toggleShareFields() {
            var isSMB = document.getElementById('shareType').value === 'smb';
            document.getElementById('shareShareField').style.display = isSMB ? '' : 'none';
            document.getElementById('shareExportField').style.display = isSMB ? 'none' : '';
            document.getElementById('smbCreds').style.display = isSMB ? '' : 'none';
        }

        function mountShare() {
            var type = document.getElementById('shareType').value;
            var btn = document.getElementById('btnMount');
            withLoading(btn, function () {
                var p;
                if (type === 'smb') {
                    p = apiPost('/sources/smb/mount', {
                        host: document.getElementById('shareHost').value,
                        share: document.getElementById('shareShare').value,
                        username: document.getElementById('shareUser').value,
                        password: document.getElementById('sharePass').value,
                    });
                } else {
                    p = apiPost('/sources/nfs/mount', {
                        host: document.getElementById('shareHost').value,
                        export: document.getElementById('shareExport').value,
                    });
                }
                return p.then(function (d) {
                    if (d && d.ok) {
                        showToast(t('mounted_ok') + ': ' + d.mount_point);
                        document.getElementById('addShareForm').style.display = 'none';
                        loadMountedDevices();
                    } else {
                        showToast(t('mount_err') + (d && d.detail ? ': ' + d.detail : ''), 'error');
                    }
                });
            });
        }

        // ── Tab 5: Archive ────────────────────────────────────────────────────────────
        function searchArchive() {
            var el = document.getElementById('archiveResults');
            var btn = document.getElementById('btnSearchArchive');
            el.innerHTML = '<span style="color:var(--tx3);font-size:12px">' + t('searching') + '</span>';
            withLoading(btn, function () {
                var q = document.getElementById('archiveQuery').value;
                var col = document.getElementById('archiveCollection').value;
                return apiGet('/sources/archive/search?q=' + encodeURIComponent(q) + '&collection=' + encodeURIComponent(col) + '&rows=10').then(function (items) {
                    if (!items || !items.length) {
                        el.innerHTML = '<span style="color:var(--tx3);font-size:12px">' + t('no_results') + '</span>';
                        return;
                    }
                    el.innerHTML = '';
                    items.forEach(function (item) {
                        var card = document.createElement('div');
                        card.className = 'card'; card.style.marginBottom = '6px';
                        card.innerHTML =
                            '<img class="card-icon" src="' + esc(item.cover_url) + '" onerror="this.style.display=\'none\'">' +
                            '<div class="card-meta">' +
                            '<div class="card-title">' + esc(item.title) + '</div>' +
                            '<div class="card-sub">' + esc(item.creator) + (item.year ? ' · ' + esc(item.year) : '') + (item.tracks ? ' · ' + item.tracks.length + ' tracks' : '') + '</div>' +
                            '</div>' +
                            '<div class="card-actions">' +
                            '<button class="btn btn-sm">' + t('play') + '</button>' +
                            '<a class="btn btn-sm btn-outline" href="' + esc(item.page_url) + '" target="_blank" rel="noopener">↗</a>' +
                            '</div>';
                        card.querySelector('button').onclick = function () {
                            if (item.first_track_url) {
                                fetch(BASE + '/player/play', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: item.first_track_url, source_type: 'archive' }) });
                            }
                        };
                        el.appendChild(card);
                    });
                });
            });
        }

        // ── Tab 6: Covers ─────────────────────────────────────────────────────────────
        function loadCoverConfig() {
            apiGet('/config').then(function (cfg) {
                if (!cfg) return;
                document.getElementById('inpLastfmKey').value = cfg.lastfm_api_key === '****' ? '' : (cfg.lastfm_api_key || '');
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
            apiGet('/covers/cache/info').then(function (d) {
                if (d) document.getElementById('cacheSize').textContent = (d.size_mb || 0).toFixed(2) + ' MB';
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function verifyLastfm() {
            var key = document.getElementById('inpLastfmKey').value.trim();
            if (!key) return;
            var btn = document.getElementById('btnVerifyLastfm');
            var st = document.getElementById('lastfmStatus');
            st.textContent = t('verifying');
            st.className = '';
            withLoading(btn, function () {
                return apiPost('/config', { lastfm_api_key: key }).then(function () {
                    return apiPost('/config/lastfm/verify');
                }).then(function (d) {
                    st.className = d && d.ok ? 'chip chip-ok' : 'chip chip-err';
                    st.textContent = d && d.ok ? t('key_ok') : t('key_err') + (d && d.error ? ' (' + d.error + ')' : '');
                    showToast(d && d.ok ? t('key_ok') : t('key_err'));
                });
            });
        }

        function clearCache() {
            var btn = document.getElementById('btnClearCache');
            withLoading(btn, function () {
                return apiPost('/covers/cache/clear').then(function (d) {
                    showToast(t('cache_cleared') + (d ? ' (' + d.cleared + ')' : ''));
                    document.getElementById('cacheSize').textContent = '0.00 MB';
                });
            });
        }

        function testVoice() {
            var txt = document.getElementById('inpTestVoice').value.trim();
            if (!txt) return;
            var btn = document.getElementById('btnTestVoice');
            var out = document.getElementById('testVoiceResult');
            out.textContent = t('testing');
            withLoading(btn, function () {
                var intents = [
                    [/\b(?:play|put on|turn on|start)\b/i, /radio/i, 'media.play_radio'],
                    [/\b(?:play|put on|turn on|start)\b/i, /rock|jazz|classic|ambient|lofi|pop|news/i, 'media.play_genre'],
                    [/\b(?:next|skip)\b/i, null, 'media.next'],
                    [/\b(?:previous|back)\b/i, null, 'media.previous'],
                    [/\bstop\b/i, null, 'media.stop'],
                    [/\bpause\b/i, null, 'media.pause'],
                    [/\b(?:resume|continue)\b/i, null, 'media.resume'],
                    [/\b(?:quieter|lower|softer)\b/i, null, 'media.volume_down'],
                    [/\b(?:louder|turn it up)\b/i, null, 'media.volume_up'],
                    [/\bvolume\s+\d+/i, null, 'media.volume_set'],
                    [/what.*playing/i, null, 'media.whats_playing'],
                    [/\bshuffle\b/i, null, 'media.shuffle_toggle'],
                ];
                var matched = null;
                for (var i = 0; i < intents.length; i++) {
                    var rule = intents[i];
                    if (rule[0].test(txt) && (!rule[1] || rule[1].test(txt))) { matched = rule[2]; break; }
                }
                out.textContent = matched ? '→ intent: ' + matched : '→ no match (will fall back to LLM)';
                return Promise.resolve();
            });
        }

        // ── Time formatting ───────────────────────────────────────────────────────────
        function fmtTime(sec) {
            sec = Math.floor(sec || 0);
            var m = Math.floor(sec / 60), s = sec % 60;
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ── Init ──────────────────────────────────────────────────────────────────────
        function load() {
            applyLang();
            loadOutputs();
            loadPlaybackConfig();
            loadRadioStats();
            loadRadioLibrary();
            loadFavourites();
            loadMountedDevices();
            loadCoverConfig();
            renderVoiceTable();
        }

        // Works whether script runs before or after DOMContentLoaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', load);
        } else {
            load();
        }
    </script>
</body>

</html>
