<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: transparent;
            color: var(--tx);
            font-size: 13px;
        }

        .widget {
            display: flex;
            gap: 12px;
            padding: 10px;
            height: 100%;
        }

        .panel {
            flex: 1;
            background: var(--b);
            border-radius: 8px;
            padding: 10px;
        }

        .panel h3 {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx2);
            margin-bottom: 8px;
        }

        .big {
            font-size: 32px;
            font-weight: 700;
            color: var(--gr);
        }

        .label {
            font-size: 11px;
            color: var(--tx3);
            margin-bottom: 10px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            border-bottom: 1px solid var(--b);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot.home {
            background: var(--gr);
        }

        .dot.away {
            background: var(--rd);
        }

        .dot.unknown {
            background: var(--tx2);
        }

        /* home but not detected in last arp-scan (Deep Sleep / leaving) */
        .dot.pending {
            background: var(--am);
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .user-name {
            font-size: 12px;
            color: var(--tx);
            flex: 1;
        }

        .user-state {
            font-size: 11px;
            color: var(--tx3);
        }

        .sub-warn {
            font-size: 10px;
            color: var(--am);
            margin-right: 4px;
        }
    </style>
</head>

<body>

    <div class="widget">
        <div class="panel">
            <h3 data-i18n="presence"></h3>
            <div class="big" id="home-count">—</div>
            <div class="label" data-i18n="users_home"></div>
            <div class="stat"><span data-i18n="away"></span><span id="away-count">—</span></div>
            <div class="stat"><span data-i18n="total_tracked"></span><span id="total-count">—</span></div>
        </div>
        <div class="panel">
            <h3 data-i18n="users_title"></h3>
            <div id="users-list">
                <div style="color:var(--tx3);font-size:11px" data-i18n="loading"></div>
            </div>
        </div>
    </div>
    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                presence: 'Presence', users_home: 'users home', away: 'Away', total_tracked: 'Total tracked', users_title: 'Users', loading: 'Loading…', no_users: 'No users tracked.',
                state_home: 'home', state_away: 'away', state_unknown: 'unknown', not_seen: 'not seen', away_in: 'away in'
            },
            uk: {
                presence: 'Присутність', users_home: 'вдома', away: 'Відсутні', total_tracked: 'Всього відстежується', users_title: 'Користувачі', loading: 'Завантаження…', no_users: 'Немає відстежуваних користувачів.',
                state_home: 'вдома', state_away: 'відсутній', state_unknown: 'невідомо', not_seen: 'не видно', away_in: 'відїде ч/з'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); refresh(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');

        async function refresh() {
            try {
                const [sr, ur] = await Promise.all([
                    fetch(BASE + "/status"),
                    fetch(BASE + "/users"),
                ]);
                if (sr.ok) {
                    const s = await sr.json();
                    document.getElementById("home-count").textContent = s.users_home ?? 0;
                    document.getElementById("away-count").textContent = s.users_away ?? 0;
                    document.getElementById("total-count").textContent = s.users_total ?? 0;
                }
                if (ur.ok) {
                    const d = await ur.json();
                    const list = document.getElementById("users-list");
                    const users = d.users ?? [];
                    if (users.length === 0) {
                        list.innerHTML = '<div style="color:var(--tx3);font-size:11px">' + t('no_users') + '</div>';
                    } else {
                        list.innerHTML = users.slice(0, 6).map(u => {
                            // Dot class: if detected=false but state=home → amber (Deep Sleep)
                            var dotClass = u.state;
                            if (u.state === 'home' && u.detected === false) dotClass = 'pending';
                            // Sub-label: show countdown or "not seen"
                            var subLabel = '';
                            if (u.state === 'home' && u.detected === false) {
                                subLabel = u.away_in_sec != null
                                    ? '<span class="sub-warn">' + t('away_in') + ' ' + u.away_in_sec + 's</span>'
                                    : '<span class="sub-warn">' + t('not_seen') + '</span>';
                            }
                            var stateLabel = t('state_' + u.state) || u.state;
                            return '<div class="user-item"><div class="dot ' + dotClass + '"></div><span class="user-name">' + u.name + '</span>' + subLabel + '<span class="user-state">' + stateLabel + '</span></div>';
                        }).join("");
                    }
                } else {
                    document.getElementById("users-list").innerHTML = '<div style="color:var(--rd);font-size:10px">users: ' + ur.status + ' ' + (await ur.text()).substring(0, 60) + '</div>';
                }
            } catch (err) {
                document.getElementById("users-list").innerHTML = '<div style="color:var(--rd);font-size:10px">ERR: ' + (err.message || 'fetch error') + '</div>';
            }
        }

        applyLang();
        refresh();
        setInterval(refresh, 15000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
