<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presence Detection Settings</title>
    <link rel="stylesheet" href="/api/shared/theme.css">
    <style>
        body {
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* Stat card overrides (4-col grid + module-specific val colors) */
        .stat-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        .stat-card .val {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .stat-card .val.green { color: var(--gr); }
        .stat-card .val.red   { color: var(--rd); }
        .stat-card .val.blue  { color: var(--ac); }
        .stat-card .val.amber { color: var(--am); }

        .stat-card .lbl {
            font-size: 0.72rem;
            color: var(--tx3);
            margin-top: 4px;
        }

        /* Buttons row */
        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Forms */
        .form-row {
            margin-bottom: 12px;
        }

        .form-row label {
            display: block;
            font-size: 0.8rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .form-row input,
        .form-row select {
            width: 100%;
            background: var(--sf2);
            border: 1px solid var(--b2);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--tx);
            font-size: 0.9rem;
            outline: none;
        }

        .form-row input:focus {
            border-color: var(--ac);
        }

        .msg {
            font-size: 0.82rem;
            margin-top: 8px;
            min-height: 18px;
        }

        .ok-msg { color: var(--gr); }
        .err-msg { color: var(--rd); }

        /* User cards */
        .user-card {
            background: var(--sf2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.home    { background: var(--gr); }
        .dot.away    { background: var(--rd); }
        .dot.unknown { background: var(--tx3); }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-meta {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .device-tag {
            display: inline-block;
            background: var(--sf3);
            border: 1px solid var(--b2);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.72rem;
            color: var(--tx2);
            margin: 2px 2px 0 0;
        }

        .user-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Discovered device rows */
        .disc-row {
            background: var(--sf2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }

        .disc-row:hover {
            border-color: var(--ac);
        }

        .disc-row.selected {
            border-color: var(--gr);
            background: rgba(46, 201, 138, 0.08);
        }

        .disc-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
            width: 32px;
            text-align: center;
        }

        .disc-info {
            flex: 1;
            min-width: 0;
        }

        .disc-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .disc-detail {
            font-size: 0.75rem;
            color: var(--tx3);
        }

        .disc-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--b2);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .disc-row.selected .disc-check {
            border-color: var(--gr);
            background: var(--gr);
        }

        .disc-row.selected .disc-check::after {
            content: '\2713';
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        .scan-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--b2);
            border-top: 2px solid var(--ac);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        .empty-msg {
            color: var(--tx3);
            font-size: 0.85rem;
            text-align: center;
            padding: 16px;
        }

        /* QR Modal overrides */
        .modal h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .modal .qr-box {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: inline-block;
            margin: 16px 0;
        }

        .modal .qr-box svg {
            width: 200px;
            height: 200px;
        }

        .modal .status-line {
            font-size: 0.85rem;
            color: var(--tx2);
            margin-top: 8px;
        }

        .modal .status-line.done {
            color: var(--gr);
            font-weight: 600;
        }

        .modal .close-btn {
            margin-top: 16px;
        }

        /* History */
        .history-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.78rem;
            color: var(--tx2);
        }

        .history-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .history-dot.home { background: var(--gr); }
        .history-dot.away { background: var(--rd); }

        .user-history {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--b);
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>

    <!-- Stats -->
    <div class="stat-grid">
        <div class="stat-card">
            <div class="val green" id="s-home">0</div>
            <div class="lbl" data-i18n="stat_home"></div>
        </div>
        <div class="stat-card">
            <div class="val red" id="s-away">0</div>
            <div class="lbl" data-i18n="stat_away"></div>
        </div>
        <div class="stat-card">
            <div class="val blue" id="s-total">0</div>
            <div class="lbl" data-i18n="stat_tracked"></div>
        </div>
        <div class="stat-card">
            <div class="val amber" id="s-interval">&mdash;</div>
            <div class="lbl" data-i18n="stat_interval"></div>
        </div>
    </div>

    <!-- Tracked users -->
    <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <h2 style="margin:0" data-i18n="tracked_users"></h2>
            <div class="btn-row">
                <button class="btn btn-primary btn-sm" id="btn-scan-now" onclick="triggerScan()" data-i18n="scan_now"></button>
                <button class="btn btn-sec btn-sm" onclick="loadUsers()">&#8635;</button>
            </div>
        </div>
        <div id="users-container">
            <p class="empty-msg" data-i18n="loading"></p>
        </div>
    </div>

    <!-- Add user — step 1: scan network -->
    <div class="section">
        <h2 data-i18n="h_add_user"></h2>
        <p style="font-size:0.85rem;color:var(--tx2);margin-bottom:14px" data-i18n="add_hint"></p>

        <div class="btn-row" style="margin-bottom:14px">
            <button class="btn btn-primary" onclick="scanNetwork()" id="btn-scan-net"
                data-i18n="btn_scan_network"></button>
            <button class="btn btn-sec" onclick="openQrInvite()" id="btn-qr-invite" data-i18n="btn_qr_invite"></button>
            <span id="scan-spinner" style="display:none"><span class="scan-spinner"></span></span>
        </div>

        <div id="discover-list" style="display:none">
            <div id="discover-container"></div>
            <div class="msg" id="disc-msg"></div>
        </div>

        <!-- After selecting device(s), fill in user name -->
        <div id="add-form" style="display:none;margin-top:16px;border-top:1px solid var(--b2);padding-top:16px">
            <div class="form-row">
                <label data-i18n="lbl_name"></label>
                <input id="f-name" data-placeholder-i18n="ph_name">
            </div>
            <div id="selected-devices-info" style="margin-bottom:12px"></div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btn-add-user" onclick="addUserFromSelection()" data-i18n="btn_add_user"></button>
                <span class="msg" id="add-msg"></span>
            </div>
        </div>

        <!-- Manual fallback -->
        <details style="margin-top:16px">
            <summary style="color:var(--tx3);font-size:0.82rem;cursor:pointer" data-i18n="manual_toggle"></summary>
            <div style="padding-top:12px">
                <div class="form-row">
                    <label data-i18n="lbl_uid"></label>
                    <input id="m-uid" placeholder="user-001">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_name_manual"></label>
                    <input id="m-name" placeholder="Alice">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_ip"></label>
                    <input id="m-ip" placeholder="192.168.1.101">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_mac"></label>
                    <input id="m-mac" placeholder="aa:bb:cc:dd:ee:ff">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_bt"></label>
                    <input id="m-bt" placeholder="AA:BB:CC:DD:EE:FF">
                </div>
                <button class="btn btn-sec" id="btn-add-manual" onclick="addUserManual()" data-i18n="btn_add_manual"></button>
                <span class="msg" id="add-msg-manual"></span>
            </div>
        </details>
    </div>

    <!-- Push Notifications Section -->
    <div class="section">
        <h2><span data-i18n="push_title"></span> · <span id="push-count">0</span> <span data-i18n="push_devices"></span>
        </h2>
        <div id="push-list"></div>
        <div style="margin-top:14px;background:var(--sf2);border-radius:8px;padding:12px">
            <div style="font-size:0.8rem;color:var(--tx2);margin-bottom:6px" data-i18n="push_vapid"></div>
            <div style="display:flex;align-items:center;gap:8px">
                <code id="push-vapid-key" style="font-size:0.75rem;color:var(--tx3);word-break:break-all;flex:1"></code>
                <button class="btn btn-sec btn-sm" id="push-copy-btn" onclick="copyVapid()"
                    data-i18n="push_copy"></button>
            </div>
            <div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:10px">
                <button class="btn btn-sec btn-sm" id="btn-reset-push" onclick="resetPush()" data-i18n="push_reset"></button>
                <span style="font-size:0.75rem;color:var(--tx3);margin-left:8px" data-i18n="push_reset_hint"></span>
            </div>
        </div>
    </div>

    <!-- QR Invite Modal -->
    <div id="qr-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeQrModal()">
        <div class="modal">
            <h3 data-i18n="qr_title"></h3>
            <div class="form-row" id="qr-name-row">
                <label data-i18n="qr_lbl_name"></label>
                <input id="qr-name" data-placeholder-i18n="ph_name">
            </div>
            <button class="btn btn-primary" id="qr-gen-btn" onclick="generateQrInvite()"
                data-i18n="qr_generate"></button>
            <div id="qr-result" style="display:none">
                <div class="qr-box" id="qr-svg-box"></div>
                <p class="status-line" id="qr-status" data-i18n="qr_waiting"></p>
            </div>
            <button class="btn btn-sec close-btn" onclick="closeQrModal()" data-i18n="qr_close"></button>
        </div>
    </div>

    <script src="/api/shared/widget-common.js"></script>

                err_name: '\u0412\u0432\u0435\u0434\u0456\u0442\u044C \u0456\u043C\u0027\u044F', err_required: 'User ID \u0442\u0430 \u0406\u043C\u0027\u044F \u043E\u0431\u043E\u0432\u0027\u044F\u0437\u043A\u043E\u0432\u0456',
                remove_confirm: '\u0412\u0438\u0434\u0430\u043B\u0438\u0442\u0438 \u0446\u044E \u043B\u044E\u0434\u0438\u043D\u0443?',
                last_seen: '\u041E\u0441\u0442\u0430\u043D\u043D\u0456\u0439 \u0440\u0430\u0437', never: '\u043D\u0456\u043A\u043E\u043B\u0438',
                home: '\u0432\u0434\u043E\u043C\u0430', away: '\u0432\u0456\u0434\u0441\u0443\u0442\u043D\u0456\u0439', unknown: '\u043D\u0435\u0432\u0456\u0434\u043E\u043C\u043E',
                qr_title: 'QR \u0437\u0430\u043F\u0440\u043E\u0448\u0435\u043D\u043D\u044F', qr_lbl_name: '\u0406\u043C\u0027\u044F \u043B\u044E\u0434\u0438\u043D\u0438',
                qr_generate: '\u0417\u0433\u0435\u043D\u0435\u0440\u0443\u0432\u0430\u0442\u0438 QR \u043A\u043E\u0434', qr_waiting: '\u041E\u0447\u0456\u043A\u0443\u0432\u0430\u043D\u043D\u044F \u0441\u043A\u0430\u043D\u0443\u0432\u0430\u043D\u043D\u044F\u2026',
                qr_done: '\u2713 \u041F\u0440\u0438\u0441\u0442\u0440\u0456\u0439 \u0437\u0430\u0440\u0435\u0454\u0441\u0442\u0440\u043E\u0432\u0430\u043D\u043E!', qr_expired: '\u0417\u0430\u043F\u0440\u043E\u0448\u0435\u043D\u043D\u044F \u043F\u0440\u043E\u0441\u0442\u0440\u043E\u0447\u0435\u043D\u0435',
                qr_close: '\u0417\u0430\u043A\u0440\u0438\u0442\u0438', qr_hint: '\u041F\u043E\u043A\u0430\u0436\u0456\u0442\u044C \u0446\u0435\u0439 QR \u043B\u044E\u0434\u0438\u043D\u0456. \u0412\u043E\u043D\u0430 \u0441\u043A\u0430\u043D\u0443\u0454 \u0439\u043E\u0433\u043E \u043A\u0430\u043C\u0435\u0440\u043E\u044E \u0442\u0435\u043B\u0435\u0444\u043E\u043D\u0443.',
                show_history: '\u0406\u0441\u0442\u043E\u0440\u0456\u044F',
                push_title: 'Push-\u0441\u043F\u043E\u0432\u0456\u0449\u0435\u043D\u043D\u044F', push_devices: '\u043F\u0440\u0438\u0441\u0442\u0440\u043E\u0457\u0432 \u043F\u0456\u0434\u043F\u0438\u0441\u0430\u043D\u043E',
                push_user: '\u041A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447', push_platform: '\u041F\u043B\u0430\u0442\u0444\u043E\u0440\u043C\u0430', push_date: '\u0414\u0430\u0442\u0430',
                push_test: '\u0422\u0435\u0441\u0442', push_no_subs: '\u041F\u043E\u043A\u0438 \u043D\u0435\u043C\u0430\u0454 push-\u043F\u0456\u0434\u043F\u0438\u0441\u043E\u043A.',
                push_vapid: 'VAPID Public Key', push_copy: '\u041A\u043E\u043F\u0456\u044E\u0432\u0430\u0442\u0438',
                push_copied: '\u0421\u043A\u043E\u043F\u0456\u0439\u043E\u0432\u0430\u043D\u043E!', push_sent: '\u0412\u0456\u0434\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u043E', push_failed: '\u041F\u043E\u043C\u0438\u043B\u043A\u0430',
                push_testing: '\u0412\u0456\u0434\u043F\u0440\u0430\u0432\u043A\u0430\u2026',
                push_reset: '\u0421\u043A\u0438\u043D\u0443\u0442\u0438 Push \u043A\u043B\u044E\u0447\u0456', push_reset_hint: '\u041F\u0435\u0440\u0435\u0433\u0435\u043D\u0435\u0440\u0443\u0432\u0430\u0442\u0438 VAPID \u043A\u043B\u044E\u0447\u0456 \u0442\u0430 \u0432\u0438\u0434\u0430\u043B\u0438\u0442\u0438 \u0432\u0441\u0456 \u043F\u0456\u0434\u043F\u0438\u0441\u043A\u0438. \u041A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u043F\u043E\u0432\u0438\u043D\u043D\u0456 \u043F\u0456\u0434\u043F\u0438\u0441\u0430\u0442\u0438\u0441\u044F \u0437\u0430\u043D\u043E\u0432\u043E.',
                push_reset_ok: '\u041A\u043B\u044E\u0447\u0456 \u043F\u0435\u0440\u0435\u0433\u0435\u043D\u0435\u0440\u043E\u0432\u0430\u043D\u043E. \u041A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u043F\u043E\u0432\u0438\u043D\u043D\u0456 \u043F\u0456\u0434\u043F\u0438\u0441\u0430\u0442\u0438\u0441\u044F \u0437\u0430\u043D\u043E\u0432\u043E \u0437 \u0442\u0435\u043B\u0435\u0444\u043E\u043D\u0456\u0432.',
                push_reset_confirm: '\u0426\u0435 \u0432\u0438\u0434\u0430\u043B\u0438\u0442\u044C \u0432\u0441\u0456 push-\u043F\u0456\u0434\u043F\u0438\u0441\u043A\u0438. \u041A\u043E\u0440\u0438\u0441\u0442\u0443\u0432\u0430\u0447\u0456 \u043F\u043E\u0432\u0438\u043D\u043D\u0456 \u0431\u0443\u0434\u0443\u0442\u044C \u043F\u0456\u0434\u043F\u0438\u0441\u0430\u0442\u0438\u0441\u044F \u0437\u0430\u043D\u043E\u0432\u043E. \u041F\u0440\u043E\u0434\u043E\u0432\u0436\u0438\u0442\u0438?'
            }
        };

        var selectedDevices = [];
        var discoveredDevices = [];

        /* ── Status ──────────────────────────────────────────── */
        function loadStatus() {
            apiGet('/status').then(function (d) {
                $('s-home').textContent = d.users_home || 0;
                $('s-away').textContent = d.users_away || 0;
                $('s-total').textContent = d.users_total || 0;
                $('s-interval').textContent = d.scan_interval_sec || '\u2014';
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        /* ── User list ───────────────────────────────────────── */
        function loadUsers() {
            apiGet('/users').then(function (d) {
                var users = d.users || [];
                var container = $('users-container');
                if (users.length === 0) {
                    container.innerHTML = '<p class="empty-msg">' + esc(t('no_users')) + '</p>';
                    return;
                }
                container.innerHTML = users.map(function (u) {
                    var stateText = t(u.state) || u.state;
                    var lastSeen = u.last_seen ? new Date(u.last_seen).toLocaleString() : t('never');
                    var devTags = (u.devices || []).map(function (d) {
                        var icon = d.type === 'ip' ? '\uD83C\uDF10' : d.type === 'mac' ? '\uD83D\uDD17' : '\uD83D\uDCF6';
                        return '<span class="device-tag">' + icon + ' ' + esc(d.address) + '</span>';
                    }).join('');
                    return '<div class="user-card">' +
                        '<div class="dot ' + esc(u.state) + '"></div>' +
                        '<div class="user-info">' +
                        '<div class="user-name">' + esc(u.name) + ' <span style="color:var(--tx3);font-size:0.75rem">(' + esc(stateText) + ')</span></div>' +
                        '<div class="user-meta">' + esc(t('last_seen')) + ': ' + esc(lastSeen) + '</div>' +
                        '<div>' + devTags + '</div>' + '<div class="user-history" id="hist-' + esc(u.user_id) + '"></div>' +
                        '<a href="#" style="font-size:0.75rem;color:var(--ac);text-decoration:none" onclick="loadHistory(\'' + esc(u.user_id) + '\');return false">' + esc(t('show_history')) + '</a>' + '</div>' +
                        '<div class="user-actions">' +
                        '<button class="btn btn-danger btn-sm" onclick="removeUser(\'' + esc(u.user_id) + '\')">&#10005;</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function removeUser(id) {
            if (!confirm(t('remove_confirm'))) return;
            apiDelete('/users/' + id).then(function () {
                loadUsers(); loadStatus();
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function triggerScan() {
            var btn = $('btn-scan-now');
            withLoading(btn, function () {
                return apiPost('/scan').then(function () {
                    loadUsers(); loadStatus();
                });
            });
        }

        /* ── Network discovery ───────────────────────────────── */
        function scanNetwork() {
            var btn = $('btn-scan-net');
            $('scan-spinner').style.display = 'inline';
            $('discover-list').style.display = 'block';
            $('discover-container').innerHTML = '<p class="empty-msg">' + esc(t('scanning')) + '</p>';
            selectedDevices = [];
            $('add-form').style.display = 'none';

            withLoading(btn, function () {
                return apiGet('/discover?active=true').then(function (d) {
                    discoveredDevices = d.devices || [];
                    renderDiscovered();
                });
            }).catch(function (e) {
                $('discover-container').innerHTML = '<p class="empty-msg">' + esc(t('no_devices_found')) + '</p>';
                showToast(e.message || 'Error', 'error');
            }).finally(function () {
                $('scan-spinner').style.display = 'none';
            });
        }

        function renderDiscovered() {
            var container = $('discover-container');
            if (discoveredDevices.length === 0) {
                container.innerHTML = '<p class="empty-msg">' + esc(t('no_devices_found')) + '</p>';
                return;
            }
            container.innerHTML = '<p style="font-size:0.82rem;color:var(--tx2);margin-bottom:10px">' + esc(t('select_device')) + '</p>' +
                discoveredDevices.map(function (dev, idx) {
                    var isSelected = selectedDevices.some(function (s) { return s.mac === dev.mac; });
                    var displayName = dev.hostname || dev.manufacturer || dev.ip;
                    var icon = guessIcon(dev);
                    return '<div class="disc-row' + (isSelected ? ' selected' : '') + '" onclick="toggleDevice(' + idx + ')">' +
                        '<div class="disc-icon">' + icon + '</div>' +
                        '<div class="disc-info">' +
                        '<div class="disc-name">' + esc(displayName) + '</div>' +
                        '<div class="disc-detail">' + esc(dev.ip) + ' &nbsp; ' + esc(dev.mac) +
                        (dev.manufacturer ? ' &nbsp; ' + esc(dev.manufacturer) : '') + '</div>' +
                        '</div>' +
                        '<div class="disc-check"></div>' +
                        '</div>';
                }).join('');
        }

        function guessIcon(dev) {
            var combined = ((dev.hostname || '') + ' ' + (dev.manufacturer || '')).toLowerCase();
            if (/iphone|android|samsung|xiaomi|huawei|oneplus|pixel|galaxy|oppo|poco|realme/.test(combined)) return '\uD83D\uDCF1';
            if (/macbook|laptop|thinkpad|dell|lenovo|hp|asus|acer/.test(combined)) return '\uD83D\uDCBB';
            if (/imac|desktop|pc|workstation/.test(combined)) return '\uD83D\uDDA5';
            if (/ipad|tablet|tab/.test(combined)) return '\uD83D\uDCF1';
            if (/apple|airpods|watch/.test(combined)) return '\u231A';
            if (/sonos|speaker|echo|alexa|homepod/.test(combined)) return '\uD83D\uDD0A';
            if (/tv|chromecast|roku|firestick/.test(combined)) return '\uD83D\uDCFA';
            if (/printer|canon|epson|brother/.test(combined)) return '\uD83D\uDDA8';
            if (/router|gateway|mikrotik|ubiquiti|tp-link|asus/.test(combined)) return '\uD83C\uDF10';
            if (/raspb|pi/.test(combined)) return '\uD83E\uDDE0';
            if (/cam|reolink|hikvision|ring|arlo/.test(combined)) return '\uD83D\uDCF7';
            return '\uD83D\uDD0C';
        }

        function toggleDevice(idx) {
            var dev = discoveredDevices[idx];
            var existIdx = -1;
            for (var i = 0; i < selectedDevices.length; i++) {
                if (selectedDevices[i].mac === dev.mac) { existIdx = i; break; }
            }
            if (existIdx >= 0) {
                selectedDevices.splice(existIdx, 1);
            } else {
                selectedDevices.push(dev);
            }
            renderDiscovered();
            updateSelectedInfo();
        }

        function updateSelectedInfo() {
            var form = $('add-form');
            var info = $('selected-devices-info');
            if (selectedDevices.length === 0) {
                form.style.display = 'none';
                return;
            }
            form.style.display = 'block';
            info.innerHTML = '<div style="font-size:0.82rem;color:var(--tx2);margin-bottom:6px">' + esc(t('selected_prefix')) + '</div>' +
                selectedDevices.map(function (d) {
                    var name = d.hostname || d.manufacturer || d.ip;
                    return '<span class="device-tag">' + esc(name) + ' (' + esc(d.mac) + ')</span>';
                }).join(' ');

            // Auto-suggest name from hostname
            var nameInput = $('f-name');
            if (!nameInput.value && selectedDevices[0].hostname) {
                nameInput.value = selectedDevices[0].hostname;
            }
        }

        function addUserFromSelection() {
            var name = $('f-name').value.trim();
            if (!name) { showMsg('add-msg', t('err_name'), true); return; }
            if (selectedDevices.length === 0) { showMsg('add-msg', t('err_select'), true); return; }

            var userId = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'user-' + Date.now();
            var devices = selectedDevices.map(function (d) {
                return { type: 'mac', address: d.mac };
            });
            // Also add IP for the selected devices (faster initial detection)
            selectedDevices.forEach(function (d) {
                if (d.ip) devices.push({ type: 'ip', address: d.ip });
            });

            var btn = $('btn-add-user');
            withLoading(btn, function () {
                return apiPost('/users', { user_id: userId, name: name, devices: devices }).then(function () {
                    showMsg('add-msg', t('added'), false);
                    $('f-name').value = '';
                    selectedDevices = [];
                    $('add-form').style.display = 'none';
                    $('discover-list').style.display = 'none';
                    loadUsers(); loadStatus();
                });
            });
        }

        /* ── Manual add (advanced) ───────────────────────────── */
        function addUserManual() {
            var id = $('m-uid').value.trim();
            var name = $('m-name').value.trim();
            if (!id || !name) { showMsg('add-msg-manual', t('err_required'), true); return; }
            var devices = [];
            var ip = $('m-ip').value.trim();
            var mac = $('m-mac').value.trim();
            var bt = $('m-bt').value.trim();
            if (ip) devices.push({ type: 'ip', address: ip });
            if (mac) devices.push({ type: 'mac', address: mac });
            if (bt) devices.push({ type: 'bluetooth', address: bt });

            var btn = $('btn-add-manual');
            withLoading(btn, function () {
                return apiPost('/users', { user_id: id, name: name, devices: devices }).then(function () {
                    showMsg('add-msg-manual', t('added'), false);
                    $('m-uid').value = '';
                    $('m-name').value = '';
                    $('m-ip').value = '';
                    $('m-mac').value = '';
                    $('m-bt').value = '';
                    loadUsers(); loadStatus();
                });
            });
        }

        function showMsg(id, msg, isErr) {
            var el = $(id);
            el.textContent = msg;
            el.className = 'msg ' + (isErr ? 'err-msg' : 'ok-msg');
            setTimeout(function () { el.textContent = ''; }, 3000);
        }

        /* ── QR Invite ───────────────────────────────────────── */
        var currentInviteToken = null;
        var pollTimer = null;

        function openQrInvite() {
            $('qr-modal').style.display = 'flex';
            $('qr-name-row').style.display = 'block';
            $('qr-gen-btn').style.display = 'inline-block';
            $('qr-result').style.display = 'none';
            $('qr-name').value = '';
            currentInviteToken = null;
            applyLang();
        }

        function closeQrModal() {
            $('qr-modal').style.display = 'none';
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        function generateQrInvite() {
            var name = $('qr-name').value.trim();
            if (!name) return;
            var btn = $('qr-gen-btn');
            withLoading(btn, function () {
                return apiPost('/invite', { name: name, base_url: window.location.origin }).then(function (d) {
                    currentInviteToken = d.token;
                    // Show QR
                    $('qr-name-row').style.display = 'none';
                    $('qr-gen-btn').style.display = 'none';
                    $('qr-result').style.display = 'block';
                    $('qr-svg-box').innerHTML = d.qr_svg || '<p>QR unavailable</p>';
                    $('qr-status').textContent = t('qr_waiting');
                    $('qr-status').className = 'status-line';
                    // Start polling
                    pollTimer = setInterval(pollInviteStatus, 3000);
                });
            });
        }

        function pollInviteStatus() {
            if (!currentInviteToken) return;
            apiGet('/invite/' + currentInviteToken).then(function (d) {
                if (d.status === 'completed') {
                    $('qr-status').textContent = t('qr_done');
                    $('qr-status').className = 'status-line done';
                    clearInterval(pollTimer); pollTimer = null;
                    loadUsers(); loadStatus();
                } else if (d.status === 'expired') {
                    $('qr-status').textContent = t('qr_expired');
                    $('qr-status').className = 'status-line err-msg';
                    clearInterval(pollTimer); pollTimer = null;
                }
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        /* ── History per user ─────────────────────────────────── */
        function loadHistory(userId) {
            var container = $('hist-' + userId);
            if (!container) return;
            if (container.innerHTML) { container.innerHTML = ''; return; } // toggle
            apiGet('/users/' + userId + '/history?limit=20').then(function (d) {
                var items = d.history || [];
                if (items.length === 0) {
                    container.innerHTML = '<div class="history-row" style="color:var(--tx3)">No history yet</div>';
                    return;
                }
                container.innerHTML = items.map(function (ev) {
                    var time = new Date(ev.timestamp).toLocaleString();
                    var label = ev.state === 'home' ? '\u25CF ' + t('home') : '\u25CF ' + t('away');
                    return '<div class="history-row"><div class="history-dot ' + esc(ev.state) + '"></div>' + esc(label) + '<span style="margin-left:auto">' + esc(time) + '</span></div>';
                }).join('');
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        /* ── Push Subscriptions ───────────────────────────── */
        function loadPushSubscriptions() {
            apiGet('/push/subscriptions').then(function (d) {
                var subs = d.subscriptions || [];
                $('push-count').textContent = subs.length;
                if (!subs.length) {
                    $('push-list').innerHTML = '<div style="color:var(--tx3);font-size:0.85rem">' + esc(t('push_no_subs')) + '</div>';
                    return;
                }
                $('push-list').innerHTML = subs.map(function (s) {
                    var dt = s.created_at ? new Date(s.created_at * 1000).toLocaleDateString() : '\u2014';
                    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--sf2)">' +
                        '<div style="font-size:0.85rem;flex:1"><strong>' + esc(s.user_id || '\u2014') + '</strong>' +
                        ' <span style="color:var(--tx3);font-size:0.75rem">' + esc(s.platform || '?') + '</span>' +
                        '<div style="color:var(--tx3);font-size:0.75rem">' + esc(dt) + '</div></div>' +
                        '<button class="btn btn-sec btn-sm" onclick="testPush(\'' + esc(s.user_id || '') + '\')">' + esc(t('push_test')) + '</button>' +
                        '</div>';
                }).join('');
            }).catch(function (e) {
                $('push-list').innerHTML = '<div style="color:var(--tx3);font-size:0.85rem">' + esc(t('push_no_subs')) + '</div>';
            });
        }

        function testPush(userId) {
            var btns = document.querySelectorAll('#push-list .btn');
            btns.forEach(function (b) { if (b.onclick && b.textContent === t('push_test')) b.disabled = true; });
            apiPost('/push-test/' + encodeURIComponent(userId)).then(function () {
                showToast(t('push_sent'));
            }).catch(function (e) {
                showToast(t('push_failed'), 'error');
            }).finally(function () {
                btns.forEach(function (b) { b.disabled = false; });
            });
        }

        function copyVapid() {
            apiGet('/push/vapid-public-key').then(function (d) {
                var key = d.public_key || '';
                $('push-vapid-key').textContent = key;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(key).then(function () {
                        $('push-copy-btn').textContent = t('push_copied');
                        setTimeout(function () { $('push-copy-btn').textContent = t('push_copy'); }, 2000);
                    });
                }
            }).catch(function (e) { showToast(e.message || 'Error', 'error'); });
        }

        function resetPush() {
            if (!confirm(t('push_reset_confirm'))) return;
            var btn = $('btn-reset-push');
            withLoading(btn, function () {
                return apiPost('/push/reset').then(function () {
                    showToast(t('push_reset_ok'));
                    loadPushSubscriptions();
                    copyVapid();
                });
            });
        }

        applyLang();
        loadStatus();
        loadUsers();
        loadPushSubscriptions();
        copyVapid();
        setInterval(loadStatus, 15000);
    </script>
</body>

</html>
