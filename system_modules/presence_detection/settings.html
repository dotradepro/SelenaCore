<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presence Detection Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--tx);
            font-size: 14px;
            min-height: 100%;
            overflow-y: auto;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--tx3);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--sf);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card h2 {
            font-size: 14px;
            font-weight: 600;
            color: var(--tx);
            margin: 0;
        }

        .form-row {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        input,
        select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--b2);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--tx);
            font-size: 13px;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-primary {
            background: var(--ac);
            color: var(--tx);
        }

        .btn-danger {
            background: rgba(248, 113, 113, 0.15);
            color: var(--rd);
        }

        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--bg);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.home {
            background: var(--gr);
        }

        .dot.away {
            background: var(--rd);
        }

        .dot.unknown {
            background: var(--tx2);
        }

        .stat-bar {
            display: flex;
            gap: 24px;
            background: var(--sf);
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: var(--gr);
        }

        .stat .desc {
            font-size: 11px;
            color: var(--tx3);
        }

        .device-tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--b2);
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 11px;
            color: var(--tx2);
            margin: 2px;
        }

        .msg {
            font-size: 12px;
            color: var(--gr);
            margin-left: 8px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 data-i18n="title"></h1>
        <p class="subtitle" data-i18n="subtitle"></p>

        <div class="stat-bar">
            <div class="stat">
                <div class="num" id="s-home">0</div>
                <div class="desc" data-i18n="stat_home"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-away" style="color:var(--rd)">0</div>
                <div class="desc" data-i18n="stat_away"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-total" style="color:var(--ac)">0</div>
                <div class="desc" data-i18n="stat_tracked"></div>
            </div>
            <div class="stat">
                <div class="num" id="s-interval" style="color:var(--am)">—</div>
                <div class="desc" data-i18n="stat_interval"></div>
            </div>
        </div>

        <!-- User list -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="tracked_users"></h2>
                <div>
                    <button class="btn btn-primary btn-sm" onclick="triggerScan()" data-i18n="scan_now"></button>
                    <button class="btn btn-primary btn-sm" onclick="loadUsers()" style="margin-left:4px">↻</button>
                </div>
            </div>
            <div id="users-container" data-i18n="loading"></div>
        </div>

        <!-- Add user -->
        <div class="card">
            <div class="card-header">
                <h2 data-i18n="add_user_title"></h2>
            </div>
            <div class="form-row">
                <label data-i18n="lbl_uid"></label>
                <input id="new-user-id" placeholder="user-uuid-001" />
            </div>
            <div class="form-row">
                <label data-i18n="lbl_name"></label>
                <input id="new-user-name" placeholder="Alice" />
            </div>
            <div class="form-row">
                <label data-i18n="lbl_ip"></label>
                <input id="new-ip" placeholder="192.168.1.101" />
            </div>
            <div class="form-row">
                <label data-i18n="lbl_mac"></label>
                <input id="new-mac" placeholder="aa:bb:cc:dd:ee:ff" />
            </div>
            <div class="form-row">
                <label data-i18n="lbl_bt"></label>
                <input id="new-bt" placeholder="AA:BB:CC:DD:EE:FF" />
            </div>
            <div style="display:flex;align-items:center">
                <button class="btn btn-primary" onclick="addUser()" data-i18n="add_user_btn"></button>
                <span class="msg" id="add-msg" data-i18n="added"></span>
            </div>
        </div>
    </div>

    <script>
        var LANG = (function () { try { return localStorage.getItem('selena-lang') || 'en'; } catch (e) { return 'en'; } })();
        var L = {
            en: {
                title: '🏠 Presence Detection', subtitle: 'Track who is home via IP, MAC, or Bluetooth',
                stat_home: 'Home', stat_away: 'Away', stat_tracked: 'Tracked', stat_interval: 'Scan interval (s)',
                tracked_users: 'Tracked Users', scan_now: 'Scan Now', loading: 'Loading…',
                add_user_title: 'Add User', lbl_uid: 'User ID', lbl_name: 'Name',
                lbl_ip: 'IP address (optional)', lbl_mac: 'MAC address (optional)', lbl_bt: 'Bluetooth address (optional)',
                add_user_btn: 'Add User', added: '✓ Added', no_users: 'No users. Add one below.',
                err_required: 'User ID and Name are required.', remove_confirm: 'Remove user?'
            },
            uk: {
                title: '🏠 Виявлення присутності', subtitle: 'Відстежуйте, хто вдома, за IP, MAC або Bluetooth',
                stat_home: 'Вдома', stat_away: 'Відсутні', stat_tracked: 'Відстежується', stat_interval: 'Інтервал (с)',
                tracked_users: 'Відстежувані користувачі', scan_now: 'Сканувати', loading: 'Завантаження…',
                add_user_title: 'Додати користувача', lbl_uid: 'User ID', lbl_name: 'Ім\'я',
                lbl_ip: 'IP-адреса (необов\'язково)', lbl_mac: 'MAC-адреса (необов\'язково)', lbl_bt: 'Bluetooth-адреса (необов\'язково)',
                add_user_btn: 'Додати', added: '✓ Додано', no_users: 'Немає користувачів. Додайте нижче.',
                err_required: 'User ID та Ім\'я обов\'язкові.', remove_confirm: 'Видалити користувача?'
            }
        };
        function t(k) { return (L[LANG] || L.en)[k] || k; }
        function applyLang() { document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); }); }
        window.addEventListener('message', function (e) { if (e.data && e.data.type === 'lang_changed') { try { LANG = localStorage.getItem('selena-lang') || 'en'; } catch (ex) { } applyLang(); loadStatus(); loadUsers(); } });

        const BASE = window.location.pathname.replace(/\/(widget|settings)(\.html)?$/, '');
        const h = { "Authorization": "Bearer " + (window.SELENA_TOKEN || ""), "Content-Type": "application/json" };

        async function loadStatus() {
            try {
                const r = await fetch(BASE + "/status", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                document.getElementById("s-home").textContent = d.users_home ?? 0;
                document.getElementById("s-away").textContent = d.users_away ?? 0;
                document.getElementById("s-total").textContent = d.users_total ?? 0;
                document.getElementById("s-interval").textContent = d.scan_interval_sec ?? "—";
            } catch { }
        }

        async function loadUsers() {
            try {
                const r = await fetch(BASE + "/users", { headers: h });
                if (!r.ok) return;
                const d = await r.json();
                const container = document.getElementById("users-container");
                const users = d.users ?? [];
                if (users.length === 0) {
                    container.innerHTML = '<p style="color:var(--tx3);font-size:13px">' + t('no_users') + '</p>';
                    return;
                }
                container.innerHTML = users.map(u => `
      <div class="user-row">
        <div class="dot ${u.state}"></div>
        <div style="flex:1">
          <div style="font-size:13px">${u.name} <span style="color:var(--tx3);font-size:11px">(${u.state})</span></div>
          <div>${(u.devices ?? []).map(d => `<span class="device-tag">${d.type}: ${d.address}</span>`).join("")}</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removeUser('${u.user_id}')">✕</button>
      </div>
    `).join("");
            } catch { }
        }

        async function removeUser(id) {
            if (!confirm(t('remove_confirm'))) return;
            await fetch(BASE + "/users/" + id, { method: "DELETE", headers: h });
            loadUsers();
            loadStatus();
        }

        async function triggerScan() {
            try {
                const r = await fetch(BASE + "/scan", { method: "POST", headers: h });
                if (r.ok) { loadUsers(); loadStatus(); }
            } catch { }
        }

        async function addUser() {
            const id = document.getElementById("new-user-id").value.trim();
            const name = document.getElementById("new-user-name").value.trim();
            if (!id || !name) { alert(t('err_required')); return; }

            const devices = [];
            const ip = document.getElementById("new-ip").value.trim();
            const mac = document.getElementById("new-mac").value.trim();
            const bt = document.getElementById("new-bt").value.trim();
            if (ip) devices.push({ type: "ip", address: ip });
            if (mac) devices.push({ type: "mac", address: mac });
            if (bt) devices.push({ type: "bluetooth", address: bt });

            const r = await fetch(BASE + "/users", {
                method: "POST", headers: h,
                body: JSON.stringify({ user_id: id, name, devices })
            });
            if (r.ok) {
                document.getElementById("add-msg").style.display = "inline";
                setTimeout(() => document.getElementById("add-msg").style.display = "none", 2000);
                loadUsers();
                loadStatus();
            }
        }

        applyLang();
        loadStatus();
        loadUsers();
        setInterval(loadStatus, 15000);
    </script>
    <script>(function () { try { var p = window.parent.document.documentElement; function s() { document.documentElement.classList.toggle("light", p.classList.contains("light")) } s(); new MutationObserver(s).observe(p, { attributes: true, attributeFilter: ["class"] }); } catch (e) { } })();</script>
</body>

</html>
