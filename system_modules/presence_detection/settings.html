<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presence Detection Settings</title>
    <style>
        :root {
            --bg: #0B0C10;
            --sf: #12131A;
            --sf2: #191A22;
            --sf3: #20212C;
            --b: rgba(255, 255, 255, .07);
            --b2: rgba(255, 255, 255, .13);
            --tx: #EDEEF5;
            --tx2: #888EA8;
            --tx3: #484D66;
            --ac: #4F8CF7;
            --gr: #2EC98A;
            --am: #F5A93A;
            --rd: #E05454;
        }

        :root.light {
            --bg: #F3F4F8;
            --sf: #FFFFFF;
            --sf2: #F0F1F5;
            --sf3: #E4E5ED;
            --b: rgba(0, 0, 0, .08);
            --b2: rgba(0, 0, 0, .14);
            --tx: #1A1C24;
            --tx2: #5C6178;
            --tx3: #9498AD;
            --ac: #3B7AE8;
            --gr: #1FAF75;
            --am: #DB8F1C;
            --rd: #C94040;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--tx);
            padding: 20px;
            min-height: 100%;
            overflow-y: auto;
            font-size: 14px;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--tx3);
            font-size: 13px;
            margin-bottom: 20px;
        }

        .section {
            background: var(--sf);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: 0.95rem;
            color: var(--tx2);
            margin-bottom: 14px;
            font-weight: 600;
        }

        /* Stat cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--sf2);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .stat-card .val {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .stat-card .val.green {
            color: var(--gr);
        }

        .stat-card .val.red {
            color: var(--rd);
        }

        .stat-card .val.blue {
            color: var(--ac);
        }

        .stat-card .val.amber {
            color: var(--am);
        }

        .stat-card .lbl {
            font-size: 0.72rem;
            color: var(--tx3);
            margin-top: 4px;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: 8px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: var(--ac);
            color: #fff;
        }

        .btn-sec {
            background: var(--sf3);
            color: var(--tx);
        }

        .btn-danger {
            background: var(--rd);
            color: #fff;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.8rem;
        }

        .btn-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Forms */
        .form-row {
            margin-bottom: 12px;
        }

        .form-row label {
            display: block;
            font-size: 0.8rem;
            color: var(--tx2);
            margin-bottom: 4px;
        }

        .form-row input,
        .form-row select {
            width: 100%;
            background: var(--sf2);
            border: 1px solid var(--b2);
            border-radius: 8px;
            padding: 9px 12px;
            color: var(--tx);
            font-size: 0.9rem;
            outline: none;
        }

        .form-row input:focus {
            border-color: var(--ac);
        }

        .msg {
            font-size: 0.82rem;
            margin-top: 8px;
            min-height: 18px;
        }

        .ok-msg {
            color: var(--gr);
        }

        .err-msg {
            color: var(--rd);
        }

        /* User cards */
        .user-card {
            background: var(--sf2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot.home {
            background: var(--gr);
        }

        .dot.away {
            background: var(--rd);
        }

        .dot.unknown {
            background: var(--tx3);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .user-meta {
            font-size: 0.75rem;
            color: var(--tx3);
            margin-top: 2px;
        }

        .device-tag {
            display: inline-block;
            background: var(--sf3);
            border: 1px solid var(--b2);
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.72rem;
            color: var(--tx2);
            margin: 2px 2px 0 0;
        }

        .user-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* Discovered device rows */
        .disc-row {
            background: var(--sf2);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.15s;
        }

        .disc-row:hover {
            border-color: var(--ac);
        }

        .disc-row.selected {
            border-color: var(--gr);
            background: rgba(46, 201, 138, 0.08);
        }

        .disc-icon {
            font-size: 1.3rem;
            flex-shrink: 0;
            width: 32px;
            text-align: center;
        }

        .disc-info {
            flex: 1;
            min-width: 0;
        }

        .disc-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .disc-detail {
            font-size: 0.75rem;
            color: var(--tx3);
        }

        .disc-check {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--b2);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .disc-row.selected .disc-check {
            border-color: var(--gr);
            background: var(--gr);
        }

        .disc-row.selected .disc-check::after {
            content: '\2713';
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        .scan-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--b2);
            border-top: 2px solid var(--ac);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .empty-msg {
            color: var(--tx3);
            font-size: 0.85rem;
            text-align: center;
            padding: 16px;
        }

        /* QR Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background: var(--sf);
            border-radius: 16px;
            padding: 28px;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .modal h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .modal .qr-box {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            display: inline-block;
            margin: 16px 0;
        }

        .modal .qr-box svg {
            width: 200px;
            height: 200px;
        }

        .modal .status-line {
            font-size: 0.85rem;
            color: var(--tx2);
            margin-top: 8px;
        }

        .modal .status-line.done {
            color: var(--gr);
            font-weight: 600;
        }

        .modal .close-btn {
            margin-top: 16px;
        }

        /* History */
        .history-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.78rem;
            color: var(--tx2);
        }

        .history-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .history-dot.home {
            background: var(--gr);
        }

        .history-dot.away {
            background: var(--rd);
        }

        .user-history {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--b);
        }
    </style>
</head>

<body>
    <h1 data-i18n="title"></h1>
    <p class="subtitle" data-i18n="subtitle"></p>

    <!-- Stats -->
    <div class="stat-grid">
        <div class="stat-card">
            <div class="val green" id="s-home">0</div>
            <div class="lbl" data-i18n="stat_home"></div>
        </div>
        <div class="stat-card">
            <div class="val red" id="s-away">0</div>
            <div class="lbl" data-i18n="stat_away"></div>
        </div>
        <div class="stat-card">
            <div class="val blue" id="s-total">0</div>
            <div class="lbl" data-i18n="stat_tracked"></div>
        </div>
        <div class="stat-card">
            <div class="val amber" id="s-interval">&mdash;</div>
            <div class="lbl" data-i18n="stat_interval"></div>
        </div>
    </div>

    <!-- Tracked users -->
    <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
            <h2 style="margin:0" data-i18n="tracked_users"></h2>
            <div class="btn-row">
                <button class="btn btn-primary btn-sm" onclick="triggerScan()" data-i18n="scan_now"></button>
                <button class="btn btn-sec btn-sm" onclick="loadUsers()">&#8635;</button>
            </div>
        </div>
        <div id="users-container">
            <p class="empty-msg" data-i18n="loading"></p>
        </div>
    </div>

    <!-- Add user — step 1: scan network -->
    <div class="section">
        <h2 data-i18n="h_add_user"></h2>
        <p style="font-size:0.85rem;color:var(--tx2);margin-bottom:14px" data-i18n="add_hint"></p>

        <div class="btn-row" style="margin-bottom:14px">
            <button class="btn btn-primary" onclick="scanNetwork()" id="btn-scan-net"
                data-i18n="btn_scan_network"></button>
            <button class="btn btn-sec" onclick="openQrInvite()" id="btn-qr-invite" data-i18n="btn_qr_invite"></button>
            <span id="scan-spinner" style="display:none"><span class="scan-spinner"></span></span>
        </div>

        <div id="discover-list" style="display:none">
            <div id="discover-container"></div>
            <div class="msg" id="disc-msg"></div>
        </div>

        <!-- After selecting device(s), fill in user name -->
        <div id="add-form" style="display:none;margin-top:16px;border-top:1px solid var(--b2);padding-top:16px">
            <div class="form-row">
                <label data-i18n="lbl_name"></label>
                <input id="f-name" data-i18n-placeholder="ph_name">
            </div>
            <div id="selected-devices-info" style="margin-bottom:12px"></div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="addUserFromSelection()" data-i18n="btn_add_user"></button>
                <span class="msg" id="add-msg"></span>
            </div>
        </div>

        <!-- Manual fallback -->
        <details style="margin-top:16px">
            <summary style="color:var(--tx3);font-size:0.82rem;cursor:pointer" data-i18n="manual_toggle"></summary>
            <div style="padding-top:12px">
                <div class="form-row">
                    <label data-i18n="lbl_uid"></label>
                    <input id="m-uid" placeholder="user-001">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_name_manual"></label>
                    <input id="m-name" placeholder="Alice">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_ip"></label>
                    <input id="m-ip" placeholder="192.168.1.101">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_mac"></label>
                    <input id="m-mac" placeholder="aa:bb:cc:dd:ee:ff">
                </div>
                <div class="form-row">
                    <label data-i18n="lbl_bt"></label>
                    <input id="m-bt" placeholder="AA:BB:CC:DD:EE:FF">
                </div>
                <button class="btn btn-sec" onclick="addUserManual()" data-i18n="btn_add_manual"></button>
                <span class="msg" id="add-msg-manual"></span>
            </div>
        </details>
    </div>

    <!-- Push Notifications Section -->
    <div class="section">
        <h2><span data-i18n="push_title"></span> · <span id="push-count">0</span> <span data-i18n="push_devices"></span>
        </h2>
        <div id="push-list"></div>
        <div style="margin-top:14px;background:var(--sf2);border-radius:8px;padding:12px">
            <div style="font-size:0.8rem;color:var(--tx2);margin-bottom:6px" data-i18n="push_vapid"></div>
            <div style="display:flex;align-items:center;gap:8px">
                <code id="push-vapid-key" style="font-size:0.75rem;color:var(--tx3);word-break:break-all;flex:1"></code>
                <button class="btn btn-sec btn-sm" id="push-copy-btn" onclick="copyVapid()"
                    data-i18n="push_copy"></button>
            </div>
            <div style="margin-top:10px;border-top:1px solid var(--bd);padding-top:10px">
                <button class="btn btn-sec btn-sm" onclick="resetPush()" data-i18n="push_reset"></button>
                <span style="font-size:0.75rem;color:var(--tx3);margin-left:8px" data-i18n="push_reset_hint"></span>
            </div>
        </div>
    </div>

    <!-- QR Invite Modal -->
    <div id="qr-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeQrModal()">
        <div class="modal">
            <h3 data-i18n="qr_title"></h3>
            <div class="form-row" id="qr-name-row">
                <label data-i18n="qr_lbl_name"></label>
                <input id="qr-name" data-i18n-placeholder="ph_name">
            </div>
            <button class="btn btn-primary" id="qr-gen-btn" onclick="generateQrInvite()"
                data-i18n="qr_generate"></button>
            <div id="qr-result" style="display:none">
                <div class="qr-box" id="qr-svg-box"></div>
                <p class="status-line" id="qr-status" data-i18n="qr_waiting"></p>
            </div>
            <button class="btn btn-sec close-btn" onclick="closeQrModal()" data-i18n="qr_close"></button>
        </div>
    </div>

            document.querySelectorAll('[data-i18n]').forEach(function (el) { el.textContent = t(el.getAttribute('data-i18n')); });

        window.addEventListener('message', function (e) {

        async function loadStatus() {
            try {
                var r = await fetch(BASE + '/status', { headers: h });
                if (!r.ok) return;
                var d = await r.json();
                document.getElementById('s-home').textContent = d.users_home || 0;
                document.getElementById('s-away').textContent = d.users_away || 0;
                document.getElementById('s-total').textContent = d.users_total || 0;
                document.getElementById('s-interval').textContent = d.scan_interval_sec || '\u2014';
            } catch (e) { }
        }

        /* ── User list ───────────────────────────────────────── */
        async function loadUsers() {
            try {
                var r = await fetch(BASE + '/users', { headers: h });
                if (!r.ok) return;
                var d = await r.json();
                var users = d.users || [];
                var container = document.getElementById('users-container');
                if (users.length === 0) {
                    container.innerHTML = '<p class="empty-msg">' + t('no_users') + '</p>';
                    return;
                }
                container.innerHTML = users.map(function (u) {
                    var stateText = t(u.state) || u.state;
                    var lastSeen = u.last_seen ? new Date(u.last_seen).toLocaleString() : t('never');
                    var devTags = (u.devices || []).map(function (d) {
                        var icon = d.type === 'ip' ? '\uD83C\uDF10' : d.type === 'mac' ? '\uD83D\uDD17' : '\uD83D\uDCF6';
                        return '<span class="device-tag">' + icon + ' ' + d.address + '</span>';
                    }).join('');
                    return '<div class="user-card">' +
                        '<div class="dot ' + u.state + '"></div>' +
                        '<div class="user-info">' +
                        '<div class="user-name">' + u.name + ' <span style="color:var(--tx3);font-size:0.75rem">(' + stateText + ')</span></div>' +
                        '<div class="user-meta">' + t('last_seen') + ': ' + lastSeen + '</div>' +
                        '<div>' + devTags + '</div>' + '<div class="user-history" id="hist-' + u.user_id + '"></div>' +
                        '<a href="#" style="font-size:0.75rem;color:var(--ac);text-decoration:none" onclick="loadHistory(\'' + u.user_id + '\');return false">' + t('show_history') + '</a>' + '</div>' +
                        '<div class="user-actions">' +
                        '<button class="btn btn-danger btn-sm" onclick="removeUser(\'' + u.user_id + '\')">&#10005;</button>' +
                        '</div>' +
                        '</div>';
                }).join('');
            } catch (e) { }
        }

        async function removeUser(id) {
            if (!confirm(t('remove_confirm'))) return;
            await fetch(BASE + '/users/' + id, { method: 'DELETE', headers: h });
            loadUsers(); loadStatus();
        }

        async function triggerScan() {
            try {
                await fetch(BASE + '/scan', { method: 'POST', headers: h });
                loadUsers(); loadStatus();
            } catch (e) { }
        }

        /* ── Network discovery ───────────────────────────────── */
        async function scanNetwork() {
            document.getElementById('scan-spinner').style.display = 'inline';
            document.getElementById('btn-scan-net').disabled = true;
            document.getElementById('discover-list').style.display = 'block';
            document.getElementById('discover-container').innerHTML = '<p class="empty-msg">' + t('scanning') + '</p>';
            selectedDevices = [];
            document.getElementById('add-form').style.display = 'none';

            try {
                var r = await fetch(BASE + '/discover?active=true', { headers: h });
                if (!r.ok) throw new Error('Scan failed');
                var d = await r.json();
                discoveredDevices = d.devices || [];
                renderDiscovered();
            } catch (e) {
                document.getElementById('discover-container').innerHTML = '<p class="empty-msg">' + t('no_devices_found') + '</p>';
            }
            document.getElementById('scan-spinner').style.display = 'none';
            document.getElementById('btn-scan-net').disabled = false;
        }

        function renderDiscovered() {
            var container = document.getElementById('discover-container');
            if (discoveredDevices.length === 0) {
                container.innerHTML = '<p class="empty-msg">' + t('no_devices_found') + '</p>';
                return;
            }
            container.innerHTML = '<p style="font-size:0.82rem;color:var(--tx2);margin-bottom:10px">' + t('select_device') + '</p>' +
                discoveredDevices.map(function (dev, idx) {
                    var isSelected = selectedDevices.some(function (s) { return s.mac === dev.mac; });
                    var displayName = dev.hostname || dev.manufacturer || dev.ip;
                    var icon = guessIcon(dev);
                    return '<div class="disc-row' + (isSelected ? ' selected' : '') + '" onclick="toggleDevice(' + idx + ')">' +
                        '<div class="disc-icon">' + icon + '</div>' +
                        '<div class="disc-info">' +
                        '<div class="disc-name">' + displayName + '</div>' +
                        '<div class="disc-detail">' + dev.ip + ' &nbsp; ' + dev.mac +
                        (dev.manufacturer ? ' &nbsp; ' + dev.manufacturer : '') + '</div>' +
                        '</div>' +
                        '<div class="disc-check"></div>' +
                        '</div>';
                }).join('');
        }

        function guessIcon(dev) {
            var combined = ((dev.hostname || '') + ' ' + (dev.manufacturer || '')).toLowerCase();
            if (/iphone|android|samsung|xiaomi|huawei|oneplus|pixel|galaxy|oppo|poco|realme/.test(combined)) return '\uD83D\uDCF1';
            if (/macbook|laptop|thinkpad|dell|lenovo|hp|asus|acer/.test(combined)) return '\uD83D\uDCBB';
            if (/imac|desktop|pc|workstation/.test(combined)) return '\uD83D\uDDA5';
            if (/ipad|tablet|tab/.test(combined)) return '\uD83D\uDCF1';
            if (/apple|airpods|watch/.test(combined)) return '\u231A';
            if (/sonos|speaker|echo|alexa|homepod/.test(combined)) return '\uD83D\uDD0A';
            if (/tv|chromecast|roku|firestick/.test(combined)) return '\uD83D\uDCFA';
            if (/printer|canon|epson|brother/.test(combined)) return '\uD83D\uDDA8';
            if (/router|gateway|mikrotik|ubiquiti|tp-link|asus/.test(combined)) return '\uD83C\uDF10';
            if (/raspb|pi/.test(combined)) return '\uD83E\uDDE0';
            if (/cam|reolink|hikvision|ring|arlo/.test(combined)) return '\uD83D\uDCF7';
            return '\uD83D\uDD0C';
        }

        function toggleDevice(idx) {
            var dev = discoveredDevices[idx];
            var existIdx = -1;
            for (var i = 0; i < selectedDevices.length; i++) {
                if (selectedDevices[i].mac === dev.mac) { existIdx = i; break; }
            }
            if (existIdx >= 0) {
                selectedDevices.splice(existIdx, 1);
            } else {
                selectedDevices.push(dev);
            }
            renderDiscovered();
            updateSelectedInfo();
        }

        function updateSelectedInfo() {
            var form = document.getElementById('add-form');
            var info = document.getElementById('selected-devices-info');
            if (selectedDevices.length === 0) {
                form.style.display = 'none';
                return;
            }
            form.style.display = 'block';
            info.innerHTML = '<div style="font-size:0.82rem;color:var(--tx2);margin-bottom:6px">' + t('selected_prefix') + '</div>' +
                selectedDevices.map(function (d) {
                    var name = d.hostname || d.manufacturer || d.ip;
                    return '<span class="device-tag">' + name + ' (' + d.mac + ')</span>';
                }).join(' ');

            // Auto-suggest name from hostname
            var nameInput = document.getElementById('f-name');
            if (!nameInput.value && selectedDevices[0].hostname) {
                nameInput.value = selectedDevices[0].hostname;
            }
        }

        async function addUserFromSelection() {
            var name = document.getElementById('f-name').value.trim();
            if (!name) { showMsg('add-msg', t('err_name'), true); return; }
            if (selectedDevices.length === 0) { showMsg('add-msg', t('err_select'), true); return; }

            var userId = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'user-' + Date.now();
            var devices = selectedDevices.map(function (d) {
                return { type: 'mac', address: d.mac };
            });
            // Also add IP for the selected devices (faster initial detection)
            selectedDevices.forEach(function (d) {
                if (d.ip) devices.push({ type: 'ip', address: d.ip });
            });

            try {
                var r = await fetch(BASE + '/users', {
                    method: 'POST', headers: h,
                    body: JSON.stringify({ user_id: userId, name: name, devices: devices })
                });
                if (r.ok) {
                    showMsg('add-msg', t('added'), false);
                    document.getElementById('f-name').value = '';
                    selectedDevices = [];
                    document.getElementById('add-form').style.display = 'none';
                    document.getElementById('discover-list').style.display = 'none';
                    loadUsers(); loadStatus();
                }
            } catch (e) { showMsg('add-msg', String(e), true); }
        }

        /* ── Manual add (advanced) ───────────────────────────── */
        async function addUserManual() {
            var id = document.getElementById('m-uid').value.trim();
            var name = document.getElementById('m-name').value.trim();
            if (!id || !name) { showMsg('add-msg-manual', t('err_required'), true); return; }
            var devices = [];
            var ip = document.getElementById('m-ip').value.trim();
            var mac = document.getElementById('m-mac').value.trim();
            var bt = document.getElementById('m-bt').value.trim();
            if (ip) devices.push({ type: 'ip', address: ip });
            if (mac) devices.push({ type: 'mac', address: mac });
            if (bt) devices.push({ type: 'bluetooth', address: bt });

            try {
                var r = await fetch(BASE + '/users', {
                    method: 'POST', headers: h,
                    body: JSON.stringify({ user_id: id, name: name, devices: devices })
                });
                if (r.ok) {
                    showMsg('add-msg-manual', t('added'), false);
                    document.getElementById('m-uid').value = '';
                    document.getElementById('m-name').value = '';
                    document.getElementById('m-ip').value = '';
                    document.getElementById('m-mac').value = '';
                    document.getElementById('m-bt').value = '';
                    loadUsers(); loadStatus();
                }
            } catch (e) { showMsg('add-msg-manual', String(e), true); }
        }

        function showMsg(id, msg, isErr) {
            var el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'msg ' + (isErr ? 'err-msg' : 'ok-msg');
            setTimeout(function () { el.textContent = ''; }, 3000);
        }

        /* ── QR Invite ───────────────────────────────────────── */
        var currentInviteToken = null;
        var pollTimer = null;

        function openQrInvite() {
            document.getElementById('qr-modal').style.display = 'flex';
            document.getElementById('qr-name-row').style.display = 'block';
            document.getElementById('qr-gen-btn').style.display = 'inline-block';
            document.getElementById('qr-result').style.display = 'none';
            document.getElementById('qr-name').value = '';
            currentInviteToken = null;
            applyLang();
        }

        function closeQrModal() {
            document.getElementById('qr-modal').style.display = 'none';
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        }

        async function generateQrInvite() {
            var name = document.getElementById('qr-name').value.trim();
            if (!name) return;
            document.getElementById('qr-gen-btn').disabled = true;
            try {
                var r = await fetch(BASE + '/invite', {
                    method: 'POST', headers: h,
                    body: JSON.stringify({ name: name, base_url: window.location.origin })
                });
                if (!r.ok) throw new Error('Failed');
                var d = await r.json();
                currentInviteToken = d.token;
                // Show QR
                document.getElementById('qr-name-row').style.display = 'none';
                document.getElementById('qr-gen-btn').style.display = 'none';
                document.getElementById('qr-result').style.display = 'block';
                document.getElementById('qr-svg-box').innerHTML = d.qr_svg || '<p>QR unavailable</p>';
                document.getElementById('qr-status').textContent = t('qr_waiting');
                document.getElementById('qr-status').className = 'status-line';
                // Start polling
                pollTimer = setInterval(pollInviteStatus, 3000);
            } catch (e) { }
            document.getElementById('qr-gen-btn').disabled = false;
        }

        async function pollInviteStatus() {
            if (!currentInviteToken) return;
            try {
                var r = await fetch(BASE + '/invite/' + currentInviteToken, { headers: h });
                if (!r.ok) return;
                var d = await r.json();
                if (d.status === 'completed') {
                    document.getElementById('qr-status').textContent = t('qr_done');
                    document.getElementById('qr-status').className = 'status-line done';
                    clearInterval(pollTimer); pollTimer = null;
                    loadUsers(); loadStatus();
                } else if (d.status === 'expired') {
                    document.getElementById('qr-status').textContent = t('qr_expired');
                    document.getElementById('qr-status').className = 'status-line err-msg';
                    clearInterval(pollTimer); pollTimer = null;
                }
            } catch (e) { }
        }

        /* ── History per user ─────────────────────────────────── */
        async function loadHistory(userId) {
            var container = document.getElementById('hist-' + userId);
            if (!container) return;
            if (container.innerHTML) { container.innerHTML = ''; return; } // toggle
            try {
                var r = await fetch(BASE + '/users/' + userId + '/history?limit=20', { headers: h });
                if (!r.ok) return;
                var d = await r.json();
                var items = d.history || [];
                if (items.length === 0) {
                    container.innerHTML = '<div class="history-row" style="color:var(--tx3)">No history yet</div>';
                    return;
                }
                container.innerHTML = items.map(function (ev) {
                    var time = new Date(ev.timestamp).toLocaleString();
                    var label = ev.state === 'home' ? '\u25CF ' + t('home') : '\u25CF ' + t('away');
                    return '<div class="history-row"><div class="history-dot ' + ev.state + '"></div>' + label + '<span style="margin-left:auto">' + time + '</span></div>';
                }).join('');
            } catch (e) { }
        }

        /* ── Push Subscriptions ───────────────────────────── */
        async function loadPushSubscriptions() {
            try {
                var r = await fetch(BASE + '/push/subscriptions', { headers: h });
                if (!r.ok) { document.getElementById('push-list').innerHTML = '<div style="color:var(--tx3);font-size:0.85rem">' + t('push_no_subs') + '</div>'; return; }
                var d = await r.json();
                var subs = d.subscriptions || [];
                document.getElementById('push-count').textContent = subs.length;
                if (!subs.length) {
                    document.getElementById('push-list').innerHTML = '<div style="color:var(--tx3);font-size:0.85rem">' + t('push_no_subs') + '</div>';
                    return;
                }
                document.getElementById('push-list').innerHTML = subs.map(function (s) {
                    var dt = s.created_at ? new Date(s.created_at * 1000).toLocaleDateString() : '\u2014';
                    return '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--sf2)">' +
                        '<div style="font-size:0.85rem;flex:1"><strong>' + (s.user_id || '\u2014') + '</strong>' +
                        ' <span style="color:var(--tx3);font-size:0.75rem">' + (s.platform || '?') + '</span>' +
                        '<div style="color:var(--tx3);font-size:0.75rem">' + dt + '</div></div>' +
                        '<button class="btn btn-sec btn-sm" onclick="testPush(\'' + (s.user_id || '') + '\')">' + t('push_test') + '</button>' +
                        '</div>';
                }).join('');
            } catch (e) {
                document.getElementById('push-list').innerHTML = '<div style="color:var(--tx3);font-size:0.85rem">' + t('push_no_subs') + '</div>';
            }
        }

        async function testPush(userId) {
            var btns = document.querySelectorAll('#push-list .btn');
            btns.forEach(function (b) { if (b.onclick && b.textContent === t('push_test')) b.disabled = true; });
            try {
                var r = await fetch(BASE + '/push-test/' + encodeURIComponent(userId), { method: 'POST', headers: h });
                if (r.ok) { showToast(t('push_sent')); }
                else { showToast(t('push_failed')); }
            } catch (e) { showToast(t('push_failed')); }
            btns.forEach(function (b) { b.disabled = false; });
        }

        async function copyVapid() {
            try {
                var r = await fetch(BASE + '/push/vapid-public-key', { headers: h });
                if (!r.ok) return;
                var d = await r.json();
                var key = d.public_key || '';
                document.getElementById('push-vapid-key').textContent = key;
                if (navigator.clipboard) {
                    await navigator.clipboard.writeText(key);
                    document.getElementById('push-copy-btn').textContent = t('push_copied');
                    setTimeout(function () { document.getElementById('push-copy-btn').textContent = t('push_copy'); }, 2000);
                }
            } catch (e) { }
        }

        async function resetPush() {
            if (!confirm(t('push_reset_confirm'))) return;
            try {
                var r = await fetch(BASE + '/push/reset', { method: 'POST', headers: h });
                if (r.ok) {
                    showToast(t('push_reset_ok'));
                    loadPushSubs();
                    copyVapid();
                } else { showToast(t('push_failed')); }
            } catch (e) { showToast(t('push_failed')); }
        }

        function showToast(msg) {
            var el = document.getElementById('toast');
            if (!el) { el = document.createElement('div'); el.id = 'toast'; el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--sf2);color:var(--tx);padding:10px 20px;border-radius:8px;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity .3s'; document.body.appendChild(el); }
            el.textContent = msg; el.style.opacity = '1';
            setTimeout(function () { el.style.opacity = '0'; }, 2500);
        }

        applyLang();
        loadStatus();
        loadUsers();
        loadPushSubscriptions();
        copyVapid();
        setInterval(loadStatus, 15000);
    </script>
