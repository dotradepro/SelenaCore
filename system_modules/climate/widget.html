<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" href="/api/shared/theme.css">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Climate</title>
<style>
:root{
  --bg:var(--sf2);
  --card:var(--sf);
  --fg:var(--tx);
  --mut:var(--tx2);
  --pr:var(--ac);
}
body{background:transparent;color:var(--fg)}
.wrap{padding:4px 6px;display:flex;flex-direction:column;gap:3px;height:100vh;overflow:hidden;min-width:0;margin:0}
.wrap.modal{padding:20px 22px 28px;max-width:720px;margin:0 auto;gap:14px;height:auto;min-height:100%;overflow-y:visible}
/* Compact mode: NO room headers (the dashboard tile is too narrow to
   waste a row on group titles). Modal mode keeps grouped layout
   because it has more horizontal room. */
.room{display:flex;flex-direction:column;gap:6px;min-width:0}
.room-title{display:none}
.wrap.modal .room-title{display:block;font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;padding:0 4px;font-weight:600}
.list{display:flex;flex-direction:column;gap:3px;min-width:0}

/* compact row (dashboard mode) — module-specific override of shared .row */
.wrap .row{
  display:flex;align-items:center;gap:8px;min-width:0;
  padding:8px 10px;background:var(--card);border:1px solid var(--b);border-radius:8px;
  cursor:pointer;transition:border-color .15s,background .15s,transform .08s;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  justify-content:flex-start;margin-bottom:0;
}
.wrap .row:hover{border-color:var(--pr)}
.wrap .row:active{transform:scale(.985)}
.wrap .row.off{opacity:.55}
/* ALL descendants (not just direct children) pass clicks through to
   .row so any pixel of the row is clickable. */
.wrap .row *{pointer-events:none}
.dot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex-shrink:0}
.dot.on{background:var(--gr);box-shadow:0 0 6px rgba(34,197,94,.5)}
/* min-width:0 is critical: without it a flex item with white-space:nowrap
   refuses to shrink below its intrinsic content width and ellipsis never
   kicks in. */
.row-name{flex:1 1 auto;min-width:0;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-target{font-size:13px;font-weight:700;color:var(--pr);font-variant-numeric:tabular-nums;flex-shrink:0}

.empty{padding:30px 14px;text-align:center;color:var(--mut);font-size:12px}

/* modal-mode card (fullscreen view) */
.fullcard{
  background:var(--card);border:1px solid var(--b);border-radius:14px;
  padding:18px 20px;display:flex;flex-direction:column;gap:14px;
}
.fc-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.fc-title{font-size:17px;font-weight:600}
.fc-subtitle{font-size:11px;color:var(--mut);margin-top:2px}
/* .toggle: shared implementation lives in /api/shared/theme.css */

.fc-temp-row{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
  padding:14px 18px;background:var(--bg);border-radius:10px;
}
.fc-now-label{font-size:11px;color:var(--mut)}
.fc-now-val{font-size:26px;font-weight:700;color:var(--fg);font-variant-numeric:tabular-nums;margin-top:2px}
.fc-target{display:flex;align-items:center;gap:10px}
.temp-btn{
  background:var(--card);border:1px solid var(--b);border-radius:8px;
  width:38px;height:38px;cursor:pointer;color:var(--fg);font-size:18px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
}
.temp-btn:hover{border-color:var(--pr)}
.temp-target-val{font-size:30px;font-weight:700;min-width:60px;text-align:center;color:var(--pr);font-variant-numeric:tabular-nums}

.fc-section{display:flex;flex-direction:column;gap:6px}
.fc-section-label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;padding:0 2px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  flex:1;min-width:60px;padding:9px 12px;border:1px solid var(--b);border-radius:9px;
  background:var(--bg);color:var(--mut);cursor:pointer;font-size:12px;font-weight:500;text-align:center;
}
.chip.active{background:var(--pr);color:var(--on-accent);border-color:var(--pr)}

.fc-meta{display:flex;gap:14px;font-size:11px;color:var(--mut);padding-top:4px;border-top:1px dashed var(--b);flex-wrap:wrap}
.fc-meta b{color:var(--fg);font-weight:600}

/* fullscreen modal close button — hidden in modal mode by shared CSS
   (parent dashboard modal provides its own close). Kept in markup for
   out-of-iframe fullscreen uses. */
.fs-close{
  position:fixed;top:14px;right:18px;
  background:var(--card);border:1px solid var(--b);border-radius:50%;
  width:36px;height:36px;cursor:pointer;color:var(--fg);font-size:18px;
  display:flex;align-items:center;justify-content:center;z-index:1001;
}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="empty" data-i18n="loading">Loading…</div>
</div>
<button class="fs-close" id="fsClose" style="display:none">×</button>

<script src="/api/shared/widget-common.js"></script>
<script>
// ── i18n dictionaries ───────────────────────────────────────────────────
var ROOM_KEYS = {
  en: {
    living_room:'Living room', livingroom:'Living room', lounge:'Lounge',
    bedroom:'Bedroom', kitchen:'Kitchen', office:'Office',
    hallway:'Hallway', bathroom:'Bathroom', garage:'Garage',
    nursery:'Nursery', dining:'Dining room', balcony:'Balcony',
  },
  uk: {
    living_room:'Вітальня', livingroom:'Вітальня', lounge:'Вітальня',
    bedroom:'Спальня', kitchen:'Кухня', office:'Кабінет',
    hallway:'Коридор', bathroom:'Ванна', garage:'Гараж',
    nursery:'Дитяча', dining:'Їдальня', balcony:'Балкон',
  }
};
function roomLabel(key) {
  if (!key || key === 'unassigned') return t('unassigned');
  var norm = String(key).toLowerCase().trim().replace(/\s+/g, '_');
  return (ROOM_KEYS[LANG] && ROOM_KEYS[LANG][norm])
      || ROOM_KEYS.en[norm]
      || key;
}
var L = {
  en: {
    title:'Climate',
    loading:'Loading…',
    empty:'No climate devices yet. Add an air conditioner via Device Control → Gree / Pular tab.',
    unassigned:'Unassigned',
    cur:'Current', target:'Target',
    power:'Power', mode:'Mode', fan_speed:'Fan speed', swing:'Swing',
    mode_auto:'Auto', mode_cool:'Cool', mode_dry:'Dry', mode_fan:'Fan', mode_heat:'Heat',
    fan_auto:'Auto', fan_low:'Low', fan_medium:'Med', fan_high:'High',
    swing_off:'Off', swing_v:'Vertical', swing_h:'Horizontal', swing_full:'Full',
    on:'on', off:'off',
    cmd_failed:'Command failed',
    estimated:'estimated', power_w:'Power',
  },
  uk: {
    title:'Клімат',
    loading:'Завантаження…',
    empty:'Немає кліматичних пристроїв. Додайте кондиціонер через Керування пристроями → вкладку Gree / Pular.',
    unassigned:'Без кімнати',
    cur:'Зараз', target:'Ціль',
    power:'Живлення', mode:'Режим', fan_speed:'Вентилятор', swing:'Жалюзі',
    mode_auto:'Авто', mode_cool:'Холод', mode_dry:'Сушка', mode_fan:'Вент.', mode_heat:'Тепло',
    fan_auto:'Авто', fan_low:'Низ', fan_medium:'Сер', fan_high:'Вис',
    swing_off:'Вимк', swing_v:'Вертик.', swing_h:'Горизонт.', swing_full:'Повне',
    on:'увімк', off:'вимк',
    cmd_failed:'Команда не виконана',
    estimated:'оцінка', power_w:'Спожив.',
  }
};

// ── helpers ──────────────────────────────────────────────────────────────
var IS_MODAL = (new URLSearchParams(window.location.search).get('modal') || '') === '1';
var inFrame = window.self !== window.top;

var MODES = ['auto','cool','dry','fan','heat'];
var FANS = ['auto','low','medium','high'];
var SWINGS = [
  {key:'off',  v:'off',  h:'off'},
  {key:'v',    v:'full', h:'off'},
  {key:'h',    v:'off',  h:'full'},
  {key:'full', v:'full', h:'full'},
];

var DEVICES = {};

// ── compact row (dashboard) ─────────────────────────────────────────────
function renderRow(d){
  // Compact dashboard row — JUST status dot, name, target temp.
  var s = d.state || {};
  var on = s.on === true;
  var tgt = (s.target_temp != null) ? s.target_temp+'°' : '—';
  return '<div class="row '+(on?'':'off')+'" data-id="'+esc(d.device_id)+'">'+
    '<span class="dot '+(on?'on':'')+'"></span>'+
    '<span class="row-name">'+esc(d.name)+'</span>'+
    '<span class="row-target">'+esc(tgt)+'</span>'+
  '</div>';
}

function bindCompactRows(){
  // pointerdown + click fallback to register on the first interaction
  // even when the iframe doesn't yet have focus.
  var openModal = function(){
    if(!inFrame) return;
    try{
      window.parent.postMessage({
        type:'openWidgetModal',
        module:'climate',
        width: 480,
        height: 560,
      }, '*');
    }catch(_){}
  };
  document.querySelectorAll('.row').forEach(function(r){
    var fired = false;
    var trigger = function(e){
      if(fired) return;
      fired = true;
      setTimeout(function(){ fired = false; }, 350);
      if(e && e.preventDefault) e.preventDefault();
      openModal();
    };
    r.addEventListener('pointerdown', trigger);
    r.addEventListener('click', trigger);
  });
}

// ── full-control card (modal mode) ──────────────────────────────────────
function renderFullCard(d){
  var s = d.state || {};
  var on = s.on === true;
  var mode = (s.mode||'auto').toLowerCase();
  var target = (s.target_temp != null) ? s.target_temp : 22;
  var current = (s.current_temp != null) ? s.current_temp+'°' : '—';
  var fan = (s.fan_speed||'auto').toLowerCase();
  if(fan === 'medium_low' || fan === 'medium_high') fan = 'medium';
  var sv = (s.swing_v||'off').toLowerCase();
  var sh = (s.swing_h||'off').toLowerCase();
  var vOn = sv !== 'off' && sv !== '';
  var hOn = sh !== 'off' && sh !== '';
  var swingKey = (vOn && hOn) ? 'full' : (vOn ? 'v' : (hOn ? 'h' : 'off'));

  var watts = s.estimated_watts;
  var wattsLine = (watts != null)
    ? '<span><b>'+Math.round(watts)+' W</b> '+esc(t('estimated'))+'</span>'
    : '';

  var modeChips = MODES.map(function(m){
    return '<button class="chip mode '+(mode===m?'active':'')+'" data-id="'+esc(d.device_id)+'" data-mode="'+m+'">'+esc(t('mode_'+m))+'</button>';
  }).join('');
  var fanChips = FANS.map(function(f){
    return '<button class="chip fan '+(fan===f?'active':'')+'" data-id="'+esc(d.device_id)+'" data-fan="'+f+'">'+esc(t('fan_'+f))+'</button>';
  }).join('');
  var swingChips = SWINGS.map(function(sw){
    return '<button class="chip swing '+(swingKey===sw.key?'active':'')+'" data-id="'+esc(d.device_id)+'" data-skey="'+sw.key+'">'+esc(t('swing_'+sw.key))+'</button>';
  }).join('');

  return '<div class="fullcard" data-card="'+esc(d.device_id)+'">'+
    '<div class="fc-head">'+
      '<div>'+
        '<div class="fc-title">'+esc(d.name)+'</div>'+
        '<div class="fc-subtitle">'+esc(roomLabel(d.location))+' · '+esc(d.protocol)+'</div>'+
      '</div>'+
      '<label class="toggle" data-id="'+esc(d.device_id)+'">'+
        '<input type="checkbox" class="power-input"'+(on?' checked':'')+'>'+
        '<span class="slider"></span>'+
      '</label>'+
    '</div>'+
    '<div class="fc-temp-row">'+
      '<div>'+
        '<div class="fc-now-label">'+esc(t('cur'))+'</div>'+
        '<div class="fc-now-val">'+esc(current)+'</div>'+
      '</div>'+
      '<div class="fc-target">'+
        '<button class="temp-btn temp-down" data-id="'+esc(d.device_id)+'" data-cur="'+esc(target)+'">−</button>'+
        '<div class="temp-target-val">'+esc(target)+'°</div>'+
        '<button class="temp-btn temp-up" data-id="'+esc(d.device_id)+'" data-cur="'+esc(target)+'">+</button>'+
      '</div>'+
    '</div>'+
    '<div class="fc-section">'+
      '<div class="fc-section-label">'+esc(t('mode'))+'</div>'+
      '<div class="chips">'+modeChips+'</div>'+
    '</div>'+
    '<div class="fc-section">'+
      '<div class="fc-section-label">'+esc(t('fan_speed'))+'</div>'+
      '<div class="chips">'+fanChips+'</div>'+
    '</div>'+
    '<div class="fc-section">'+
      '<div class="fc-section-label">'+esc(t('swing'))+'</div>'+
      '<div class="chips">'+swingChips+'</div>'+
    '</div>'+
    (wattsLine ? '<div class="fc-meta">'+esc(t('power_w'))+': '+wattsLine+'</div>' : '')+
  '</div>';
}

// Helper: register a control with pointerdown trigger for first-click response.
function tap(el, fn){
  var fired = false;
  var handler = function(e){
    if(fired) return;
    fired = true;
    setTimeout(function(){ fired = false; }, 250);
    if(e && e.preventDefault) e.preventDefault();
    fn(e);
  };
  el.addEventListener('pointerdown', handler);
  el.addEventListener('click', handler);
}

function bindFullCards(){
  document.querySelectorAll('label.toggle').forEach(function(lbl){
    var input = lbl.querySelector('input.power-input');
    var id = lbl.getAttribute('data-id');
    if(!input) return;
    input.addEventListener('change', function(){
      sendCmd(id, {on: input.checked});
    });
  });
  document.querySelectorAll('.temp-down').forEach(function(b){
    tap(b, function(){
      var id = b.getAttribute('data-id');
      var cur = parseInt(b.getAttribute('data-cur'),10) || 22;
      sendCmd(id, {target_temp: Math.max(16, cur-1)});
    });
  });
  document.querySelectorAll('.temp-up').forEach(function(b){
    tap(b, function(){
      var id = b.getAttribute('data-id');
      var cur = parseInt(b.getAttribute('data-cur'),10) || 22;
      sendCmd(id, {target_temp: Math.min(30, cur+1)});
    });
  });
  document.querySelectorAll('.chip.mode').forEach(function(c){
    tap(c, function(){
      sendCmd(c.getAttribute('data-id'), {mode: c.getAttribute('data-mode')});
    });
  });
  document.querySelectorAll('.chip.fan').forEach(function(c){
    tap(c, function(){
      sendCmd(c.getAttribute('data-id'), {fan_speed: c.getAttribute('data-fan')});
    });
  });
  document.querySelectorAll('.chip.swing').forEach(function(c){
    tap(c, function(){
      var k = c.getAttribute('data-skey');
      var sw = SWINGS.filter(function(x){return x.key===k;})[0];
      if(sw) sendCmd(c.getAttribute('data-id'), {swing_v: sw.v, swing_h: sw.h});
    });
  });
  try { window.focus(); } catch(_) {}
}

// ── load + render ───────────────────────────────────────────────────────
function load(){
  apiGet('/rooms').then(function(res){
    var rooms = res.rooms || {};
    var keys = Object.keys(rooms);
    DEVICES = {};
    keys.forEach(function(k){(rooms[k]||[]).forEach(function(d){DEVICES[d.device_id]=d;});});

    if(keys.length===0){
      $('root').innerHTML = '<div class="empty">'+esc(t('empty'))+'</div>';
      return;
    }
    keys.sort();
    var html = '';
    var compactTotal = 0;
    var COMPACT_MAX = 2;
    keys.forEach(function(roomKey){
      var devs = rooms[roomKey] || [];
      var label = roomLabel(roomKey);
      html += '<div class="room"><div class="room-title">'+esc(label)+'</div>';
      if(IS_MODAL){
        devs.forEach(function(d){ html += renderFullCard(d); });
      } else {
        html += '<div class="list">';
        devs.forEach(function(d){
          if(compactTotal < COMPACT_MAX){ html += renderRow(d); compactTotal++; }
        });
        html += '</div>';
      }
      html += '</div>';
    });
    $('root').innerHTML = html;
    if(IS_MODAL) bindFullCards(); else bindCompactRows();
    reportModalSize();
  }).catch(function(e){
    $('root').innerHTML = '<div class="empty">'+esc(e.message)+'</div>';
    showToast(e.message || 'Error', 'error');
    reportModalSize();
  });
}

function sendCmd(id, state){
  apiPost('/device/'+encodeURIComponent(id)+'/command', {state:state})
    .then(function(){ load(); })
    .catch(function(e){ showToast(t('cmd_failed')+': '+e.message, 'error'); });
}

// In modal mode, ask the parent SPA to size its panel to fit our content.
function reportModalSize(){
  if(!IS_MODAL || !inFrame) return;
  requestAnimationFrame(function(){
    var root = $('root');
    if(!root) return;
    var w = Math.min(760, Math.max(560, root.scrollWidth + 48));
    var h = Math.min(820, Math.max(480, root.scrollHeight + 48));
    try{
      window.parent.postMessage({type:'modal_resize', width:w, height:h}, '*');
    }catch(_){}
  });
}

// ── modal mode setup ────────────────────────────────────────────────────
if(IS_MODAL){
  document.body.classList.add('modal-mode');
  $('root').classList.add('modal');
  if(inFrame){
    var btn = $('fsClose');
    btn.style.display = 'flex';
    btn.onclick = function(){
      try{ window.parent.postMessage({type:'closeWidgetModal', module:'climate'}, '*'); }catch(_){}
    };
    window.addEventListener('keydown', function(e){
      if(e.key === 'Escape'){
        try{ window.parent.postMessage({type:'closeWidgetModal', module:'climate'}, '*'); }catch(_){}
      }
    });
  }
}

// Additional 'refresh' postMessage handler (shared listener handles lang_changed)
window.addEventListener('message', function(e){
  if(e.data && e.data.type === 'refresh') load();
});

// ── boot ─────────────────────────────────────────────────────────────────
applyLang();
load();
setInterval(load, IS_MODAL ? 5000 : 10000);
window.addEventListener('focus', load);
</script>
</body>
</html>
