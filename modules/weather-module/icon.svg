  <!-- Sun rays -->
  <rect x="8.25" y="2" width="1.5" height="2.5" rx="0.75"/>
  <rect x="8.25" y="11.5" width="1.5" height="2" rx="0.75" opacity="0.5"/>
  <rect x="2" y="7.25" width="2.5" height="1.5" rx="0.75"/>
  <rect x="12.5" y="7.25" width="2" height="1.5" rx="0.75" opacity="0.5"/>
  <!-- diagonal rays -->
  <rect x="3.8" y="3.8" width="1.5" height="2" rx="0.75" transform="rotate(-45 3.8 3.8)"/>
  <rect x="13.2" y="3.2" width="1.5" height="2" rx="0.75" transform="rotate(45 13.2 3.2)" opacity="0.6"/>
